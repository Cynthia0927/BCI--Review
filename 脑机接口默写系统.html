<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>脑机接口 · 默写评分系统</title>
<style>
:root{
  --bg:#ffffff; --side:#fafafa; --panel:#ffffff;
  --ink:#18181b; --ink-soft:#6b7280; --ink-faint:#9ca3af;
  --line:#ececec; --line-soft:#f3f3f3; --line-strong:#e0e0e0;
  --accent:#18181b;
  --good:#15803d; --good-bg:#f0f7f1; --good-line:#cfe6d4;
  --amber:#b45309; --amber-bg:#fbf6ee; --amber-line:#ecdcc4;
  --red:#b91c1c; --red-bg:#fbf1f0; --red-line:#eecfcb;
  --radius:12px; --radius-sm:8px;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit}
:focus-visible{outline:1.5px solid var(--accent);outline-offset:2px}
::selection{background:#18181b15}

.app{display:grid;grid-template-columns:308px 1fr;height:100vh;overflow:hidden}
.side{background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.main{min-height:0;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg)}

.brand{padding:20px 20px 16px;border-bottom:1px solid var(--line)}
.brand h1{margin:0;font-size:14.5px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.brand .sub{margin-top:5px;font-size:11px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.02em}

.stats{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:11px}
.stat-top{display:flex;justify-content:space-between;align-items:baseline}
.stat-top .lbl{font-size:11.5px;color:var(--ink-soft)}
.stat-top .pct{font-size:20px;font-weight:300;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.track{height:3px;border-radius:3px;background:var(--line);overflow:hidden;display:flex}
.track i{height:100%;display:block}
.track i.s{background:#27272a}.track i.m{background:#a1a1aa}.track i.w{background:#d4d4d8}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:10.5px;color:var(--ink-faint)}
.legend span{display:flex;align-items:center;gap:4px}
.d{width:6px;height:6px;border-radius:50%;display:inline-block}
.d.s{background:#27272a}.d.m{background:#a1a1aa}.d.w{background:#d4d4d8}.d.n{background:#ececec}
.metoo{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
.metoo b{font-weight:600;color:var(--ink)}

.tools{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:11px}
.search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:7px 10px}
.search input{border:none;background:none;outline:none;width:100%;font-size:13px;color:var(--ink)}
.search input::placeholder{color:var(--ink-faint)}
.seg{display:flex;flex-wrap:wrap;gap:5px}
.seg .chip{font-size:11.5px;padding:4px 9px;border-radius:6px;color:var(--ink-soft);background:#fff;border:1px solid var(--line-strong)}
.seg .chip:hover{border-color:#c8c8c8}
.seg .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.acts{display:flex;flex-wrap:wrap;gap:5px}
.acts button{font-size:11.5px;padding:5px 9px;border-radius:6px;color:var(--ink-soft);background:#fff;border:1px solid var(--line-strong)}
.acts button:hover{border-color:#c8c8c8;color:var(--ink)}

.qlist{flex:1;overflow-y:auto;padding:6px}
.qitem{position:relative;display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:8px;cursor:pointer}
.qitem:hover{background:#f1f1f1}
.qitem.active{background:#efefef}
.qitem.active::before{content:"";position:absolute;left:0;top:9px;width:2px;height:22px;background:var(--accent);border-radius:2px}
.qitem .fam{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;background:#ececec}
.qitem .fam.s{background:#27272a}.qitem .fam.m{background:#a1a1aa}.qitem .fam.w{background:#d4d4d8}
.qitem .body{flex:1;min-width:0}
.qitem .top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.qitem .bdg{font-size:9.5px;font-family:var(--mono);padding:1px 5px;border-radius:4px;background:#efefef;color:#52525b}
.qitem .num{font-size:10px;color:var(--ink-faint);font-family:var(--mono)}
.qitem .txt{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qitem.active .txt{color:var(--ink)}
.qitem .sc{flex-shrink:0;font-size:10.5px;font-family:var(--mono);font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);z-index:5}
.crumb{font-size:12px;color:var(--ink-faint);font-family:var(--mono)}
.crumb b{color:var(--ink);font-weight:600}
.nav{display:flex;gap:7px}
.nav button{border:1px solid var(--line-strong);background:#fff;border-radius:8px;padding:7px 13px;font-size:13px;color:var(--ink-soft)}
.nav button:hover{border-color:#c8c8c8;color:var(--ink)}

.stage{flex:1;padding:30px;max-width:880px;width:100%;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.qhead{padding:18px 24px 0;display:flex;align-items:center;gap:9px}
.tag{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:5px;letter-spacing:.02em}
.tag.fill{background:#f4f4f5;color:#3f3f46}
.tag.choice{background:#f4f4f5;color:#3f3f46}
.tag.short{background:#18181b;color:#fff}
.tag.src{background:#fafafa;color:var(--ink-faint);border:1px solid var(--line)}
.qbody{padding:14px 24px 18px;font-size:17px;line-height:1.85}
.qbody .bk{display:inline-block;min-width:42px;border-bottom:1.5px solid var(--ink);margin:0 3px;text-align:center;font-weight:600}

.opts{padding:0 24px 18px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{display:flex;gap:9px;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;line-height:1.5;align-items:flex-start;background:#fff}
.opt .L{font-family:var(--mono);font-weight:700;color:var(--ink-faint);flex-shrink:0}
.opt .mk{margin-left:auto;font-family:var(--mono);font-weight:700}
.opt.correct{background:var(--good-bg);border-color:var(--good-line)}
.opt.correct .L{color:var(--good)}
.opts.pick .opt{cursor:pointer;transition:.12s}
.opts.pick .opt:hover{border-color:#c8c8c8;background:#fafafa}
.opts.pick.answered .opt{cursor:default}
.opts.pick.answered .opt.right{background:var(--good-bg);border-color:var(--good-line)}
.opts.pick.answered .opt.right .L,.opts.pick.answered .opt.right .mk{color:var(--good)}
.opts.pick.answered .opt.wrong{background:var(--red-bg);border-color:var(--red-line)}
.opts.pick.answered .opt.wrong .L,.opts.pick.answered .opt.wrong .mk{color:var(--red)}

.choice-tip{padding:0 24px 18px;font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.choice-tip .mb{font-size:10.5px;font-family:var(--mono);background:#18181b;color:#fff;padding:2px 7px;border-radius:5px}
kbd{font-family:var(--mono);background:#f4f4f5;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;color:var(--ink-soft)}

.azone{padding:18px 24px 20px;border-top:1px solid var(--line-soft)}
.azlabel{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink-soft);margin-bottom:8px}
.azlabel .hk{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)}
textarea#inp{width:100%;min-height:96px;resize:vertical;border:1px solid var(--line-strong);border-radius:9px;padding:12px 14px;font-size:15px;line-height:1.7;font-family:var(--sans);color:var(--ink);background:#fff}
textarea#inp.tall{min-height:150px}
textarea#inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #18181b0d}
.az-actions{display:flex;gap:8px;margin-top:11px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--line-strong);background:#fff;border-radius:8px;padding:8px 14px;font-size:13.5px;color:var(--ink-soft)}
.btn:hover{border-color:#c8c8c8;color:var(--ink)}
.btn.go{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.btn.go:hover{background:#000}
.fam-set{display:flex;gap:5px;margin-left:auto}
.fam-set button{font-size:12px;padding:6px 11px;border-radius:7px;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft)}
.fam-set button.on{background:#18181b;color:#fff;border-color:#18181b}

.result{margin-top:16px;display:none}
.result.show{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.meter{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;display:flex;gap:24px;align-items:center}
.ring{position:relative;width:104px;height:104px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .v{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .v b{font-size:34px;font-weight:300;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.ring .v span{font-size:9.5px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.1em;margin-top:3px}
.minfo{flex:1;min-width:0}
.grade{font-size:17px;font-weight:600;margin-bottom:2px}
.minfo .desc{font-size:12px;color:var(--ink-faint)}
.subs{display:flex;gap:20px;margin-top:13px;flex-wrap:wrap}
.sub{font-size:11.5px;color:var(--ink-soft)}
.sub b{font-size:15px;font-weight:600;color:var(--ink);margin-left:5px;font-variant-numeric:tabular-nums}
.sbar{height:3px;border-radius:3px;background:var(--line);margin-top:5px;width:84px;overflow:hidden}
.sbar i{display:block;height:100%;background:#27272a}

.next-hint{text-align:center;font-size:12px;color:var(--ink-faint);margin-top:14px;font-family:var(--mono)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-top:13px;overflow:hidden}
.panel h3{margin:0;padding:13px 22px;font-size:12.5px;color:var(--ink-soft);font-weight:600;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:8px}
.panel h3::before{content:"";width:3px;height:13px;background:var(--accent);border-radius:2px}
.pbody{padding:15px 22px}

.kws{display:flex;flex-wrap:wrap;gap:7px}
.kw{font-size:12.5px;padding:4px 10px;border-radius:7px;display:flex;align-items:center;gap:6px;border:1px solid var(--line)}
.kw .mk{font-family:var(--mono);font-weight:700;font-size:11px}
.kw.hit{background:var(--good-bg);border-color:var(--good-line);color:var(--good)}
.kw.part{background:var(--amber-bg);border-color:var(--amber-line);color:var(--amber)}
.kw.miss{background:var(--red-bg);border-color:var(--red-line);color:var(--red)}

.partlist{display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:flex-start;gap:11px;font-size:13.5px;line-height:1.55}
.prow .pmk{font-family:var(--mono);font-size:12px;width:16px;text-align:center;flex-shrink:0;margin-top:2px}
.prow .pbar{flex:0 0 64px;height:3px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:8px}
.prow .pbar i{display:block;height:100%}
.prow.hit .pbar i{background:var(--good)}.prow.hit .pmk{color:var(--good)}
.prow.part .pbar i{background:var(--amber)}.prow.part .pmk{color:var(--amber)}
.prow.miss .pbar i{background:#d4d4d8}.prow.miss .pmk{color:var(--ink-faint)}
.prow .ptxt{flex:1;color:var(--ink-soft)}

.refline{font-size:14.5px;line-height:1.9;background:#fafafa;border:1px solid var(--line);border-radius:9px;padding:12px 14px}
.refline .miss{background:#fbe9e6;color:var(--red);border-radius:3px;padding:0 2px;font-weight:600}
.refline .got{background:#eef6ef;border-radius:3px;padding:0 2px}
.diff{font-size:14.5px;line-height:1.9}
.diff .ok{background:#eef6ef;border-radius:3px;padding:0 1px}
.diff .extra{background:#fbe9e6;color:var(--red);text-decoration:line-through;border-radius:3px;padding:0 1px}
.metaline{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-bottom:6px}

.reveal-a{font-size:15px;line-height:1.85;background:#fafafa;border:1px solid var(--line);border-radius:9px;padding:13px 15px;white-space:pre-wrap}
.exp{font-size:13.5px;line-height:1.85;color:var(--ink-soft);white-space:pre-wrap}

.empty{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--ink-faint)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#18181b;color:#fff;padding:9px 16px;border-radius:9px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.menu-btn{display:none;width:34px;height:34px;border-radius:8px;border:1px solid var(--line-strong);background:#fff;align-items:center;justify-content:center;color:var(--ink-soft)}
.scrim{display:none;position:fixed;inset:0;background:#0006;z-index:25}
.scrim.show{display:block}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;inset:0 auto 0 0;width:290px;z-index:30;transform:translateX(-100%);transition:.25s}
  .side.open{transform:none}
  .opts{grid-template-columns:1fr}
  .menu-btn{display:inline-flex}
  .stage{padding:20px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <h1><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12h3l2-7 4 16 3-11 2 5h6"/></svg> 脑机接口 · 默写评分</h1>
      <div class="sub" id="brandSub">填空 · 单选 · 多选 · 简答</div>
    </div>
    <div class="stats">
      <div class="stat-top"><span class="lbl">掌握进度</span><span class="pct" id="masterPct">0%</span></div>
      <div class="track"><i class="s" id="barS"></i><i class="m" id="barM"></i><i class="w" id="barW"></i></div>
      <div class="legend">
        <span><i class="d s"></i><b id="cntS">0</b> 熟</span>
        <span><i class="d m"></i><b id="cntM">0</b> 中</span>
        <span><i class="d w"></i><b id="cntW">0</b> 弱</span>
        <span><i class="d n"></i><b id="cntN">0</b> 未练</span>
      </div>
      <div class="metoo"><span>均分 <b id="avgSc">—</b></span><span>最高 <b id="bestSc">—</b></span></div>
    </div>
    <div class="tools">
      <div class="search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" placeholder="搜索题目 / 答案 / 关键词">
      </div>
      <div class="seg" id="typeFilters">
        <span class="chip on" data-type="all">全部</span>
        <span class="chip" data-type="fill">填空</span>
        <span class="chip" data-type="single">单选</span>
        <span class="chip" data-type="multi">多选</span>
        <span class="chip" data-type="short">简答</span>
      </div>
      <div class="seg" id="bankFilters">
        <span class="chip on" data-bank="all">两库</span>
        <span class="chip" data-bank="main">主库</span>
        <span class="chip" data-bank="supp">补充库</span>
      </div>
      <div class="acts">
        <button id="actRandom">随机</button>
        <button id="actWeak">练薄弱</button>
        <button id="actUntried">练未做</button>
        <button id="actExport">导出</button>
        <button id="actReset">重置</button>
      </div>
    </div>
    <div class="qlist" id="qlist"></div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <section class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-btn" id="menuBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div class="crumb" id="crumb">—</div>
      </div>
      <div class="nav">
        <button id="prevBtn">← 上一题</button>
        <button id="nextBtn">下一题 →</button>
      </div>
    </div>
    <div class="stage" id="stage"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
const ITEMS = [{"id":"supp-fill-8","src":"supp","type":"fill","n":8,"q":"BCI（脑机接口）研究人员和开发人员在使用 BCI 控制 AT（辅助技术）应用时，可以有两种选择方式： ［填空］ 和 ［填空］ 。","a":"同步控制；异步控制","parts":["同步控制","异步控制"],"keywords":["同步控制","异步控制"],"exp":"【考点】BCI 控制 AT 的两种方式。同步控制=系统定时给窗口、用户须配合节拍（如 P300）；异步控制=持续监测、用户随时发起（如运动想象），更自然但要解决连续解码与误触发。【记忆】同步=机器定时；异步=用户自定。"},{"id":"supp-fill-9","src":"supp","type":"fill","n":9,"q":"对硬件采集的脑电信号进行分析并产生实时输出、决定和协调实际运行的是 BCI 软件，它包含四个关键部件： ［填空］ 、 ［填空］ 、 ［填空］ 和 ［填空］ 。","a":"信号处理模块、特征提取模块、特征分类模块、控制接口模块","parts":["信号处理模块","特征提取模块","特征分类模块","控制接口模块"],"keywords":["信号处理模块","特征提取模块","特征分类模块","控制接口模块"],"exp":"【考点】BCI 软件四模块。口诀「处·取·分·接」：信号处理 → 特征提取 → 特征分类 → 控制接口。"},{"id":"supp-fill-10","src":"supp","type":"fill","n":10,"q":"在头皮两个电极之间测量电极阻抗的方式分为： ［填空］ ，测量信号电极与参考电极之间的阻抗； ［填空］ ，测量两个信号电极之间的阻抗。","a":"单极模式；双极模式","parts":["单极模式","双极模式"],"keywords":["单极模式","双极模式"],"exp":"【考点】阻抗测量两模式。单极=信号电极 vs 参考电极；双极=两个信号电极之间。"},{"id":"supp-fill-11","src":"supp","type":"fill","n":11,"q":"在大脑皮层中，与运动、感觉相关的区域主要有 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"初级运动皮层、运动前区皮层、初级躯体感觉皮层、后顶叶皮层、前额叶皮层","parts":["初级运动皮层","运动前区皮层","初级躯体感觉皮层","后顶叶皮层","前额叶皮层"],"keywords":["初级运动皮层","运动前区皮层","初级躯体感觉皮层","后顶叶皮层","前额叶皮层"],"exp":"【考点】运动感觉相关皮层五区。记「运动两块（初级运动 M1+运动前区 PM）、感觉一块（初级躯体感觉 S1）、整合规划两块（后顶叶 PPC+前额叶）」。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 初级运动皮层（M1）：直接发出运动指令、控制随意运动的皮层区。\n• 运动前区皮层（PM）：运动的准备与计划，含背侧（手臂到达）与腹侧（抓握）。\n• 初级躯体感觉皮层（S1）：处理触觉、本体觉、温痛等躯体感觉。\n• 后顶叶皮层（PPC）：感觉运动整合、空间注意与运动规划；受损可致半侧空间忽视。"},{"id":"supp-fill-12","src":"supp","type":"fill","n":12,"q":"脑内偶极子电流源在脑、脑脊液、颅骨和头皮上扩散的方式称为 ［填空］ 。","a":"容积传导效应","parts":["容积传导效应"],"keywords":["容积传导效应"],"exp":"【考点】容积传导效应。它让头皮 EEG 模糊、空间分辨率差。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 容积传导（容积导体效应）：脑内电流源经脑、脑脊液、颅骨、头皮向四周扩散模糊，由组织几何形状与电阻率决定，是 EEG 空间分辨率差的原因。"},{"id":"supp-fill-13","src":"supp","type":"fill","n":13,"q":"脑电图（EEG（头皮脑电））一般的记录方式为 ［填空］ （单极性/双极性），准确记录和解读脑电图的关键是 ［填空］ 。","a":"双极性；参考电极的选择","parts":["双极性","参考电极的选择"],"keywords":["双极性","参考电极的选择"],"exp":"【考点】EEG 记录方式与关键。双极性记录；成败关键在参考电极选得好不好。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。"},{"id":"supp-fill-14","src":"supp","type":"fill","n":14,"q":"四种主要的代谢神经成像方法有 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"功能经颅多普勒、正电子发射断层扫描、功能近红外光谱、功能核磁共振成像","parts":["功能经颅多普勒","正电子发射断层扫描","功能近红外光谱","功能核磁共振成像"],"keywords":["功能经颅多普勒","正电子发射断层扫描","功能近红外光谱","功能核磁共振成像"],"exp":"【考点】四种代谢（血流/代谢类）成像。记「多普勒 fTCD、PET、fNIRS、fMRI」——都看代谢/血流，时间分辨率低。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 功能经颅多普勒（fTCD）：用超声多普勒测脑动脉血流速度变化来反映脑活动，属血流/代谢类成像方法。\n• PET（正电子发射断层扫描）：注入放射性示踪剂、探测正电子湮灭来成像代谢活动，属代谢神经成像，有辐射。\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、按血氧变化推测脑区活动的光学方法，轻便便宜，但看血流（反应慢）且只能看表层。\n• fMRI（功能核磁共振成像）：靠血氧水平依赖（BOLD）信号推断脑活动，空间分辨率极高、全脑覆盖、无创，但响应慢、时间分辨率低。"},{"id":"supp-fill-15","src":"supp","type":"fill","n":15,"q":"大脑皮层一般可分为 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 四个区域（脑叶）。","a":"额叶、颞叶、顶叶、枕叶","parts":["额叶","颞叶","顶叶","枕叶"],"keywords":["额叶","颞叶","顶叶","枕叶"],"exp":"【考点】四大脑叶。口诀「额·颞·顶·枕」。"},{"id":"supp-fill-16","src":"supp","type":"fill","n":16,"q":"覆盖在大脑半球表面、厚约 1.5~4mm 的大脑结构称为 ［填空］ ，因集中了大量神经元俗称 ［填空］ ，是 BCI 研究的主要脑区。","a":"皮层（皮质）；灰质","parts":["皮层（皮质）","灰质"],"keywords":["皮层","灰质"],"exp":"【考点】皮层=灰质。1.5–4mm 厚、神经元密集，是 BCI 主战场。"},{"id":"supp-fill-17","src":"supp","type":"fill","n":17,"q":"大脑皮层主要有两种细胞：一种是 ［填空］ ，是投射神经元，将信息从皮层传出引发或阻止运动；另一种是 ［填空］ ，具大量局部树突，主要做局部信息处理。","a":"锥体细胞；星形（颗粒）细胞","parts":["锥体细胞","星形（颗粒）细胞"],"keywords":["锥体细胞","星形细胞"],"exp":"【考点】两类皮层细胞。锥体细胞=投射/传出（EEG 主源）；星形细胞=局部处理。重点抓“投射 vs 局部”。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 锥体细胞：一类投射神经元，把信息从皮层传向其他脑区/脊髓，是头皮 EEG 同步电位的主要来源。\n• 星形（颗粒）细胞：有大量局部树突、主要做局部信息处理的皮层细胞。"},{"id":"supp-fill-18","src":"supp","type":"fill","n":18,"q":"离开皮层的神经纤维称为 ［填空］ ，为许多皮层到其他脑区提供大量投射；由皮层纤维延续到脊髓的延髓椎体形成 ［填空］ ，大部分投射到中间区并经脊髓中间神经元间接影响运动神经元。","a":"皮层传出纤维；皮层脊髓束","parts":["皮层传出纤维","皮层脊髓束"],"keywords":["皮层传出纤维","皮层脊髓束"],"exp":"【考点】皮层传出纤维 vs 皮层脊髓束。前者泛指传出投射，后者特指下行到脊髓的束。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 皮层脊髓束：由皮层纤维延续到脊髓的传导束，大部分投射到中间区、经中间神经元间接影响运动神经元。"},{"id":"supp-fill-19","src":"supp","type":"fill","n":19,"q":"电流源在脑、脑脊液、颅骨和头皮上扩散的现象称为 ［填空］ ，由组织的几何形状和 ［填空］ 决定。","a":"容积传导；电阻率","parts":["容积传导","电阻率"],"keywords":["容积传导","电阻率"],"exp":"【考点】容积传导的决定因素。几何形状 + 电阻率。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 容积传导（容积导体效应）：脑内电流源经脑、脑脊液、颅骨、头皮向四周扩散模糊，由组织几何形状与电阻率决定，是 EEG 空间分辨率差的原因。"},{"id":"supp-fill-20","src":"supp","type":"fill","n":20,"q":"皮层介观源的源电流，大部分留在颅骨内被记录为 ［填空］ ，较少部分会到达头皮被记录为 ［填空］ 。","a":"皮层脑电图（ECoG（皮层脑电））；头皮脑电图（EEG（头皮脑电））","parts":["皮层脑电图（ECoG（皮层脑电））","头皮脑电图（EEG（头皮脑电））"],"keywords":["皮层脑电图）","头皮脑电图）"],"exp":"【考点】ECoG vs EEG 的来源差异。多数源电流留颅内 → ECoG 拿到；少数透到头皮 → EEG，所以 EEG 信号弱。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。"},{"id":"supp-fill-21","src":"supp","type":"fill","n":21,"q":"普遍观点认为，头皮记录脑电图的主要来源是大脑皮层 ［填空］ 的同步源；脑磁图（MEG（脑磁图））往往对 ［填空］ 的切向偶极子源更敏感。","a":"脑回冠；脑沟壁","parts":["脑回冠","脑沟壁"],"keywords":["脑回冠","脑沟壁"],"exp":"【考点】EEG vs MEG 敏感源。EEG ← 脑回冠（径向同步源）；MEG ← 脑沟壁（切向源）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场而非电位，定位准但需磁屏蔽房+液氦低温，设备昂贵；对脑沟壁的切向源更敏感。"},{"id":"supp-fill-22","src":"supp","type":"fill","n":22,"q":"在大脑成像中， ［填空］ 为 1mm 代表每个体素沿各方向都是 1mm； ［填空］ 反映进行一次测量所用的时间。","a":"空间分辨率；时间分辨率","parts":["空间分辨率","时间分辨率"],"keywords":["空间分辨率","时间分辨率"],"exp":"【考点】空间分辨率 vs 时间分辨率。空间=分清哪块；时间=分清哪一刻。"},{"id":"supp-fill-24","src":"supp","type":"fill","n":24,"q":"EEG（头皮脑电）是无创脑电采集方式，其脑电电极可分为 ［填空］ 和 ［填空］ 两种。","a":"干电极；湿电极","parts":["干电极","湿电极"],"keywords":["干电极","湿电极"],"exp":"【考点】干/湿电极。湿电极涂导电膏，信号好但麻烦；干电极方便但稳定性差。"},{"id":"supp-fill-31","src":"supp","type":"fill","n":31,"q":"一个逻辑上的 BCI 潜在用户群，由 ［填空］ 和 ［填空］ 的人组成（虽有足够认知功能，但无法激活任何肌肉）。","a":"不能产生任何自愿肌肉激活；完全闭锁综合征","parts":["不能产生任何自愿肌肉激活","完全闭锁综合征"],"keywords":["不能产生任何自愿肌肉激活","完全闭锁综合征"],"exp":"【考点】BCI 的核心用户群。认知正常但动不了——完全闭锁、无任何随意肌激活者。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 完全闭锁综合征：意识清醒、认知正常，但几乎无法激活任何随意肌（含眼动），是 BCI 的重要目标人群。"},{"id":"supp-fill-37","src":"supp","type":"fill","n":37,"q":"在 ［填空］ 协议中，信号特征被转化为产生过程下一步动作的指令（如光标/轮椅运动、连续开合机械手、改变神经假肢握力等）。","a":"过程控制","parts":["过程控制"],"keywords":["过程控制"],"exp":"【考点】过程控制协议。连续、逐步、可依反馈调整（对比目标选择）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 过程控制（process control）：用户与 BCI 控制实现意图的全过程、可依实时反馈连续调整（对比“目标选择”只下达目标）。\n• 目标选择（goal selection）：BCI 只把目标意图传给设备，由设备自身完成（如告诉轮椅目的地，导航交给轮椅）。"},{"id":"supp-fill-38","src":"supp","type":"fill","n":38,"q":"特定皮层系统的功能由丘脑皮层振荡开始或停止，丘脑皮层振荡用 ［填空］ 节律表达。","a":"μ / β","parts":["μ","β"],"keywords":["μ","β"],"exp":"【考点】丘脑皮层振荡的节律。μ/β——也正是运动想象 SMR 用的节律。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SMR（感觉运动节律）：感觉运动皮层的 μ(8–12Hz)+β(13–30Hz) 节律，运动/想象时 ERD、运动后 ERS。"},{"id":"supp-fill-50","src":"supp","type":"fill","n":50,"q":"用于 fNIRS（功能性近红外光谱）的光谱主要包括 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"连续波光谱、时间分辨光谱、频域谱","parts":["连续波光谱","时间分辨光谱","频域谱"],"keywords":["连续波光谱","时间分辨光谱","频域谱"],"exp":"【考点】fNIRS 三类光谱。连续波、时间分辨、频域。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、按血氧变化推测脑区活动的光学方法，轻便便宜，但看血流（反应慢）且只能看表层。"},{"id":"supp-fill-51","src":"supp","type":"fill","n":51,"q":"列举两个 fMRI（功能核磁共振成像）常用的单变量信号分析方法： ［填空］ 、 ［填空］ 。","a":"相关分析；广义线性模型","parts":["相关分析","广义线性模型"],"keywords":["相关分析","广义线性模型"],"exp":"【考点】fMRI 单变量分析。相关分析 + 广义线性模型（GLM）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fMRI（功能核磁共振成像）：靠血氧水平依赖（BOLD）信号推断脑活动，空间分辨率极高、全脑覆盖、无创，但响应慢、时间分辨率低。"},{"id":"supp-fill-52","src":"supp","type":"fill","n":52,"q":"BCI 技术为运动障碍患者带来福音，其针对的受损功能包括 ［填空］ 、 ［填空］ 和 ［填空］ 。","a":"交流受损、移动性受损、自主神经功能受损","parts":["交流受损","移动性受损","自主神经功能受损"],"keywords":["交流受损","移动性受损","自主神经功能受损"],"exp":"【考点】BCI 服务的三类受损功能。交流、移动、自主神经。"},{"id":"supp-fill-57","src":"supp","type":"fill","n":57,"q":"脑机接口中常用的特征类型有： ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"时域特征、频域特征、小波分析、相似性特征","parts":["时域特征","频域特征","小波分析","相似性特征"],"keywords":["时域特征","频域特征","小波分析","相似性特征"],"exp":"【考点】四类特征。时域、频域、小波、相似性。"},{"id":"supp-fill-58","src":"supp","type":"fill","n":58,"q":"分析感觉运动皮层活动的主要方法有： ［填空］ 和 ［填空］ 。","a":"频率分析；空间分析","parts":["频率分析","空间分析"],"keywords":["频率分析","空间分析"],"exp":"【考点】感觉运动皮层分析两法。频率分析 + 空间分析。"},{"id":"supp-fill-59","src":"supp","type":"fill","n":59,"q":"慢皮层电位（SCP（慢皮层电位））是一种事件相关电位，通常包括 ［填空］ 变化，先于实际或想象的运动和认知任务（如心算），代表准备行动的皮层激活；其后通常是一个 ［填空］ ，称为运动相关电位。","a":"负电位；双向波","parts":["负电位","双向波"],"keywords":["负电位","双向波"],"exp":"【考点】SCP 的波形构成。先负电位（准备）→ 后双向波（运动相关电位）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SCP（慢皮层电位）：一种很慢的事件相关电位（含负电位变化），先于实际或想象的运动/心算等，代表准备行动的皮层激活。"},{"id":"supp-fill-61","src":"supp","type":"fill","n":61,"q":"按电极放置位置可将 BCI 分为非侵入式与侵入式；不同于非侵入式只能记录 ［填空］ ，侵入式可从细胞外空间同时记录两类信号 ［填空］ 和 ［填空］ 。","a":"场电位；动作电位（尖峰脉冲）、场电位","parts":["场电位","动作电位（尖峰脉冲）"],"keywords":["场电位","动作电位"],"exp":"【考点】侵入式 vs 非侵入式记录到的信号。非侵入只拿场电位；侵入式还能拿单神经元动作电位（尖峰）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LFP（局部场电位）：脑内电极记录到的、电极周围一小群神经元集体电活动的总和，介于单神经元与头皮 EEG 之间的中等尺度信号。\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需把极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。"},{"id":"supp-fill-63","src":"supp","type":"fill","n":63,"q":"在基于脑电信号的运动想象 BCI 系统中，常用来表征运动想象状态的脑电节律是 ［填空］ 和 ［填空］ 频段的事件相关去同步/同步（ERD/ERS）现象。","a":"μ 波（8–13 Hz）；β 波（13–30 Hz）","parts":["μ 波（8–13 Hz）","β 波"],"keywords":["μ 波","β 波"],"exp":"【考点】运动想象用的节律。μ(8–13Hz)+β(13–30Hz) 的 ERD/ERS。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERD（事件相关去同步）：运动或运动想象时，对侧运动区 μ/β 节律功率下降的现象，反映皮层激活。\n• ERS（事件相关同步）：动作结束后 β 节律功率反弹增强的现象，反映运动抑制/恢复。\n• SMR（感觉运动节律）：感觉运动皮层的 μ(8–12Hz)+β(13–30Hz) 节律，运动/想象时 ERD、运动后 ERS。"},{"id":"supp-fill-69","src":"supp","type":"fill","n":69,"q":"在侵入式脑机接口中，常用的微电极阵列材料包括 ［填空］ 和 ［填空］ ，其特点是导电性好且生物兼容性强。","a":"铂（或铂金）；硅","parts":["铂（或铂金）","硅"],"keywords":["铂","硅"],"exp":"【考点】微电极阵列材料。铂 + 硅，导电好、生物相容。"},{"id":"supp-choice-6","src":"supp","type":"choice","n":6,"q":"BCI 的非医疗用途可分为以下三类：①改善/稳定/优化常规神经肌肉性能；②使常规神经肌肉性能超出正常能力；③拓展或丰富生活体验；④治疗注意力缺陷症并改进认知加工。以上正确组合是（）","a":"①②③","parts":["①②③"],"keywords":["①②③"],"exp":"【考点】非医疗用途三类。①②③属非医疗（优化、增强、丰富体验）；④治疗 ADHD 属医疗用途，排除 → D。","multi":false,"ans":"D","options":{"A":"①③④","B":"①②④","C":"②③④","D":"①②③"}},{"id":"supp-choice-7","src":"supp","type":"choice","n":7,"q":"评估任何事业（项目）行善（beneficence）的先决条件是（）","a":"明确定义行善","parts":["明确定义行善"],"keywords":["明确定义行善"],"exp":"【考点】Belmont 行善原则。先得把“什么是行善”定义清楚，才能评估 → A。","multi":false,"ans":"A","options":{"A":"明确定义行善","B":"明确行善方式","C":"明确事业影响","D":"明确行善对象"}},{"id":"supp-choice-25","src":"supp","type":"choice","n":25,"q":"下列记录的电位中，空间分辨率最高的是（）","a":"动作电位","parts":["动作电位"],"keywords":["动作电位"],"exp":"【考点·易混】空间分辨率排序：动作电位（单神经元）> 局部场电位 LFP > 皮层脑电 ECoG > 头皮脑电 EEG。单神经元最精细 → B。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需把极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。\n• LFP（局部场电位）：脑内电极记录到的、电极周围一小群神经元集体电活动的总和，介于单神经元与头皮 EEG 之间的中等尺度信号。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。","multi":false,"ans":"B","options":{"A":"局部场电位","B":"动作电位","C":"脑电图","D":"皮层脑电"}},{"id":"supp-choice-26","src":"supp","type":"choice","n":26,"q":"脑电图的主要脑源为（）","a":"皮层脑回冠的同步源","parts":["皮层脑回冠的同步源"],"keywords":["皮层脑回冠的同步源"],"exp":"【考点】EEG 主源=脑回冠的径向同步源（B）；切向源（脑沟壁）是 MEG 更敏感的，别选 D。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场而非电位，定位准但需磁屏蔽房+液氦低温，设备昂贵；对脑沟壁的切向源更敏感。","multi":false,"ans":"B","options":{"A":"皮层脑沟壁的切向源","B":"皮层脑回冠的同步源","C":"皮层折叠源","D":"以上都是"}},{"id":"supp-choice-28","src":"supp","type":"choice","n":28,"q":"下列说法错误的是（）","a":"与头皮记录相比，颅内记录会得到更多更好的信息","parts":["与头皮记录相比，颅内记录会得到更多更好的信息"],"keywords":["与头皮记录相比，颅内记录会得到更多更好的信息"],"exp":"【考点·找错】C 过于绝对：颅内信号虽好，但覆盖范围有限、且有手术风险，“更多更好”是错误表述 → C。A/B/D 均正确。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• LFP（局部场电位）：脑内电极记录到的、电极周围一小群神经元集体电活动的总和，介于单神经元与头皮 EEG 之间的中等尺度信号。\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。","multi":false,"ans":"C","options":{"A":"因电极不刺入大脑，ECoG 比 LFP 记录创伤更小，空间分辨率介于 LFP 与 EEG 之间","B":"颅内电势的幅度、空间与时间依赖性主要依赖电极尺度","C":"与头皮记录相比，颅内记录会得到更多更好的信息","D":"皮层突触源是头皮记录 EEG 的主要来源"}},{"id":"supp-choice-31","src":"supp","type":"choice","n":31,"q":"半侧空间忽视症的障碍，主要由（）部分的病变引起。","a":"后顶叶皮层（PPC）","parts":["后顶叶皮层（PPC）"],"keywords":["后顶叶皮层"],"exp":"【考点】半侧空间忽视 ← 后顶叶皮层 PPC 病变（D）。PPC 管空间注意/整合。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 初级运动皮层（M1）：直接发出运动指令、控制随意运动的皮层区。\n• 运动前区皮层（PM）：运动的准备与计划，含背侧（手臂到达）与腹侧（抓握）。\n• 初级躯体感觉皮层（S1）：处理触觉、本体觉、温痛等躯体感觉。\n• 后顶叶皮层（PPC）：感觉运动整合、空间注意与运动规划；受损可致半侧空间忽视。\n• 半侧空间忽视症：常因后顶叶皮层（PPC）病变，患者忽略对侧一半空间的信息。","multi":false,"ans":"D","options":{"A":"初级运动皮层（M1）","B":"运动前区皮层（PM）","C":"初级躯体感觉皮层（S1）","D":"后顶叶皮层（PPC）"}},{"id":"supp-choice-32","src":"supp","type":"choice","n":32,"q":"下列脑电场信号中，空间分辨率最高的是（）。","a":"局部场电位","parts":["局部场电位"],"keywords":["局部场电位"],"exp":"【考点·易混】本题选项里没有单神经元动作电位，故 LFP（局部场电位）空间分辨率最高（B）。注意与第 25 题区分——选项不同，答案就不同。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LFP（局部场电位）：脑内电极记录到的、电极周围一小群神经元集体电活动的总和，介于单神经元与头皮 EEG 之间的中等尺度信号。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。","multi":false,"ans":"B","options":{"A":"P300 电位","B":"局部场电位","C":"头皮脑电图","D":"皮层脑电图"}},{"id":"supp-choice-33","src":"supp","type":"choice","n":33,"q":"下列大脑活动测量技术中，空间分辨率最高的是（）。","a":"微电极","parts":["微电极"],"keywords":["微电极"],"exp":"【考点·易混】问“测量技术”，微电极（记单神经元）空间分辨率最高（C）。三道“空间分辨率最高”题要按选项判断：动作电位/微电极 > LFP > ECoG > fMRI > fNIRS > EEG。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需把极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。\n• fMRI（功能核磁共振成像）：靠血氧水平依赖（BOLD）信号推断脑活动，空间分辨率极高、全脑覆盖、无创，但响应慢、时间分辨率低。\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、按血氧变化推测脑区活动的光学方法，轻便便宜，但看血流（反应慢）且只能看表层。","multi":false,"ans":"C","options":{"A":"头皮脑电图","B":"功能近红外光谱成像","C":"微电极","D":"功能核磁共振成像"}},{"id":"supp-choice-34","src":"supp","type":"choice","n":34,"q":"微电极记录点的生物电势，通过（）转化为导线上的电流信号。","a":"电化学反应","parts":["电化学反应"],"keywords":["电化学反应"],"exp":"【考点】电极-组织界面靠电化学反应（离子 ↔ 电子）把生物电势转成导线电流 → C。","multi":false,"ans":"C","options":{"A":"电磁感应","B":"微机处理","C":"电化学反应","D":"红外传感技术"}},{"id":"supp-choice-36","src":"supp","type":"choice","n":36,"q":"（多选）脑机接口系统中常用的特征提取方法有（）","a":"快速傅里叶变换；短时傅里叶变换；小波分析；自回归模型","parts":["快速傅里叶变换","短时傅里叶变换","小波分析","自回归模型"],"keywords":["快速傅里叶变换","短时傅里叶变换","小波分析","自回归模型"],"exp":"【考点·多选】FFT、STFT、小波、AR 全是常用特征提取方法 → ABCD。","multi":true,"ans":"ABCD","options":{"A":"快速傅里叶变换","B":"短时傅里叶变换","C":"小波分析","D":"自回归模型"}},{"id":"supp-choice-37","src":"supp","type":"choice","n":37,"q":"下列属于数据无关空间滤波器的是（）","a":"公共平均参考（CAR（公共平均参考））","parts":["公共平均参考（CAR（公共平均参考））"],"keywords":["公共平均参考）"],"exp":"【考点·易混】“数据无关”=不依赖数据统计/标签的固定滤波，即 CAR（B）。PCA/ICA 依赖数据统计（数据相关），CSP 还要用类别标签（有监督）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• PCA（主成分分析）：无监督降维/空间滤波，找方差最大的正交方向；依赖数据统计，属数据相关方法。\n• CAR（公共平均参考）：把所有电极的平均值作参考减掉，是固定的、数据无关的空间滤波/重参考。\n• CSP（共空间模式）：有监督（用类别标签）的空间滤波，找让两类方差差异最大的投影，运动想象常用。\n• ICA（独立成分分析）：假设记录是若干相互独立信号的混合并把它们拆开，常用于剔除眼电/肌电伪迹，能去掉与脑电频率重叠的伪迹。","multi":false,"ans":"B","options":{"A":"主成分分析（PCA（主成分分析））","B":"公共平均参考（CAR（公共平均参考））","C":"共空间模式（CSP（共空间模式））","D":"独立成分分析（ICA（独立成分分析））"}},{"id":"supp-choice-38","src":"supp","type":"choice","n":38,"q":"（多选）下列哪些信息可作为 EEG 信号的特征类型（）","a":"诱发电位幅值；频带功率；单神经元发射功率","parts":["诱发电位幅值","频带功率","单神经元发射功率"],"keywords":["诱发电位幅值","频带功率","单神经元发射功率"],"exp":"【考点·多选】诱发电位幅值、频带功率、单神经元发射功率均可作特征 → ABD。C 是分类器参数、不是信号特征，排除。","multi":true,"ans":"ABD","options":{"A":"诱发电位幅值","B":"频带功率","C":"支持向量机参数","D":"单神经元发射功率"}},{"id":"supp-choice-44","src":"supp","type":"choice","n":44,"q":"下面关于信号滤波的说法中，错误的是（）","a":"基于 P300 的系统使用 40~250Hz 的带通滤波器","parts":["基于 P300 的系统使用 40~250Hz 的带通滤波器"],"keywords":["基于 P300 的系统使用 40~250Hz 的带通滤波器"],"exp":"【考点·找错】P300 是较慢的诱发电位（主要为低频成分），用 40~250Hz 的高频带通会把 P300 本身滤掉 → C 错。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。","multi":false,"ans":"C","options":{"A":"EEG 常用 256Hz 采样，通常用 0.5~100Hz 模拟滤波器","B":"记录慢波要求使用很低拐角频率（如 0.1Hz）的高通滤波器","C":"基于 P300 的系统使用 40~250Hz 的带通滤波器","D":"ECoG 记录采用 0.5~500Hz 的带通滤波器"}},{"id":"supp-choice-47","src":"supp","type":"choice","n":47,"q":"皮层脑电（ECoG（皮层脑电））和脑磁（MEG（脑磁图））的相关范围达到至少（）","a":"200Hz","parts":["200Hz"],"keywords":["200Hz"],"exp":"【考点·记数字】ECoG 与 MEG 的相关范围至少达 200Hz → C。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场而非电位，定位准但需磁屏蔽房+液氦低温，设备昂贵；对脑沟壁的切向源更敏感。","multi":false,"ans":"C","options":{"A":"150Hz","B":"180Hz","C":"200Hz","D":"300Hz"}},{"id":"supp-choice-48","src":"supp","type":"choice","n":48,"q":"在观察左右手运动想象的 ERD（事件相关去同步）现象时，最优先考虑下列哪条通道的信号（）","a":"C4","parts":["C4"],"keywords":["C4"],"exp":"【考点】运动想象看中央区 C3/C4（不是枕区 PO）。手部运动想象 ERD 出现在对侧：想左手 → 右脑 C4，想右手 → 左脑 C3。本题答案 D（C4）；PO1/PO2 是枕区视觉通道，排除。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERD（事件相关去同步）：运动或运动想象时，对侧运动区 μ/β 节律功率下降的现象，反映皮层激活。","multi":false,"ans":"D","options":{"A":"PO1","B":"PO2","C":"C3","D":"C4"}},{"id":"supp-choice-49","src":"supp","type":"choice","n":49,"q":"不同 SSVEP（稳态视觉诱发电位）/VEP 范式的性能比较，从高到低的顺序是（）","a":"c-VEP、f-VEP、t-VEP","parts":["c-VEP、f-VEP、t-VEP"],"keywords":["c-VEP、f-VEP、t-VEP"],"exp":"【考点】VEP 范式性能：码调制 c-VEP > 频率调制 f-VEP > 时间调制 t-VEP（A）。c-VEP 用伪随机码，信息率最高。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• VEP（视觉诱发电位）：视觉刺激（闪光/图形翻转）后枕叶产生的诱发电位，按调制方式分 t-VEP（时间）/f-VEP（频率）/c-VEP（码）。\n• SSVEP（稳态视觉诱发电位）：盯着固定频率闪烁的目标时，枕叶产生同频及谐波的稳定脑电响应，是高速 BCI 范式。","multi":false,"ans":"A","options":{"A":"c-VEP、f-VEP、t-VEP","B":"c-VEP、t-VEP、f-VEP","C":"f-VEP、c-VEP、t-VEP","D":"f-VEP、t-VEP、c-VEP"}},{"id":"supp-choice-50","src":"supp","type":"choice","n":50,"q":"以下说法错误的是（）","a":"慢变皮层电位之后通常是一个单相波，称为运动相关电位","parts":["慢变皮层电位之后通常是一个单相波，称为运动相关电位"],"keywords":["慢变皮层电位之后通常是一个单相波，称为运动相关电位"],"exp":"【考点·找错】SCP 之后是“双向波”而非“单相波” → A 错（对照填空 #59）。B/C/D 均正确。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SCP（慢皮层电位）：一种很慢的事件相关电位（含负电位变化），先于实际或想象的运动/心算等，代表准备行动的皮层激活。\n• SMR（感觉运动节律）：感觉运动皮层的 μ(8–12Hz)+β(13–30Hz) 节律，运动/想象时 ERD、运动后 ERS。","multi":false,"ans":"A","options":{"A":"慢变皮层电位之后通常是一个单相波，称为运动相关电位","B":"SCP 通常包括负电位变化","C":"准备电位（Bereitschaft 电位）是一种负的慢皮层电位，通常开始于自我发起运动前 500~1000ms","D":"与 SMR 类似，感觉运动区的 SCP 及相关电位与运动想象及实际运动相关"}},{"id":"supp-choice-55","src":"supp","type":"choice","n":55,"q":"（注：原题库此处题干疑似从第 7 题误植；按选项内容，本题实为“将一个新 BCI 医疗器械按 510(k) 途径推向市场，通常包括以下哪些步骤”）①识别可参考的已批准第二类上市设备；②获取申请书、识别设备中实质等效于新 BCI 装置的元素；③制造商递交 510(k) 监管意见书；④获取 FDA 发布许可证。正确的是（）","a":"①②③④","parts":["①②③④"],"keywords":["①②③④"],"exp":"【考点】510(k) 上市流程。四步全要：找参照设备 → 证明实质等效 → 递交 510(k) → 获 FDA 许可 → D。原题干文字疑似串行，按选项作答。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 510(k)：美国 FDA 的医疗器械上市途径——证明新器械与已上市器械“实质等效”即可获许可，比 PMA 快。\n• FDA：美国食品药品监督管理局，负责医疗器械的审批与监管。","multi":false,"ans":"D","options":{"A":"②③④","B":"①②④","C":"①②③","D":"①②③④"}},{"id":"supp-choice-56","src":"supp","type":"choice","n":56,"q":"功能磁共振成像（fMRI（功能核磁共振成像））信号对（）的预测，构成该领域一个可能的研究方向；其多变量模式分类的最新进展，利用 fMRI 的高空间分辨率、全脑覆盖和无创性成为可能。","a":"认知、情感（情绪）、知觉和运动状态","parts":["认知、情感（情绪）、知觉和运动状态"],"keywords":["认知、情感、知觉和运动状态"],"exp":"【考点】fMRI 多变量解码可预测认知/情感/知觉/运动等多种状态 → A（最全）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fMRI（功能核磁共振成像）：靠血氧水平依赖（BOLD）信号推断脑活动，空间分辨率极高、全脑覆盖、无创，但响应慢、时间分辨率低。","multi":false,"ans":"A","options":{"A":"认知、情感（情绪）、知觉和运动状态","B":"认知、情感（情绪）","C":"知觉和运动状态","D":"情感（情绪）、知觉"}},{"id":"main-fill-1","src":"main","type":"fill","n":1,"q":"脑机接口可以用于改善并治疗大脑功能，基于EEG（头皮脑电）的脑机接口治疗用途有 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"减少癫痫发作频率、治疗注意力缺陷症并改进认知加工、改善运动功能的恢复","parts":["减少癫痫发作频率","治疗注意力缺陷症并改进认知加工","改善运动功能的恢复"],"keywords":["减少癫痫发作频率","治疗注意力缺陷症并改进认知加工","改善运动功能的恢复"],"exp":"【考点】基于 EEG（头皮脑电） 的脑机接口三大治疗用途。要点是把神经反馈训练用到临床：①减少癫痫发作频率（让患者学会抑制异常放电的脑节律）；②治疗注意力缺陷症（ADHD（注意缺陷多动障碍））并改进认知加工（训练 θ/β 比值）；③改善运动功能的恢复（中风后运动康复）。【易错】这三项要一字不差、成组背。常把'改善运动功能恢复'误写成'增强运动能力'——治疗用途强调的是'恢复/康复'，不是给健康人增强。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 开环 vs 闭环（反馈）：开环=只是'读脑→控制设备'的单向输出，用户不知道自己做得对不对；闭环=把控制结果实时反馈给用户（视觉/听觉/触觉），用户据此调整大脑状态、越用越准。反馈是闭环的灵魂。\n• 神经反馈：把你自己的脑波实时显示给你看，通过反馈训练让你学会主动调节某种脑波（如降低癫痫相关的异常放电、改善注意力）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-2","src":"main","type":"fill","n":2,"q":"目前，正在使用两种运动辅助设备： ［填空］ 、 ［填空］ 。","a":"功能性电刺激、机器人","parts":["功能性电刺激","机器人"],"keywords":["功能性电刺激","机器人"],"exp":"【考点】目前在用的两种运动辅助设备：功能性电刺激（FES（功能性电刺激），用电流刺激瘫痪肌肉产生收缩）与机器人（外骨骼/机械臂带动肢体）。【易错】题干限定'运动辅助设备'，不要把 BCI（脑机接口） 本身、轮椅、假肢笼统填进去。只有这两个是标准答案。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• FES（功能性电刺激）：用电流刺激瘫痪的肌肉、让它产生收缩，从而帮患者恢复部分动作（如重新抓握）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-3","src":"main","type":"fill","n":3,"q":"BCI（脑机接口）应用于一般人群时，用户应用可能性很大程度上取决于BCI的 ［填空］ 、 ［填空］ 、 ［填空］ 方面的大幅改善。","a":"便利性、控制能力和一致性","parts":["便利性","控制能力和一致性"],"keywords":["便利性","控制能力和一致性"],"exp":"【考点】BCI（脑机接口） 要走向一般（健康）人群，取决于三方面的大幅改善：便利性（戴上即用、无需湿电极）、控制能力（精度够高能完成任务）、一致性（每次表现稳定可重复）。【易错】这是'一般人群'的应用前提，区别于'残障患者'——患者更看重能否替代失去的功能，健康人则要求门槛低、好用、稳定。别漏掉'一致性'，它正对应 BCI 当前最大短板。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 干电极 vs 湿电极：湿电极要涂导电膏，信号好但戴起来麻烦、要清理；干电极不用膏、戴着方便，但信号稳定性差些。常用电极材料是金、铂、银（银/氯化银最常见）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-4","src":"main","type":"fill","n":4,"q":"1978年Belmont报告中（保护人类被试的国家委员会）阐述的三项原则： ［填空］ 、 ［填空］ 、 ［填空］ ，讨论对人的脑-机接口研究引发的伦理道德问题，该报告是现代人类研究标准的创始文件。","a":"行善、对人尊重、公正","parts":["行善","对人尊重","公正"],"keywords":["行善","对人尊重","公正"],"exp":"【考点】1978 年 Belmont 报告三原则：行善（Beneficence，趋利避害）、对人尊重（Respect for persons，尊重自主与保护弱势）、公正（Justice，风险与受益公平分配）。它是现代人类被试研究伦理的创始文件。【易错】口诀'善·尊·公'。常见干扰项是'知情同意'——知情同意是'对人尊重'原则的具体落实，本身不是三原则之一。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERD / ERS（事件相关去同步 / 同步）：做或想象一个动作时，相关脑区某个频段的脑波会'变弱'（叫 ERD，去同步）；动作结束后又会短暂'变强'（叫 ERS，同步）。一句话：ERD=能量降低，ERS=能量升高。\n• Belmont 报告三原则：现代人体研究伦理的奠基文件，三原则是：行善（趋利避害）、对人尊重（尊重自主、保护弱势）、公正（风险和好处公平分配）。'知情同意'是落实'对人尊重'的具体做法。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-5","src":"main","type":"fill","n":5,"q":"BCIs把中枢神经系统的活动转化为新的输出，新的输出可以 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 自然的中枢神经系统输出。","a":"替代、恢复、增强、补充、改善","parts":["替代","恢复","增强","补充","改善"],"keywords":["替代","恢复","增强","补充","改善"],"exp":"【考点·高频必背】BCI（脑机接口） 把中枢神经系统活动转化为五种新输出：替代、恢复、增强、补充、改善（自然的中枢神经系统输出）。替代=代替已失去的功能（打字代替说话）；恢复=恢复受损功能（FES（功能性电刺激） 让瘫痪手重新抓握）；增强=超越常规（提高警觉性）；补充=在原功能上加一路输出（脑控第三只手）；改善=改进康复后的功能。【易错】口诀'替·恢·增·补·改'，五个一个都不能少，顺序最好也记住。'增强'与'补充'最容易混：增强是把原有能力做得更强，补充是额外加一个新通道。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• FES（功能性电刺激）：用电流刺激瘫痪的肌肉、让它产生收缩，从而帮患者恢复部分动作（如重新抓握）。\n• 中枢神经系统（CNS）的五种新输出：中枢神经系统=大脑和脊髓，是身体的总指挥部。脑机接口能把它的活动转成五种新输出：替代（代替失去的功能）、恢复（修复受损功能）、增强（超越常规）、补充（额外加一路）、改善（改进康复后的功能）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-6","src":"main","type":"fill","n":6,"q":"EEG（头皮脑电）电极分为 ［填空］ 和 ［填空］ ，其中 ［填空］ 直接与放大器连接， 包含一个1~10倍的前置放大。","a":"主动电极  被动电极   被动电极   主动电极","parts":["主动电极  被动电极   被动电极   主动电极"],"keywords":["主动电极  被动电极   被动电极   主动电极"],"exp":"【考点】EEG（头皮脑电） 电极分主动电极和被动电极。被动电极直接与放大器相连；主动电极内置一个 1~10 倍的前置放大（就近放大，抗干扰、降低对导线和阻抗的敏感）。【易错·极高频错点】千万别记反！'含前置放大的是主动电极'，'直接连放大器的是被动电极'。题目正是用'谁直接连、谁含前置放大'来设陷阱。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 电极阻抗：反映电极和头皮'接触好不好'的指标。阻抗高=接触差=信号弱、噪声大；面积大、皮肤清洁、涂导电膏都能降低阻抗。\n• 主动 vs 被动电极（前置放大）：被动电极直接连到放大器；主动电极在电极处就先内置一个小放大器（前置放大），就近把信号放大、更抗干扰。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-7","src":"main","type":"fill","n":7,"q":"［填空］ 和 ［填空］ 在皮质活动灵敏性方面是互相补充的。","a":"EEG（头皮脑电） , MEG（脑磁图）","parts":["EEG（头皮脑电）","MEG"],"keywords":["EEG","MEG"],"exp":"【考点】EEG（头皮脑电） 与 MEG（脑磁图） 在皮质活动灵敏性方面互相补充：EEG 对径向源（垂直皮层、脑回顶部）更敏感，MEG 对切向源（脑沟壁内）更敏感，二者结合可更全面定位。【易错】关键词是'互相补充/互补'，不是'相同'或'其中一个更好'。考'MEG 优势'时答'对脑沟源敏感、测真实场值、无需参考电极'。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• MEG（脑磁图）：不测电、而测大脑电活动产生的极微弱'磁场'。定位准，但磁场太弱，必须在磁屏蔽房里、用液氦把传感器冷却到极低温才能测，设备昂贵难普及。\n• 参考电极与重参考：脑电测的是'某电极相对一个参考点'的电压差，所以要选参考（如耳垂/乳突、全脑平均）。重参考=换个参考基准重新算。注意'表面拉普拉斯'其实是空间滤波，不算选参考电极。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-8","src":"main","type":"fill","n":8,"q":"脑机接口系统中常用的四种特征调理方法： ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］","a":"均值去除、滤波去噪、特征归一化、特征降维","parts":["均值去除","滤波去噪","特征归一化","特征降维"],"keywords":["均值去除","滤波去噪","特征归一化","特征降维"],"exp":"【考点】四种特征调理（conditioning）方法：均值去除、滤波去噪、特征归一化、特征降维。这是在'特征提取之后、送入分类器之前'对特征做的整理。【易错】口诀'均·滤·归·降'。注意区分'特征调理'（处理特征）与'信号预处理'（处理原始信号，是滤波/基线校正/伪迹去除/重参考）——两组四个词容易串。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• 特征调理：在提取出特征之后、送进分类器之前，对特征做的整理：去均值、滤波、归一化（统一量纲）、降维（减少维度）。\n• 参考电极与重参考：脑电测的是'某电极相对一个参考点'的电压差，所以要选参考（如耳垂/乳突、全脑平均）。重参考=换个参考基准重新算。注意'表面拉普拉斯'其实是空间滤波，不算选参考电极。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-9","src":"main","type":"fill","n":9,"q":"在脑机接口的特征翻译中，常用的分类模型有 ［填空］ 、 ［填空］ 、 ［填空］ 和非线性模型","a":"最小二乘判别函数、贝叶斯分类器、支持向量机","parts":["最小二乘判别函数","贝叶斯分类器","支持向量机"],"keywords":["最小二乘判别函数","贝叶斯分类器","支持向量机"],"exp":"【考点】特征翻译（分类）阶段常用的（线性）分类模型：最小二乘判别函数、贝叶斯分类器、支持向量机 SVM（支持向量机），外加非线性模型（如人工神经网络）。【易错】题干已给'和非线性模型'，所以前三空填线性的三种。别把 PCA（主成分分析）/ICA（独立成分分析）/CSP（共空间模式） 填进来——那些是特征提取/空间滤波，不是分类模型。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 四类特征（时域/频域/时频域/空域）：按'从哪个角度看信号'分类：时域=看波形随时间的样子（均值、峰值）；频域=看各频率的能量；时频域=看频率随时间怎么变（如小波）；空域=看不同电极位置之间的空间分布。\n• PCA（主成分分析）：一种'降维'方法，把很多相关的数据维度压缩成几个最能代表整体差异的新维度、去掉冗余。属于无监督方法（不需要标签）。\n• ICA（独立成分分析）：假设头皮记到的脑电其实是脑电、眼电、肌电等几路'相互独立'的信号混在一起，ICA 能把它们重新拆开，从而单独剔除眼电、肌电等伪迹。强项是能去掉'和脑电频率重叠'的伪迹（这点普通滤波做不到）。\n• CSP（共空间模式）：专门用于'两类'运动想象（如想左手 vs 想右手）的空间滤波。它找一组电极组合，让一类动作的信号方差最大、另一类最小，把两类的差异放到最大、便于区分。\n• SVM（支持向量机）：一种常用分类器，努力在两类数据之间找一条'间隔最大'的分界线。在样本少、特征多时表现稳健，所以脑机接口里常用。\n• 贝叶斯分类器：用概率做判断的分类器——结合'先验知识'和'新数据'，算出每个类别的可能性（后验概率），选最可能的那个。\n• 最小二乘判别函数：用'让误差平方和最小'的拟合方法找出各类别的分布，再画一条判别线来分类的线性方法。\n• 人工神经网络与深度学习（ANN/CNN/RNN/LSTM）：模仿大脑神经元层层连接的算法，能自动从数据里学复杂规律。擅长处理非线性、随时间变化的复杂模式，但通常需要大量训练数据。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-10","src":"main","type":"fill","n":10,"q":"在任何一个BCI（脑机接口）中，信号处理的两个部分 ［填空］ 和 ［填空］ 都必须一起良好地工作。","a":"特征提取、特征翻译","parts":["特征提取","特征翻译"],"keywords":["特征提取","特征翻译"],"exp":"【考点】任何 BCI（脑机接口） 中信号处理的两大部分：特征提取（从信号里提取与意图相关的特征）和特征翻译（把特征映射为控制命令，即分类/解码），二者必须协同良好工作。【易错】口诀'提+翻'。容易把'特征翻译'写成'特征分类'——意思相近但课件用语是'特征翻译'，按标准答案写最稳。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-11","src":"main","type":"fill","n":11,"q":"完全LIS（闭锁综合征）、典型LIS和不完全LIS是很多病症或事件的结果，包括 ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 、病毒性感染、或严重的大脑性麻痹。","a":"脑中风、肌肉萎缩性侧索硬化症 (Amyotrophic Lateral Sclerosis，ALS（肌萎缩性侧索硬化症）)、创伤、肿瘤","parts":["脑中风","肌肉萎缩性侧索硬化症 (Amyotrophic Lateral Sclerosis","ALS（肌萎缩性侧索硬化症）)","创伤","肿瘤"],"keywords":["脑中风","肌肉萎缩性侧索硬化症 (Amyotrophic Lateral Sclerosis","ALS)","创伤","肿瘤"],"exp":"【考点】导致完全/典型/不完全闭锁综合征（LIS（闭锁综合征））的病因：脑中风、肌萎缩性侧索硬化症（ALS（肌萎缩性侧索硬化症））、创伤、肿瘤（题干另给病毒性感染、严重脑性麻痹）。共同特点是损伤了运动输出通路但可能保留认知。【易错】ALS 全称要会写（Amyotrophic Lateral Sclerosis）。这些是'病因'，不要和 LIS 的三个'阶段'（完全/经典/不完全）混淆。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 闭锁综合征（LIS）：患者大脑清醒、有意识，但几乎全身肌肉都瘫了、无法说话和动作，像被'锁在身体里'。按残留动作多少分完全/经典/不完全三型，是脑机接口最有价值的服务对象。\n• ALS（肌萎缩性侧索硬化症，渐冻症）：一种运动神经元逐渐死亡、肌肉日益萎缩瘫痪的病，晚期可致闭锁状态，但认知常保留。"},{"id":"main-fill-12","src":"main","type":"fill","n":12,"q":"BCI（脑机接口）被集成在某个应用中，从而一起构成独立的提供特定功能的设备被称为 ［填空］ 。","a":"BCI（脑机接口）/AT（辅助技术）设备或系统","parts":["BCI（脑机接口）","AT（辅助技术）设备或系统"],"keywords":["BCI","AT设备或系统"],"exp":"【考点】BCI（脑机接口） 被集成进某个应用、共同构成一个独立的、提供特定功能的设备，称为 BCI/AT（辅助技术） 设备或系统（AT=辅助技术 Assistive Technology）。【易错】记住是'BCI/AT'这个组合词。它强调 BCI 不是孤立存在，而是和辅助技术绑定成一个能干活的完整系统。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 辅助技术（AT）：帮助残障人士完成日常功能的设备（如轮椅、拼写器）。BCI 常和 AT 绑在一起，组成一个能真正干活的完整系统（BCI/AT 系统）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-13","src":"main","type":"fill","n":13,"q":"一个逻辑上的BCI（脑机接口）潜在用户群由 ［填空］ 和 ［填空］ 的人组成（虽然有足够的认知功能，但是无法激活任何肌肉）。","a":"严重运动功能障碍 完全闭锁状态","parts":["严重运动功能障碍 完全闭锁状态"],"keywords":["严重运动功能障碍 完全闭锁状态"],"exp":"【考点】逻辑上的 BCI（脑机接口） 潜在用户群 = 严重运动功能障碍 + 完全闭锁状态的人（有足够认知功能，但无法激活任何肌肉）。这正是 BCI 最有价值的对象：脑子清醒、却'困在身体里'。【易错】关键限定是'有认知、无肌肉控制'。别填成'植物人/无意识'——那类人没有可用的认知，不是 BCI 目标用户。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 闭锁综合征（LIS）：患者大脑清醒、有意识，但几乎全身肌肉都瘫了、无法说话和动作，像被'锁在身体里'。按残留动作多少分完全/经典/不完全三型，是脑机接口最有价值的服务对象。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-14","src":"main","type":"fill","n":14,"q":"诱发P300（刺激后约 300 毫秒出现的正向事件相关电位）事件相关电位(P300)的特定实验范式称为 ［填空］ 。","a":"Oddball范式","parts":["Oddball范式"],"keywords":["Oddball范式"],"exp":"【考点】诱发 P300（刺激后约 300 毫秒出现的正向事件相关电位） 事件相关电位的特定实验范式叫 Oddball 范式（小概率范式）：在一串高频出现的标准刺激中，偶尔插入低概率的目标刺激，目标出现就会诱发 P300。【易错】Oddball 拼写要记牢。机制核心是'罕见+相关'的刺激引发注意资源分配，约 300ms 后出现正波。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。\n• Oddball 范式（小概率范式）：在一连串频繁、普通的刺激里，偶尔插一个少见的'目标'。这个少见目标一出现，就会诱发 P300。"},{"id":"main-fill-15","src":"main","type":"fill","n":15,"q":"采用矩阵格式的基于P300（刺激后约 300 毫秒出现的正向事件相关电位）的BCI（脑机接口）系统，其性能在一定程度上可能取决于用户注视目标时的 ［填空］ 。","a":"专注程度","parts":["专注程度"],"keywords":["专注程度"],"exp":"【考点】采用矩阵格式（行列闪烁字符表）的 P300（刺激后约 300 毫秒出现的正向事件相关电位）-BCI（脑机接口），其性能部分取决于用户注视目标时的专注程度——越专注，目标行列闪烁诱发的 P300 越显著、识别越准。【易错】填'专注程度/注意力'。这题考的是'注意力调节 P300 幅度'这一机制，不是注视的物理角度或亮度。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-16","src":"main","type":"fill","n":16,"q":"采集到的信号可以被 ［填空］ (如EMG（肌电）活动、ECG（心电）活动、EOG（眼电）活动)、 ［填空］ (如电极振动、运动电势、DC（直流）偏置)、 ［填空］ (如与电力线的电容或电感耦合)以及放大和数字化过程中 ［填空］ 所污染。","a":"生理伪迹    电极或连接器伪迹     电磁干扰    固有的噪声","parts":["生理伪迹    电极或连接器伪迹     电磁干扰    固有的噪声"],"keywords":["生理伪迹    电极或连接器伪迹     电磁干扰    固有的噪声"],"exp":"【考点】采集信号可能被四类来源污染：生理伪迹（EMG（肌电） 肌电、ECG（心电） 心电、EOG（眼电） 眼电）、电极或连接器伪迹（电极振动、运动电势、DC（直流） 偏置）、电磁干扰（与电力线的电容/电感耦合，即工频）、放大数字化过程中固有的噪声。【易错】口诀'理·极·磁·噪'。注意'生理伪迹'来自人体，'电极伪迹'来自电极接触，'电磁干扰'来自外部电网，三者来源不同别张冠李戴。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• EMG（肌电）：肌肉收缩时产生的电信号。出现在脑电里属于伪迹（咬牙、皱眉就会混进来）。\n• EOG（眼电）：眼球转动、眨眼产生的电信号，是一种又大又慢（低频）的伪迹，主要污染前额附近的脑电。\n• ECG（心电）：心脏跳动产生的电信号，混进脑电时属于伪迹。\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。"},{"id":"main-fill-17","src":"main","type":"fill","n":17,"q":"异步协议区分 ［填空］ 和 ［填空］ 。这种操作模式允许用户在任何想要的时刻使用BCI（脑机接口），异步协议可以在用户和BCI之间获得更加自然和动态的交互。","a":"无控制状态   意图控制状态","parts":["无控制状态   意图控制状态"],"keywords":["无控制状态   意图控制状态"],"exp":"【考点】异步协议区分'无控制状态'和'意图控制状态'，允许用户在任意时刻使用 BCI（脑机接口），从而获得更自然、动态的交互。同步协议则由系统规定何时输出。【易错】别把异步协议的两个状态写成'休息态/工作态'之类——标准答案是'无控制状态'与'意图控制状态'。异步=自定节奏=更接近真实使用。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 同步 / 异步 / 混合协议：同步=系统规定固定时间窗、它说什么时候读你脑信号（简单可靠但不自然）；异步=你想用就用、系统持续监听并分清你此刻是'没打算操作（无控制状态）'还是'在主动下命令（意图控制状态）'（更自然但更难做）；混合=两者结合。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-18","src":"main","type":"fill","n":18,"q":"与EEG（头皮脑电）比较，ECoG（皮层脑电）具有更宽的带宽，为 ［填空］ 。","a":"0-200Hz","parts":["0-200Hz"],"keywords":["0-200Hz"],"exp":"【考点】与 EEG（头皮脑电） 相比，ECoG（皮层脑电）带宽更宽，为 0–200Hz（部分课件写可达 250Hz）；EEG 最高约 70Hz。更宽带宽意味着 ECoG 能拿到高频 γ 信息。【易错】数字 0–200Hz 要记准。这正解释了为什么 ECoG 比 EEG 性能更好——它能记录 EEG 拿不到的高频活动。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-19","src":"main","type":"fill","n":19,"q":"对BCI（脑机接口）研发具有最直接益处的两种测量大脑代谢活动方法分别为： 、","a":"功能近红外光谱、功能性磁共振成像","parts":["功能近红外光谱","功能性磁共振成像"],"keywords":["功能近红外光谱","功能性磁共振成像"],"exp":"【考点】对 BCI（脑机接口） 研发最直接有益的两种测量大脑代谢活动的方法：功能近红外光谱（fNIRS（功能性近红外光谱））、功能性磁共振成像（fMRI（功能性磁共振成像））。二者都测血氧（BOLD（血氧水平依赖）），属于'代谢/血流'类（非电信号类）。【易错】题干限定'代谢活动'，所以答 fNIRS 和 fMRI，不要填 EEG（头皮脑电）/MEG（脑磁图）/ECoG（那些测电/磁信号）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• MEG（脑磁图）：不测电、而测大脑电活动产生的极微弱'磁场'。定位准，但磁场太弱，必须在磁屏蔽房里、用液氦把传感器冷却到极低温才能测，设备昂贵难普及。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-20","src":"main","type":"fill","n":20,"q":"闭锁综合征通过症状可以分为三个阶段： ［填空］ ， ［填空］ ， ［填空］ 。","a":"完全的LIS，经典的LIS，不完全的LIS（顺序可换）","parts":["完全的LIS","经典的LIS","不完全的LIS"],"keywords":["完全的LIS","经典的LIS","不完全的LIS"],"exp":"【考点】闭锁综合征按症状分三阶段：完全的 LIS、经典的 LIS、不完全的 LIS（顺序可换）。区别在于残留的随意运动多少：完全=连眼球都不能动；经典=仅保留眼球垂直运动/眨眼；不完全=保留少量其他随意动作。【易错】口诀'完·经·不'。这是'阶段/分型'，别和题11的'病因'混。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 闭锁综合征（LIS）：患者大脑清醒、有意识，但几乎全身肌肉都瘫了、无法说话和动作，像被'锁在身体里'。按残留动作多少分完全/经典/不完全三型，是脑机接口最有价值的服务对象。"},{"id":"main-fill-21","src":"main","type":"fill","n":21,"q":"目前的BCIs主要是 ［填空］ ，即是BCIs而不是用户决定何时产生输出。理想的情况是，BCIs应该是 ［填空］ （即自定节奏），并且用户的大脑信号仅当产生BCI（脑机接口）输出时才进行控制。","a":"同步的、异步的","parts":["同步的","异步的"],"keywords":["同步的","异步的"],"exp":"【考点】目前 BCI（脑机接口） 多为同步的（是 BCI 而非用户决定何时产生输出，系统给出时间窗）；理想情况应是异步的（自定节奏，用户大脑信号仅在想输出时才进行控制）。【易错】两空别填反：'目前=同步'，'理想=异步'。异步更难实现但更自然，对应题17的两个状态划分。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 同步 / 异步 / 混合协议：同步=系统规定固定时间窗、它说什么时候读你脑信号（简单可靠但不自然）；异步=你想用就用、系统持续监听并分清你此刻是'没打算操作（无控制状态）'还是'在主动下命令（意图控制状态）'（更自然但更难做）；混合=两者结合。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-22","src":"main","type":"fill","n":22,"q":"为了实现真正实用的、有效的BCIs，我们必须解决领域里三个关键的问题，其中最困难的问题是： ［填空］ 。","a":"BCI（脑机接口）的可靠性","parts":["BCI（脑机接口）的可靠性"],"keywords":["BCI的可靠性"],"exp":"【考点】要做出真正实用有效的 BCI（脑机接口），必须解决三个关键问题，其中最困难的是 BCI 的可靠性——即每次都能稳定、准确地按用户意图工作。【易错】答'可靠性'，不是'速度'或'成本'。可靠性差（时灵时不灵）是 BCI 走向实用的头号障碍，也对应'BCI 盲'和信号漂移等问题。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI 盲：约 15%–30% 的人，无论怎么训练都很难产生可被有效解码的脑信号，这类人群被称为 BCI 盲。\n• 信号漂移：脑机接口的表现会随时间慢慢变差——因为用户会疲劳、注意力波动，电极接触会变化，神经信号本身也会变。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-23","src":"main","type":"fill","n":23,"q":"BCI（脑机接口）系统可能被用来增强神经肌肉的性能，使其超越常规可能的性能。例如，BCI检测特定于目标刺激的脑电特征，增加检测任务的 和 。","a":"速度、准确性","parts":["速度","准确性"],"keywords":["速度","准确性"],"exp":"【考点】BCI（脑机接口） 可用于增强神经肌肉性能、超越常规：通过检测特定于目标刺激的脑电特征，提高检测任务的速度和准确性（例如哨兵监视场景中更快更准地发现目标）。【易错】两空填'速度、准确性'。这题属于'增强'类应用（给健康人加 buff），不是治疗康复。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-24","src":"main","type":"fill","n":24,"q":"微电极暴露在外的记录区域尺度很小，微电极具有很高的阻抗，一般为 ［填空］ 到几兆欧。因此，信号通常在传输给主放大器之前由一个距离电极较近的 ［填空］ 放大，这可以降低信号的环境噪声。","a":"几十千欧     前置放大器","parts":["几十千欧     前置放大器"],"keywords":["几十千欧     前置放大器"],"exp":"【考点】微电极记录区域极小、阻抗很高（几十千欧到几兆欧）。为降低环境噪声，信号在送给主放大器前，先由一个靠近电极的前置放大器放大。【易错】两空：'几十千欧'（阻抗下限）+'前置放大器'。就近前置放大是高阻抗微电极抗噪的关键手段，和题6主动电极的前置放大同理。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 电极阻抗：反映电极和头皮'接触好不好'的指标。阻抗高=接触差=信号弱、噪声大；面积大、皮肤清洁、涂导电膏都能降低阻抗。\n• 主动 vs 被动电极（前置放大）：被动电极直接连到放大器；主动电极在电极处就先内置一个小放大器（前置放大），就近把信号放大、更抗干扰。"},{"id":"main-fill-25","src":"main","type":"fill","n":25,"q":"对于记录动作电位（尖峰）而言，信号质量通常用 ［填空］ 进行描述。","a":"信噪比","parts":["信噪比"],"keywords":["信噪比"],"exp":"【考点】记录动作电位（尖峰 spike）时，信号质量通常用信噪比（SNR（信噪比））来描述——有用尖峰幅度相对背景噪声的比值。【易错】答'信噪比'。这是衡量侵入式单神经元记录质量的核心指标，不要写成'分辨率'或'采样率'。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• 信噪比（SNR）：有用信号相对背景噪声的强弱比值。比值越高信号越干净越好认；EEG 隔着颅骨，信噪比天生偏低。"},{"id":"main-fill-26","src":"main","type":"fill","n":26,"q":"顶叶皮层由 ［填空］ 和 ［填空］ 部分组成","a":"初级体感皮层、后顶叶皮层","parts":["初级体感皮层","后顶叶皮层"],"keywords":["初级体感皮层","后顶叶皮层"],"exp":"【考点】顶叶皮层由两部分组成：初级体感皮层 + 后顶叶皮层。前者处理躯体感觉，后者参与感觉运动整合、空间注意与运动规划。【易错】口诀'体+后'。在 BCI（脑机接口） 里，后顶叶（含 PRR（顶叶到达区）/到达区）是解码运动意图的重要来源。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 顶叶皮层：大脑顶部偏后的区域，含初级体感皮层（处理身体的触觉等感觉）和后顶叶皮层（把感觉整合成动作计划、参与空间注意），在脑机接口里是解码'运动意图'的重要来源。\n• PRR（顶叶到达区）：顶叶里专门编码'手臂要伸向哪里（到达 reach 的目标位置和轨迹）'的区域。注意它管'手臂到达'，不是管眼动。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-27","src":"main","type":"fill","n":27,"q":"运动前区由 ［填空］ 、 ［填空］ 和 ［填空］ 部分组成","a":"额叶眼区、腹侧运动前皮层、背侧运动前区","parts":["额叶眼区","腹侧运动前皮层","背侧运动前区"],"keywords":["额叶眼区","腹侧运动前皮层","背侧运动前区"],"exp":"【考点】运动前区由三部分组成：额叶眼区、腹侧运动前皮层、背侧运动前区。分别与眼动、抓握、手臂到达等运动计划相关。【易错】口诀'眼·腹·背'。配合记忆：背侧 PMD（背侧运动前区）—手臂到达，腹侧 F5（腹侧运动前皮层）—抓握，对应选择题第13题的功能配对。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 运动前区：负责'动作的计划与准备'的脑区。其中额叶眼区管眼动、腹侧运动前皮层(F5)管抓握、背侧运动前区(PMD)管手臂伸够（到达）。"},{"id":"main-fill-28","src":"main","type":"fill","n":28,"q":"中风康复常用的方法有 ［填空］ 、 ［填空］ 、和 ［填空］ 。","a":"物理疗法、职业治疗、言语与语言治疗、BCI（脑机接口）(任选三个回答)，","parts":["物理疗法","职业治疗","言语与语言治疗","BCI（脑机接口）(任选三个回答)"],"keywords":["物理疗法","职业治疗","言语与语言治疗","BCI"],"exp":"【考点】中风康复常用方法：物理疗法、职业治疗、言语与语言治疗、BCI（题目要求任选三个回答）。BCI 作为新兴手段被纳入康复体系。【易错】题干'任选三个'，所以写三个即可，但要写得规范。别把这些康复方法和题1的'EEG（头皮脑电）-BCI 治疗用途'混。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-29","src":"main","type":"fill","n":29,"q":"BCI（脑机接口）神经接口按植入位置可分为 ［填空］ 、 ［填空］ 、 ［填空］ 三类。","a":"头皮脑电电极阵   皮质电信号电极阵列   植入式微电极阵列","parts":["头皮脑电电极阵   皮质电信号电极阵列   植入式微电极阵列"],"keywords":["头皮脑电电极阵   皮质电信号电极阵列   植入式微电极阵列"],"exp":"【考点】神经接口按植入位置分三类：头皮脑电电极阵（EEG（头皮脑电），体外）、皮质电信号电极阵列（ECoG（皮层脑电），硬膜下贴皮层表面）、植入式微电极阵列（刺入皮层内，记录单神经元）。【易错】口诀'皮→质→入'，按'由外到内、分辨率由低到高、创伤由小到大'顺序记。三者正好对应非侵入→半侵入→侵入。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-30","src":"main","type":"fill","n":30,"q":"信号处理中常用的数字滤波器有： ［填空］ 、 ［填空］ 、 ［填空］ 、带阻滤波器。","a":"低通滤波器、高通滤波器、带通滤波器","parts":["低通滤波器","高通滤波器","带通滤波器"],"keywords":["低通滤波器","高通滤波器","带通滤波器"],"exp":"【考点】常用数字滤波器四种：低通滤波器、高通滤波器、带通滤波器、带阻滤波器（题干已给带阻）。低通留低频去高频，高通反之，带通留中间一段，带阻（陷波）专去某一窄带如 50Hz 工频。【易错】口诀'低·高·带·阻'。陷波滤波器是带阻的特例，常用于去工频。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 滤波器：像一道'频率筛子'，只让特定频率范围通过。低通=只留低频，高通=只留高频，带通=只留中间一段，带阻/陷波=专门挖掉某个窄频段（常用来去 50Hz 工频）。"},{"id":"main-fill-31","src":"main","type":"fill","n":31,"q":"预处理是提高脑电信号分类算法性能的重要步骤，常见的预处理方法包括： ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"滤波去噪、基线校正、伪迹去除、重参考","parts":["滤波去噪","基线校正","伪迹去除","重参考"],"keywords":["滤波去噪","基线校正","伪迹去除","重参考"],"exp":"【考点】预处理四步：滤波去噪、基线校正、伪迹去除、重参考。目的是提高信噪比、为后续特征提取打基础。【易错】口诀'滤·基·伪·重'。注意'预处理'（处理原始信号）≠'特征调理'（处理特征，题8 的均/滤/归/降），两组别串。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• 特征调理：在提取出特征之后、送进分类器之前，对特征做的整理：去均值、滤波、归一化（统一量纲）、降维（减少维度）。\n• 参考电极与重参考：脑电测的是'某电极相对一个参考点'的电压差，所以要选参考（如耳垂/乳突、全脑平均）。重参考=换个参考基准重新算。注意'表面拉普拉斯'其实是空间滤波，不算选参考电极。\n• 信噪比（SNR）：有用信号相对背景噪声的强弱比值。比值越高信号越干净越好认；EEG 隔着颅骨，信噪比天生偏低。"},{"id":"main-fill-32","src":"main","type":"fill","n":32,"q":"脑机接口中常用的特征类型有： ［填空］ 、 ［填空］ 、 ［填空］ 、 ［填空］ 。","a":"时域特征、频域特征、时频域特征、空域特征","parts":["时域特征","频域特征","时频域特征","空域特征"],"keywords":["时域特征","频域特征","时频域特征","空域特征"],"exp":"【考点】常用特征类型四种：时域特征（均值、方差、峰值）、频域特征（功率谱、节律能量）、时频域特征（小波变换）、空域特征（空间滤波/导联模式）。【易错】四类按'信号在哪个维度看'来记：时间、频率、时间×频率、空间。运动想象常用频域+空域（如 CSP（共空间模式））。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• 小波变换：也是把信号按频率拆开，但比傅里叶更进一步——它能同时告诉你'某个频率成分在哪个时间点出现'，适合分析随时间变化的信号（属于时频分析）。\n• 功率谱密度（PSD）：描述一段信号'每个频率上各有多少能量'的曲线，是频域分析最核心的工具——运动想象、SSVEP 都靠它看某频段功率高低。\n• 四类特征（时域/频域/时频域/空域）：按'从哪个角度看信号'分类：时域=看波形随时间的样子（均值、峰值）；频域=看各频率的能量；时频域=看频率随时间怎么变（如小波）；空域=看不同电极位置之间的空间分布。\n• CSP（共空间模式）：专门用于'两类'运动想象（如想左手 vs 想右手）的空间滤波。它找一组电极组合，让一类动作的信号方差最大、另一类最小，把两类的差异放到最大、便于区分。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-33","src":"main","type":"fill","n":33,"q":"皮层脑电(ECoG（皮层脑电）)可能提供高于EEG（头皮脑电）的性能，并且需要更少的训练，这个优势可能主要是由于ECoG能够记录 ［填空］ 活动，而EEG中却无法得到。","a":"高频(γ) 活动","parts":["高频(γ) 活动"],"keywords":["高频 活动"],"exp":"【考点】ECoG（皮层脑电） 性能优于 EEG（头皮脑电） 且需更少训练，主要因为它能记录高频（γ）活动，而 EEG 拿不到（γ 在头皮被颅骨严重衰减）。γ 频段含丰富的运动信息。【易错】答'高频(γ)活动'。注意 ECoG 幅度随频率升高而衰减，但高频段虽弱却信息量大，这正是它的价值所在。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-34","src":"main","type":"fill","n":34,"q":"在EEG（头皮脑电）信号中，α波（8-13Hz）主要出现在大脑的 ［填空］ 区域。","a":"枕叶","parts":["枕叶"],"keywords":["枕叶"],"exp":"【考点】α 波（8–13Hz）主要出现在枕叶区域，与闭眼放松状态密切相关（睁眼或注意时 α 被抑制，称 α 阻断）。【易错】α 波—枕叶—闭眼放松，三者绑定记忆。别和运动区的 μ 节律（也在 8–13Hz 附近但位于中央区、与运动想象相关）混。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• 枕叶视觉区（含初级视皮层 V1）：大脑后脑勺处理视觉的区域。视觉诱发的信号（如 SSVEP）和闭眼放松的 α 波都在这里最明显。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-35","src":"main","type":"fill","n":35,"q":"多模态脑机接口中，EEG（头皮脑电）-fMRI（功能性磁共振成像）的融合需解决 ［填空］ 差异问题。","a":"时空分辨率","parts":["时空分辨率"],"keywords":["时空分辨率"],"exp":"【考点】EEG（头皮脑电）-fMRI（功能性磁共振成像） 多模态融合需解决时空分辨率差异问题：EEG 时间分辨率高（毫秒）但空间差，fMRI 空间分辨率高（毫米）但时间慢（秒级），融合要在两个尺度上对齐。【易错】答'时空分辨率'差异。多模态的意义就是优势互补、缺点互补。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。"},{"id":"main-fill-36","src":"main","type":"fill","n":36,"q":"闭环神经调控中，刺激效果的实时评估通常依赖 ［填空］ 指标（如局部场电位振荡功率或尖峰发放同步性）。","a":"神经生理（或电生理）","parts":["神经生理"],"keywords":["神经生理"],"exp":"【考点】闭环神经调控中，刺激效果的实时评估通常依赖神经生理（电生理）指标，如局部场电位（LFP（局部场电位））振荡功率、尖峰发放同步性。这些指标实时反映大脑状态，指导刺激参数调整。【易错】答'神经生理/电生理'。对应选择题闭环 DBS（深部脑刺激） 用 LFP 的 β 波段功率作反馈。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• LFP（局部场电位）：插在脑内的电极记录到的、电极周围一小群神经元'集体'的电活动总和。比单个神经元信号更稳定，介于'单神经元'和'整片头皮 EEG'之间的中等尺度信号。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 开环 vs 闭环（反馈）：开环=只是'读脑→控制设备'的单向输出，用户不知道自己做得对不对；闭环=把控制结果实时反馈给用户（视觉/听觉/触觉），用户据此调整大脑状态、越用越准。反馈是闭环的灵魂。\n• DBS（深部脑刺激）：把电极植入脑深部、持续放电来调节异常脑活动，常用于帕金森病。闭环 DBS 还能一边监测脑信号一边自动调整刺激。"},{"id":"main-fill-37","src":"main","type":"fill","n":37,"q":"运动想象脑机接口中，想象左手运动时，大脑 ［填空］ 半球的μ节律（8-12Hz）通常会出现能量 ［填空］ 。","a":"右，衰减","parts":["右","衰减"],"keywords":["右","衰减"],"exp":"【考点】运动想象中，想象左手运动 → 对侧即右半球的 μ 节律（8–12Hz）出现能量衰减（ERD（事件相关去同步），事件相关去同步）。大脑运动控制是对侧支配的。【易错】两空：'右'（对侧）+'衰减'（ERD）。核心是'对侧支配'+'ERD=功率降低'。想左手→看右脑，这是高频陷阱，务必记牢。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERD / ERS（事件相关去同步 / 同步）：做或想象一个动作时，相关脑区某个频段的脑波会'变弱'（叫 ERD，去同步）；动作结束后又会短暂'变强'（叫 ERS，同步）。一句话：ERD=能量降低，ERS=能量升高。\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-fill-38","src":"main","type":"fill","n":38,"q":"脑机接口系统中，反馈机制主要是提供给用户 ［填空］ 反馈、 ［填空］ 反馈和 ［填空］ 反馈，以提高控制的准确性和学习效率。","a":"视觉、触觉、听觉","parts":["视觉","触觉","听觉"],"keywords":["视觉","触觉","听觉"],"exp":"【考点】BCI（脑机接口） 反馈机制主要提供三种反馈：视觉反馈、触觉反馈、听觉反馈，帮助用户实时调整脑活动、提高控制准确性与学习效率。【易错】三通道'视·触·听'。闭环 BCI 的精髓就在反馈——没有反馈用户无法学习如何调控自己的脑信号。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 开环 vs 闭环（反馈）：开环=只是'读脑→控制设备'的单向输出，用户不知道自己做得对不对；闭环=把控制结果实时反馈给用户（视觉/听觉/触觉），用户据此调整大脑状态、越用越准。反馈是闭环的灵魂。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。"},{"id":"main-choice-1","src":"main","type":"choice","n":1,"q":"如下图所示，请问图中蓝色曲线表示的下列哪种电位？( )","a":"SSVEP电位","parts":["SSVEP电位"],"keywords":["SSVEP电位"],"exp":"【答案 B】考查四种典型电位的波形识别。A. P300（刺激后约 300 毫秒出现的正向事件相关电位）——在目标刺激后约300ms出现的单个正向峰，是一次性诱发的'尖峰'。B. SSVEP（稳态视觉诱发电位）——随注视频率持续振荡的正弦样周期波形，蓝色曲线呈现的就是这种规律性振荡，故选 B。C. mVEP（运动视觉诱发电位）——由视觉运动刺激诱发，波形不同于稳态振荡。D. SCP（慢皮层电位）——缓慢漂移的直流样电位变化，持续数百毫秒到数秒，不是振荡。【易错】区分'一次性诱发峰'（P300）与'持续振荡'（SSVEP）是关键。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• SCP（慢皮层电位）：大脑皮层一种很慢的电位漂移，能持续几百毫秒到几秒。人可以通过长期训练学会主动把它升高或降低来'发指令'，但速度慢、要练很久。\n• mVEP（运动视觉诱发电位）：由'画面突然开始运动'这类视觉刺激诱发出的一次性电位波，和持续振荡的 SSVEP 不一样。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 信号漂移：脑机接口的表现会随时间慢慢变差——因为用户会疲劳、注意力波动，电极接触会变化，神经信号本身也会变。","multi":false,"ans":"B","options":{"A":"P300电位","B":"SSVEP电位","C":"mVEP电位","D":"SCP电位"}},{"id":"main-choice-2","src":"main","type":"choice","n":2,"q":"以下哪种不属于频率分析方法？( )","a":"共平均参考","parts":["共平均参考"],"keywords":["共平均参考"],"exp":"【答案 C】问哪个'不属于'频率分析方法。A. 傅里叶变换——把信号分解到频域，是最经典的频率分析。B. 连续小波变换——时频分析，既看频率也看时间，属频率分析范畴。C. 共平均参考——这是一种空间参考/重参考方法（把所有电极均值作参考），属于空间域处理，不是频率分析，故选 C。D. 自回归模型——用模型估计功率谱，是参数化的频率分析方法。【易错】共平均参考极易被误当成某种分析；它本质是改变参考电极，和'频率'无关。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 傅里叶变换（FFT 是它的快速算法）：把一段信号拆开，看它由哪些'频率'成分组成、各有多强，好比把混在一起的声音分出有多少低音、多少高音。它只看频率，不告诉你某频率在'什么时刻'出现。\n• 小波变换：也是把信号按频率拆开，但比傅里叶更进一步——它能同时告诉你'某个频率成分在哪个时间点出现'，适合分析随时间变化的信号（属于时频分析）。\n• 自回归模型：用'当前值由前几个时刻的值推算'这种思路给信号建个数学模型，再据此估计它的频率构成（一种参数化的频率分析）。\n• 功率谱密度（PSD）：描述一段信号'每个频率上各有多少能量'的曲线，是频域分析最核心的工具——运动想象、SSVEP 都靠它看某频段功率高低。\n• 参考电极与重参考：脑电测的是'某电极相对一个参考点'的电压差，所以要选参考（如耳垂/乳突、全脑平均）。重参考=换个参考基准重新算。注意'表面拉普拉斯'其实是空间滤波，不算选参考电极。","multi":false,"ans":"C","options":{"A":"傅里叶变换","B":"连续小波变换","C":"共平均参考","D":"自回归模型"}},{"id":"main-choice-3","src":"main","type":"choice","n":3,"q":"以下哪个不属于基于SSVEP（稳态视觉诱发电位）的脑-机接口的优势？( )","a":"没有注视依赖性","parts":["没有注视依赖性"],"keywords":["没有注视依赖性"],"exp":"【答案 D】问哪个'不属于'SSVEP（稳态视觉诱发电位）-BCI（脑机接口） 的优势。A. 任务简单——用户只需盯着看，正确，是优势。B. 不需大量训练——SSVEP 几乎即插即用，正确。C. 信息传输率高——SSVEP 的 ITR（信息传输率） 在各范式中名列前茅，正确。D. 没有注视依赖性——错！SSVEP 恰恰高度依赖注视（必须用眼睛盯住目标），这是它的局限而非优势，故选 D。【易错】题问'优势'，D 描述的是缺点的反面。SSVEP 的软肋正是'依赖眼动'，对眼动障碍患者不适用。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• 信息传输率（ITR）：衡量脑机接口'单位时间能传多少信息'的速度指标（常用 bit/min）。它取决于可选目标数、识别准确率和每次选择耗时，三者要平衡。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"D","options":{"A":"涉及简单的用户任务","B":"不需要大量的训练","C":"信息传输速率高","D":"没有注视依赖性"}},{"id":"main-choice-4","src":"main","type":"choice","n":4,"q":"以下哪个不属于基于SCPs的脑-机接口的问题？ ( )","a":"不适用于患有严重ALS的用户","parts":["不适用于患有严重ALS的用户"],"keywords":["不适用于患有严重ALS的用户"],"exp":"【答案 A】问哪个'不属于'SCP-BCI（脑机接口） 的问题。SCP（慢皮层电位）范式的固有缺点是：B. 速度很慢（训练和使用都慢）；C. 需要大量训练（用户要学很久才能调控 SCP）；D. 多维控制效果差。这三项都是其真实问题。A. 不适用于严重 ALS（肌萎缩性侧索硬化症） 用户——恰恰相反，SCP 曾被成功用于 ALS/闭锁患者，所以'不适用于 ALS'不是它的问题，故选 A。【易错】原题选项标号有笔误（出现两个C），按内容判断：速度慢、需训练、多维差都是缺点，唯独 A 不是。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SCP（慢皮层电位）：大脑皮层一种很慢的电位漂移，能持续几百毫秒到几秒。人可以通过长期训练学会主动把它升高或降低来'发指令'，但速度慢、要练很久。\n• ALS（肌萎缩性侧索硬化症，渐冻症）：一种运动神经元逐渐死亡、肌肉日益萎缩瘫痪的病，晚期可致闭锁状态，但认知常保留。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"不适用于患有严重ALS的用户","B":"速度很慢","C":"需要大量训练","D":"多维控制效果差"}},{"id":"main-choice-5","src":"main","type":"choice","n":5,"q":"在脑机接口产品设计方面，在风险管理环节中，下列选项中不属于必要环节的是（）","a":"需求分析","parts":["需求分析"],"keywords":["需求分析"],"exp":"【答案 C】问风险管理中哪个'不属于'必要环节。医疗器械风险管理的标准环节包括：A. 风险分析（识别危害）、B. 风险控制（采取措施降低风险）、D. 产后信息（产品上市后持续收集风险信息）。C. 需求分析——这是产品设计/需求工程环节，不属于'风险管理'流程，故选 C。【易错】需求分析听起来很'必要'，但它属于设计阶段而非风险管理闭环（分析→评价→控制→产后监督）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 开环 vs 闭环（反馈）：开环=只是'读脑→控制设备'的单向输出，用户不知道自己做得对不对；闭环=把控制结果实时反馈给用户（视觉/听觉/触觉），用户据此调整大脑状态、越用越准。反馈是闭环的灵魂。\n• （医疗器械）风险管理：识别危害并把风险降到可接受的闭环流程，主要环节是风险分析→风险评价→风险控制→上市后（产后）信息收集。'需求分析'属于产品设计阶段，不在风险管理环节内。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"C","options":{"A":"风险分析","B":"风险控制","C":"需求分析","D":"产后信息"}},{"id":"main-choice-6","src":"main","type":"choice","n":6,"q":"在BCIs研究中，不属于这项工作涉及的风险为（）","a":"设备操作不熟练的风险","parts":["设备操作不熟练的风险"],"keywords":["设备操作不熟练的风险"],"exp":"【答案 C】问 BCI（脑机接口） 研究'不涉及'的风险。课件列出的 BCI 研究风险有：A. 身体风险（尤其侵入式手术）、B. 有害的中枢神经系统可塑性风险（长期使用可能不良重塑大脑）、D. 不适当输出的风险（误识别导致错误动作）。C. 设备操作不熟练的风险——属于使用者技能问题，不在研究伦理界定的风险范畴，故选 C。【易错】C 看似合理，但它不是研究本身带来的固有风险，而是操作熟练度问题。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"C","options":{"A":"身体风险","B":"有害的中枢神经系统可塑性的风险","C":"设备操作不熟练的风险","D":"不适当的输出的风险"}},{"id":"main-choice-7","src":"main","type":"choice","n":7,"q":"在脑机接口研究中，有关伦理审查和知情同意的说法，以下哪项是不正确的？","a":"护理人员在参与脑机接口研究时无需签署任何形式的知情同意，只需遵守一般护理规范。","parts":["护理人员在参与脑机接口研究时无需签署任何形式的知情同意，只需遵守一般护理规范。"],"keywords":["护理人员在参与脑机接口研究时无需签署任何形式的知情同意，只需遵守一般护理规范"],"exp":"【答案 C】问知情同意说法哪个'不正确'。A. 必须获得知情同意、充分告知风险与利益——正确。B. 无行为能力/认知障碍被试由法定监护人或家属代签——正确。C. 护理人员参与研究'无需签署任何知情同意'——错误！护理人员一旦作为研究参与者，同样需要签署知情同意，故选 C。D. 侵入式研究风险高、伦理审查与知情同意要求更严——正确。【易错】C 用'无需签署'设套，凡是参与研究的人（包括护理者）都需知情同意。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• Belmont 报告三原则：现代人体研究伦理的奠基文件，三原则是：行善（趋利避害）、对人尊重（尊重自主、保护弱势）、公正（风险和好处公平分配）。'知情同意'是落实'对人尊重'的具体做法。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"C","options":{"A":"脑机接口研究必须获得被试者的知情同意，确保其充分了解研究风险与利益。","B":"对于无行为能力或认知障碍被试，通常需要其法定监护人或家庭成员代为签署知情同意书。","C":"护理人员在参与脑机接口研究时无需签署任何形式的知情同意，只需遵守一般护理规范。","D":"侵入式脑机接口研究因涉及较高风险，伦理审查和知情同意的要求更为严格，且需明确告知潜在风险。"}},{"id":"main-choice-8","src":"main","type":"choice","n":8,"q":"（多选）下列选项中，属于脑电伪迹信号的是：（）","a":"肌电信号；心电信号；眼电信号；电力线干扰","parts":["肌电信号","心电信号","眼电信号","电力线干扰"],"keywords":["肌电信号","心电信号","眼电信号","电力线干扰"],"exp":"【答案 ABCD（多选）】问哪些属于脑电伪迹。脑电伪迹=混入 EEG（头皮脑电） 的非脑源信号：A. 肌电（EMG（肌电），咬牙皱眉）、B. 心电（ECG（心电），心跳）、C. 眼电（EOG（眼电），眨眼眼动）、D. 电力线干扰（50Hz 工频）——四者全是伪迹，全选。【易错】别漏选 D：很多人只想到生理伪迹（肌、心、眼），忘了工频/电磁干扰也是伪迹。生理伪迹+电磁干扰都算。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• EMG（肌电）：肌肉收缩时产生的电信号。出现在脑电里属于伪迹（咬牙、皱眉就会混进来）。\n• EOG（眼电）：眼球转动、眨眼产生的电信号，是一种又大又慢（低频）的伪迹，主要污染前额附近的脑电。\n• ECG（心电）：心脏跳动产生的电信号，混进脑电时属于伪迹。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":true,"ans":"ABCD","options":{"A":"肌电信号","B":"心电信号","C":"眼电信号","D":"电力线干扰"}},{"id":"main-choice-9","src":"main","type":"choice","n":9,"q":"脑电电极分为干电极和湿电极两类，下列关于脑电电极的说法中错误的是（）：","a":"湿电极相比于干电极穿戴更加便捷。","parts":["湿电极相比于干电极穿戴更加便捷。"],"keywords":["湿电极相比于干电极穿戴更加便捷"],"exp":"【答案 B】问关于脑电电极哪个说法'错误'。A. 湿电极含导电膏电极系统和海绵-盐水电极系统两类——正确。B. 湿电极比干电极穿戴'更便捷'——错误！湿电极要涂导电膏、清理麻烦，穿戴更繁琐，干电极才便捷，故选 B。C. 湿电极材料多为锡/银/铂，干电极多为惰性金属或绝缘体——正确。D. 干电极性能不如湿电极稳定——正确（这是干电极换取便利的代价）。【易错】B 把干湿电极的便利性说反了：湿电极信号好但麻烦，干电极方便但欠稳。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 干电极 vs 湿电极：湿电极要涂导电膏，信号好但戴起来麻烦、要清理；干电极不用膏、戴着方便，但信号稳定性差些。常用电极材料是金、铂、银（银/氯化银最常见）。","multi":false,"ans":"B","options":{"A":"湿电极主要包含导电膏电极系统和海绵-盐水电极系统两类。","B":"湿电极相比于干电极穿戴更加便捷。","C":"湿电极的电极材料主要有锡、银、铂等组成，干电极以惰性金属或绝缘体为主。","D":"干电极的性能不如湿电极稳定。"}},{"id":"main-choice-10","src":"main","type":"choice","n":10,"q":"下列不属于参考电极选择方法的是（）：","a":"基于表面拉普拉斯的参考","parts":["基于表面拉普拉斯的参考"],"keywords":["基于表面拉普拉斯的参考"],"exp":"【答案 B】问哪个'不属于'参考电极选择方法。A. 公共平均参考（以所有电极均值为参考）、C. 基于模型的参考、D. 耳垂（乳突）相连参考——都是选参考电极的方法。B. 基于表面拉普拉斯的参考——这其实是一种空间滤波（用周围电极估计局部电流源密度），不是'选某个参考电极'，故选 B。【易错】拉普拉斯虽带'参考'二字，本质是空间滤波，归类不同。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 参考电极与重参考：脑电测的是'某电极相对一个参考点'的电压差，所以要选参考（如耳垂/乳突、全脑平均）。重参考=换个参考基准重新算。注意'表面拉普拉斯'其实是空间滤波，不算选参考电极。","multi":false,"ans":"B","options":{"A":"公共平均参考","B":"基于表面拉普拉斯的参考","C":"基于模型的参考","D":"耳垂（乳突）相连参考"}},{"id":"main-choice-11","src":"main","type":"choice","n":11,"q":"下列哪一项不属于脑电信号的空间滤波特征提取方法：（）","a":"线性判别分析（LDA）","parts":["线性判别分析（LDA）"],"keywords":["线性判别分析"],"exp":"【答案 C】问哪个'不属于'空间滤波特征提取方法。A. PCA（主成分分析）、B. ICA（独立成分分析）、D. CSP（共空间模式）——都是对多通道信号做空间变换提取特征的方法。C. LDA（线性判别分析）——是分类器/监督学习方法，不是空间滤波，故选 C。【易错·高频】PCA/ICA/CSP 是'特征提取（空间滤波）'，LDA 是'分类'，二者职能不同，最爱在这里设陷阱。口诀：空间滤波'P·I·C'，LDA 出局。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 四类特征（时域/频域/时频域/空域）：按'从哪个角度看信号'分类：时域=看波形随时间的样子（均值、峰值）；频域=看各频率的能量；时频域=看频率随时间怎么变（如小波）；空域=看不同电极位置之间的空间分布。\n• PCA（主成分分析）：一种'降维'方法，把很多相关的数据维度压缩成几个最能代表整体差异的新维度、去掉冗余。属于无监督方法（不需要标签）。\n• ICA（独立成分分析）：假设头皮记到的脑电其实是脑电、眼电、肌电等几路'相互独立'的信号混在一起，ICA 能把它们重新拆开，从而单独剔除眼电、肌电等伪迹。强项是能去掉'和脑电频率重叠'的伪迹（这点普通滤波做不到）。\n• CSP（共空间模式）：专门用于'两类'运动想象（如想左手 vs 想右手）的空间滤波。它找一组电极组合，让一类动作的信号方差最大、另一类最小，把两类的差异放到最大、便于区分。\n• LDA（线性判别分析）：一种分类器（做判断、分类的算法），用带标签的数据学一条'分界线'把不同类别分开。注意它是'分类'用的，不是提取特征/空间滤波。\n• 监督 vs 无监督学习：监督=用'带标准答案（标签）'的数据训练（如 LDA、SVM 分类）；无监督=数据没标签、让算法自己找结构（如 PCA、ICA 降维或分离）。","multi":false,"ans":"C","options":{"A":"主成分分析（PCA）","B":"独立成分分析（ICA）","C":"线性判别分析（LDA）","D":"共空间模式（CSP）"}},{"id":"main-choice-12","src":"main","type":"choice","n":12,"q":"下列不属于相似性特征的是（）：","a":"快速傅里叶变换","parts":["快速傅里叶变换"],"keywords":["快速傅里叶变换"],"exp":"【答案 A】问哪个'不属于'相似性特征。相似性特征衡量两路信号/与模板的相似程度：B. 相干性（频域相关）、C. 锁相值（相位同步程度）、D. 马氏距离（考虑协方差的距离度量）——都是相似性度量。A. 快速傅里叶变换——是频率分析方法，把信号变到频域，不衡量'相似性'，故选 A。【易错】FFT（快速傅里叶变换） 是分析工具不是相似性特征；相干性/锁相值/马氏距离才描述'像不像'。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 傅里叶变换（FFT 是它的快速算法）：把一段信号拆开，看它由哪些'频率'成分组成、各有多强，好比把混在一起的声音分出有多少低音、多少高音。它只看频率，不告诉你某频率在'什么时刻'出现。\n• 相似性特征：衡量'两路信号有多像'或'信号和模板有多像'的指标，如相干性（频域相关）、锁相值（相位是否同步）、马氏/欧氏距离（数据点之间的距离）。","multi":false,"ans":"A","options":{"A":"快速傅里叶变换","B":"相干性","C":"锁相值","D":"马氏距离"}},{"id":"main-choice-13","src":"main","type":"choice","n":13,"q":"下列各个区域与其负责的功能不一致的是？（）","a":"中部顶内区域MIP 抓握","parts":["中部顶内区域MIP 抓握"],"keywords":["中部顶内区域MIP","抓握"],"exp":"【答案 D】问哪个脑区与功能配对'不一致'。A. 背侧运动前区 PMD（背侧运动前区）—手臂到达——正确。B. 腹侧运动前皮层 F5（腹侧运动前皮层）—抓握——正确。C. 外侧顶内区 LIP（外侧顶内区）—眼动——正确。D. 中部顶内区 MIP—抓握——错误！MIP（中部顶内区）参与的是手臂'到达'运动，'抓握'是 AIP（前部顶内区）/F5 的职能，故选 D。【易错】MIP 管'到达'不管'抓握'。记忆：顶内沟里 LIP 管眼、MIP 管臂到达、AIP 管抓握。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 运动前区：负责'动作的计划与准备'的脑区。其中额叶眼区管眼动、腹侧运动前皮层(F5)管抓握、背侧运动前区(PMD)管手臂伸够（到达）。\n• 顶内沟三区 LIP / MIP / AIP：顶内沟里分工明确的三个区：LIP 管眼动、MIP 管手臂到达、AIP 管抓握——这是常考的配对。","multi":false,"ans":"D","options":{"A":"背侧运动前区PMD  手臂到达","B":"腹侧运动前皮层F5  抓握","C":"外侧顶内区域LIP  眼动","D":"中部顶内区域MIP  抓握"}},{"id":"main-choice-14","src":"main","type":"choice","n":14,"q":"下列关于局部场电位说法错误的是？（）","a":"用LFP信号解码的错误率一般高于用神经元脉冲活动SPK解码的错误率","parts":["用LFP信号解码的错误率一般高于用神经元脉冲活动SPK解码的错误率"],"keywords":["用LFP信号解码的错误率一般高于用神经元脉冲活动SPK解码的错误率"],"exp":"【答案 C】问关于局部场电位（LFP（局部场电位））哪个说法'错误'。A. LFP 是记录位点附近大量神经元兴奋性与抑制性树突电位的总和——正确定义。B. LFP 是解码运动意图的合适信号——正确。C. 用 LFP 解码错误率一般'高于'用神经元脉冲（SPK（神经元尖峰放电））解码——错误！实际上 LFP 解码错误率通常'低于'（更鲁棒、更稳定）单纯用 SPK，故选 C。D. LFP 在频谱图中反映运动方向（偏好/非偏好方向）的高频差异——正确。【易错】C 把高低说反，LFP 因群体平均反而更稳，错误率更低。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LFP（局部场电位）：插在脑内的电极记录到的、电极周围一小群神经元'集体'的电活动总和。比单个神经元信号更稳定，介于'单神经元'和'整片头皮 EEG'之间的中等尺度信号。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。","multi":false,"ans":"C","options":{"A":"局部场电位Local field potential（LFP）是由来自记录位点附近的大量神经元的兴奋性和抑制性树突电位的总和","B":"LFP是解码运动意图的一种合适的信号","C":"用LFP信号解码的错误率一般高于用神经元脉冲活动SPK解码的错误率","D":"LFP会在频谱图中反映运动方向 (注意偏好和非偏好方向) 之间的高频差异"}},{"id":"main-choice-15","src":"main","type":"choice","n":15,"q":"以下哪一个不是功能近红外光谱-脑机接口用到的设备或技术？（）","a":"回波平面成像","parts":["回波平面成像"],"keywords":["回波平面成像"],"exp":"【答案 C】问哪个'不是' fNIRS（功能性近红外光谱） 用到的设备/技术。fNIRS 基本要素：A. 发射器（发近红外光）、B. 光电倍增管（探测微弱光）、D. 光电探测器（接收透射/反射光）。C. 回波平面成像（EPI（回波平面成像））——这是 fMRI（功能性磁共振成像） 的快速成像序列，属于磁共振技术，不是 fNIRS，故选 C。【易错】EPI 属于 fMRI 阵营，混进 fNIRS 选项里设套。fNIRS 是'光学'手段，与磁共振无关。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"C","options":{"A":"发射器","B":"光电倍增管","C":"回波平面成像","D":"光电探测器"}},{"id":"main-choice-16","src":"main","type":"choice","n":16,"q":"当用fNIRS（功能性近红外光谱）测量大脑代谢活动时，大脑神经活动增加，会有以下哪个反应？（）","a":"局部脑氧代谢率增加","parts":["局部脑氧代谢率增加"],"keywords":["局部脑氧代谢率增加"],"exp":"【答案 B】问 fNIRS（功能性近红外光谱） 测得神经活动增加时的反应。神经活动↑→局部耗氧与血流↑（神经血管耦合）：A. 含氧血红蛋白浓度'降低'——错（应升高）。B. 局部脑氧代谢率增加——正确，故选 B。C. 脱氧血红蛋白浓度'增加'——通常局部含氧血涌入使脱氧血红蛋白相对'下降'，此项不准。D. 局部脑血流'降低'——错（应增加）。【易错】抓住主线：活动增强→代谢率↑、血流↑、含氧血红蛋白↑、脱氧血红蛋白↓。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• 神经血管耦合：神经活动增强→该处耗氧增多→血流随之加大、把含氧血'冲'过来。这是血氧类方法（fMRI/fNIRS）能反映脑活动的生理基础。","multi":false,"ans":"B","options":{"A":"含氧血红蛋白浓度降低","B":"局部脑氧代谢率增加","C":"脱氧血红蛋白浓度增加","D":"局部脑血流降低"}},{"id":"main-choice-17","src":"main","type":"choice","n":17,"q":"下列说法不正确的是？（）","a":"顶叶到达区 PRR编码了位置和即将到来的眼部运动的轨迹","parts":["顶叶到达区 PRR编码了位置和即将到来的眼部运动的轨迹"],"keywords":["顶叶到达区 PRR编码了位置和即将到来的眼部运动的轨迹"],"exp":"【答案 B】问哪个说法'不正确'。A. 运动前区与顶叶对应的眼/臂/手区直接相互连接，产生高级运动计划——正确。B. 顶叶到达区 PRR 编码了位置和即将到来的'眼部运动'轨迹——错误！PRR（顶叶到达区）编码的是'手臂到达（伸够）'的目标位置与轨迹，不是眼动，故选 B。C. fMRI（功能性磁共振成像） 通过检测磁共振信号变化推断脑活动——正确。D. fNIRS（功能性近红外光谱） 基于近红外光（700–1000nm）穿透活体组织——正确。【易错】PRR 管'到达（reach）'不管'眼动'，把它和眼动绑定就错了。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 顶叶皮层：大脑顶部偏后的区域，含初级体感皮层（处理身体的触觉等感觉）和后顶叶皮层（把感觉整合成动作计划、参与空间注意），在脑机接口里是解码'运动意图'的重要来源。\n• 运动前区：负责'动作的计划与准备'的脑区。其中额叶眼区管眼动、腹侧运动前皮层(F5)管抓握、背侧运动前区(PMD)管手臂伸够（到达）。\n• PRR（顶叶到达区）：顶叶里专门编码'手臂要伸向哪里（到达 reach 的目标位置和轨迹）'的区域。注意它管'手臂到达'，不是管眼动。\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。","multi":false,"ans":"B","options":{"A":"运动前区直接地、相互地连接到顶叶皮层区中对应的眼、手臂和手区，从而产生高级别的运动计划","B":"顶叶到达区 PRR编码了位置和即将到来的眼部运动的轨迹","C":"fMRI是通过检测磁共振信号的变化来推断大脑活动","D":"fNIRs是基于对近红外光（波长700-1000nm）穿透生物活体组织的观察"}},{"id":"main-choice-18","src":"main","type":"choice","n":18,"q":"下面哪一个选项不是BCI（脑机接口）系统的初始化操作协议？（）","a":"自参数化协议","parts":["自参数化协议"],"keywords":["自参数化协议"],"exp":"【答案 D】问哪个'不是' BCI（脑机接口） 初始化操作协议。标准协议有：A. 同步协议（系统定时）、B. 异步协议（用户自定节奏）、C. 混合协议（二者结合）。D. 自参数化协议——课件中无此协议，是杜撰项，故选 D。【易错】记住协议三类'同步/异步/混合'，'自参数化'是干扰项。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 同步 / 异步 / 混合协议：同步=系统规定固定时间窗、它说什么时候读你脑信号（简单可靠但不自然）；异步=你想用就用、系统持续监听并分清你此刻是'没打算操作（无控制状态）'还是'在主动下命令（意图控制状态）'（更自然但更难做）；混合=两者结合。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"D","options":{"A":"同步协议","B":"异步协议","C":"混合协议","D":"自参数化协议"}},{"id":"main-choice-19","src":"main","type":"choice","n":19,"q":"下面哪一个不是在选择滤波器时需要考虑的因素？（）","a":"信号幅值","parts":["信号幅值"],"keywords":["信号幅值"],"exp":"【答案 B】问选滤波器时'不需考虑'的因素。设计数字滤波器需考虑：A. 阶数（决定过渡带陡峭程度与计算量）、C. 转角频率（截止频率位置）、D. 相位（是否线性相位、是否引入失真）。B. 信号幅值——滤波器是按频率特性设计的，与信号幅值大小无关，故选 B。【易错】幅值是信号属性不是滤波器参数；阶数、转角频率、相位才是设计要素。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 滤波器：像一道'频率筛子'，只让特定频率范围通过。低通=只留低频，高通=只留高频，带通=只留中间一段，带阻/陷波=专门挖掉某个窄频段（常用来去 50Hz 工频）。","multi":false,"ans":"B","options":{"A":"阶数","B":"信号幅值","C":"转角频率","D":"相位"}},{"id":"main-choice-20","src":"main","type":"choice","n":20,"q":"下面哪一个说法不正确。（）","a":"ECoG信号具有比EEG信号更低的幅值","parts":["ECoG信号具有比EEG信号更低的幅值"],"keywords":["ECoG信号具有比EEG信号更低的幅值"],"exp":"【答案 B】问哪个说法'不正确'。A. ECoG（皮层脑电） 比 EEG（头皮脑电） 离信号源更近（贴在皮层上）——正确。B. ECoG 信号幅值比 EEG'更低'——错误！离源更近、衰减更少，ECoG 幅值反而'更高'，故选 B。C. ECoG 空间分辨率毫米级、EEG 厘米级——正确。D. ECoG 频带可达 250Hz、EEG 最高约 70Hz——正确。【易错·高频】ECoG'更高幅值'是必记点；说'更低'就是错。距离近→衰减小→信号强。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"B","options":{"A":"相对于EEG传感器，ECoG采样电极距离脑信号源位置更近","B":"ECoG信号具有比EEG信号更低的幅值","C":"ECoG的空间分辨率是毫米尺度，而EEG是厘米尺度","D":"ECoG信号的频率带高达250Hz，而EEG的最高频带只有70Hz"}},{"id":"main-choice-21","src":"main","type":"choice","n":21,"q":"下面哪一项不是用来描述独立的脑-机接口/辅助技术系统。（）","a":"这种BCI需要进行简单配置来满足不同AT设备的需求","parts":["这种BCI需要进行简单配置来满足不同AT设备的需求"],"keywords":["这种BCI需要进行简单配置来满足不同AT设备的需求"],"exp":"【答案 D】问哪个'不是'用来描述独立 BCI（脑机接口）/AT（辅助技术） 系统。独立系统特征：A. 在便捷性/速度/精度等重要性能上有优势、B. 控制命令灵活、C. 适用于特殊环境。D. '需要进行简单配置来满足不同 AT 设备的需求'——这描述的是'非独立'系统（要适配外部设备），故选 D。【易错】'独立'系统自身就是完整功能单元，不依赖去配置适配别的 AT 设备；D 说的正好是非独立的特点。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 独立 vs 非独立 BCI：非独立=要靠外部刺激/正常通路（如盯着闪烁屏看的 SSVEP、P300）；独立=不依赖外部刺激、纯靠自主脑活动（如运动想象 ERD/ERS）。\n• 辅助技术（AT）：帮助残障人士完成日常功能的设备（如轮椅、拼写器）。BCI 常和 AT 绑在一起，组成一个能真正干活的完整系统（BCI/AT 系统）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"D","options":{"A":"在重要的性能方面具有优势（便捷性、速度或精度）","B":"控制命令语句灵活","C":"适用于特殊环境下","D":"这种BCI需要进行简单配置来满足不同AT设备的需求"}},{"id":"main-choice-22","src":"main","type":"choice","n":22,"q":"下列说法错误的是（）","a":"与头皮记录相比，颅内记录会得到更多更好的信息。","parts":["与头皮记录相比，颅内记录会得到更多更好的信息。"],"keywords":["与头皮记录相比，颅内记录会得到更多更好的信息"],"exp":"【答案 C】问哪个说法'错误'。A. 电极不刺入大脑，ECoG（皮层脑电） 比 LFP（局部场电位） 创伤小，空间分辨率介于 LFP 与 EEG（头皮脑电） 之间——正确。B. 颅内电势的幅度、空间与时间依赖性主要取决于电极尺度——正确。C. 与头皮记录相比，颅内记录'会得到更多更好的信息'——过于绝对、表述不当，故选 C（颅内确实信号好，但'更多更好'这种绝对化说法被判为错误项）。D. 皮层突触源是头皮 EEG 的主要来源——正确。【易错】C 的问题在'绝对化'；考试中过分绝对的表述常是错误项。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• LFP（局部场电位）：插在脑内的电极记录到的、电极周围一小群神经元'集体'的电活动总和。比单个神经元信号更稳定，介于'单神经元'和'整片头皮 EEG'之间的中等尺度信号。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"C","options":{"A":"因为电极不刺入大脑，皮层脑电比局部场电位记录具有较少的创伤，并提供了介于局部场电位和脑电图之间的空间分辨率。","B":"颅内电势的幅度、 空间依赖性和时间依赖性主要依赖于电极尺度。","C":"与头皮记录相比，颅内记录会得到更多更好的信息。","D":"皮层突触源是头皮记录脑电图主要来源。"}},{"id":"main-choice-23","src":"main","type":"choice","n":23,"q":"下列哪一项不属于非独立BCI（脑机接口）所使用的脑电信号（）。","a":"事件相关去同步/事件相关同步","parts":["事件相关去同步/事件相关同步"],"keywords":["事件相关去同步/事件相关同步"],"exp":"【答案 B】问哪个'不属于'非独立 BCI（脑机接口） 使用的脑电信号。非独立 BCI 依赖外部刺激/正常通路，用 A. P300（刺激后约 300 毫秒出现的正向事件相关电位）、C. SSVEP（稳态视觉诱发电位）。B. 事件相关去同步/同步（ERD（事件相关去同步）/ERS（事件相关同步））——属于运动想象，是'独立'BCI 的信号（不依赖外部刺激），故选 B。D. 以上都不属于——不对。【易错·高频】ERD/ERS 归'独立'BCI；P300、SSVEP 归'非独立'。这条独立/非独立的归类是必考点。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。\n• ERD / ERS（事件相关去同步 / 同步）：做或想象一个动作时，相关脑区某个频段的脑波会'变弱'（叫 ERD，去同步）；动作结束后又会短暂'变强'（叫 ERS，同步）。一句话：ERD=能量降低，ERS=能量升高。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• 独立 vs 非独立 BCI：非独立=要靠外部刺激/正常通路（如盯着闪烁屏看的 SSVEP、P300）；独立=不依赖外部刺激、纯靠自主脑活动（如运动想象 ERD/ERS）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"B","options":{"A":"P300电位","B":"事件相关去同步/事件相关同步","C":"稳态视觉诱发电位","D":"以上都不属于"}},{"id":"main-choice-24","src":"main","type":"choice","n":24,"q":"皮层下区域中主要涉及运动的平衡以及运动的学习和适应的是（）。","a":"小脑","parts":["小脑"],"keywords":["小脑"],"exp":"【答案 D】问皮层下哪个区域主要涉及运动平衡、运动学习与适应。A. 丘脑——感觉中继。B. 脑干——基础生命功能。C. 基底核——运动的启动与调节、习惯学习。D. 小脑——运动的协调、平衡、精细调节与运动学习/适应，故选 D。【易错】'平衡+学习适应'是小脑标志功
