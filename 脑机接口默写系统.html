    ${it.exp?`<div class="panel"><h3>考点解析</h3><div class="pbody"><div class="exp">${esc(it.exp)}</div></div></div>`:''}`;
  res.classList.add('show');
  requestAnimationFrame(()=>{const a=$('#ringArc');if(a){a.style.transition='stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1)';a.style.strokeDashoffset=C*(1-r.score/100);}});
}
function reveal(){const it=ITEMS.find(x=>x.id===curId);const res=$('#result');res.innerHTML=`<div class="panel"><h3>标准答案</h3><div class="pbody"><div class="reveal-a">${esc(it.a)}</div>${(it.keywords&&it.keywords.length)?`<div style="margin-top:12px"><div style="font-size:12px;color:#9ca3af;margin-bottom:7px">关键术语</div><div class="kws">${it.keywords.map(k=>`<span class="kw" style="color:#3f3f46;background:#f4f4f5;border-color:#e0e0e0"><span class="mk">·</span>${esc(k)}</span>`).join('')}</div></div>`:''}</div></div>${it.exp?`<div class="panel"><h3>考点解析</h3><div class="pbody"><div class="exp">${esc(it.exp)}</div></div></div>`:''}`;res.classList.add('show');}

/* ===== nav ===== */
function select(id){if(!ITEMS.find(x=>x.id===id))return;curId=id;renderList();renderQuestion();}
function step(d){const arr=filtered();if(!arr.length)return;let i=arr.findIndex(x=>x.id===curId);i=i<0?0:(i+d+arr.length)%arr.length;select(arr[i].id);}
function pickRandom(){const arr=filtered();if(!arr.length)return;select(arr[Math.floor(Math.random()*arr.length)].id);toast('随机抽题');}
function practiceWeak(){const weak=ITEMS.filter(it=>{const p=prog[it.id];return p&&(p.fam===1||(p.best!=null&&p.best<60));});if(!weak.length){toast('暂无薄弱题');return;}order=weak.map(it=>it.id).concat(ITEMS.filter(it=>!weak.includes(it)).map(it=>it.id));view.type='all';view.bank='all';syncChips();select(weak[0].id);renderList();toast('已排到前面：'+weak.length+' 道薄弱题');}
function practiceUntried(){const un=ITEMS.filter(it=>{const p=prog[it.id];return !p||p.best==null;});if(!un.length){toast('所有题都练过了');return;}order=un.map(it=>it.id).concat(ITEMS.filter(it=>!un.includes(it)).map(it=>it.id));view.type='all';view.bank='all';syncChips();select(un[0].id);renderList();toast('已排到前面：'+un.length+' 道未做题');}
function resetAll(){if(!confirm('确定清空所有进度？此操作不可撤销。'))return;prog={};save();order=ITEMS.map(it=>it.id);renderStats();renderList();renderQuestion();toast('已重置');}
function exportProg(){const data={app:'bci_master',exported:new Date().toISOString(),progress:prog};const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='脑机接口默写进度_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('进度已导出');}

function syncChips(){document.querySelectorAll('#typeFilters .chip').forEach(c=>c.classList.toggle('on',c.dataset.type===view.type));document.querySelectorAll('#bankFilters .chip').forEach(c=>c.classList.toggle('on',c.dataset.bank===view.bank));}
document.querySelectorAll('#typeFilters .chip').forEach(c=>c.onclick=()=>{view.type=c.dataset.type;syncChips();renderList();ensureCur();});
document.querySelectorAll('#bankFilters .chip').forEach(c=>c.onclick=()=>{view.bank=c.dataset.bank;syncChips();renderList();ensureCur();});
$('#search').addEventListener('input',e=>{view.q=e.target.value;renderList();});
function ensureCur(){const arr=filtered();if(arr.length&&!arr.find(x=>x.id===curId))select(arr[0].id);else renderQuestion();}
$('#prevBtn').onclick=()=>step(-1);$('#nextBtn').onclick=()=>step(1);
$('#actRandom').onclick=pickRandom;$('#actWeak').onclick=practiceWeak;$('#actUntried').onclick=practiceUntried;$('#actReset').onclick=resetAll;$('#actExport').onclick=exportProg;

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight')step(1);
  else if(e.key==='ArrowLeft')step(-1);
  else if(e.key==='Enter'){if(answered)step(1);}
  else if(/^[a-gA-G]$/.test(e.key)){const st=$('#stage');if(st&&st._keyAnswer)st._keyAnswer(e.key.toUpperCase());}
  else if(e.key>='1'&&e.key<='3')setFam(+e.key);
});
function openSide(){$('#side').classList.add('open');$('#scrim').classList.add('show');}
function closeSide(){$('#side').classList.remove('open');$('#scrim').classList.remove('show');}
$('#menuBtn').onclick=openSide;$('#scrim').onclick=closeSide;

renderStats();renderList();renderQuestion();
</script>
</body>
</html>
