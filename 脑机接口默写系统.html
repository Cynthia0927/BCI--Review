能；基底核偏'调节/选择动作'，别混。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 皮层下结构（丘脑/脑干/基底核/小脑）：丘脑=感觉信息的中转站；脑干=维持呼吸心跳等基本生命；基底核=动作的启动与选择、习惯养成；小脑=动作的协调、平衡与运动学习。","multi":false,"ans":"D","options":{"A":"丘脑","B":"脑干","C":"基底核","D":"小脑"}},{"id":"main-choice-25","src":"main","type":"choice","n":25,"q":"（多选）实际脑机接口应用中，在特征维度大而样本量小的情况，可考虑（）","a":"进行特征选择；利用支持向量机模型","parts":["进行特征选择","利用支持向量机模型"],"keywords":["进行特征选择","利用支持向量机模型"],"exp":"【答案 BC（多选）】问特征维度大、样本量小时可考虑什么。维度高样本少易过拟合：B. 进行特征选择（降维、留有效特征）、C. 用支持向量机（小样本高维下泛化好）——都合适，选 BC。A. 深度神经网络——需大量样本，小样本下易过拟合，不合适。D. 小波分析——是特征提取手段，不直接解决'高维小样本'的建模困境。【易错】小样本高维的对策是'减维（特征选择）+ 用 SVM（支持向量机）'，不是堆深度网络。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 小波变换：也是把信号按频率拆开，但比傅里叶更进一步——它能同时告诉你'某个频率成分在哪个时间点出现'，适合分析随时间变化的信号（属于时频分析）。\n• SVM（支持向量机）：一种常用分类器，努力在两类数据之间找一条'间隔最大'的分界线。在样本少、特征多时表现稳健，所以脑机接口里常用。\n• 人工神经网络与深度学习（ANN/CNN/RNN/LSTM）：模仿大脑神经元层层连接的算法，能自动从数据里学复杂规律。擅长处理非线性、随时间变化的复杂模式，但通常需要大量训练数据。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":true,"ans":"BC","options":{"A":"采用深度神经网络模型","B":"进行特征选择","C":"利用支持向量机模型","D":"采用小波分析"}},{"id":"main-choice-26","src":"main","type":"choice","n":26,"q":"下列采样设备中，不能记录生理电信号的是（）","a":"功能性近红外光谱","parts":["功能性近红外光谱"],"keywords":["功能性近红外光谱"],"exp":"【答案 C】问哪个采样设备'不能'记录生理电信号。A. EEG（头皮脑电） 电极、B. ECoG（皮层脑电） 电极、D. 针电极——都直接采集电信号。C. 功能性近红外光谱（fNIRS（功能性近红外光谱））——测的是血氧（光学信号），不记录电信号，故选 C。【易错】fNIRS 是光学/代谢测量，不属于电生理；凡问'电信号'，fNIRS/fMRI（功能性磁共振成像） 都出局。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"C","options":{"A":"EEG电极","B":"ECoG电极","C":"功能性近红外光谱","D":"针电极"}},{"id":"main-choice-27","src":"main","type":"choice","n":27,"q":"下列材料中，哪一种不是电极常用的材料（）","a":"锡","parts":["锡"],"keywords":["锡"],"exp":"【答案 B】问哪种'不是'电极常用材料。常用电极材料：金、铂、银（银/氯化银最常见）。锡——不是脑电电极常用材料，故选 B。【易错】记住常用'金、铂、银（Ag/AgCl（氯化银））'，锡是干扰项。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 干电极 vs 湿电极：湿电极要涂导电膏，信号好但戴起来麻烦、要清理；干电极不用膏、戴着方便，但信号稳定性差些。常用电极材料是金、铂、银（银/氯化银最常见）。","multi":false,"ans":"B","options":{"A":"金","B":"锡","C":"铂","D":"银"}},{"id":"main-choice-28","src":"main","type":"choice","n":28,"q":"下面哪一个说法不正确。（）","a":"ECoG信号具有比EEG信号更低的幅值","parts":["ECoG信号具有比EEG信号更低的幅值"],"keywords":["ECoG信号具有比EEG信号更低的幅值"],"exp":"【答案 B】与第20题完全相同。问哪个说法'不正确'。B. 'ECoG（皮层脑电） 信号幅值比 EEG（头皮脑电） 更低'——错误，ECoG 离源近、衰减小，幅值'更高'，故选 B。其余 A（更近）、C（mm vs cm）、D（250Hz vs 70Hz）均正确。【易错】重复考点说明'ECoG 幅值更高'是高频必背；遇到'ECoG 幅值更低'直接判错。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"B","options":{"A":"相对于EEG传感器，ECoG采样电极距离脑信号源位置更近","B":"ECoG信号具有比EEG信号更低的幅值","C":"ECoG的空间分辨率是毫米尺度，而EEG是厘米尺度","D":"ECoG信号的频率带高达250Hz，而EEG的最高频带只有70Hz"}},{"id":"main-choice-29","src":"main","type":"choice","n":29,"q":"在SSVEP（稳态视觉诱发电位）中，用户会看到位于视野中不同地方的并发的重复刺激显示。每个刺激以( )的频率呈现。","a":"不同的频率","parts":["不同的频率"],"keywords":["不同的频率"],"exp":"【答案 D】问 SSVEP（稳态视觉诱发电位） 中每个并发刺激以什么频率呈现。SSVEP 让视野中多个刺激各自以'不同的'频率闪烁，大脑会对注视目标的频率产生同步响应，从而区分用户在看哪个，故选 D。A. 8–12Hz、B. 13–30Hz 是具体频段不符题意；C. '相同频率'就无法区分目标了。【易错】关键是'不同频率'才能编码不同目标——若都相同则无法解码注视对象。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。","multi":false,"ans":"D","options":{"A":"8-12Hz","B":"13-30Hz","C":"相同的频率","D":"不同的频率"}},{"id":"main-choice-30","src":"main","type":"choice","n":30,"q":"以下不属于皮层脑电（ECoG（皮层脑电））信号的采集需要注意是( )","a":"低通滤波器频率应大于数字化速率","parts":["低通滤波器频率应大于数字化速率"],"keywords":["低通滤波器频率应大于数字化速率"],"exp":"【答案 B】问 ECoG（皮层脑电） 采集'不需要注意'的是哪项。需注意：A. 选择适当材料、C. 足够的时间分辨率、D. 足够的电压范围和分辨率。B. '低通滤波器频率应大于数字化速率'——错误！按奈奎斯特采样定理，抗混叠低通截止应'小于'采样率的一半，绝不能'大于'数字化速率，故选 B。【易错】抗混叠要求'低通截止 < 采样率/2'；说'大于数字化速率'方向完全反了，会引起混叠。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 滤波器：像一道'频率筛子'，只让特定频率范围通过。低通=只留低频，高通=只留高频，带通=只留中间一段，带阻/陷波=专门挖掉某个窄频段（常用来去 50Hz 工频）。\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。","multi":false,"ans":"B","options":{"A":"选择适当的材料","B":"低通滤波器频率应大于数字化速率","C":"具有足够的时间分辨率","D":"足够的电压范围和分辨率"}},{"id":"main-choice-31","src":"main","type":"choice","n":31,"q":"以下不属于iBCI（侵入式脑机接口）研发的目标的是( )","a":"确定eBCIs优于iBCIs的优势和益处","parts":["确定eBCIs优于iBCIs的优势和益处"],"keywords":["确定eBCIs优于iBCIs的优势和益处"],"exp":"【答案 A】问哪个'不是' iBCI（侵入式 BCI（脑机接口））研发目标。iBCI 目标：B. 恢复瘫痪患者有益的动作范围、C. 可靠稳定发挥作用、D. 长期安全使用。A. '确定 eBCI（非侵入式脑机接口） 优于 iBCI 的优势和益处'——这不是 iBCI 自身的研发目标（且方向相反），故选 A。【易错】A 在'给 eBCI 做对比论证'，与 iBCI'恢复功能、可靠、长期安全'的目标无关。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"确定eBCIs优于iBCIs的优势和益处","B":"恢复瘫痪患者的功能上有益的动作范围","C":"可靠和稳定发挥作用","D":"长期安全使用"}},{"id":"main-choice-32","src":"main","type":"choice","n":32,"q":"下列关于顶叶和运动前区的说法错误的是 ( )","a":"顶叶和运动前区包含了针对特定运动类型的区域，包含有关于目标和有意动作的频域信息","parts":["顶叶和运动前区包含了针对特定运动类型的区域，包含有关于目标和有意动作的频域信息"],"keywords":["顶叶和运动前区包含了针对特定运动类型的区域，包含有关于目标和有意动作的频域信息"],"exp":"【答案 C】问关于顶叶和运动前区哪个说法'错误'。A. 与感觉系统及意志/动机/奖励脑区紧密相连——正确。B. 作用于动作规划执行相关的感觉运动转换与决策——正确。C. 包含针对特定运动类型的区域，含目标与有意动作的'频域信息'——错误！应是含目标与有意动作的'信息/表征'，把它说成'频域信息'是错误表述，故选 C。D. 准备和规划基于感觉与意志信息的有意动作——正确。【易错】C 偷换成'频域信息'，这是错误项的常见手法（塞入一个看似专业实则不当的词）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 顶叶皮层：大脑顶部偏后的区域，含初级体感皮层（处理身体的触觉等感觉）和后顶叶皮层（把感觉整合成动作计划、参与空间注意），在脑机接口里是解码'运动意图'的重要来源。\n• 运动前区：负责'动作的计划与准备'的脑区。其中额叶眼区管眼动、腹侧运动前皮层(F5)管抓握、背侧运动前区(PMD)管手臂伸够（到达）。","multi":false,"ans":"C","options":{"A":"顶叶和运动前区紧密地与感觉系统和与意志、 动机和奖励相关的脑区相关联。","B":"顶叶和运动前区作用于与动作的规划和执行相关的感觉运动转换和决策。","C":"顶叶和运动前区包含了针对特定运动类型的区域，包含有关于目标和有意动作的频域信息","D":"顶叶和运动前区的作用是准备和规划基于感觉和意志信息的有意动作。"}},{"id":"main-choice-33","src":"main","type":"choice","n":33,"q":"下面说法错误的是( )","a":"功能性近红外光谱能提供非常高的空间分辨率","parts":["功能性近红外光谱能提供非常高的空间分辨率"],"keywords":["功能性近红外光谱能提供非常高的空间分辨率"],"exp":"【答案 A】问哪个说法'错误'。A. 功能性近红外光谱能提供'非常高的空间分辨率'——错误！fNIRS（功能性近红外光谱） 空间分辨率较差（厘米级），故选 A。B. fNIRS 和 fMRI（功能性磁共振成像） 都基于测量任务引起的血氧水平依赖（BOLD（血氧水平依赖））响应——正确。C. BOLD 反映血流变化、是脑活动的间接测量、与脑电活动密切相关——正确。D. fNIRS 和 fMRI 是对 BCI（脑机接口） 最直接有益的两种代谢活动测量法——正确。【易错】fNIRS 优点是便携低价、时间分辨率较好，但空间分辨率'差'；说它空间分辨率高就是错。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"功能性近红外光谱能提供非常高的空间分辨率","B":"fNIRs和fMRI方法包括它们的BCI用途，都是基于测量任务引起的血氧水平依赖BLOD响应的。","C":"BLO","D":"反映了血流量的变化，是大脑活动的间接测量，越来越多的证据表明它与脑电活动密切相关。"}},{"id":"main-choice-34","src":"main","type":"choice","n":34,"q":"以下不属于可以纳入未来BCI（脑机接口）家庭用户的基本标准的人群是( )。","a":"无法与外界交流的人群","parts":["无法与外界交流的人群"],"keywords":["无法与外界交流的人群"],"exp":"【答案 C】问哪类人群'不属于'未来 BCI（脑机接口） 家庭用户的基本标准。纳入标准：A. 很少或没有有用的自主肌肉控制（最需要 BCI 的人）、B. 有可靠护理者、能获得基本计算机技能并致力于支持其使用、D. 稳定的生活环境。C. '无法与外界交流的人群'——表述太宽泛，不是家庭用户准入的基本标准条目，故选 C。【易错】标准强调的是'有支持条件、环境稳定、确实需要'，而非笼统的'无法交流'。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"C","options":{"A":"很少或没有任何有用的自动的肌肉控制的人群","B":"有可靠的护理者拥有或能够获得基本的计算机技能并致力于支持被试的BCI使用","C":"无法与外界交流的人群","D":"稳定的生活环境"}},{"id":"main-choice-35","src":"main","type":"choice","n":35,"q":"以下哪种解码方法能有效处理神经信号的非线性动力学？（）","a":"递归神经网络","parts":["递归神经网络"],"keywords":["递归神经网络"],"exp":"【答案 B】问哪种解码方法能有效处理神经信号的'非线性动力学'。A. 线性判别分析 LDA（线性判别分析）——线性方法。B. 递归神经网络 RNN——擅长建模时间序列的非线性动态，故选 B。C. 主成分分析 PCA（主成分分析）——线性降维。D. 匹配滤波——线性相关检测。【易错】只有 RNN（及深度网络）能捕捉非线性时变动力学；LDA/PCA/匹配滤波本质都是线性。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• PCA（主成分分析）：一种'降维'方法，把很多相关的数据维度压缩成几个最能代表整体差异的新维度、去掉冗余。属于无监督方法（不需要标签）。\n• LDA（线性判别分析）：一种分类器（做判断、分类的算法），用带标签的数据学一条'分界线'把不同类别分开。注意它是'分类'用的，不是提取特征/空间滤波。\n• 人工神经网络与深度学习（ANN/CNN/RNN/LSTM）：模仿大脑神经元层层连接的算法，能自动从数据里学复杂规律。擅长处理非线性、随时间变化的复杂模式，但通常需要大量训练数据。\n• 匹配滤波：拿一个已知的'模板波形'去和信号比对，找出最相似的片段（一种线性的检测方法）。","multi":false,"ans":"B","options":{"A":"线性判别分析","B":"递归神经网络","C":"主成分分析","D":"匹配滤波"}},{"id":"main-choice-36","src":"main","type":"choice","n":36,"q":"在闭环深脑刺激（DBS（深部脑刺激））系统中，刺激参数调整依赖的实时反馈信号通常是：（）","a":"局部场电位（LFP）的β波段功率","parts":["局部场电位（LFP）的β波段功率"],"keywords":["局部场电位的β波段功率"],"exp":"【答案 A】问闭环 DBS（深脑刺激）系统调参依赖的实时反馈信号。A. 局部场电位（LFP（局部场电位））的 β 波段功率——帕金森等病中 β 振荡过强与症状相关，闭环 DBS 正是用 LFP 的 β 功率作为反馈来自适应调节刺激，故选 A。B. 头皮 EEG（头皮脑电） 的 α 相位——非侵入、不用于植入式闭环 DBS。C. fMRI（功能性磁共振成像） 的 BOLD（血氧水平依赖）——慢、设备庞大，不能实时床旁反馈。D. EMG（肌电） 幅值——是肌电不是脑内信号。【易错】闭环 DBS 的标志反馈=LFP 的 β 波段功率，要与题36 的题面绑定记忆。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• EMG（肌电）：肌肉收缩时产生的电信号。出现在脑电里属于伪迹（咬牙、皱眉就会混进来）。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• LFP（局部场电位）：插在脑内的电极记录到的、电极周围一小群神经元'集体'的电活动总和。比单个神经元信号更稳定，介于'单神经元'和'整片头皮 EEG'之间的中等尺度信号。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• 开环 vs 闭环（反馈）：开环=只是'读脑→控制设备'的单向输出，用户不知道自己做得对不对；闭环=把控制结果实时反馈给用户（视觉/听觉/触觉），用户据此调整大脑状态、越用越准。反馈是闭环的灵魂。\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• DBS（深部脑刺激）：把电极植入脑深部、持续放电来调节异常脑活动，常用于帕金森病。闭环 DBS 还能一边监测脑信号一边自动调整刺激。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"局部场电位（LFP）的β波段功率","B":"头皮EEG的α波相位","C":"fMRI的BOLD信号","D":"肌电图（EMG）幅值"}},{"id":"main-choice-37","src":"main","type":"choice","n":37,"q":"以下哪种现象会导致BCI（脑机接口）漂移？（）","a":"以上全部","parts":["以上全部"],"keywords":["以上全部"],"exp":"【答案 D（以上全部）】问哪种现象会导致 BCI（脑机接口） 漂移（性能随时间下降）。A. 用户疲劳引起脑电幅值下降——会。B. 电极阻抗随时间变化——会（信号质量变）。C. 神经表征的个体间差异——会（泛化困难）。三者都导致漂移，故选 D。【易错】别只选单一原因；BCI 漂移是用户状态、硬件、神经表征共同作用的结果，'以上全部'最完整。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 电极阻抗：反映电极和头皮'接触好不好'的指标。阻抗高=接触差=信号弱、噪声大；面积大、皮肤清洁、涂导电膏都能降低阻抗。\n• 信号漂移：脑机接口的表现会随时间慢慢变差——因为用户会疲劳、注意力波动，电极接触会变化，神经信号本身也会变。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"D","options":{"A":"用户疲劳引起的脑电幅值下降","B":"电极阻抗随时间变化","C":"神经表征的个体间差异","D":"以上全部"}},{"id":"main-choice-38","src":"main","type":"choice","n":38,"q":"EEG（头皮脑电）信号中伪迹眼电干扰（EOG（眼电））通常产生于哪个频段？","a":"低频δ和θ波段","parts":["低频δ和θ波段"],"keywords":["低频δ和θ波段"],"exp":"【答案 B】问 EOG（眼电干扰）通常产生于哪个频段。眨眼/眼动是缓慢的大幅电位变化，能量集中在低频 δ（0.5–4Hz）和 θ（4–8Hz）波段，故选 B。A. 高频 γ、C. 中频 α、D. β 都不对。【易错】眼电=低频大幅伪迹，主要污染额区低频；与高频肌电正好相反。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• EMG（肌电）：肌肉收缩时产生的电信号。出现在脑电里属于伪迹（咬牙、皱眉就会混进来）。\n• EOG（眼电）：眼球转动、眨眼产生的电信号，是一种又大又慢（低频）的伪迹，主要污染前额附近的脑电。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"B","options":{"A":"高频伽马波段","B":"低频δ和θ波段","C":"中频α波段","D":"β波段"}},{"id":"main-choice-39","src":"main","type":"choice","n":39,"q":"脑机接口系统中，信号采集模块的主要作用是（）","a":"获取大脑或神经系统相关的生理信号","parts":["获取大脑或神经系统相关的生理信号"],"keywords":["获取大脑或神经系统相关的生理信号"],"exp":"【答案 B】问信号采集模块的主要作用。BCI（脑机接口） 第一模块负责'获取大脑或神经系统相关的生理信号'，故选 B。A. 转文字是后端输出、C. 机械控制是设备控制模块、D. 心理评估不是 BCI 模块功能。【易错】采集模块只管'拿到信号'，不负责解码、控制或输出，各模块分工要清。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"B","options":{"A":"将用户意图直接转化为文字","B":"获取大脑或神经系统相关的生理信号","C":"对外部设备进行机械控制","D":"对用户进行心理评估"}},{"id":"main-choice-40","src":"main","type":"choice","n":40,"q":"下列哪种脑电节律通常与闭眼放松状态密切相关？（）","a":"α波","parts":["α波"],"keywords":["α波"],"exp":"【答案 C】问哪种节律与闭眼放松密切相关。A. δ 波——深睡。B. θ 波——困倦/冥想。C. α 波（8–13Hz）——闭眼清醒放松时枕区显著，故选 C。D. γ 波——高级认知/高频活动。【易错】α=闭眼放松，是必记对应；睁眼或集中注意时 α 被抑制（α 阻断）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。","multi":false,"ans":"C","options":{"A":"δ波","B":"θ波","C":"α波","D":"γ波"}},{"id":"main-choice-41","src":"main","type":"choice","n":41,"q":"EEG（头皮脑电）信号中，β节律的典型频率范围通常是（）","a":"13～30 Hz","parts":["13～30 Hz"],"keywords":["13～30 Hz"],"exp":"【答案 D】问 β 节律的典型频率范围。β 为 13–30Hz，故选 D。A. 0.5–4Hz 是 δ、B. 4–8Hz 是 θ、C. 8–13Hz 是 α。【易错】五频段数字必背：δ 0.5–4 / θ 4–8 / α 8–13 / β 13–30 / γ >30 Hz。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"D","options":{"A":"0.5～4 Hz","B":"4～8 Hz","C":"8～13 Hz","D":"13～30 Hz"}},{"id":"main-choice-42","src":"main","type":"choice","n":42,"q":"运动想象BCI（脑机接口）中常用的感觉运动节律主要包括（）","a":"μ节律和β节律","parts":["μ节律和β节律"],"keywords":["μ节律和β节律"],"exp":"【答案 A】问运动想象 BCI（脑机接口） 常用的感觉运动节律。运动想象会引起感觉运动皮层的 μ 节律（8–12Hz）与 β 节律（13–30Hz）变化（ERD（事件相关去同步）/ERS（事件相关同步）），故选 A。B. δ/θ、C. α/γ 不是感觉运动节律；D. P300（刺激后约 300 毫秒出现的正向事件相关电位）/N200（刺激后约 200 毫秒出现的负向事件相关电位） 是诱发电位不是节律。【易错】运动想象=μ+β；注意 μ 节律虽在 α 频段，但定位在中央运动区、与运动相关，不同于枕区 α。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。\n• ERD / ERS（事件相关去同步 / 同步）：做或想象一个动作时，相关脑区某个频段的脑波会'变弱'（叫 ERD，去同步）；动作结束后又会短暂'变强'（叫 ERS，同步）。一句话：ERD=能量降低，ERS=能量升高。\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• SMR（感觉运动节律）：运动相关脑区（中央区）的脑波节律，包含 μ 和 β，在实际运动或运动想象时会出现 ERD/ERS 变化。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"μ节律和β节律","B":"δ节律和θ节律","C":"α节律和γ节律","D":"P300和N200"}},{"id":"main-choice-43","src":"main","type":"choice","n":43,"q":"在运动想象任务中，ERD（事件相关去同步）通常表示（）","a":"特定频段功率降低","parts":["特定频段功率降低"],"keywords":["特定频段功率降低"],"exp":"【答案 B】问运动想象中 ERD 表示什么。ERD（事件相关去同步）=特定频段功率'降低'（去同步化），故选 B。A. 功率增强是 ERS（事件相关同步）、C. 信号消失/D. 阻抗升高都不对。【易错·高频】ERD=功率降低、ERS=功率升高。这条务必背反不得：'去同步=减少'。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERD / ERS（事件相关去同步 / 同步）：做或想象一个动作时，相关脑区某个频段的脑波会'变弱'（叫 ERD，去同步）；动作结束后又会短暂'变强'（叫 ERS，同步）。一句话：ERD=能量降低，ERS=能量升高。\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• 电极阻抗：反映电极和头皮'接触好不好'的指标。阻抗高=接触差=信号弱、噪声大；面积大、皮肤清洁、涂导电膏都能降低阻抗。","multi":false,"ans":"B","options":{"A":"特定频段功率增强","B":"特定频段功率降低","C":"脑电信号完全消失","D":"电极阻抗升高"}},{"id":"main-choice-44","src":"main","type":"choice","n":44,"q":"在BCI（脑机接口）系统中，分类器的主要作用是（）","a":"将提取到的特征映射为用户意图类别","parts":["将提取到的特征映射为用户意图类别"],"keywords":["将提取到的特征映射为用户意图类别"],"exp":"【答案 B】问分类器的主要作用。分类器把'提取到的特征'映射为'用户意图类别'（如左手/右手），故选 B。A. 增强导电、C. 改刺激频率、D. 降采样率都不是分类器职责。【易错】分类器=特征→意图的映射，是'决策'环节，不碰硬件或刺激参数。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"B","options":{"A":"增强电极导电性能","B":"将提取到的特征映射为用户意图类别","C":"改变视觉刺激频率","D":"降低采样率"}},{"id":"main-choice-45","src":"main","type":"choice","n":45,"q":"下列哪种方法常用于降低EEG（头皮脑电）信号中的工频干扰？（）","a":"陷波滤波器","parts":["陷波滤波器"],"keywords":["陷波滤波器"],"exp":"【答案 A】问去除工频干扰常用什么方法。工频是 50/60Hz 的窄带干扰，用陷波滤波器（带阻滤波器，在工频处挖个深槽）最对症，故选 A。B. 低通去高频、C. 高通去低频、D. 积分都不能精准去某一窄带。【易错】工频→陷波/带阻；低通高通是去整段高/低频，不针对单一频点。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 滤波器：像一道'频率筛子'，只让特定频率范围通过。低通=只留低频，高通=只留高频，带通=只留中间一段，带阻/陷波=专门挖掉某个窄频段（常用来去 50Hz 工频）。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"陷波滤波器","B":"低通滤波器","C":"高通滤波器","D":"积分运算"}},{"id":"main-choice-46","src":"main","type":"choice","n":46,"q":"在中国大陆地区，工频干扰的主要频率通常是（）","a":"50 Hz","parts":["50 Hz"],"keywords":["50 Hz"],"exp":"【答案 C】问中国大陆工频干扰主频。中国大陆市电频率 50Hz，故工频干扰主频为 50Hz，选 C。【易错】中国/欧洲是 50Hz，美国/日本部分是 60Hz；题目限定'中国大陆'就是 50Hz。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。","multi":false,"ans":"C","options":{"A":"10 Hz","B":"25 Hz","C":"50 Hz","D":"100 Hz"}},{"id":"main-choice-47","src":"main","type":"choice","n":47,"q":"下列哪种信号属于肌肉活动产生的生理电信号？（）","a":"EMG","parts":["EMG"],"keywords":["EMG"],"exp":"【答案 B】问哪种信号属于肌肉活动产生的生理电信号。A. EEG（头皮脑电）=脑电、B. EMG（肌电）=肌电（肌肉收缩产生）、C. EOG=眼电、D. ECG=心电。肌肉对应 EMG，故选 B。【易错】记住缩写对应：E+M=Muscle 肌电；别和 EOG（眼）、ECG（心）混。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EMG（肌电）：肌肉收缩时产生的电信号。出现在脑电里属于伪迹（咬牙、皱眉就会混进来）。\n• EOG（眼电）：眼球转动、眨眼产生的电信号，是一种又大又慢（低频）的伪迹，主要污染前额附近的脑电。\n• ECG（心电）：心脏跳动产生的电信号，混进脑电时属于伪迹。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"B","options":{"A":"EEG","B":"EMG","C":"EOG","D":"ECG"}},{"id":"main-choice-48","src":"main","type":"choice","n":48,"q":"眼动或眨眼伪迹通常会对哪类脑电信号产生较明显影响？（）","a":"额区低频EEG信号","parts":["额区低频EEG信号"],"keywords":["额区低频EEG信号"],"exp":"【答案 A】问眼动/眨眼伪迹对哪类信号影响明显。眼电是低频大幅信号，且眼睛靠近前额，主要影响'额区低频 EEG（头皮脑电） 信号'，故选 A。B. 枕区高频 γ、C. 顶区超高频、D. 皮层内单神经元都离眼远或频段不符。【易错】眼电伪迹=额区+低频，这与它的'位置（前额近眼）+性质（低频慢波）'一致。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• EOG（眼电）：眼球转动、眨眼产生的电信号，是一种又大又慢（低频）的伪迹，主要污染前额附近的脑电。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"额区低频EEG信号","B":"枕区高频γ信号","C":"顶区超高频信号","D":"皮层内单神经元信号"}},{"id":"main-choice-49","src":"main","type":"choice","n":49,"q":"在EEG（头皮脑电）采集中，电极阻抗过高可能导致（）","a":"信号质量下降","parts":["信号质量下降"],"keywords":["信号质量下降"],"exp":"【答案 A】问电极阻抗过高会导致什么。阻抗高→接触不良→信号质量下降（噪声大、信号弱），故选 A。B. 空间分辨率无限提高、C. 采样率自动升高、D. 节律消失都是无稽。【易错】阻抗是'接触好坏'的指标，高阻抗只会让信号变差，不会改变分辨率或采样率。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• 电极阻抗：反映电极和头皮'接触好不好'的指标。阻抗高=接触差=信号弱、噪声大；面积大、皮肤清洁、涂导电膏都能降低阻抗。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"信号质量下降","B":"空间分辨率无限提高","C":"采样频率自动升高","D":"脑电节律消失"}},{"id":"main-choice-50","src":"main","type":"choice","n":50,"q":"下列哪种方法常用于去除EEG（头皮脑电）中的独立伪迹成分？（）","a":"独立成分分析","parts":["独立成分分析"],"keywords":["独立成分分析"],"exp":"【答案 A】问去除 EEG（头皮脑电） 中独立伪迹成分常用什么。独立成分分析（ICA）能把混合信号分解为统计独立的成分，从中剔除眼电/肌电等伪迹成分，故选 A。B. FFT（快速傅里叶变换） 是频率分析、C. 欧氏距离是度量、D. 线性插值是补点，都不能分离独立伪迹。【易错】'独立伪迹成分'这几个字直接指向 ICA（Independent Component Analysis）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 伪迹：混进脑电里的'非大脑'信号，比如眨眼（眼电）、咬牙皱眉（肌电）、心跳（心电）、市电（工频）。它们会盖住真正的脑信号，预处理时要去掉。\n• EMG（肌电）：肌肉收缩时产生的电信号。出现在脑电里属于伪迹（咬牙、皱眉就会混进来）。\n• EOG（眼电）：眼球转动、眨眼产生的电信号，是一种又大又慢（低频）的伪迹，主要污染前额附近的脑电。\n• 傅里叶变换（FFT 是它的快速算法）：把一段信号拆开，看它由哪些'频率'成分组成、各有多强，好比把混在一起的声音分出有多少低音、多少高音。它只看频率，不告诉你某频率在'什么时刻'出现。\n• ICA（独立成分分析）：假设头皮记到的脑电其实是脑电、眼电、肌电等几路'相互独立'的信号混在一起，ICA 能把它们重新拆开，从而单独剔除眼电、肌电等伪迹。强项是能去掉'和脑电频率重叠'的伪迹（这点普通滤波做不到）。\n• 相似性特征：衡量'两路信号有多像'或'信号和模板有多像'的指标，如相干性（频域相关）、锁相值（相位是否同步）、马氏/欧氏距离（数据点之间的距离）。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"独立成分分析","B":"快速傅里叶变换","C":"欧氏距离计算","D":"线性插值"}},{"id":"main-choice-51","src":"main","type":"choice","n":51,"q":"在SSVEP（稳态视觉诱发电位）-BCI（脑机接口）中，用户通常需要（）","a":"注视以特定频率闪烁的视觉刺激","parts":["注视以特定频率闪烁的视觉刺激"],"keywords":["注视以特定频率闪烁的视觉刺激"],"exp":"【答案 A】问 SSVEP（稳态视觉诱发电位）-BCI（脑机接口） 中用户需要做什么。SSVEP 要求用户'注视以特定频率闪烁的视觉刺激'，故选 A。B. 想象手部运动是运动想象范式、C. 等听觉刺激、D. 口头输入都不是 SSVEP。【易错】SSVEP=盯着闪烁块看，靠注视目标的闪烁频率被解码。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"注视以特定频率闪烁的视觉刺激","B":"反复想象手部运动","C":"等待随机听觉刺激","D":"进行口头指令输入"}},{"id":"main-choice-52","src":"main","type":"choice","n":52,"q":"SSVEP（稳态视觉诱发电位）信号最常在头皮哪个区域记录到较明显响应？（）","a":"枕叶视觉区","parts":["枕叶视觉区"],"keywords":["枕叶视觉区"],"exp":"【答案 C】问 SSVEP（稳态视觉诱发电位） 在头皮哪个区域响应最明显。SSVEP 是视觉诱发的，最强响应在'枕叶视觉区'（初级视皮层 V1（初级视皮层） 所在），故选 C。A. 额叶、B. 中央运动区、D. 颞叶听觉区都不对。【易错】视觉→枕叶。SSVEP/视觉诱发电位都在枕区最明显，与 α 波同处枕区。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• 枕叶视觉区（含初级视皮层 V1）：大脑后脑勺处理视觉的区域。视觉诱发的信号（如 SSVEP）和闭眼放松的 α 波都在这里最明显。","multi":false,"ans":"C","options":{"A":"额叶区域","B":"中央运动区","C":"枕叶视觉区","D":"颞叶听觉区"}},{"id":"main-choice-53","src":"main","type":"choice","n":53,"q":"P300（刺激后约 300 毫秒出现的正向事件相关电位）电位通常出现在目标刺激出现后约（）","a":"300 ms","parts":["300 ms"],"keywords":["300 ms"],"exp":"【答案 C】问 P300（刺激后约 300 毫秒出现的正向事件相关电位） 出现的潜伏期。P300 在目标刺激出现后约 300ms 出现（故名 P300），选 C。A. 30ms、B. 100ms 太早、D. 1000ms 太晚。【易错】名字即答案：P300 ≈ 300ms。它是反映注意/认知评价的内源性正波。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。","multi":false,"ans":"C","options":{"A":"30 ms","B":"100 ms","C":"300 ms","D":"1000 ms"}},{"id":"main-choice-54","src":"main","type":"choice","n":54,"q":"P300（刺激后约 300 毫秒出现的正向事件相关电位）拼写器通常利用的实验范式是（）","a":"Oddball范式","parts":["Oddball范式"],"keywords":["Oddball范式"],"exp":"【答案 A】问 P300（刺激后约 300 毫秒出现的正向事件相关电位） 拼写器用的范式。P300 拼写器用 Oddball 范式（行列随机闪烁，目标行列闪烁诱发 P300），故选 A。B. 静息态、C. 睡眠监测、D. 深脑刺激都与拼写器无关。【易错】P300+拼写器=Oddball，必背组合。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• P300：你看到/听到一个'正在等的、少见的'目标时，大脑会在大约 300 毫秒后冒出一个向上的电位尖峰。它反映'注意力被抓住了一下'，常用来做拼写器。\n• ERP（事件相关电位）：在某个特定事件（比如出现一个刺激）之后，大脑锁定时间、按固定节奏冒出来的一串电位波。名字里的数字是大致毫秒数，P 是向上的波、N 是向下的波（P300、N200 都属于 ERP）。\n• Oddball 范式（小概率范式）：在一连串频繁、普通的刺激里，偶尔插一个少见的'目标'。这个少见目标一出现，就会诱发 P300。\n• DBS（深部脑刺激）：把电极植入脑深部、持续放电来调节异常脑活动，常用于帕金森病。闭环 DBS 还能一边监测脑信号一边自动调整刺激。","multi":false,"ans":"A","options":{"A":"Oddball范式","B":"静息态范式","C":"睡眠监测范式","D":"深脑刺激范式"}},{"id":"main-choice-55","src":"main","type":"choice","n":55,"q":"下列哪项属于侵入式脑机接口的典型优势？（）","a":"信号空间分辨率较高","parts":["信号空间分辨率较高"],"keywords":["信号空间分辨率较高"],"exp":"【答案 B】问侵入式 BCI（脑机接口） 的典型优势。侵入式电极贴近/刺入皮层，'信号空间分辨率较高'、信噪比好，故选 B。A. 无需手术（错，侵入式必须手术）、C. 完全没有安全风险（错，有手术与生物相容性风险）、D. 不需信号处理（错，仍需处理）。【易错】侵入式优势=分辨率高/信号好；代价是手术风险。别被'完全没风险''无需处理'这类绝对化错项带偏。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• 信噪比（SNR）：有用信号相对背景噪声的强弱比值。比值越高信号越干净越好认；EEG 隔着颅骨，信噪比天生偏低。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"B","options":{"A":"无需手术植入","B":"信号空间分辨率较高","C":"完全没有安全风险","D":"不需要信号处理"}},{"id":"main-choice-56","src":"main","type":"choice","n":56,"q":"皮层内微电极通常可以记录到（）","a":"单神经元放电活动","parts":["单神经元放电活动"],"keywords":["单神经元放电活动"],"exp":"【答案 A】问皮层内微电极能记录到什么。刺入皮层的微电极能记录'单神经元放电活动（spikes）'，故选 A。B. 皮肤电、C. 血氧、D. 眼球轨迹都不是皮层内电极所测。【易错】侵入式微电极=单神经元尖峰，这是它相对 EEG（头皮脑电）/ECoG（皮层脑电） 的独特能力。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（要开颅手术）记录电活动。比头皮 EEG 离大脑近得多，信号更强、更清晰、能拿到高频信息，属于'半侵入式'。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• 侵入式 vs 非侵入式：侵入式=动手术把电极放进/贴上大脑（如 ECoG、皮层内微电极），信号好但有手术风险；非侵入式=体外采集（如 EEG），安全方便但信号弱。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"单神经元放电活动","B":"皮肤电反应","C":"血氧饱和度","D":"眼球转动轨迹"}},{"id":"main-choice-57","src":"main","type":"choice","n":57,"q":"局部场电位主要反映的是（）","a":"局部神经元群体突触活动","parts":["局部神经元群体突触活动"],"keywords":["局部神经元群体突触活动"],"exp":"【答案 A】问局部场电位（LFP（局部场电位））主要反映什么。LFP 反映'局部神经元群体的突触活动'（树突电位的总和），故选 A。B. 肌肉收缩、C. 皮肤温度、D. 血流速度都不对。【易错】LFP=局部群体突触活动，介于单神经元尖峰与宏观 EEG（头皮脑电） 之间。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LFP（局部场电位）：插在脑内的电极记录到的、电极周围一小群神经元'集体'的电活动总和。比单个神经元信号更稳定，介于'单神经元'和'整片头皮 EEG'之间的中等尺度信号。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"局部神经元群体突触活动","B":"肌肉收缩强度","C":"皮肤温度变化","D":"血液流速"}},{"id":"main-choice-58","src":"main","type":"choice","n":58,"q":"在BCI（脑机接口）系统评价中，信息传输率通常用于衡量（）","a":"系统通信效率","parts":["系统通信效率"],"keywords":["系统通信效率"],"exp":"【答案 B】问信息传输率（ITR（信息传输率））衡量什么。ITR 衡量'系统通信效率'（单位时间传递的信息量，bit/min），故选 B。A. 脑组织结构、C. 电极硬度、D. 屏幕亮度都无关。【易错】ITR 是 BCI（脑机接口） 性能的核心通信指标，取决于目标数、准确率、单次选择时间。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 干电极 vs 湿电极：湿电极要涂导电膏，信号好但戴起来麻烦、要清理；干电极不用膏、戴着方便，但信号稳定性差些。常用电极材料是金、铂、银（银/氯化银最常见）。\n• 信息传输率（ITR）：衡量脑机接口'单位时间能传多少信息'的速度指标（常用 bit/min）。它取决于可选目标数、识别准确率和每次选择耗时，三者要平衡。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"B","options":{"A":"用户脑组织结构","B":"系统通信效率","C":"电极材料硬度","D":"刺激屏幕亮度"}},{"id":"main-choice-59","src":"main","type":"choice","n":59,"q":"下列哪种情况可能降低BCI（脑机接口）系统的在线性能？（）","a":"用户注意力下降","parts":["用户注意力下降"],"keywords":["用户注意力下降"],"exp":"【答案 A】问哪种情况可能'降低'BCI（脑机接口） 在线性能。A. 用户注意力下降——会直接拉低识别率，故选 A。B. 信号噪声减少、C. 电极接触稳定、D. 特征分布稳定——都是有利因素，反而提升性能。【易错】题问'降低'，三个干扰项都是'变好'的条件，唯有注意力下降是'变差'。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"用户注意力下降","B":"信号噪声减少","C":"电极接触稳定","D":"特征分布稳定"}},{"id":"main-choice-60","src":"main","type":"choice","n":60,"q":"下列哪类方法属于监督学习分类算法？（）","a":"线性判别分析","parts":["线性判别分析"],"keywords":["线性判别分析"],"exp":"【答案 A】问哪类方法属于监督学习分类算法。A. 线性判别分析 LDA（线性判别分析）——用带标签数据训练分类边界，是监督学习，故选 A。B. PCA（主成分分析）、C. ICA（独立成分分析）——无监督降维/分离；D. 傅里叶变换——信号变换。都不是监督分类。【易错】LDA 是'监督分类'，PCA/ICA 是'无监督'。这与第11题（LDA 不是空间滤波）是同一组易混点的不同侧面。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 傅里叶变换（FFT 是它的快速算法）：把一段信号拆开，看它由哪些'频率'成分组成、各有多强，好比把混在一起的声音分出有多少低音、多少高音。它只看频率，不告诉你某频率在'什么时刻'出现。\n• PCA（主成分分析）：一种'降维'方法，把很多相关的数据维度压缩成几个最能代表整体差异的新维度、去掉冗余。属于无监督方法（不需要标签）。\n• ICA（独立成分分析）：假设头皮记到的脑电其实是脑电、眼电、肌电等几路'相互独立'的信号混在一起，ICA 能把它们重新拆开，从而单独剔除眼电、肌电等伪迹。强项是能去掉'和脑电频率重叠'的伪迹（这点普通滤波做不到）。\n• LDA（线性判别分析）：一种分类器（做判断、分类的算法），用带标签的数据学一条'分界线'把不同类别分开。注意它是'分类'用的，不是提取特征/空间滤波。\n• 监督 vs 无监督学习：监督=用'带标准答案（标签）'的数据训练（如 LDA、SVM 分类）；无监督=数据没标签、让算法自己找结构（如 PCA、ICA 降维或分离）。","multi":false,"ans":"A","options":{"A":"线性判别分析","B":"主成分分析","C":"独立成分分析","D":"傅里叶变换"}},{"id":"main-choice-61","src":"main","type":"choice","n":61,"q":"公共空间模式算法常用于哪类BCI（脑机接口）任务？（）","a":"运动想象分类","parts":["运动想象分类"],"keywords":["运动想象分类"],"exp":"【答案 A】问共空间模式（CSP（共空间模式））常用于哪类 BCI（脑机接口） 任务。CSP 是两类运动想象的空间滤波利器（让一类方差最大、另一类最小），故用于'运动想象分类'，选 A。B. 基因序列、C. 图像压缩、D. 语音合成都与 CSP 无关。【易错】CSP↔运动想象（尤其左右手），是固定搭配。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• 四类特征（时域/频域/时频域/空域）：按'从哪个角度看信号'分类：时域=看波形随时间的样子（均值、峰值）；频域=看各频率的能量；时频域=看频率随时间怎么变（如小波）；空域=看不同电极位置之间的空间分布。\n• CSP（共空间模式）：专门用于'两类'运动想象（如想左手 vs 想右手）的空间滤波。它找一组电极组合，让一类动作的信号方差最大、另一类最小，把两类的差异放到最大、便于区分。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"运动想象分类","B":"基因序列分析","C":"图像压缩","D":"语音合成"}},{"id":"main-choice-62","src":"main","type":"choice","n":62,"q":"在EEG（头皮脑电）频域分析中，功率谱密度主要用于描述（）","a":"信号能量随频率的分布","parts":["信号能量随频率的分布"],"keywords":["信号能量随频率的分布"],"exp":"【答案 A】问功率谱密度（PSD（功率谱密度））主要描述什么。PSD 描述'信号能量随频率的分布'，故选 A。B. 电极位置、C. 神经元形态、D. 用户年龄都不对。【易错】PSD 是频域分析的核心，看'各频率上有多少能量'，运动想象/SSVEP（稳态视觉诱发电位） 都靠它看频段功率。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SSVEP（稳态视觉诱发电位）：你盯着一个固定频率闪烁的光（比如每秒闪 10 次），大脑视觉区会跟着产生同样频率、持续不断的振荡。屏幕上不同按钮用不同频率闪，看你脑中出现哪个频率，就知道你在看哪个按钮。\n• 脑电节律（δ/θ/α/β/γ 与 μ）：脑电波按快慢分成几个频段，像收音机的不同频道：δ(0.5–4Hz,深睡)、θ(4–8Hz,困倦)、α(8–13Hz,闭眼放松)、β(13–30Hz,清醒专注)、γ(>30Hz,高级认知)。μ 节律频率和 α 接近，但出现在运动区、跟动作有关。\n• 运动想象（MI）：不真的动，只在脑子里'想象'做某个动作（比如想象握左手）。这会让对侧运动脑区的脑波变化（ERD），系统据此判断你想动哪边。\n• 功率谱密度（PSD）：描述一段信号'每个频率上各有多少能量'的曲线，是频域分析最核心的工具——运动想象、SSVEP 都靠它看某频段功率高低。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"A","options":{"A":"信号能量随频率的分布","B":"电极在头皮上的位置","C":"神经元细胞形态","D":"用户的年龄信息"}},{"id":"main-choice-63","src":"main","type":"choice","n":63,"q":"下列哪种采样频率更适合记录0.5～40 Hz范围内的EEG（头皮脑电）信号？（）","a":"128 Hz","parts":["128 Hz"],"keywords":["128 Hz"],"exp":"【答案 C】问哪种采样率更适合记录 0.5–40Hz 的 EEG（头皮脑电）。按奈奎斯特定理，采样率应≥最高频率的 2 倍（即 ≥80Hz），128Hz 满足且留有余量，故选 C。A. 20Hz、B. 50Hz、D. 30Hz 都不足以无失真采到 40Hz 成分。【易错】采样率≥2×最高频；记 40Hz 至少要 80Hz 以上，128Hz 才合适。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 工频干扰：市电（中国是 50Hz）通过电线、设备耦合进脑电里的固定频率噪声，是脑电采集中最常见的外部干扰之一。\n• 采样率与奈奎斯特定理：把连续信号变成数字时，每秒采点的次数叫采样率。定理要求采样率至少是信号最高频率的 2 倍，否则信号会失真（混叠）；抗混叠低通的截止频率要小于采样率的一半。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"C","options":{"A":"20 Hz","B":"50 Hz","C":"128 Hz","D":"30 Hz"}},{"id":"main-choice-64","src":"main","type":"choice","n":64,"q":"与EEG（头皮脑电）相比，fMRI（功能性磁共振成像）的主要优势通常是（）","a":"空间分辨率更高","parts":["空间分辨率更高"],"keywords":["空间分辨率更高"],"exp":"【答案 B】问相比 EEG（头皮脑电），fMRI（功能性磁共振成像） 的主要优势。fMRI '空间分辨率更高'（毫米级，能精确定位脑区），故选 B。A. 时间分辨率更高（错，fMRI 时间分辨率差、秒级）、C. 更便携（错，设备庞大）、D. 直接记录动作电位（错，测的是血氧不是电）。【易错】fMRI=空间强、时间弱；EEG=时间强、空间弱，二者正好互补。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• 单神经元放电（尖峰 spike）：单个神经元'兴奋'时发出的一个电脉冲，像神经元在'说一句话'。要把极细的微电极刺进脑组织才能记录到，是最精细但创伤最大的信号。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。\n• 空间分辨率 vs 时间分辨率：空间分辨率=能分清'是哪一小块脑区'（越细越好，fMRI 强）；时间分辨率=能分清'在哪个瞬间发生'（越快越好，EEG 强）。两者常此强彼弱、需要互补。\n• EEG（头皮脑电）：在头皮上贴电极、隔着头皮记录大脑电活动的方法。最安全、最便宜、戴个'电极帽'就行，但信号隔着颅骨很微弱、容易被干扰。","multi":false,"ans":"B","options":{"A":"时间分辨率更高","B":"空间分辨率更高","C":"设备更便携","D":"可直接记录动作电位"}},{"id":"main-choice-65","src":"main","type":"choice","n":65,"q":"功能性近红外光谱成像主要检测的是（）","a":"血红蛋白氧合状态变化","parts":["血红蛋白氧合状态变化"],"keywords":["血红蛋白氧合状态变化"],"exp":"【答案 A】问 fNIRS（功能性近红外光谱） 主要检测什么。fNIRS 检测'血红蛋白氧合状态变化'（含氧/脱氧血红蛋白对近红外光吸收不同），故选 A。B. 神经元膜电位、C. 肌肉张力、D. 皮肤电阻都不是。【易错】fNIRS=光学测血氧，与 fMRI（功能性磁共振成像） 同测 BOLD（血氧水平依赖），但用的是近红外光而非磁共振。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、根据血液含氧量变化来推测哪块脑区在活动的'光学'方法。设备轻便便宜，但看的是血流（反应慢），且只能看到大脑表层。\n• fMRI（功能性磁共振成像）：用大型磁共振仪器，根据血氧变化看大脑哪里在工作。定位极准（毫米级），但机器庞大昂贵、反应慢（秒级），人得躺进去，不便携。\n• 血氧反应（BOLD）：大脑某块区域工作时会耗氧、血流随之增多，含氧/缺氧血红蛋白的比例会变。fMRI 和 fNIRS 都靠捕捉这个'血氧变化'间接判断脑活动，属于间接、偏慢的信号。","multi":false,"ans":"A","options":{"A":"血红蛋白氧合状态变化","B":"神经元膜电位","C":"肌肉张力变化","D":"皮肤电阻变化"}},{"id":"main-choice-66","src":"main","type":"choice","n":66,"q":"在实际BCI（脑机接口）系统中，校准阶段的主要目的是（）","a":"收集用户数据以训练或调整模型","parts":["收集用户数据以训练或调整模型"],"keywords":["收集用户数据以训练或调整模型"],"exp":"【答案 A】问校准阶段的主要目的。校准阶段'收集用户数据以训练或调整模型'（适配该用户的脑电模式），故选 A。B. 增大电极重量、C. 降屏幕分辨率、D. 完全消除所有生理噪声（不可能做到）都不对。【易错】校准=为个体收数据、调模型，对应'个体差异大、需个性化'这一 BCI（脑机接口） 痛点。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 校准：正式使用前先采一段该用户自己的脑信号来训练/调整模型，让系统适配这个人的脑电特点（因为每个人差异很大）。\n• BCI（脑机接口）：'用脑子直接控制设备'的技术——不用动手动嘴，直接读取大脑发出的电信号，翻译成命令去操控电脑、轮椅或机械臂。","multi":false,"ans":"A","options":{"A":"收集用户数据以训练或调整模型","B":"增大电极重量","C":"降低屏幕分辨率","D":"完全消除所有生理噪声"}},{"id":"main-short-1","src":"main","type":"short","n":"1","q":"脑电图（EEG（头皮脑电））相较于脑磁图（MEG（脑磁图））有什么优缺点？请简要分析。","a":"（1）MEG 信号变化小、需磁屏蔽室：MEG 相对 EEG 最大的劣势是大脑磁场变化远小于周围环境磁场变化（如地磁波动），因此只有在磁屏蔽室中才能测到大脑产生的微弱磁场。（2）MEG 空间分辨率低：因磁屏蔽室的必要性及其他技术限制，MEG 测量点一般位于头皮上方 1–2cm，导致空间分辨率较低。（3）MEG 无需参考传感器：MEG 的主要优势是能提供某一特定点的真实场测量值，而 EEG 只能测两点间的电势差，因此 MEG 不需要选择参考传感器。","parts":["MEG 信号变化小、需磁屏蔽室：MEG 相对 EEG 最大的劣势是大脑磁场变化远小于周围环境磁场变化（如地磁波动），因此只有在磁屏蔽室中才能测到大脑产生的微弱磁场","MEG 空间分辨率低：因磁屏蔽室的必要性及其他技术限制，MEG 测量点一般位于头皮上方 1–2cm，导致空间分辨率较低","MEG 无需参考传感器：MEG 的主要优势是能提供某一特定点的真实场测量值，而 EEG 只能测两点间的电势差，因此 MEG 不需要选择参考传感器"],"keywords":["MEG 空间分辨率低","MEG 无需参考传感器","MEG","EEG"],"exp":"【考点】EEG vs MEG（本题从 MEG 角度反着答）。MEG 两大劣势：①磁场变化太小、必须磁屏蔽室 ②测量点离头皮远、空间分辨率低；一大优势：测某点真实场值、无需参考。反过来即 EEG 的特点——便宜便携、不需磁屏蔽（优），但只能测电势差、需选参考电极（劣）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，但信号微弱、易受干扰，只能测两点间电势差、需选参考电极。\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场（提供某点真实场值、无需参考），但需磁屏蔽室+液氦冷却、空间分辨率低；对脑沟切向源敏感。"},{"id":"main-short-2","src":"main","type":"short","n":"2","q":"请列举几个脑机接口中常用的分类模型，并简要说明其原理。","a":"（1）线性最小二乘判别函数：以最小二乘法为基础，先用最小二乘法拟合预测类的分布（拟合函数），再用判别函数对类别进行预测（判别函数垂直于拟合函数）。（2）贝叶斯分类器：用最大似然的概念把先验知识与新获取的知识结合，产生一个后验概率；基于所获数据产生最可能正确的参数模型。（3）支持向量机（SVM）：通过一系列迭代优化最小化目标函数，目标函数含两部分——各类别内观察值到分割超平面的欧氏距离、以及边界间的欧氏距离；模型中一个参数可把这两部分的相对影响调整到适应数据类型。（4）人工神经网络（ANN）：是生物神经网络的简化模型，主要目的不是模拟或复制生物神经网络/脑活动，而是获得像生物神经网络一样强大的决策能力，进而用于多分类问题。","parts":["线性最小二乘判别函数：以最小二乘法为基础，先用最小二乘法拟合预测类的分布（拟合函数），再用判别函数对类别进行预测（判别函数垂直于拟合函数）","贝叶斯分类器：用最大似然的概念把先验知识与新获取的知识结合，产生一个后验概率","基于所获数据产生最可能正确的参数模型","支持向量机（SVM）：通过一系列迭代优化最小化目标函数，目标函数含两部分——各类别内观察值到分割超平面的欧氏距离、以及边界间的欧氏距离","模型中一个参数可把这两部分的相对影响调整到适应数据类型","人工神经网络（ANN）：是生物神经网络的简化模型，主要目的不是模拟或复制生物神经网络/脑活动，而是获得像生物神经网络一样强大的决策能力，进而用于多分类问题"],"keywords":["线性最小二乘判别函数","贝叶斯分类器","支持向量机（SVM）","人工神经网络（ANN）","SVM"],"exp":"【考点·重点】四种常用分类模型，口诀「最·贝·支·神」。①最小二乘判别=先用最小二乘拟合出“打分方向”，再用垂直于拟合线的判别面切一刀分类。②贝叶斯=用最大似然结合先验→后验，找最可能正确的参数模型。③SVM=迭代最小化目标（类内距+间隔两部分），一个参数权衡两者、适配数据。④ANN=生物网络的简化版，重在强决策能力、做多分类。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LDA（线性判别分析）：有监督线性分类器，找让两类最可分的投影方向；注意它是分类器、不是空间滤波。"},{"id":"main-short-3","src":"main","type":"short","n":"3","q":"请简述两种代谢神经功能成像方法——功能近红外光谱（fNIRS（功能性近红外光谱））和功能磁共振成像（fMRI（功能核磁共振成像））的原理及优缺点。","a":"原理：fNIRS 测量含氧血红蛋白变成脱氧血红蛋白时对近红外光吸收的改变；fMRI 测量含氧血红蛋白变成脱氧血红蛋白时磁特性的改变。fNIRS——优势：设备相对轻便、低廉，时间分辨率较好；劣势：空间分辨率较差（cm 级别）。fMRI——优势：无损伤，与大脑皮层电活动密切相关；劣势：费用昂贵，相比电信号反馈相对缓慢。","parts":["原理：fNIRS 测量含氧血红蛋白变成脱氧血红蛋白时对近红外光吸收的改变","fMRI 测量含氧血红蛋白变成脱氧血红蛋白时磁特性的改变","fNIRS——优势：设备相对轻便、低廉，时间分辨率较好","劣势：空间分辨率较差（cm 级别）","fMRI——优势：无损伤，与大脑皮层电活动密切相关","劣势：费用昂贵，相比电信号反馈相对缓慢"],"keywords":["fNIRS——优势","fMRI——优势","fNIRS","fMRI"],"exp":"【考点·重点】fNIRS vs fMRI。原理都基于含氧↔脱氧血红蛋白变化：fNIRS 看“光吸收”改变、fMRI 看“磁特性”改变（BOLD）。fNIRS=轻便便宜、时间分辨率较好，但空间分辨率差(cm)、只看表层；fMRI=无创、空间分辨率高全脑覆盖，但贵且慢。【共性】都靠血氧、响应慢。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：测含氧↔脱氧血红蛋白对近红外光吸收的变化推断脑活动，轻便便宜、时间分辨率较好，但空间分辨率差(cm)、只看表层。\n• fMRI（功能核磁共振成像）：测含氧↔脱氧血红蛋白的磁特性变化（BOLD）推断脑活动，空间分辨率极高、全脑覆盖、无创，但贵且响应慢。\n• BOLD（血氧水平依赖）：含氧/脱氧血红蛋白比例变化引起的信号变化，fMRI/fNIRS 据此推断脑活动。"},{"id":"main-short-4","src":"main","type":"short","n":"4","q":"请概述脑磁图（MEG（脑磁图））相对于脑电图（EEG（头皮脑电））的优势和劣势。","a":"优势：在某些特定源识别尤为重要的应用中（如癫痫灶位于脑沟时），MEG 对脑沟源相对敏感，这是 EEG 无法完成的。劣势：MEG 使用时必须在磁屏蔽室中进行，且其线圈必须用液态氦过度冷却，这大大制约了它在 BCI 中的发展。","parts":["优势：在某些特定源识别尤为重要的应用中（如癫痫灶位于脑沟时），MEG 对脑沟源相对敏感，这是 EEG 无法完成的","劣势：MEG 使用时必须在磁屏蔽室中进行，且其线圈必须用液态氦过度冷却，这大大制约了它在 BCI 中的发展"],"keywords":["MEG","EEG","BCI"],"exp":"【考点】MEG vs EEG（与第 1 题互为正反面）。优势=对脑沟切向源敏感（能定位脑沟里的癫痫灶等，EEG 做不到）；劣势=必须磁屏蔽室+液氦冷却 → 昂贵笨重、难在 BCI 普及。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场（提供某点真实场值、无需参考），但需磁屏蔽室+液氦冷却、空间分辨率低；对脑沟切向源敏感。\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，但信号微弱、易受干扰，只能测两点间电势差、需选参考电极。"},{"id":"main-short-5","src":"main","type":"short","n":"5","q":"电极阻抗的测量方式分为哪几种？影响电极阻抗的因素有哪些？","a":"测量方式分为单极模式和双极模式。影响电极阻抗的因素有：①采样电极的表面积；②皮肤状态和准备情况；③导电膏的特性；④放置电极后的使用时间。","parts":["测量方式分为单极模式和双极模式。影响电极阻抗的因素有：①采样电极的表面积","皮肤状态和准备情况","导电膏的特性","放置电极后的使用时间"],"keywords":[],"exp":"【考点】电极阻抗测量+影响因素。两种方式「单极/双极」。四个影响因素「面积、皮肤、导电膏、时间」。"},{"id":"main-short-6","src":"main","type":"short","n":"6","q":"试简单介绍 SMR（感觉运动节律）的 ERD/ERS 现象，并解释 β 反弹。","a":"实际运动和运动想象都伴随在感觉运动皮层记录到的节律活动变化。这些感觉运动节律的减少与增加，分别被称为事件相关去同步（ERD）和事件相关同步（ERS）。与 μ 节律相似，β 节律也表现出与躯体感觉刺激和运动行为相关的事件相关去同步（ERD）；除此 ERD 之外，β 节律还在运动后出现一个短暂的 ERS，称为 β 反弹。","parts":["实际运动和运动想象都伴随在感觉运动皮层记录到的节律活动变化","这些感觉运动节律的减少与增加，分别被称为事件相关去同步（ERD）和事件相关同步（ERS）","与 μ 节律相似，β 节律也表现出与躯体感觉刺激和运动行为相关的事件相关去同步（ERD）","除此 ERD 之外，β 节律还在运动后出现一个短暂的 ERS，称为 β 反弹"],"keywords":["ERD","ERS"],"exp":"【考点·重点】SMR 的 ERD/ERS + β 反弹。SMR=感觉运动皮层的 μ/β 节律。运动/想象时节律功率下降=ERD；功率回升=ERS。β 反弹=运动“结束后”β 节律出现的那个短暂 ERS（功率反弹增强）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SMR（感觉运动节律）：感觉运动皮层的 μ(8–12Hz)+β(13–30Hz) 节律，运动/想象时 ERD、运动后 ERS（β 反弹）。\n• ERD（事件相关去同步）：运动或运动想象时，对侧运动区 μ/β 节律功率下降的现象，反映皮层激活。\n• ERS（事件相关同步）：动作结束后 β 节律功率反弹增强的现象（β 反弹），反映运动抑制/恢复。"},{"id":"main-short-7.1","src":"main","type":"short","n":"7.1","q":"BCI（脑机接口）系统中的两个自适应控制器指的是什么？","a":"中枢神经系统（用户大脑）、BCI 本身。","parts":["中枢神经系统（用户大脑）、BCI 本身"],"keywords":["BCI"],"exp":"【考点】两个自适应控制器=用户大脑（中枢神经系统）+ BCI 本身。二者相互适应（人机共适应）：大脑学着产生更清晰、更可分的信号，BCI 学着更准地解码，两者协同优化，效果才好。"},{"id":"main-short-7.2","src":"main","type":"short","n":"7.2","q":"基于 SCP（慢皮层电位）的 BCI 有什么基本问题/特点？","a":"特点：一、速度很慢；二、很容易出错；三、不能提供良好的多维控制；四、需要大量训练。许多认知活动（如移动或执行算术）可以调节慢皮层电位活动；在基于 SCP 的 BCI 中，用户学习完成心理任务以产生 BCI 能检测到的 SCP 变化并用于控制。","parts":["特点：一、速度很慢","很容易出错","不能提供良好的多维控制","需要大量训练。许多认知活动（如移动或执行算术）可以调节慢皮层电位活动；在基于 SCP 的 BCI 中，用户学习完成心理任务以产生 BCI 能检测到的 SCP 变化并用于控制"],"keywords":["SCP","BCI"],"exp":"【考点】SCP-BCI 四大特点「慢、易错、多维差、需大量训练」。机制=用户学着用心理任务（如心算、想象移动）调节 SCP，BCI 据此识别并控制。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• SCP（慢皮层电位）：一种很慢的事件相关电位（含负电位变化），先于实际或想象的运动/心算等，代表准备行动的皮层激活。"},{"id":"main-short-8","src":"main","type":"short","n":"8","q":"列举一下 BCI 中的三大主流范式并分别阐述其原理。","a":"（1）基于事件相关电位（ERP）的范式，代表技术 P300 拼写器：用户注视闪烁的字符矩阵，目标字符闪烁时大脑自然产生 P300 电位（约 300ms 后出现的正波）；P300 反映注意资源分配，由罕见但相关的刺激（oddball 范式）诱发。（2）基于稳态视觉诱发电位（SSVEP（稳态视觉诱发电位））的范式，代表技术频率编码控制：屏幕显示多个以不同频率（如 5Hz、10Hz）闪烁的刺激块，用户注视某目标时枕叶视觉皮层生成与刺激频率同步的振荡信号（SSVEP）；机制是视觉神经元的节律性锁相响应。（3）基于运动想象（MI）的范式，代表技术 μ/β 节律解码：用户想象肢体运动（如左/右手），导致对侧运动皮层 μ(8–12Hz)、β(13–30Hz) 能量衰减（ERD）；机制是运动准备/想象激活皮层神经元、打破静息态振荡同步性。","parts":["基于事件相关电位（ERP）的范式，代表技术 P300 拼写器：用户注视闪烁的字符矩阵，目标字符闪烁时大脑自然产生 P300 电位（约 300ms 后出现的正波）","P300 反映注意资源分配，由罕见但相关的刺激（oddball 范式）诱发","基于稳态视觉诱发电位（SSVEP（稳态视觉诱发电位））的范式，代表技术频率编码控制：屏幕显示多个以不同频率（如 5Hz、10Hz）闪烁的刺激块，用户注视某目标时枕叶视觉皮层生成与刺激频率同步的振荡信号（SSVEP）","机制是视觉神经元的节律性锁相响应","基于运动想象（MI）的范式，代表技术 μ/β 节律解码：用户想象肢体运动（如左/右手），导致对侧运动皮层 μ(8–12Hz)、β(13–30Hz) 能量衰减（ERD）","机制是运动准备/想象激活皮层神经元、打破静息态振荡同步性"],"keywords":["SSVEP","ERD"],"exp":"【考点·重点】三大主流范式「P·闪·想」。①ERP/P300：盯字符矩阵→目标闪烁诱发约 300ms 正波（oddball、注意资源分配）。②SSVEP：盯固定频率闪烁块→枕叶产生同频锁相振荡。③MI 运动想象：想动肢体→对侧运动区 μ/β 能量衰减(ERD)。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERP（事件相关电位）：由特定事件/刺激锁时诱发的脑电成分，如 P300。\n• P300：在罕见但相关刺激（oddball）出现后约 300ms 的正向 ERP 波，反映注意资源分配，是 P300 拼写器的基础。\n• SSVEP（稳态视觉诱发电位）：盯着固定频率闪烁的目标时，枕叶产生同频及谐波的稳定脑电响应（锁相），是高速 BCI 范式。\n• 运动想象（MI）：不真动、只在脑中想象做某动作，引起对侧运动区 μ/β 节律 ERD，是运动想象 BCI 的基础。\n• ERD（事件相关去同步）：运动或运动想象时，对侧运动区 μ/β 节律功率下降的现象，反映皮层激活。"},{"id":"main-short-9","src":"main","type":"short","n":"9","q":"简述侵入式与非侵入式脑机接口的优缺点。","a":"（1）侵入式 BCI：通过手术将电极植入大脑皮层（如 ECoG（皮层脑电）、Utah 阵列）或深部脑区（如 DBS（深部脑刺激））。优点——高时空分辨率（直接记录神经元放电 spikes 或局部场电位 LFP（局部场电位），信号质量极佳）、抗干扰强（不受头皮颅骨衰减）、部分技术长期稳定（如 Utah 阵列可长期植入供瘫痪患者控制机械臂）。缺点——手术风险（感染、出血、免疫排斥）、生物相容性问题（长期植入致胶质瘢痕包裹电极、信号衰减）、高成本（需神经外科手术与精密设备维护）。（2）非侵入式 BCI：通过外部设备（如 EEG（头皮脑电）、fNIRS、MEG）采集脑信号，无需手术。优点——安全无创、便携（如 EEG 帽可快速部署）、低成本、接受度高。缺点——低信噪比（受头皮颅骨衰减，易受肌电 EMG（肌电）、眼电 EOG（眼电）干扰）、空间分辨率有限（EEG 的容积导体问题致信号模糊）、用户训练需求高（如运动想象 BCI 需长期训练才能达到可用精度）。","parts":["侵入式 BCI：通过手术将电极植入大脑皮层（如 ECoG（皮层脑电）、Utah 阵列）或深部脑区（如 DBS（深部脑刺激））","优点——高时空分辨率（直接记录神经元放电 spikes 或局部场电位 LFP（局部场电位），信号质量极佳）、抗干扰强（不受头皮颅骨衰减）、部分技术长期稳定（如 Utah 阵列可长期植入供瘫痪患者控制机械臂）","缺点——手术风险（感染、出血、免疫排斥）、生物相容性问题（长期植入致胶质瘢痕包裹电极、信号衰减）、高成本（需神经外科手术与精密设备维护）","非侵入式 BCI：通过外部设备（如 EEG（头皮脑电）、fNIRS、MEG）采集脑信号，无需手术","优点——安全无创、便携（如 EEG 帽可快速部署）、低成本、接受度高","缺点——低信噪比（受头皮颅骨衰减，易受肌电 EMG（肌电）、眼电 EOG（眼电）干扰）、空间分辨率有限（EEG 的容积导体问题致信号模糊）、用户训练需求高（如运动想象 BCI 需长期训练才能达到可用精度）"],"keywords":["侵入式 BCI","非侵入式 BCI","BCI","ECoG","DBS","LFP","EEG","fNIRS","MEG"],"exp":"【考点·重点·万能钥匙】这道题本质是一个镜像对称的权衡——侵入式拿“信号质量”换“安全方便”，非侵入式拿“安全方便”换“信号质量”，一边的优点正好是另一边的缺点。记两组口诀：侵入式优点「准·抗·稳」/ 缺点「险·斥·贵」；非侵入式优点「安·便·廉」/ 缺点「噪·糊·练」。【易错】成对地写“优点对应缺点”。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• DBS（深部脑刺激）：把电极植入脑深部持续放电调节异常脑活动，常用于帕金森病。\n• LFP（局部场电位）：脑内电极记录到的、电极周围一小群神经元集体电活动的总和，介于单神经元与头皮 EEG 之间的中等尺度信号。\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，但信号微弱、易受干扰，只能测两点间电势差、需选参考电极。\n• fNIRS（功能性近红外光谱）：测含氧↔脱氧血红蛋白对近红外光吸收的变化推断脑活动，轻便便宜、时间分辨率较好，但空间分辨率差(cm)、只看表层。\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场（提供某点真实场值、无需参考），但需磁屏蔽室+液氦冷却、空间分辨率低；对脑沟切向源敏感。\n• EMG（肌电）：肌肉收缩（咬牙、皱眉）产生的电信号，混进脑电属伪迹。\n• EOG（眼电）：眼球转动、眨眼产生的又大又慢（低频）电信号，主要污染前额脑电。"},{"id":"main-short-10","src":"main","type":"short","n":"10","q":"讨论脑机接口面临的主要技术挑战（从信号、解码、个体差异三方面简述）。","a":"（1）信号质量与稳定性：非侵入式（EEG（头皮脑电）等）易受肌电 EMG（肌电）、眼电 EOG（眼电）、环境电磁噪声干扰，信噪比 SNR（信噪比）低；侵入式长期植入后可能因胶质增生致信号衰减；信号漂移（用户疲劳、注意力波动）影响解码稳定性。方案：改进信号处理算法（如深度学习降噪）、开发更稳定的电极材料（柔性电极、生物相容涂层）。（2）解码精度与实时性：大脑信息编码非线性、时变，单一算法难适配不同用户/任务；运动解码中神经元群体的稀疏性与冗余性增加建模难度；闭环延迟通常需小于 200ms。方案：结合机器学习（LSTM、Transformer）提升动态解码、边缘计算降低延迟。（3）个体差异与泛化：跨用户/跨会话脑电模式差异大、需个性化校准，普适性差；BCI 盲约 15%–30% 用户无法有效生成可解码信号。方案：迁移学习减少校准时间、自适应（在线学习）动态调参。","parts":["信号质量与稳定性：非侵入式（EEG（头皮脑电）等）易受肌电 EMG（肌电）、眼电 EOG（眼电）、环境电磁噪声干扰，信噪比 SNR（信噪比）低","侵入式长期植入后可能因胶质增生致信号衰减","信号漂移（用户疲劳、注意力波动）影响解码稳定性","方案：改进信号处理算法（如深度学习降噪）、开发更稳定的电极材料（柔性电极、生物相容涂层）","解码精度与实时性：大脑信息编码非线性、时变，单一算法难适配不同用户/任务","运动解码中神经元群体的稀疏性与冗余性增加建模难度","闭环延迟通常需小于 200ms","方案：结合机器学习（LSTM、Transformer）提升动态解码、边缘计算降低延迟","个体差异与泛化：跨用户/跨会话脑电模式差异大、需个性化校准，普适性差","BCI 盲约 15%–30% 用户无法有效生成可解码信号","方案：迁移学习减少校准时间、自适应（在线学习）动态调参"],"keywords":["信号质量与稳定性","解码精度与实时性","个体差异与泛化","EEG","EMG","EOG","SNR","BCI"],"exp":"【考点·重点】三大技术挑战，每方面写“问题+方案”。①信号质量（噪声/漂移→降噪+稳定电极）②解码精度与实时性（非线性时变+延迟<200ms→深度学习+边缘计算）③个体差异与泛化（差异大+BCI 盲 15–30%→迁移学习+在线自适应）。【记数字】延迟<200ms、BCI 盲 15–30%。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EMG（肌电）：肌肉收缩（咬牙、皱眉）产生的电信号，混进脑电属伪迹。\n• EOG（眼电）：眼球转动、眨眼产生的又大又慢（低频）电信号，主要污染前额脑电。\n• SNR（信噪比）：有用信号相对背景噪声的强弱比值，越高越干净；EEG 隔着颅骨信噪比天生偏低。\n• BCI 盲（BCI-illiteracy）：约 15%–30% 的人无论怎么训练都难产生可被有效解码的脑信号。"},{"id":"main-short-11","src":"main","type":"short","n":"11","q":"简述脑机接口（BCI（脑机接口））的定义、核心思想。","a":"脑机接口（BCI）是一种不依赖人体外周神经系统和肌肉组织、直接在人脑与外部电子设备之间搭建的全新信息交互与控制通路。核心思想：绕过正常肢体运动输出通路，直接采集大脑神经活动信号，经过处理、解码后转化为控制指令，实现人脑对外界设备的直接操控。","parts":["脑机接口（BCI）是一种不依赖人体外周神经系统和肌肉组织、直接在人脑与外部电子设备之间搭建的全新信息交互与控制通路","核心思想：绕过正常肢体运动输出通路，直接采集大脑神经活动信号，经过处理、解码后转化为控制指令，实现人脑对外界设备的直接操控"],"keywords":["核心思想","BCI"],"exp":"【考点】定义的灵魂=“不依赖外周神经与肌肉”“直接脑—设备通路”；核心思想=绕过肌肉、采集解码脑信号为指令。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI（脑机接口）：不依赖外周神经与肌肉、直接读取大脑电信号并解码为命令来操控设备的技术。"},{"id":"main-short-12","src":"main","type":"short","n":"12","q":"脑电信号中常见伪迹有哪些？简述预处理常用方法及作用。","a":"常见伪迹：眨眼与眼球转动带来的眼电 EOG（眼电）伪迹、咬牙皱眉产生的肌电 EMG（肌电）伪迹、心跳带来的心电 ECG（心电）伪迹、电网引入的 50Hz 工频干扰、电极接触不良造成的基线漂移。常用预处理方法及作用：带通滤波——保留有效脑电频段、滤除高低频噪声；陷波滤波——专门消除 50Hz 工频干扰；基线校正——消除信号缓慢漂移、统一信号基准；独立成分分析 ICA（独立成分分析）——分离并剔除眼电、肌电等独立伪迹成分，最大程度保留真实脑电。","parts":["常见伪迹：眨眼与眼球转动带来的眼电 EOG（眼电）伪迹、咬牙皱眉产生的肌电 EMG（肌电）伪迹、心跳带来的心电 ECG（心电）伪迹、电网引入的 50Hz 工频干扰、电极接触不良造成的基线漂移","常用预处理方法及作用：带通滤波——保留有效脑电频段、滤除高低频噪声","陷波滤波——专门消除 50Hz 工频干扰","基线校正——消除信号缓慢漂移、统一信号基准","独立成分分析 ICA（独立成分分析）——分离并剔除眼电、肌电等独立伪迹成分，最大程度保留真实脑电"],"keywords":["常见伪迹","常用预处理方法及作用","EOG","EMG","ECG","ICA"],"exp":"【考点】常见伪迹+预处理。伪迹来源「眼电、肌电、心电、50Hz 工频、基线漂移」；预处理四法「带通(留频段)、陷波(去 50Hz)、基线校正(去漂移)、ICA(去与脑电同频的眼/肌电)」。【关键】ICA 能去掉和脑电频段重叠的伪迹，这是普通滤波做不到的。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EOG（眼电）：眼球转动、眨眼产生的又大又慢（低频）电信号，主要污染前额脑电。\n• EMG（肌电）：肌肉收缩（咬牙、皱眉）产生的电信号，混进脑电属伪迹。\n• ECG（心电）：心脏跳动产生的电信号，混进脑电属伪迹。\n• ICA（独立成分分析）：假设记录是若干相互独立源信号的线性混合并把它们拆开，能去掉与脑电频率重叠的眼电/肌电伪迹（普通滤波做不到）。"},{"id":"main-short-13","src":"main","type":"short","n":"13","q":"请结合脑电信号传输路径，详细分析非侵入式 EEG（头皮脑电）脑机接口信噪比低的根本原因，并说明该缺陷会对 BCI 系统整体性能造成哪些具体影响。","a":"根本原因是信号存在多层介质衰减与多源噪声干扰。神经元产生的电活动需依次穿过大脑皮层、脑脊液、颅骨、头皮、毛发等多层高阻抗介质，信号发生大幅衰减、弥散和畸变，到达头皮时极其微弱（幅值仅微伏级）；同时采集过程会叠加大量干扰，包括 50Hz 工频噪声，眨眼、咬合、肢体微动产生的肌电 EMG（肌电）、眼电 EOG（眼电）伪迹，以及设备电路噪声、环境电磁干扰。具体影响：①有效特征被噪声覆盖，特征提取难度大幅提升；②相同意图的脑电信号个体差异、试次差异极大，模型识别准确率下降、稳定性变差；③系统无法实现高精度、多分类、高速率的意念解码，限制了复杂场景下的脑控交互应用。","parts":["根本原因是信号存在多层介质衰减与多源噪声干扰。神经元产生的电活动需依次穿过大脑皮层、脑脊液、颅骨、头皮、毛发等多层高阻抗介质，信号发生大幅衰减、弥散和畸变，到达头皮时极其微弱（幅值仅微伏级）；同时采集过程会叠加大量干扰，包括 50Hz 工频噪声，眨眼、咬合、肢体微动产生的肌电 EMG（肌电）、眼电 EOG（眼电）伪迹，以及设备电路噪声、环境电磁干扰。具体影响：①有效特征被噪声覆盖，特征提取难度大幅提升","相同意图的脑电信号个体差异、试次差异极大，模型识别准确率下降、稳定性变差","系统无法实现高精度、多分类、高速率的意念解码，限制了复杂场景下的脑控交互应用"],"keywords":["EMG","EOG"],"exp":"【考点·重点】EEG 信噪比低的根本原因+影响。原因两条「多层高阻抗介质衰减弥散（皮层→脑脊液→颅骨→头皮，降到微伏级）+ 多源噪声（工频/肌电眼电/设备环境）」。影响三条「特征被淹没→提取难；个体/试次差异大→准确率稳定性差；难高精度多分类高速率→限制应用」。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，但信号微弱、易受干扰，只能测两点间电势差、需选参考电极。\n• SNR（信噪比）：有用信号相对背景噪声的强弱比值，越高越干净；EEG 隔着颅骨信噪比天生偏低。\n• EMG（肌电）：肌肉收缩（咬牙、皱眉）产生的电信号，混进脑电属伪迹。\n• EOG（眼电）：眼球转动、眨眼产生的又大又慢（低频）电信号，主要污染前额脑电。\n• 容积导体效应（容积传导）：脑内电流源经脑、脑脊液、颅骨、头皮向四周扩散模糊，是 EEG 空间分辨率差的原因。"},{"id":"main-short-14","src":"main","type":"short","n":"14","q":"请详细说明独立成分分析（ICA（独立成分分析））在脑电信号预处理中的核心原理，以及相比传统滤波方法的独特优势。","a":"核心原理基于信号线性混合模型：头皮采集的原始脑电是真实脑电、眼电、肌电、工频噪声等多个相互独立的源信号线性混合而成。ICA 通过算法迭代，在满足信号统计独立的条件下，将混合信号拆解为多个独立分量，再通过人工或自动判别剔除伪迹分量、保留纯净脑电分量，实现信号净化。独特优势：传统滤波只能从频率维度过滤、去除固定频段噪声，无法区分同频段的脑电与伪迹，易造成有效信号丢失；而 ICA 不局限于频率，可基于信号的空间、统计特征分离伪迹，能精准去除与有效脑电频段重叠的眼电、肌电伪迹，最大程度保留有效神经活动信号，大幅提升后续特征提取与分类精度，是高精度 BCI 预处理的关键技术。","parts":["核心原理基于信号线性混合模型：头皮采集的原始脑电是真实脑电、眼电、肌电、工频噪声等多个相互独立的源信号线性混合而成","ICA 通过算法迭代，在满足信号统计独立的条件下，将混合信号拆解为多个独立分量，再通过人工或自动判别剔除伪迹分量、保留纯净脑电分量，实现信号净化","独特优势：传统滤波只能从频率维度过滤、去除固定频段噪声，无法区分同频段的脑电与伪迹，易造成有效信号丢失","而 ICA 不局限于频率，可基于信号的空间、统计特征分离伪迹，能精准去除与有效脑电频段重叠的眼电、肌电伪迹，最大程度保留有效神经活动信号，大幅提升后续特征提取与分类精度，是高精度 BCI 预处理的关键技术"],"keywords":["独特优势","ICA","BCI"],"exp":"【考点·重点】ICA 原理+相比滤波的优势。原理=假设头皮信号是若干“独立源”线性混合→迭代按统计独立拆开→剔除伪迹分量。【核心优势】滤波只看频率、去不掉同频伪迹；ICA 按空间/统计特征分离，能去掉“和脑电频段重叠”的眼电肌电，这是滤波做不到的。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ICA（独立成分分析）：假设记录是若干相互独立源信号的线性混合并把它们拆开，能去掉与脑电频率重叠的眼电/肌电伪迹（普通滤波做不到）。"},{"id":"main-short-15","src":"main","type":"short","n":"15","q":"简述脑机接口系统的一般组成结构及各模块的功能。","a":"通常包括六个模块：（1）信号采集模块——通过 EEG（头皮脑电）、ECoG（皮层脑电）、fNIRS、MEG 或侵入式电极采集脑活动信号；（2）信号预处理模块——对原始信号滤波、去伪迹、降噪、重参考，提高信噪比；（3）特征提取模块——从脑信号中提取与意图相关的特征，如频带功率、事件相关电位、时频特征、空间模式；（4）分类/解码模块——用机器学习或统计模型识别意图，把脑信号转为控制命令；（5）外部设备控制模块——按解码结果控制拼写器、轮椅、机械臂、康复机器人等；（6）反馈模块——向用户提供视觉/听觉/触觉/本体感觉反馈，帮助用户调整脑活动、提升控制效果。","parts":["通常包括六个模块：（1）信号采集模块——通过 EEG（头皮脑电）、ECoG（皮层脑电）、fNIRS、MEG 或侵入式电极采集脑活动信号","信号预处理模块——对原始信号滤波、去伪迹、降噪、重参考，提高信噪比","特征提取模块——从脑信号中提取与意图相关的特征，如频带功率、事件相关电位、时频特征、空间模式","分类/解码模块——用机器学习或统计模型识别意图，把脑信号转为控制命令","外部设备控制模块——按解码结果控制拼写器、轮椅、机械臂、康复机器人等","反馈模块——向用户提供视觉/听觉/触觉/本体感觉反馈，帮助用户调整脑活动、提升控制效果"],"keywords":["通常包括六个模块","EEG","ECoG","fNIRS","MEG"],"exp":"【考点·重点】BCI 六模块，口诀「采·预·特·分·控·反」：采集→预处理→特征提取→分类解码→设备控制→反馈。反馈模块构成闭环，是越用越准的关键。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，但信号微弱、易受干扰，只能测两点间电势差、需选参考电极。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• fNIRS（功能性近红外光谱）：测含氧↔脱氧血红蛋白对近红外光吸收的变化推断脑活动，轻便便宜、时间分辨率较好，但空间分辨率差(cm)、只看表层。\n• MEG（脑磁图）：测大脑电活动产生的极微弱磁场（提供某点真实场值、无需参考），但需磁屏蔽室+液氦冷却、空间分辨率低；对脑沟切向源敏感。"},{"id":"main-short-16","src":"main","type":"short","n":"16","q":"简述脑机接口中“在线系统”和“离线系统”的区别。","a":"（1）离线系统：先采集脑信号数据，再对数据处理、分析和建模，主要目的是评估算法性能、选择特征和训练分类器，不要求实时反馈。（2）在线系统：在采集脑信号的同时实时处理数据，并将结果转化为控制命令反馈给用户，重点是实时性、稳定性和交互性能。区别：①离线主要用于算法开发与性能验证，在线更接近实际应用；②离线准确率高并不一定代表在线控制效果好；③在线系统中用户会根据反馈调整脑活动，因此人机共同适应更加重要。","parts":["离线系统：先采集脑信号数据，再对数据处理、分析和建模，主要目的是评估算法性能、选择特征和训练分类器，不要求实时反馈。（2）在线系统：在采集脑信号的同时实时处理数据，并将结果转化为控制命令反馈给用户，重点是实时性、稳定性和交互性能。区别：①离线主要用于算法开发与性能验证，在线更接近实际应用","离线准确率高并不一定代表在线控制效果好","在线系统中用户会根据反馈调整脑活动，因此人机共同适应更加重要"],"keywords":["离线系统"],"exp":"【考点】在线 vs 离线。离线=先存后算，用于开发算法/选特征/训分类器，不需实时反馈；在线=边采边算边反馈，重实时/稳定/交互。【易错】离线准确率高≠在线好；在线有反馈→人机共适应更关键。"},{"id":"main-short-17","src":"main","type":"short","n":"17","q":"简答 BCI 中特征提取与模式识别的任务分别是什么，常用方法有哪些。","a":"特征提取任务：从原始降噪脑电中剔除冗余信息、提炼能区分不同意图的有效特征，把高维脑电数据映射为低维可分析特征向量。常用特征：时域（均值、方差、峰值）、频域（功率谱、节律能量）、时频域（小波变换）、空域（导联空间滤波特征）。模式识别任务：用算法对提取的特征建模、训练与分类，自动识别用户的运动想象、视觉注意、认知决策等意图。常用方法：传统机器学习（SVM、LDA（线性判别分析）线性判别分析、K 近邻）、深度学习（卷积神经网络 CNN（卷积神经网络）、时序网络等）。","parts":["特征提取任务：从原始降噪脑电中剔除冗余信息、提炼能区分不同意图的有效特征，把高维脑电数据映射为低维可分析特征向量","常用特征：时域（均值、方差、峰值）、频域（功率谱、节律能量）、时频域（小波变换）、空域（导联空间滤波特征）","模式识别任务：用算法对提取的特征建模、训练与分类，自动识别用户的运动想象、视觉注意、认知决策等意图","常用方法：传统机器学习（SVM、LDA（线性判别分析）线性判别分析、K 近邻）、深度学习（卷积神经网络 CNN（卷积神经网络）、时序网络等）"],"keywords":["特征提取任务","常用特征","模式识别任务","常用方法","SVM","LDA","CNN"],"exp":"【考点·重点】特征提取 vs 模式识别。特征提取=去冗余、提有效、降维（四类特征：时域/频域/时频/空域）；模式识别=对特征建模分类、认出意图（方法：传统 SVM/LDA/KNN + 深度 CNN/时序网络）。【注意】空域特征=导联空间滤波（如 CSP）；LDA 是分类器不是空间滤波。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LDA（线性判别分析）：有监督线性分类器，找让两类最可分的投影方向；注意它是分类器、不是空间滤波。\n• CNN（卷积神经网络）：擅长自动提取局部空间/时频特征的深度网络，用于脑电解码等。\n• CSP（共空间模式）：有监督的空间滤波，找让一类方差最大、另一类最小的投影，取对数方差作特征，运动想象两类分类常用。"},{"id":"main-short-18","src":"main","type":"short","n":"18","q":"什么是闭环脑机接口系统？请对比开环 BCI，说明闭环 BCI 的核心优势和工作价值。","a":"开环 BCI 是单向系统，仅完成“大脑信号采集—解码—设备控制”的单向输出，无反馈环节，用户无法实时知晓自身脑电状态和控制效果、无法自主调整思维状态。闭环 BCI 具备“感知-解码-控制-反馈-调节”完整闭环，在完成设备控制后，会通过视觉、听觉、触觉等把控制结果、识别状态、解码精度实时反馈给用户，用户据此主动调整思维、注意力和心理状态、优化脑电特征，从而提升识别精度。核心优势与价值：①人机协同优化，降低试次差异误差，提升稳定性与准确率；②帮助用户快速掌握脑电调控、缩短训练周期、改善 BCI 盲用户的交互；③适配神经康复，通过闭环反馈刺激受损神经重塑，大幅提升脑卒中、瘫痪患者的康复效果，是现阶段高性能 BCI 的主流架构。","parts":["开环 BCI 是单向系统，仅完成“大脑信号采集—解码—设备控制”的单向输出，无反馈环节，用户无法实时知晓自身脑电状态和控制效果、无法自主调整思维状态。闭环 BCI 具备“感知-解码-控制-反馈-调节”完整闭环，在完成设备控制后，会通过视觉、听觉、触觉等把控制结果、识别状态、解码精度实时反馈给用户，用户据此主动调整思维、注意力和心理状态、优化脑电特征，从而提升识别精度。核心优势与价值：①人机协同优化，降低试次差异误差，提升稳定性与准确率","帮助用户快速掌握脑电调控、缩短训练周期、改善 BCI 盲用户的交互","适配神经康复，通过闭环反馈刺激受损神经重塑，大幅提升脑卒中、瘫痪患者的康复效果，是现阶段高性能 BCI 的主流架构"],"keywords":["BCI"],"exp":"【考点·重点】闭环 vs 开环。开环=单向“采集→解码→控制”、无反馈、用户不能调整；闭环=多了“反馈→调节”，形成“感知-解码-控制-反馈-调节”环。价值三条：①人机协同、降误差升准确率 ②缩短训练、改善 BCI 盲 ③促神经重塑、利康复。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI 盲（BCI-illiteracy）：约 15%–30% 的人无论怎么训练都难产生可被有效解码的脑信号。\n• 神经可塑性：神经系统因刺激与学习经历发生的适应性改变（突触重组、连接增强），是康复恢复的基础。"},{"id":"main-short-19","src":"main","type":"short","n":"19","q":"简述脑机接口中信息传输率（ITR（信息传输率））的含义及影响因素。","a":"信息传输率是评价 BCI 性能的重要指标，衡量系统单位时间能传递的信息量，通常以 bit/min 表示。主要影响因素：①可选择目标数量——目标越多理论信息量越大，但识别难度也可能增加；②分类准确率——越高有效信息传输率越高；③单次选择所需时间——越短单位时间输出命令越多；④系统反馈和确认时间——反馈、纠错和确认步骤会影响整体速度；⑤用户状态——注意力、疲劳、训练水平都会影响输出效率。因此高 ITR 需在目标数量、准确率与响应速度之间取得平衡。","parts":["信息传输率是评价 BCI 性能的重要指标，衡量系统单位时间能传递的信息量，通常以 bit/min 表示。主要影响因素：①可选择目标数量——目标越多理论信息量越大，但识别难度也可能增加","分类准确率——越高有效信息传输率越高","单次选择所需时间——越短单位时间输出命令越多","系统反馈和确认时间——反馈、纠错和确认步骤会影响整体速度","用户状态——注意力、疲劳、训练水平都会影响输出效率。因此高 ITR 需在目标数量、准确率与响应速度之间取得平衡"],"keywords":["BCI","ITR"],"exp":"【考点】ITR 含义+影响因素。含义=单位时间传递的信息量(bit/min)。五因素「目标数、准确率、单次用时、反馈确认时间、用户状态」。【核心】高 ITR=在“目标数 × 准确率 × 速度”之间平衡。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ITR（信息传输率）：单位时间能传递的信息量（常用 bit/min），由目标数、准确率、单次用时等共同决定，是衡量 BCI 性能的关键指标。"},{"id":"main-short-20","src":"main","type":"short","n":"20","q":"简述共空间模式（CSP（共空间模式））算法在运动想象 BCI 中的基本思想。","a":"CSP 是常用于两类运动想象分类的空间滤波方法。基本思想：①通过空间滤波器对多通道 EEG（头皮脑电）信号做线性变换；②使一类任务下信号方差最大、同时使另一类任务下信号方差最小；③提取变换后信号的方差或对数方差作为分类特征；④将特征输入分类器（如 LDA（线性判别分析）或 SVM）实现左右手运动想象等任务分类。优点是能有效增强两类信号差异，缺点是易受噪声、通道选择和个体差异影响。","parts":["CSP 是常用于两类运动想象分类的空间滤波方法。基本思想：①通过空间滤波器对多通道 EEG（头皮脑电）信号做线性变换","使一类任务下信号方差最大、同时使另一类任务下信号方差最小","提取变换后信号的方差或对数方差作为分类特征","将特征输入分类器（如 LDA（线性判别分析）或 SVM）实现左右手运动想象等任务分类。优点是能有效增强两类信号差异，缺点是易受噪声、通道选择和个体差异影响"],"keywords":["CSP","EEG","LDA","SVM"],"exp":"【考点·重点】CSP 基本思想。一句话：找一组空间滤波器，让“一类方差最大、另一类方差最小”，取（对数）方差作特征再丢给 LDA/SVM 分类。优点=放大两类差异；缺点=怕噪声、通道选择和个体差异。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• CSP（共空间模式）：有监督的空间滤波，找让一类方差最大、另一类最小的投影，取对数方差作特征，运动想象两类分类常用。\n• LDA（线性判别分析）：有监督线性分类器，找让两类最可分的投影方向；注意它是分类器、不是空间滤波。"},{"id":"supp-short-3","src":"supp","type":"short","n":3,"q":"请简要描述电极信号调理的概念，并简要给出有效的电极信号调理方案。","a":"电极信号调理是消除记录信号中噪声的过程。最有效的调理方法是在尽可能靠近电极的地方调节信号：先用前级（前置）放大器在离电极很近处放大信号，再进一步滤波和放大。","parts":["电极信号调理是消除记录信号中噪声的过程","最有效的调理方法是在尽可能靠近电极的地方调节信号：先用前级（前置）放大器在离电极很近处放大信号，再进一步滤波和放大"],"keywords":[],"exp":"【考点】电极信号调理概念+方案。概念=就近消噪；方案=近电极前置放大 → 再滤波放大。【要点】关键词“尽可能靠近电极”“前置放大器先放大”。"},{"id":"supp-short-4","src":"supp","type":"short","n":4,"q":"请给出脑机接口的 5 类应用，并讨论 BCI 未来可应用的领域及其带来的改变与突破。","a":"五类应用：替代、恢复、增强、补充、改善。未来领域举例——医疗康复：为神经疾病尤其脑卒中患者带来脑控康复新形式，更多样、有效、便捷；游戏娱乐：超越视觉的虚拟现实，机器编码反馈直接在脑中形成触觉认知；教育：用“颅内芯片”辅助提升学习、运算、注意力与记忆力。但受限于侵入式损伤与复杂脑信号解码，BCI 真正走进日常仍有很长的路。","parts":["五类应用：替代、恢复、增强、补充、改善","未来领域举例——医疗康复：为神经疾病尤其脑卒中患者带来脑控康复新形式，更多样、有效、便捷","游戏娱乐：超越视觉的虚拟现实，机器编码反馈直接在脑中形成触觉认知","教育：用“颅内芯片”辅助提升学习、运算、注意力与记忆力","但受限于侵入式损伤与复杂脑信号解码，BCI 真正走进日常仍有很长的路"],"keywords":["五类应用","未来领域举例——医疗康复","游戏娱乐","教育","BCI"],"exp":"【考点·重点】BCI 五类应用 + 未来领域。五类口诀「替·恢·增·补·改」。展开时分领域谈“带来什么改变”：医疗康复、游戏娱乐、教育，并客观指出局限（侵入损伤、解码难）。"},{"id":"supp-short-7","src":"supp","type":"short","n":7,"q":"解释脑机接口中“异步控制”与“同步控制”的设计差异。","a":"同步控制依赖固定时间窗口（如每 4 秒执行一次指令），系统与用户严格同步，适用于 P300 等诱发范式；异步控制持续监测脑信号，用户可随时发起操作（如运动想象触发机械臂移动），需解决连续解码与误触发抑制问题，更符合自然交互需求。","parts":["同步控制依赖固定时间窗口（如每 4 秒执行一次指令），系统与用户严格同步，适用于 P300 等诱发范式","异步控制持续监测脑信号，用户可随时发起操作（如运动想象触发机械臂移动），需解决连续解码与误触发抑制问题，更符合自然交互需求"],"keywords":[],"exp":"【考点·重点】同步 vs 异步控制。框架：各写“谁决定时机+典型范式+优缺点”。同步=系统定时（P300），简单但不自然；异步=用户自定（运动想象），自然但要防误触发。【易错】异步的难点=连续解码 + 误触发抑制。"},{"id":"supp-short-9","src":"supp","type":"short","n":9,"q":"设计脑-机接口系统时要选择合适的放大器，才能保证采集信号被有效识别。选择放大器时需要从哪几个方面考虑？","a":"①阻抗条件：放大器输入阻抗要远大于电极阻抗。EEG/ECoG 电极阻抗通常 0.1~20kΩ(1kHz 处)，放大器输入阻抗至少大 100 倍（几兆欧以上）；电极阻抗越高所需输入阻抗越高（如记单神经元的微电极需很高输入阻抗的前置放大器）。②通道数量：由信号类型决定，慢波或 P300 等 8 通道或更少即可，ECoG 和神经元记录常用上百通道。③ADC 分辨率与动态范围：16 位 ADC 精度常不足以记录 DC 电势；24 位有足够范围避免 DC 电势过大时饱和、同时保留对小而快电势变化的分辨率，故多数 16 位 ADC 在数字化前用高通滤波去除 DC 偏置。","parts":["阻抗条件：放大器输入阻抗要远大于电极阻抗。EEG/ECoG 电极阻抗通常","1~20kΩ(1kHz 处)，放大器输入阻抗至少大 100 倍（几兆欧以上）；电极阻抗越高所需输入阻抗越高（如记单神经元的微电极需很高输入阻抗的前置放大器）。②通道数量：由信号类型决定，慢波或 P300 等 8 通道或更少即可，ECoG 和神经元记录常用上百通道。③ADC 分辨率与动态范围：16 位 ADC 精度常不足以记录 DC 电势；24 位有足够范围避免 DC 电势过大时饱和、同时保留对小而快电势变化的分辨率，故多数 16 位 ADC 在数字化前用高通滤波去除 DC 偏置"],"keywords":["阻抗条件","EEG","ECoG"],"exp":"【考点·重点】选放大器三方面。框架「阻·道·ADC」：①输入阻抗 ≫ 电极阻抗（×100、几兆欧）②通道数按信号类型（慢波/P300 ≤8，ECoG/单元上百）③ADC 分辨率/动态范围（24 位优于 16 位，否则需高通去 DC）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• ADC（模数转换器）：把连续模拟电压转成数字量。位数越高分辨率越细、动态范围越大（如 24 位优于 16 位）。\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需把极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。"},{"id":"supp-short-10","src":"supp","type":"short","n":10,"q":"为特定应用开发 BCI 时，必须确保 BCI 与应用兼容。请简要阐述应用操作的三要素。","a":"①BCI 提供给应用的指令：即 BCI 的输出、应用的输入，可以是目标选择指令或过程控制指令。②BCI 命令到应用动作的变换：可以是直接的，也可以是间接的。③应用产生的作用：即应用输出，完成用户目标，可以是离散的，也可以是连续的。","parts":["BCI 提供给应用的指令：即 BCI 的输出、应用的输入，可以是目标选择指令或过程控制指令","BCI 命令到应用动作的变换：可以是直接的，也可以是间接的","应用产生的作用：即应用输出，完成用户目标，可以是离散的，也可以是连续的"],"keywords":["BCI 提供给应用的指令","应用产生的作用","BCI"],"exp":"【考点】应用操作三要素。框架「指令 → 变换 → 作用」：①BCI 给应用的指令（目标选择/过程控制）②命令到动作的变换（直接/间接）③应用产生的作用（离散/连续）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 目标选择（goal selection）：BCI 只把目标意图传给设备，由设备自身完成（如告诉轮椅目的地，导航交给轮椅）。\n• 过程控制（process control）：用户与 BCI 控制实现意图的全过程、可依实时反馈连续调整（对比“目标选择”只下达目标）。"},{"id":"supp-short-13","src":"supp","type":"short","n":13,"q":"请简述皮层内脑-机接口所面临的长期性能问题，以及可解决这些问题的办法。","a":"问题：异物植入手术存在风险；有创 BCI 设备（植入脑内或颅骨内）必须持续工作多年而无需更换或修理；长期植入本身不能带来显著的感染或组织损伤风险。办法：通过精心选择植入材料的类型与几何形状、采用适当的手术插入技术确保植入物稳定性，并持续监测组织反应和可能的感染，从而把这些风险降到最低。","parts":["问题：异物植入手术存在风险","有创 BCI 设备（植入脑内或颅骨内）必须持续工作多年而无需更换或修理","长期植入本身不能带来显著的感染或组织损伤风险","办法：通过精心选择植入材料的类型与几何形状、采用适当的手术插入技术确保植入物稳定性，并持续监测组织反应和可能的感染，从而把这些风险降到最低"],"keywords":["BCI"],"exp":"【考点】皮层内 BCI 长期性能问题+办法。问题=手术风险 + 需多年免维护 + 不能引发感染/损伤；办法=选材料与几何形状 + 恰当手术 + 监测组织反应与感染。"},{"id":"supp-short-14","src":"supp","type":"short","n":14,"q":"试简述皮层脑电（ECoG（皮层脑电））的局限性。","a":"局限一：用于 BCI 研究的 ECoG 信号采集存在很多现实障碍；局限二：与单个神经元记录相比，ECoG 空间分辨率较低；局限三：放置 ECoG 记录电极需要侵入性（外科）手术。","parts":["局限一：用于 BCI 研究的 ECoG 信号采集存在很多现实障碍","局限二：与单个神经元记录相比，ECoG 空间分辨率较低","局限三：放置 ECoG 记录电极需要侵入性（外科）手术"],"keywords":["局限一","局限二","局限三","BCI","ECoG"],"exp":"【考点】ECoG 三大局限。「采集障碍、分辨率不如单元、需开颅手术」。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需把极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。"},{"id":"supp-short-15","src":"supp","type":"short","n":15,"q":"皮层脑电（ECoG（皮层脑电））是从颅骨下记录脑电信号的技术。与脑电（EEG（头皮脑电））相比，ECoG 具有哪些优势？","a":"①更高的空间分辨率：电极直接贴皮层，避免颅骨/头皮衰减与空间弥散，可达毫米级（1~10mm），能精准定位（如区分相邻手指控制信号），而 EEG 因容积传导仅厘米级。②更大的信号幅度：ECoG 在 μV~mV 级，比 EEG（μV 级）高一个数量级（EEG 需穿过高阻抗颅骨软组织而大幅衰减）。③不易受伪迹影响：电极位于颅骨内，屏蔽多数体表伪迹（肌电、心电、环境噪声），比 EEG 更可靠。④更宽的带宽：可记录 DC(0Hz)~数百 Hz（含高频 γ 30~200Hz），擅长捕捉认知/运动相关高频振荡，而 EEG 因颅骨低通效应通常只能分析 80Hz 以下。⑤更长期的功能稳定性：电极与皮层相对固定，信号特性可数月至数年不变，适合长期植入；EEG 电极易因油脂/头发/位移而阻抗变化、需频繁校准。","parts":["更高的空间分辨率：电极直接贴皮层，避免颅骨/头皮衰减与空间弥散，可达毫米级（1~10mm），能精准定位（如区分相邻手指控制信号），而 EEG 因容积传导仅厘米级","更大的信号幅度：ECoG 在 μV~mV 级，比 EEG（μV 级）高一个数量级（EEG 需穿过高阻抗颅骨软组织而大幅衰减）","不易受伪迹影响：电极位于颅骨内，屏蔽多数体表伪迹（肌电、心电、环境噪声），比 EEG 更可靠","更宽的带宽：可记录 DC(0Hz)~数百 Hz（含高频 γ 30~200Hz），擅长捕捉认知/运动相关高频振荡，而 EEG 因颅骨低通效应通常只能分析 80Hz 以下","更长期的功能稳定性：电极与皮层相对固定，信号特性可数月至数年不变，适合长期植入","EEG 电极易因油脂/头发/位移而阻抗变化、需频繁校准"],"keywords":["更高的空间分辨率","更大的信号幅度","不易受伪迹影响","更宽的带宽","更长期的功能稳定性","EEG","ECoG"],"exp":"【考点·重点】ECoG 相比 EEG 的五大优势。框架「准·强·净·宽·稳」：①空间分辨率高（mm 级）②信号幅度大（高一个数量级）③抗伪迹（颅内屏蔽）④带宽宽（含高频 γ）⑤长期稳定。每条都对照 EEG 的短板来答。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。\n• 容积传导（容积导体效应）：脑内电流源经脑、脑脊液、颅骨、头皮向四周扩散模糊，由组织几何形状与电阻率决定，是 EEG 空间分辨率差的原因。\n• EMG（肌电）：肌肉收缩（咬牙、皱眉）产生的电信号，混进脑电属伪迹。"},{"id":"supp-short-16","src":"supp","type":"short","n":16,"q":"几种不同的视觉诱发电位（VEP（视觉诱发电位））刺激范式，请分别简述它们的名称及特点。","a":"(a) 时间调制的视觉诱发电位（t-VEP）：不同刺激相互独立、互不重叠；(b) 频率调制的视觉诱发电位（f-VEP）：每个重复刺激发生在一个特定频率；(c) 伪随机码调制的视觉诱发电位（c-VEP）：每个刺激发生在一个伪随机模式中。","parts":["时间调制的视觉诱发电位（t-VEP）：不同刺激相互独立、互不重叠","频率调制的视觉诱发电位（f-VEP）：每个重复刺激发生在一个特定频率","伪随机码调制的视觉诱发电位（c-VEP）：每个刺激发生在一个伪随机模式中"],"keywords":["VEP"],"exp":"【考点】三种 VEP 范式。t-VEP=时间上独立不重叠；f-VEP=各目标固定频率；c-VEP=伪随机码调制。性能 c>f>t（对照选择 #49）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• VEP（视觉诱发电位）：视觉刺激（闪光/图形翻转）后枕叶产生的诱发电位，按调制方式分 t-VEP（时间）/f-VEP（频率）/c-VEP（码）。\n• SSVEP（稳态视觉诱发电位）：盯着固定频率闪烁的目标时，枕叶产生同频及谐波的稳定脑电响应，是高速 BCI 范式。"},{"id":"supp-short-17","src":"supp","type":"short","n":17,"q":"请简要叙述到达任务的过程，并结合顶区及运动前区各部分功能对结果进行分析。","a":"(1) 到达任务流程：猴子先注视并触摸中央固定的 LED 灯；随后屏幕边缘八个可能位置之一短暂闪烁约 300ms 的绿色目标提示灯（绿色闪烁表示“到达”任务）；猴子须再等约 1s 直到中央注视灯熄灭，然后将手臂移向要求的方向，同时继续注视中央灯。(2) 结果分析：扫视任务中，在目标提示、延时及执行扫视期间 LIP（外侧顶内区）神经元活动升高；到达任务中，在提示、延迟及执行期间 PRR（顶叶到达区）活跃强烈。这与“LIP 含眼动神经元、PRR 编码手臂到达运动”一致——二者分别在扫视与手臂动作中特别活跃，尤其在延迟期参与记忆目标位置和规划运动。","parts":["到达任务流程：猴子先注视并触摸中央固定的 LED 灯","随后屏幕边缘八个可能位置之一短暂闪烁约 300ms 的绿色目标提示灯（绿色闪烁表示“到达”任务）","猴子须再等约 1s 直到中央注视灯熄灭，然后将手臂移向要求的方向，同时继续注视中央灯","结果分析：扫视任务中，在目标提示、延时及执行扫视期间 LIP（外侧顶内区）神经元活动升高","到达任务中，在提示、延迟及执行期间 PRR（顶叶到达区）活跃强烈","这与“LIP 含眼动神经元、PRR 编码手臂到达运动”一致——二者分别在扫视与手臂动作中特别活跃，尤其在延迟期参与记忆目标位置和规划运动"],"keywords":["到达任务流程","结果分析","LIP","PRR"],"exp":"【考点·重点】到达任务流程 + LIP/PRR 功能分析。框架：先讲实验流程（注视 → 目标闪烁 → 延迟 → 到达），再讲结论——LIP 管眼动（扫视活跃）、PRR 管手臂到达（到达活跃），延迟期都参与“记位置+规划”。【易错】别把 LIP 与 PRR 弄反：LIP=眼，PRR=臂。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• LIP（外侧顶内区）：编码眼动（扫视），在注视/延迟/扫视期间活跃。\n• PRR（顶叶到达区）：编码手臂到达的目标位置与轨迹，在提示/延迟/执行到达期间活跃（不是眼动）。"},{"id":"supp-short-18","src":"supp","type":"short","n":18,"q":"请简单谈谈两种测量大脑代谢活动方法（fNIRS（功能性近红外光谱）/fMRI（功能核磁共振成像））的基本原理及各自优缺点。","a":"(1) fNIRS 是依赖血氧水平响应的技术，主要测量大脑活动期间含氧与脱氧血红蛋白相对含量的变化，据此计算与神经元活动相关的 BOLD 响应。(2) fMRI 能测量与脑生理功能相关的参数（血流量、血容量、血氧合等），最常用的是测基于血红蛋白磁化率的 BOLD 对比度来推断脑活动。优缺点：fNIRS 无创、安全、非入侵、便携、价廉；fMRI 无创、空间分辨率非常高、可全脑覆盖、具解剖特异性。但两者共同缺点是响应慢、时间分辨率低。","parts":["fNIRS 是依赖血氧水平响应的技术，主要测量大脑活动期间含氧与脱氧血红蛋白相对含量的变化，据此计算与神经元活动相关的 BOLD 响应","fMRI 能测量与脑生理功能相关的参数（血流量、血容量、血氧合等），最常用的是测基于血红蛋白磁化率的 BOLD 对比度来推断脑活动","优缺点：fNIRS 无创、安全、非入侵、便携、价廉","fMRI 无创、空间分辨率非常高、可全脑覆盖、具解剖特异性","但两者共同缺点是响应慢、时间分辨率低"],"keywords":["fNIRS","BOLD","fMRI"],"exp":"【考点·重点】fNIRS vs fMRI 原理+优缺点。原理都看血氧（BOLD）。fNIRS=光学、便携便宜但只看表层；fMRI=磁共振、空间分辨率极高全脑覆盖但贵且笨重。【共同缺点】响应慢、时间分辨率低（代谢类通病）。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、按血氧变化推测脑区活动的光学方法，轻便便宜，但看血流（反应慢）且只能看表层。\n• fMRI（功能核磁共振成像）：靠血氧水平依赖（BOLD）信号推断脑活动，空间分辨率极高、全脑覆盖、无创，但响应慢、时间分辨率低。\n• BOLD（血氧水平依赖）：含氧/脱氧血红蛋白比例变化引起的磁共振信号变化，fMRI/fNIRS 据此推断脑活动。"},{"id":"supp-short-21","src":"supp","type":"short","n":21,"q":"结合神经可塑性理论，阐述闭环脑机接口系统如何促进神经功能恢复。","a":"神经可塑性指神经系统对外界刺激和学习经历的适应性改变。闭环脑机接口通过实时解码大脑信号并提供反馈，形成“感知—动作—反馈”的循环，强化相应神经通路的活动，促进突触重组和功能性连接增强。尤其在神经损伤后，闭环系统能通过意图驱动的运动训练刺激受损脑区及相关神经网络，促进功能补偿与恢复。","parts":["神经可塑性指神经系统对外界刺激和学习经历的适应性改变","闭环脑机接口通过实时解码大脑信号并提供反馈，形成“感知—动作—反馈”的循环，强化相应神经通路的活动，促进突触重组和功能性连接增强","尤其在神经损伤后，闭环系统能通过意图驱动的运动训练刺激受损脑区及相关神经网络，促进功能补偿与恢复"],"keywords":[],"exp":"【考点·重点】神经可塑性 + 闭环 BCI 促恢复。逻辑链：可塑性（用进废退）→ 闭环提供实时反馈形成“感知-动作-反馈”环 → 强化通路、突触重组 → 意图驱动训练刺激受损脑区 → 功能补偿恢复。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 神经可塑性：神经系统因刺激与学习经历发生的适应性改变（突触重组、连接增强），是康复恢复的基础。"},{"id":"supp-short-22","src":"supp","type":"short","n":22,"q":"解释脑机接口中“解码器”泛化能力不足的原因及常用的解决策略。","a":"原因：神经信号高变异性（脑电噪声、用户状态改变）、训练数据有限、模型过拟合等。解决策略：①数据增强与多样化训练集构建；②使用正则化方法防止过拟合；③在线学习与自适应算法动态调整模型参数；④融合多模态信号提升解码鲁棒性；⑤利用深度学习模型自动提取鲁棒特征以提高泛化能力。","parts":["原因：神经信号高变异性（脑电噪声、用户状态改变）、训练数据有限、模型过拟合等。解决策略：①数据增强与多样化训练集构建","使用正则化方法防止过拟合","在线学习与自适应算法动态调整模型参数","融合多模态信号提升解码鲁棒性","利用深度学习模型自动提取鲁棒特征以提高泛化能力"],"keywords":[],"exp":"【考点】解码器泛化差的原因+对策。原因「变异大 + 数据少 + 过拟合」；对策五条「增强数据、正则化、在线自适应、多模态融合、深度学习鲁棒特征」。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• BCI 盲（BCI-illiteracy）：约 15%–30% 的人无论怎么训练都难产生可被有效解码的脑信号。"},{"id":"supp-short-23","src":"supp","type":"short","n":23,"q":"在 BCI 的传播（商业化）中，研发新医疗器械是积极与消极因素相混合的迅速发展。请简述两方面因素，并谈谈研究者应如何面对。","a":"【消极】在监管像 BCI 这样的新技术的学术研究与商业化过程中，存在大量障碍。【积极】成功的产品已催生出一个先进的医疗器械行业。研究者应对：首先要仔细、客观地分析任何拟议开发的风险与回报；把已熟悉的科学方法（资料的系统收集、趋势预测与分析、逻辑推理）应用到与商业相关的考量上——市场规模、商品成本、监管与偿付风险、销售与支持成本、投资回报率；若学术研究者缺乏评估这些因素的知识或工具，引入一个具商业知识的合作伙伴就更加重要。","parts":["【消极】在监管像 BCI 这样的新技术的学术研究与商业化过程中，存在大量障碍","【积极】成功的产品已催生出一个先进的医疗器械行业","研究者应对：首先要仔细、客观地分析任何拟议开发的风险与回报","把已熟悉的科学方法（资料的系统收集、趋势预测与分析、逻辑推理）应用到与商业相关的考量上——市场规模、商品成本、监管与偿付风险、销售与支持成本、投资回报率","若学术研究者缺乏评估这些因素的知识或工具，引入一个具商业知识的合作伙伴就更加重要"],"keywords":["研究者应对","BCI"],"exp":"【考点】BCI 商业化的积极/消极因素 + 应对。消极=监管商业化障碍多；积极=已催生先进器械产业。应对=客观分析风险回报、把科研分析能力用于市场/成本/监管/回报评估、必要时找懂商业的合作伙伴。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• FDA：美国食品药品监督管理局，负责医疗器械的审批与监管。\n• 510(k)：美国 FDA 的医疗器械上市途径——证明新器械与已上市器械“实质等效”即可获许可，比 PMA 快。"},{"id":"supp-short-24","src":"supp","type":"short","n":24,"q":"基于脑机接口的运动康复，未来研究中的关键问题有哪些？","a":"①尽量减少设置与训练所需时间，用最少通道（电极）就能提供足够脑信号；②医院环境下用电屏蔽室帮助 EEG-BCI 免受电噪声干扰；③在患者筛查、决策、BCI 设置与训练协议中，运动康复人员需接受培训；④EEG-BCI 运动辅助系统应可用于家庭治疗，要求无创、电极易穿戴、软件界面友好；⑤应获得 BCI 辅助运动康复的医疗保险报销审批。","parts":["尽量减少设置与训练所需时间，用最少通道（电极）就能提供足够脑信号","医院环境下用电屏蔽室帮助 EEG-BCI 免受电噪声干扰","在患者筛查、决策、BCI 设置与训练协议中，运动康复人员需接受培训","EEG-BCI 运动辅助系统应可用于家庭治疗，要求无创、电极易穿戴、软件界面友好","应获得 BCI 辅助运动康复的医疗保险报销审批"],"keywords":["BCI"],"exp":"【考点·重点】BCI 运动康复五大关键问题。「时间少/通道少、电屏蔽、人员培训、家用友好、医保报销」。覆盖技术、环境、人、易用性、支付五个维度。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。\n• BCI 盲（BCI-illiteracy）：约 15%–30% 的人无论怎么训练都难产生可被有效解码的脑信号。"},{"id":"supp-short-25","src":"supp","type":"short","n":25,"q":"在应用 1978 年 Belmont 报告的三项原则时，BCI 研究被划分为哪两种类型？请分别简述其研究内容。","a":"第一类：帮助残疾患者获得等同健全人的功能状态的 BCI 研究——旨在恢复或替代自然中枢神经系统输出通路，或改善自然输出使其等同于没有残疾的人。第二类：针对一般人群的研究——旨在增强或补充自然中枢神经系统输出，或提高自然输出以达到超常的水平。","parts":["第一类：帮助残疾患者获得等同健全人的功能状态的 BCI 研究——旨在恢复或替代自然中枢神经系统输出通路，或改善自然输出使其等同于没有残疾的人","第二类：针对一般人群的研究——旨在增强或补充自然中枢神经系统输出，或提高自然输出以达到超常的水平"],"keywords":["第一类","第二类","BCI"],"exp":"【考点·重点】Belmont 框架下 BCI 两类研究。第一类=面向残疾者，恢复/替代/改善到正常（医疗）；第二类=面向常人，增强/补充/超常（非医疗）。对应五类应用：替代恢复改善 vs 增强补充。"},{"id":"supp-short-26","src":"supp","type":"short","n":26,"q":"BCI 输出命令一般分为目标选择或过程控制两种，请举例简述两者区别，并指出最理想最有效的 BCI 输出命令形式。","a":"①目标选择：BCI 将用户的控制意图传给应用设备，再完全由设备实现，如把目标位置传给轮椅、由轮椅自身导航系统到达。②过程控制：用户与 BCI 控制实现意图的全过程，且用户可依并发反馈调整指令，如由 BCI 控制轮椅各方向运动、逐步到达目标。③最理想最有效的是具有正常中枢神经系统功能的“分布式控制”BCI——结合目标选择与过程控制，保真度更高。","parts":["目标选择：BCI 将用户的控制意图传给应用设备，再完全由设备实现，如把目标位置传给轮椅、由轮椅自身导航系统到达","过程控制：用户与 BCI 控制实现意图的全过程，且用户可依并发反馈调整指令，如由 BCI 控制轮椅各方向运动、逐步到达目标","最理想最有效的是具有正常中枢神经系统功能的“分布式控制”BCI——结合目标选择与过程控制，保真度更高"],"keywords":["目标选择","过程控制","BCI"],"exp":"【考点·重点】目标选择 vs 过程控制 + 最优形式。目标选择=只下目标、设备自理（轮椅自己导航）；过程控制=全程操控、可依反馈调整（手动控轮椅每一步）。【结论】最优=分布式控制（两者结合），保真度最高。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• 目标选择（goal selection）：BCI 只把目标意图传给设备，由设备自身完成（如告诉轮椅目的地，导航交给轮椅）。\n• 过程控制（process control）：用户与 BCI 控制实现意图的全过程、可依实时反馈连续调整（对比“目标选择”只下达目标）。"},{"id":"supp-short-28","src":"supp","type":"short","n":28,"q":"简述侵入式与非侵入式脑机接口在信号质量与应用场景上的核心差异。","a":"侵入式 BCI（如 ECoG、微电极阵列）直接接触皮层，可捕获高频（200Hz 以上）局部场电位和单神经元放电，时空分辨率高，但存在手术风险，适用于重度瘫痪患者或精细控制场景（如机械臂操控）。非侵入式 BCI（如 EEG、fNIRS）依赖头皮信号，主要获取低频（100Hz 以下）宏观脑活动，易受肌电伪迹干扰，但安全性高，适用于康复训练、神经反馈等场景。","parts":["侵入式 BCI（如 ECoG、微电极阵列）直接接触皮层，可捕获高频（200Hz 以上）局部场电位和单神经元放电，时空分辨率高，但存在手术风险，适用于重度瘫痪患者或精细控制场景（如机械臂操控）","非侵入式 BCI（如 EEG、fNIRS）依赖头皮信号，主要获取低频（100Hz 以下）宏观脑活动，易受肌电伪迹干扰，但安全性高，适用于康复训练、神经反馈等场景"],"keywords":["BCI","ECoG","EEG","fNIRS"],"exp":"【考点·重点】侵入 vs 非侵入：信号质量 + 应用场景。侵入式=信号好（高频 LFP+单元、时空分辨率高）但有手术风险 → 重度瘫痪/精细控制；非侵入式=安全方便但信号差（低频、易受 EMG 干扰）→ 康复训练/神经反馈。一句话：拿信号质量换安全性。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ECoG（皮层脑电）：把电极片直接铺在大脑皮层表面（需开颅）记录电活动，比头皮 EEG 更强更清晰、能拿高频信息，属半侵入式。\n• EEG（头皮脑电）：在头皮贴电极、隔着颅骨记录大脑电活动。最安全便宜，戴个电极帽即可，但信号微弱、易受干扰。\n• fNIRS（功能性近红外光谱）：用近红外光照进大脑、按血氧变化推测脑区活动的光学方法，轻便便宜，但看血流（反应慢）且只能看表层。\n• LFP（局部场电位）：脑内电极记录到的、电极周围一小群神经元集体电活动的总和，介于单神经元与头皮 EEG 之间的中等尺度信号。\n• 单神经元放电（尖峰 spike / 动作电位）：单个神经元兴奋时发出的一个电脉冲，需把极细微电极刺进脑组织，最精细、空间分辨率最高但创伤最大。\n• EMG（肌电）：肌肉收缩（咬牙、皱眉）产生的电信号，混进脑电属伪迹。"},{"id":"supp-short-29","src":"supp","type":"short","n":29,"q":"解释运动想象范式中事件相关去同步化（ERD（事件相关去同步））与同步化（ERS（事件相关同步））的神经机制。","a":"ERD 表现为 μ（8-12Hz）和 β（13-30Hz）频段功率下降，与运动皮层激活相关，在运动想象初期出现；ERS 则指动作结束后 β 频段功率反弹增强，反映运动抑制状态。二者的动态变化与“运动准备—执行—恢复”的神经节律调控密切相关，是运动想象 BCI 的核心特征。","parts":["ERD 表现为 μ（8-12Hz）和 β（13-30Hz）频段功率下降，与运动皮层激活相关，在运动想象初期出现","ERS 则指动作结束后 β 频段功率反弹增强，反映运动抑制状态","二者的动态变化与“运动准备—执行—恢复”的神经节律调控密切相关，是运动想象 BCI 的核心特征"],"keywords":["ERD","ERS","BCI"],"exp":"【考点·重点】ERD/ERS 神经机制。ERD=μ/β 功率 ↓（皮层激活，想象初期）；ERS=β 功率反弹 ↑（运动抑制/恢复，动作后）。对应“准备-执行-恢复”节律调控，是运动想象 BCI 的核心。\n\n🔰 名词扫盲（不懂的名词看这里）：\n• ERD（事件相关去同步）：运动或运动想象时，对侧运动区 μ/β 节律功率下降的现象，反映皮层激活。\n• ERS（事件相关同步）：动作结束后 β 节律功率反弹增强的现象，反映运动抑制/恢复。\n• SMR（感觉运动节律）：感觉运动皮层的 μ(8–12Hz)+β(13–30Hz) 节律，运动/想象时 ERD、运动后 ERS。"}];

/* ===== scoring engine ===== */
function norm(s){if(!s)return '';s=s.toLowerCase();s=s.replace(/[\uFF01-\uFF5E]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));s=s.replace(/\u3000/g,' ');s=s.replace(/[，,、；;。.！!？?\s\-—–_·…""''（）()\[\]【】《》:：]/g,'');return s;}
function bigrams(s){const g=[];for(let i=0;i<s.length-1;i++)g.push(s.slice(i,i+2));return g;}
function seqSim(u,r){if(!r)return u?0:1;if(!u)return 0;const ub=bigrams(u),rb=bigrams(r);if(!rb.length||!ub.length){const U=new Set(u);let h=0;for(const c of r)if(U.has(c))h++;return h/r.length;}const um=new Map();ub.forEach(g=>um.set(g,(um.get(g)||0)+1));let rec=0;const a=new Map(um);rb.forEach(g=>{const v=a.get(g)||0;if(v>0){rec++;a.set(g,v-1);}});const rm=new Map();rb.forEach(g=>rm.set(g,(rm.get(g)||0)+1));let pr=0;const b=new Map(rm);ub.forEach(g=>{const v=b.get(g)||0;if(v>0){pr++;b.set(g,v-1);}});return 0.7*(rec/rb.length)+0.3*(pr/ub.length);}
const GSUF=['模块','模型','分析','控制','系统','方法','特征','电位','节律','效应','信号','变换','滤波器','滤波','网络','皮层','皮质','细胞','纤维','成像','技术','参考','区域','现象','状态','协议','光谱','频段','波段','阵列'];
function strip(k){for(const s of GSUF)if(k.length>s.length&&k.endsWith(s))return k.slice(0,k.length-s.length);return k;}
function kwSim(u,kr){const k=norm(kr);if(!k)return 0;if(u.includes(k))return 1;if(k.length<=2)return 0;const c=strip(k);if(c!==k&&c.length>=2&&u.includes(c))return 0.85;const h=k.slice(0,2);if(u.includes(h)){let p=0;const uq=new Set(k);uq.forEach(x=>{if(u.includes(x))p++;});const cov=p/uq.size;if(cov>=0.7)return 0.9;if(cov>=0.5)return 0.6;}return 0;}
function partCov(u,parts){if(!parts||!parts.length)return{score:1,perPart:[]};const per=parts.map(p=>{const pn=norm(p);let s=seqSim(u,pn);if(pn&&u.includes(pn))s=Math.max(s,1);return{part:p,sim:s};});return{score:per.reduce((a,b)=>a+b.sim,0)/per.length,perPart:per};}
function scoreAnswer(user,item){const u=norm(user),r=norm(item.a);if(!u)return{score:0,kw:null,part:0,seq:0,perKw:[],perPart:[]};const kws=item.keywords||[];const perKw=kws.map(k=>{const s=kwSim(u,k);return{kw:k,sim:s,hit:s>=0.8,partial:s>=0.4&&s<0.8};});const kwRate=kws.length?perKw.reduce((a,b)=>a+b.sim,0)/kws.length:null;const pc=partCov(u,(item.parts&&item.parts.length)?item.parts:[item.a]);const seq=seqSim(u,r);let sc;if(item.type==='short'){sc=kwRate!==null?0.25*kwRate+0.50*pc.score+0.25*seq:0.6*pc.score+0.4*seq;}else if(kwRate!==null){sc=0.45*kwRate+0.35*pc.score+0.20*seq;}else{sc=0.6*pc.score+0.4*seq;}return{score:Math.round(Math.max(0,Math.min(1,sc))*100),kw:kwRate===null?null:Math.round(kwRate*100),part:Math.round(pc.score*100),seq:Math.round(seq*100),perKw,perPart:pc.perPart};}
function lcsDiff(aRaw,bRaw){const a=[...aRaw],b=[...bRaw],n=a.length,m=b.length;const dp=Array.from({length:n+1},()=>new Int32Array(m+1));for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)dp[i][j]=a[i]===b[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);let i=0,j=0;const aM=[],bM=[];while(i<n&&j<m){if(a[i]===b[j]){aM.push([a[i],1]);bM.push([b[j],1]);i++;j++;}else if(dp[i+1][j]>=dp[i][j+1]){aM.push([a[i],0]);i++;}else{bM.push([b[j],0]);j++;}}while(i<n){aM.push([a[i],0]);i++;}while(j<m){bM.push([b[j],0]);j++;}return{aMark:aM,bMark:bM};}

/* ===== state ===== */
const LS='bci_master_v2';
let prog=load();
function load(){try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}}
function save(){try{localStorage.setItem(LS,JSON.stringify(prog))}catch(e){}}
function P(id){return prog[id]||(prog[id]={fam:0,best:null,last:null})}
let view={type:'all',bank:'all',q:''};
let order=ITEMS.map(it=>it.id);
let curId=order[0];
let answered=false;

const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const srcLabel=s=>s==='main'?'主库':'补充库';
const famClass=f=>f===3?'s':f===2?'m':f===1?'w':'';
function typeName(it){return it.type==='fill'?'填空':it.type==='short'?'简答':(it.multi?'多选':'单选');}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}
function scoreColor(s){return s>=85?'#15803d':s>=70?'#3f3f46':s>=50?'#b45309':'#b91c1c';}

function matchType(it){if(view.type==='all')return true;if(view.type==='fill')return it.type==='fill';if(view.type==='short')return it.type==='short';if(view.type==='single')return it.type==='choice'&&!it.multi;if(view.type==='multi')return it.type==='choice'&&it.multi;return true;}
function filtered(){const q=view.q.trim().toLowerCase();return order.map(id=>ITEMS.find(it=>it.id===id)).filter(it=>{if(!matchType(it))return false;if(view.bank!=='all'&&it.src!==view.bank)return false;if(q){const hay=(it.q+' '+it.a+' '+(it.keywords||[]).join(' ')).toLowerCase();if(!hay.includes(q))return false;}return true;});}

/* ===== sidebar ===== */
function renderStats(){let s=0,m=0,w=0,n=0,sc=[],best=0;ITEMS.forEach(it=>{const p=prog[it.id];const f=p?p.fam:0;if(f===3)s++;else if(f===2)m++;else if(f===1)w++;else n++;if(p&&p.best!=null){sc.push(p.best);if(p.best>best)best=p.best;}});const t=ITEMS.length;$('#barS').style.width=(s/t*100)+'%';$('#barM').style.width=(m/t*100)+'%';$('#barW').style.width=(w/t*100)+'%';$('#cntS').textContent=s;$('#cntM').textContent=m;$('#cntW').textContent=w;$('#cntN').textContent=n;$('#masterPct').textContent=Math.round((s+m*0.5)/t*100)+'%';$('#avgSc').textContent=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):'—';$('#bestSc').textContent=sc.length?best:'—';}
function renderList(){const list=$('#qlist');list.innerHTML='';const arr=filtered();if(!arr.length){list.innerHTML='<div style="padding:18px;color:#9ca3af;font-size:12.5px">没有匹配的题目</div>';return;}arr.forEach(it=>{const p=prog[it.id];const f=p?p.fam:0;const best=p&&p.best!=null?p.best:null;const node=document.createElement('div');node.className='qitem'+(it.id===curId?' active':'');node.innerHTML=`<span class="fam ${famClass(f)}"></span><div class="body"><div class="top"><span class="bdg">${typeName(it)}</span><span class="num">${srcLabel(it.src)}·${it.n}</span></div><div class="txt">${esc(it.q).replace(/［填空］/g,'＿')}</div></div>${best!=null?`<span class="sc" style="color:${scoreColor(best)}">${best}</span>`:''}`;node.onclick=()=>{select(it.id);if(window.innerWidth<=860)closeSide();};list.appendChild(node);});}

/* ===== main render ===== */
function renderQuestion(){
  const it=ITEMS.find(x=>x.id===curId);const stage=$('#stage');
  if(!it){stage.innerHTML='<div class="empty">选择一道题开始</div>';return;}
  stage._keyAnswer=null;answered=false;
  const idx=filtered();const pos=idx.findIndex(x=>x.id===it.id);
  $('#crumb').innerHTML=`${srcLabel(it.src)} · ${typeName(it)}题 <b>#${it.n}</b> &nbsp;·&nbsp; ${pos>=0?pos+1:'-'} / ${idx.length}`;
  const qHtml=esc(it.q).replace(/［填空］/g,'<span class="bk">＿＿</span>');
  if(it.type==='choice'&&!it.multi) renderSingle(it,P(it.id),stage,qHtml);
  else renderType(it,P(it.id),stage,qHtml);
}

function renderSingle(it,p,stage,qHtml){
  const corr=(it.ans||'').split('').filter(c=>'ABCDEFG'.includes(c));
  const keys=Object.keys(it.options);
  stage.innerHTML=`<div class="card">
    <div class="qhead"><span class="tag choice">单选题</span><span class="tag src">${srcLabel(it.src)} · ${it.n}</span>
      <div class="fam-set">${famBtns(p)}</div></div>
    <div class="qbody">${qHtml}</div>
    <div class="opts pick" id="optsBox">${keys.map(k=>`<div class="opt" data-k="${k}"><span class="L">${k}</span><span>${esc(String(it.options[k]))}</span><span class="mk"></span></div>`).join('')}</div>
    <div class="choice-tip" id="choiceTip">点击选项作答 · 键盘 A/B/C/D 选择 · 作答后按 <kbd>Enter</kbd> 下一题</div>
  </div><div class="result" id="result"></div>`;
  bindFam();
  const box=$('#optsBox');
  function answer(k){if(box.classList.contains('answered'))return;box.classList.add('answered');const ok=corr.includes(k);document.querySelectorAll('#optsBox .opt').forEach(o=>{const c=corr.includes(o.dataset.k);if(c){o.classList.add('right');o.querySelector('.mk').textContent='✓';}if(o.dataset.k===k&&!c){o.classList.add('wrong');o.querySelector('.mk').textContent='✗';}});const s=ok?100:0;p.last=k;if(p.best==null||s>p.best)p.best=s;if(!p.fam)p.fam=ok?3:1;p._lastChoice=k;save();renderStats();renderList();answered=true;singleResult(it,ok,k);}
  document.querySelectorAll('#optsBox .opt').forEach(o=>o.onclick=()=>answer(o.dataset.k));
  if(p._lastChoice){const k=p._lastChoice;box.classList.add('answered');document.querySelectorAll('#optsBox .opt').forEach(o=>{const c=corr.includes(o.dataset.k);if(c){o.classList.add('right');o.querySelector('.mk').textContent='✓';}if(o.dataset.k===k&&!c){o.classList.add('wrong');o.querySelector('.mk').textContent='✗';}});answered=true;singleResult(it,corr.includes(k),k);}
  stage._keyAnswer=l=>{if(keys.includes(l))answer(l);};
}
function singleResult(it,ok,picked){
  const res=$('#result');
  $('#choiceTip').innerHTML=ok?`<span style="color:var(--good);font-weight:600">✓ 答对</span> 正确答案 ${esc(it.ans)} · 按 <kbd>Enter</kbd> 下一题`:`<span style="color:var(--red);font-weight:600">✗ 答错</span> 你选 ${esc(picked)}，正确答案 ${esc(it.ans)} <button class="btn" id="retryC" style="padding:3px 10px;font-size:12px">重做</button> · 按 <kbd>Enter</kbd> 下一题`;
  if(!ok){const r=$('#retryC');if(r)r.onclick=()=>{const p=P(it.id);delete p._lastChoice;answered=false;save();renderQuestion();};}
  res.innerHTML=it.exp?`<div class="panel"><h3>考点解析</h3><div class="pbody"><div class="exp">${esc(it.exp)}</div></div></div>`:'';
  res.classList.add('show');
}

function renderType(it,p,stage,qHtml){
  let optsHtml='';
  if(it.type==='choice'&&it.options){const corr=(it.ans||'').split('').filter(c=>'ABCDEFG'.includes(c));const keys=Object.keys(it.options);optsHtml=`<div class="opts">${keys.map(k=>`<div class="opt${corr.includes(k)?' correct':''}"><span class="L">${k}</span><span>${esc(String(it.options[k]))}</span></div>`).join('')}</div><div class="choice-tip"><span class="mb">多选</span>默写出所有正确选项的内容（不是字母），按相似度评分。正确项已标绿供核对。</div>`;}
  const tall=it.type==='short'?'tall':'';
  const ph=it.type==='short'?'默写你的答案，可分点作答……（换行用 Shift+Enter）':'在此输入你记得的答案……';
  stage.innerHTML=`<div class="card">
    <div class="qhead"><span class="tag ${it.type==='short'?'short':(it.type==='choice'?'choice':'fill')}">${typeName(it)}题</span><span class="tag src">${srcLabel(it.src)} · ${it.n}</span></div>
    <div class="qbody">${qHtml}</div>${optsHtml}
    <div class="azone">
      <div class="azlabel"><span>默写你的答案</span><span class="hk">Enter 评分 · Shift+Enter 换行</span></div>
      <textarea id="inp" class="${tall}" placeholder="${ph}">${p.last&&typeof p.last==='string'?esc(p.last):''}</textarea>
      <div class="az-actions">
        <button class="btn go" id="gradeBtn">评分</button>
        <button class="btn" id="revealBtn">看答案</button>
        <button class="btn" id="clearBtn">清空</button>
        <div class="fam-set">${famBtns(p)}</div>
      </div>
    </div></div><div class="result" id="result"></div>`;
  $('#gradeBtn').onclick=grade;$('#revealBtn').onclick=reveal;$('#clearBtn').onclick=()=>{$('#inp').value='';answered=false;$('#inp').focus();};
  const inp=$('#inp');
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();if(!answered)grade();else step(1);}
  });
  inp.addEventListener('input',()=>{P(it.id).last=inp.value;answered=false;});
  bindFam();
  if(p._lastResult){renderResult(p._lastResult,it);answered=true;}
  setTimeout(()=>inp.focus(),30);
}
function famBtns(p){return `<button class="w ${p.fam===1?'on':''}" data-f="1">弱</button><button class="m ${p.fam===2?'on':''}" data-f="2">中</button><button class="s ${p.fam===3?'on':''}" data-f="3">熟</button>`;}
function bindFam(){document.querySelectorAll('.fam-set button').forEach(b=>b.onclick=()=>setFam(+b.dataset.f));}
function setFam(f){const p=P(curId);p.fam=(p.fam===f?0:f);save();renderStats();renderList();document.querySelectorAll('.fam-set button').forEach(b=>b.classList.toggle('on',+b.dataset.f===p.fam&&p.fam!==0));}

function grade(){
  const it=ITEMS.find(x=>x.id===curId);const inp=$('#inp');const user=inp.value;
  if(!user.trim()){toast('先写点答案再评分');inp.focus();return;}
  const r=scoreAnswer(user,it);const p=P(it.id);p.last=user;
  if(p.best==null||r.score>p.best)p.best=r.score;
  if(!p.fam)p.fam=r.score>=85?3:r.score>=60?2:1;
  p._lastResult={r,user};save();renderStats();renderList();
  renderResult({r,user},it);answered=true;inp.focus();
}
function gradeLabel(s){return s>=85?['优秀','#15803d']:s>=70?['良好','#3f3f46']:s>=50?['及格','#b45309']:['待加强','#b91c1c'];}

function renderResult(payload,it){
  const {r,user}=payload;const res=$('#result');const [gl,gc]=gradeLabel(r.score);const col=scoreColor(r.score);const C=2*Math.PI*46;
  const kwHtml=(r.perKw&&r.perKw.length)?`<div class="kws">`+r.perKw.map(k=>{const cls=k.hit?'hit':k.partial?'part':'miss';const mk=k.hit?'✓':k.partial?'◐':'✗';return `<span class="kw ${cls}"><span class="mk">${mk}</span>${esc(k.kw)}</span>`;}).join('')+`</div>`:'<div style="color:#9ca3af;font-size:13px">本题无关键词标注</div>';
  const partHtml=(r.perPart&&r.perPart.length>1)?`<div class="partlist">`+r.perPart.map(pp=>{const lv=Math.round(pp.sim*100);const cls=pp.sim>=0.8?'hit':pp.sim>=0.4?'part':'miss';const mk=pp.sim>=0.8?'✓':pp.sim>=0.4?'◐':'✗';return `<div class="prow ${cls}"><span class="pmk">${mk}</span><span class="pbar"><i style="width:${lv}%"></i></span><span class="ptxt">${esc(pp.part)}</span></div>`;}).join('')+`</div>`:'';
  const {aMark,bMark}=lcsDiff(norm(user),norm(it.a));
  const refDiff=bMark.map(([c,ok])=>ok?`<span class="got">${esc(c)}</span>`:`<span class="miss">${esc(c)}</span>`).join('');
  const userDiff=aMark.map(([c,ok])=>ok?`<span class="ok">${esc(c)}</span>`:`<span class="extra">${esc(c)}</span>`).join('');
  res.innerHTML=`
    <div class="meter">
      <div class="ring"><svg width="104" height="104"><circle cx="52" cy="52" r="46" fill="none" stroke="#ececec" stroke-width="6"/><circle cx="52" cy="52" r="46" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}" id="ringArc"/></svg><div class="v"><b style="color:${col}">${r.score}</b><span>SCORE</span></div></div>
      <div class="minfo">
        <div class="grade" style="color:${gc}">${gl}</div>
        <div class="desc">关键术语 · 要点覆盖 · 序列相似度 综合评分</div>
        <div class="subs">${r.kw!=null?`<div class="sub">关键术语<b>${r.kw}</b><div class="sbar"><i style="width:${r.kw}%"></i></div></div>`:''}<div class="sub">要点覆盖<b>${r.part}</b><div class="sbar"><i style="width:${r.part}%"></i></div></div><div class="sub">序列相似<b>${r.seq}</b><div class="sbar"><i style="width:${r.seq}%"></i></div></div></div>
      </div>
    </div>
    <div class="next-hint">按 <kbd>Enter</kbd> 进入下一题 · 修改答案后按 <kbd>Enter</kbd> 重新评分</div>
    <div class="panel"><h3>关键术语命中</h3><div class="pbody">${kwHtml}</div></div>
    ${partHtml?`<div class="panel"><h3>参考要点逐条覆盖</h3><div class="pbody">${partHtml}</div></div>`:''}
    <div class="panel"><h3>逐字比对</h3><div class="pbody"><div class="metaline">标准答案（<span style="color:#b91c1c">红=漏写</span> / <span style="color:#15803d">绿=已写到</span>）</div><div class="refline">${refDiff}</div><div class="metaline" style="margin-top:12px">你的默写（<span style="color:#b91c1c">红删除线=多写/偏离</span>）</div><div class="diff">${userDiff}</div></div></div>
    <div class="panel"><h3>标准答案</h3><div class="pbody"><div class="reveal-a">${esc(it.a)}</div></div></div>
