<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>综合设计题 · 背诵台</title>
<style>
:root{
  --ink:#0E141B; --panel:#161E28; --panel2:#1E2833; --panel3:#243140;
  --line:#2A3744; --line2:#34465a;
  --text:#E9EEF3; --dim:#9DACBB; --faint:#647686;
  --c-aud:#2BB6C4; --c-vis:#A78BFA; --c-gen:#EC6F9C;
  --silu:#5B8DEF; --kw:#E89A45; --good:#34D399; --warn:#F2C14E;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --cjk:"PingFang SC","Microsoft YaHei","Hiragino Sans GB","Source Han Sans SC","Noto Sans SC",system-ui,sans-serif;
  --r:13px; --r2:9px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--ink);color:var(--text);font-family:var(--cjk);font-size:15.5px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background-image:radial-gradient(1100px 700px at 82% -8%,rgba(43,182,196,.07),transparent 60%),radial-gradient(900px 600px at -5% 8%,rgba(167,139,250,.06),transparent 55%);}
::selection{background:rgba(91,141,239,.34)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:.02em}
.app{opacity:0;animation:fadein .5s ease .04s forwards}
@keyframes fadein{to{opacity:1}}

/* ---------- HUD ---------- */
.hud{position:sticky;top:0;z-index:40;backdrop-filter:blur(10px);
  background:linear-gradient(to bottom,rgba(14,20,27,.94),rgba(14,20,27,.82));
  border-bottom:1px solid var(--line);}
.hud-in{max-width:1180px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;min-width:0}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase}
.title{font-size:20px;font-weight:800;letter-spacing:.01em;line-height:1.1;white-space:nowrap}
.title b{color:var(--c-aud);font-weight:800}
.title em{font-style:normal;color:var(--faint);font-weight:600;font-size:13px;margin-left:7px}
.spacer{flex:1 1 40px}
.meter{display:flex;flex-direction:column;gap:5px;min-width:172px}
.meter-top{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--dim)}
.m-label{letter-spacing:.04em}
.m-num{font-family:var(--mono);font-size:12px;color:var(--dim)}
.m-num b{color:var(--good);font-size:14px}
.track{position:relative;height:6px;border-radius:99px;background:var(--panel3);overflow:hidden}
.track i{position:absolute;top:0;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.7,.3,1),left .5s cubic-bezier(.2,.7,.3,1)}
.fill-done{left:0;background:linear-gradient(90deg,#2bd49a,#34D399)}
.fill-rev{background:linear-gradient(90deg,#e8b13e,#F2C14E);opacity:.9}
.iconbtn{flex:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
  color:var(--dim);font-size:17px;cursor:pointer;display:grid;place-items:center;transition:.16s}
.iconbtn:hover{border-color:var(--line2);color:var(--text);background:var(--panel2)}
#menuBtn{display:none}

/* tabs */
.tabs{max-width:1180px;margin:0 auto;padding:0 20px 11px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;border:1px solid var(--line);background:transparent;color:var(--dim);
  padding:7px 15px;border-radius:99px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:.16s;white-space:nowrap}
.tab .ic{font-size:14px;opacity:.85}
.tab:hover{color:var(--text);border-color:var(--line2)}
.tab.on{color:var(--ink);background:var(--text);border-color:var(--text);font-weight:700}
.tab .cnt{font-family:var(--mono);font-size:11px;opacity:.6}
.tab.on .cnt{opacity:.55}

/* ---------- LAYOUT ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px;display:grid;grid-template-columns:262px 1fr;gap:26px;align-items:start}
.spine{position:sticky;top:128px;max-height:calc(100vh - 150px);overflow:auto;padding-right:6px;scrollbar-width:thin}
.spine::-webkit-scrollbar{width:7px}.spine::-webkit-scrollbar-thumb{background:var(--line2);border-radius:9px}
.grp{margin-bottom:16px}
.grp-h{display:flex;align-items:center;gap:9px;padding:4px 6px 9px;font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.04em}
.grp-h .bar{width:9px;height:9px;border-radius:3px;flex:none}
.grp-h .gc{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-left:auto;font-weight:600}
.qitem{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px;cursor:pointer;color:var(--dim);
  font-size:13px;line-height:1.35;transition:.13s;border:1px solid transparent}
.qitem:hover{background:var(--panel);color:var(--text)}
.qitem.cur{background:var(--panel2);border-color:var(--line2);color:var(--text)}
.qitem .qt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:11px;height:11px;border-radius:99px;flex:none;border:1.8px solid var(--faint);background:transparent;transition:.16s}
.dot.s1{border-color:var(--warn);background:radial-gradient(circle at 50% 50%,var(--warn) 0 42%,transparent 44%)}
.dot.s2{border-color:var(--good);background:var(--good);box-shadow:0 0 0 3px rgba(52,211,153,.16)}

.main{min-width:0}

/* ---------- shared content blocks ---------- */
.silu{background:rgba(91,141,239,.07);border:1px solid rgba(91,141,239,.26);border-left:3px solid var(--silu);
  border-radius:var(--r2);padding:12px 15px;margin:0 0 13px}
.silu-h{font-size:11.5px;font-weight:700;letter-spacing:.1em;color:var(--silu);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.silu-h::before{content:"";width:13px;height:13px;border-radius:99px;border:2px solid var(--silu);box-shadow:inset 0 0 0 2px var(--ink)}
.silu-b{color:#cfdcef;font-size:14px;line-height:1.78}
.mini-h{font-size:11.5px;font-weight:700;letter-spacing:.1em;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.kw-h{color:var(--kw)}
.kw-h .tag{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--faint);letter-spacing:.06em}
.kwrow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{font-size:12.5px;padding:4px 10px;border-radius:7px;background:rgba(232,154,69,.1);
  border:1px solid rgba(232,154,69,.32);color:#f3c690;line-height:1.3}
.ans{color:#dde5ee;font-size:14.5px;line-height:1.82}
.ans p{margin:0 0 10px}
.ans p:last-child{margin-bottom:0}
.ans b{color:#fff;font-weight:700}

/* ---------- STUDY ---------- */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:180px;position:relative}
.search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  font-family:inherit;font-size:14px;border-radius:10px;padding:10px 13px 10px 38px;outline:none;transition:.16s}
.search input:focus{border-color:var(--silu);box-shadow:0 0 0 3px rgba(91,141,239,.14)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--dim);font-family:inherit;font-size:13px;
  font-weight:600;padding:9px 13px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--line2);color:var(--text);background:var(--panel2)}
.part-sec{margin-bottom:26px}
.part-h{display:flex;align-items:center;gap:11px;margin:0 0 13px;padding-bottom:9px;border-bottom:1px solid var(--line)}
.part-h .bar{width:5px;height:20px;border-radius:3px;flex:none}
.part-h .pn{font-size:15px;font-weight:800;letter-spacing:.01em}
.part-h .pc{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:auto}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--dom);
  border-radius:var(--r);margin-bottom:11px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--line2);border-left-color:var(--dom)}
.card-h{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.statusdot{flex:none;width:18px;height:18px;border-radius:99px;border:2px solid var(--faint);background:transparent;
  cursor:pointer;transition:.16s;padding:0}
.statusdot.s1{border-color:var(--warn);background:radial-gradient(circle,var(--warn) 0 40%,transparent 42%)}
.statusdot.s2{border-color:var(--good);background:var(--good);box-shadow:0 0 0 3px rgba(52,211,153,.16)}
.card-h .ct{flex:1;font-size:15px;font-weight:600;line-height:1.4}
.kwcount{font-family:var(--mono);font-size:11px;color:var(--faint);background:var(--panel3);
  padding:2px 8px;border-radius:6px;flex:none}
.chev{flex:none;color:var(--faint);transition:transform .26s;display:grid;place-items:center}
.card.open .chev{transform:rotate(90deg)}
.acc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.card.open .acc-body{grid-template-rows:1fr}
.acc-inner{overflow:hidden}
.acc-pad{padding:2px 16px 16px}

/* ---------- RECITE ---------- */
.rbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.fchip{border:1px solid var(--line);background:var(--panel);color:var(--dim);font-family:inherit;font-size:13px;
  font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;transition:.15s}
.fchip:hover{color:var(--text);border-color:var(--line2)}
.fchip.on{background:var(--panel3);color:var(--text);border-color:var(--line2)}
.fchip.on[data-k="aud"]{box-shadow:inset 0 0 0 1px var(--c-aud);color:#bdeef3}
.fchip.on[data-k="vis"]{box-shadow:inset 0 0 0 1px var(--c-vis);color:#d9ccff}
.fchip.on[data-k="gen"]{box-shadow:inset 0 0 0 1px var(--c-gen);color:#fbc9dc}
.toggle{margin-left:auto;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--dim);cursor:pointer;user-select:none}
.sw{width:38px;height:22px;border-radius:99px;background:var(--panel3);border:1px solid var(--line);position:relative;transition:.18s;flex:none}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:99px;background:var(--faint);transition:.18s}
.toggle.on .sw{background:rgba(52,211,153,.28);border-color:var(--good)}
.toggle.on .sw::after{left:18px;background:var(--good)}

.rcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 24px;
  box-shadow:0 18px 50px -28px rgba(0,0,0,.7);position:relative;overflow:hidden}
.rcard::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--dom)}
.rhead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.rbadge{font-size:11.5px;font-weight:700;letter-spacing:.06em;padding:3px 11px;border-radius:7px;color:var(--ink)}
.rpos{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--faint)}
.rpos b{color:var(--text)}
.rtitle{font-size:21px;font-weight:800;line-height:1.4;letter-spacing:.005em;margin:8px 0 20px}
.layers{display:flex;flex-direction:column;gap:11px}
.lyr{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--ink)}
.lyr-btn{width:100%;display:flex;align-items:center;gap:12px;padding:13px 16px;background:transparent;border:0;
  color:var(--dim);font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;transition:.15s;text-align:left}
.lyr-btn:hover{color:var(--text);background:var(--panel)}
.lyr-num{font-family:var(--mono);font-size:11px;font-weight:700;width:22px;height:22px;border-radius:7px;display:grid;
  place-items:center;flex:none;border:1px solid var(--line2);color:var(--faint)}
.lyr[data-t="silu"] .lyr-num{color:var(--silu);border-color:rgba(91,141,239,.5)}
.lyr[data-t="kw"] .lyr-num{color:var(--kw);border-color:rgba(232,154,69,.5)}
.lyr[data-t="ans"] .lyr-num{color:var(--good);border-color:rgba(52,211,153,.5)}
.lyr-state{margin-left:auto;font-size:11.5px;font-family:var(--mono);color:var(--faint);display:flex;align-items:center;gap:7px}
.lyr-chev{transition:transform .25s}
.lyr.open .lyr-chev{transform:rotate(90deg)}
.lyr-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
.lyr.open .lyr-wrap{grid-template-rows:1fr}
.lyr-inner{overflow:hidden}
.lyr-pad{padding:2px 16px 16px}
.lyr.open .lyr-btn{color:var(--text)}

.grade{display:flex;gap:11px;margin-top:20px}
.gbtn{flex:1;border-radius:11px;padding:13px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;
  border:1px solid;transition:.16s;display:flex;align-items:center;justify-content:center;gap:8px}
.g-no{background:rgba(242,193,78,.1);border-color:rgba(242,193,78,.4);color:var(--warn)}
.g-no:hover{background:rgba(242,193,78,.18)}
.g-yes{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.45);color:var(--good)}
.g-yes:hover{background:rgba(52,211,153,.2)}
.nav{display:flex;gap:11px;margin-top:11px}
.navbtn{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--dim);font-family:inherit;font-size:13.5px;
  font-weight:600;padding:11px;border-radius:10px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
.navbtn:hover:not(:disabled){border-color:var(--line2);color:var(--text);background:var(--panel2)}
.navbtn:disabled{opacity:.32;cursor:default}
.hint{margin-top:16px;text-align:center;font-size:11.5px;color:var(--faint);font-family:var(--mono);line-height:1.9}
.hint kbd{background:var(--panel3);border:1px solid var(--line2);border-bottom-width:2px;border-radius:5px;
  padding:1px 6px;font-family:var(--mono);font-size:11px;color:var(--dim)}
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty .big{font-size:42px;margin-bottom:12px}
.empty p{margin:6px 0}

/* ---------- KEYWORD MODE ---------- */
.kwq{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--dom);border-radius:var(--r);
  padding:14px 16px;margin-bottom:11px}
.kwq-h{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.kwq-h .qt{flex:1;font-size:14.5px;font-weight:600}
.kwq-h .tally{font-family:var(--mono);font-size:11px;color:var(--faint)}
.kwq-h .flip{font-size:11.5px;font-weight:600;color:var(--silu);background:none;border:0;cursor:pointer;padding:4px 6px;border-radius:6px}
.kwq-h .flip:hover{background:var(--panel2)}
.kwchips{display:flex;flex-wrap:wrap;gap:7px}
.kc{font-size:13px;padding:5px 11px;border-radius:7px;cursor:pointer;transition:.18s;border:1px dashed var(--line2);
  color:var(--faint);background:var(--ink);min-width:34px;text-align:center;user-select:none;font-family:var(--mono);letter-spacing:.12em}
.kc:hover{border-color:var(--silu);color:var(--dim)}
.kc.show{border-style:solid;border-color:rgba(232,154,69,.32);background:rgba(232,154,69,.1);color:#f3c690;
  font-family:var(--cjk);letter-spacing:0;cursor:default}

/* ---------- APPENDIX ---------- */
.apx-note{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.26);border-left:3px solid var(--good);
  border-radius:var(--r2);padding:13px 16px;margin-bottom:20px;color:#cdeede;font-size:14px;line-height:1.78}
.apx-note b{color:var(--good)}
.apx-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.apx-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px 17px}
.apx-card .ah{font-size:12.5px;font-weight:700;letter-spacing:.05em;color:var(--c-aud);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.apx-card.vis .ah{color:var(--c-vis)}
.apx-card .ah::before{content:"";width:6px;height:6px;border-radius:99px;background:currentColor}
.apx-card .ab{color:#d5dee8;font-size:13.5px;line-height:1.85}
.num{font-family:var(--mono);font-weight:600;color:#ffe2b0;background:rgba(232,154,69,.13);
  padding:0 4px;border-radius:4px;font-size:.94em}
.apx-card.vis .num{color:#dcd0ff;background:rgba(167,139,250,.15)}
.kou{grid-column:1/-1;background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(43,182,196,.08));
  border:1px solid var(--line2);border-radius:var(--r);padding:18px 20px;margin-top:7px}
.kou .ah{font-size:13px;font-weight:800;letter-spacing:.1em;color:#fff;margin-bottom:9px;display:flex;align-items:center;gap:9px}
.kou .ah .pill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink);background:linear-gradient(90deg,var(--c-aud),var(--c-vis));padding:2px 9px;border-radius:99px}
.kou .ab{color:#e7edf3;font-size:15px;line-height:1.85}
.kou .ab b{color:#fff}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,10,15,.72);backdrop-filter:blur(4px);z-index:60;
  display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .2s}
.overlay.show{display:flex;opacity:1}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;max-width:480px;width:100%;
  padding:24px;position:relative;max-height:86vh;overflow:auto;transform:translateY(8px);transition:transform .22s}
.overlay.show .modal{transform:none}
.modal h3{margin:0 0 6px;font-size:18px;font-weight:800}
.modal .sub{color:var(--faint);font-size:12px;font-family:var(--mono);letter-spacing:.04em;margin-bottom:16px}
.modal p{color:#d5dee8;font-size:14px;line-height:1.8;margin:0 0 14px}
.modal .row{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--dim);margin-bottom:9px;line-height:1.7}
.modal .row b{color:var(--text)}
.modal .keys{display:flex;flex-wrap:wrap;gap:6px 14px;margin:4px 0 18px}
.modal .keys span{font-size:12.5px;color:var(--dim)}
.modal .keys kbd{background:var(--panel3);border:1px solid var(--line2);border-bottom-width:2px;border-radius:5px;padding:1px 7px;font-family:var(--mono);font-size:11px;color:var(--text);margin-right:5px}
.close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;border:1px solid var(--line);
  background:var(--ink);color:var(--dim);font-size:18px;cursor:pointer;display:grid;place-items:center}
.close:hover{color:var(--text);border-color:var(--line2)}
.dngr{border-color:rgba(242,193,78,.4);color:var(--warn);background:rgba(242,193,78,.08)}
.dngr:hover{background:rgba(242,193,78,.16)}

.backdrop{display:none}

/* ---------- RESPONSIVE ---------- */
@media (max-width:920px){
  .wrap{grid-template-columns:1fr;gap:0;padding-top:18px}
  #menuBtn{display:grid}
  .spine{position:fixed;top:0;left:0;bottom:0;width:284px;max-height:none;background:var(--panel);z-index:70;
    transform:translateX(-104%);transition:transform .26s cubic-bezier(.3,.7,.3,1);padding:20px 14px;
    border-right:1px solid var(--line2);box-shadow:24px 0 60px -30px #000}
  body.menu .spine{transform:none}
  body.menu .backdrop{display:block;position:fixed;inset:0;background:rgba(6,10,15,.6);z-index:65}
  .apx-grid{grid-template-columns:1fr}
  .title em{display:none}
  .meter{order:3}
}
@media (max-width:560px){
  body{font-size:15px}
  .hud-in{padding:11px 15px;gap:12px}
  .tabs{padding:0 15px 10px}
  .wrap{padding:16px 15px 70px}
  .rcard{padding:18px 16px}
  .rtitle{font-size:18px}
  .meter{min-width:130px}
  .grade{flex-direction:column}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001s!important;transition-duration:.001s!important}
}
</style>
</head>
<body>
<div class="app">
  <header class="hud">
    <div class="hud-in">
      <button class="iconbtn" id="menuBtn" aria-label="目录">&#9776;</button>
      <div class="brand">
        <div class="eyebrow">机器人传感技术 · 答辩冲刺</div>
        <div class="title">综合设计题 <b>背诵台</b><em>听觉 · 视觉 · 通用</em></div>
      </div>
      <div class="spacer"></div>
      <div class="meter" title="绿色=已掌握，黄色=复习中">

<script>
const DATA = {"intro": "每道题下新增两栏：蓝条「答题思路」讲清答题结构、考点与采分逻辑，按它组织语言就不跑题；橙条「关键词」是阅卷踩分的术语，作答时务必逐一命中。正文为可直接背诵的参考答案，已与两份项目报告、两份答辩 PPT 逐条核对。通用答题口诀见文末附录。", "parts": [{"name": "第一部分　听觉任务：儿童陪伴机器人听觉感知系统（小千 BuddyBot）", "questions": [{"title": "一、本项目的技术路线是什么", "silu": "先点立意：不是单一语音识别程序，而是可运行的听觉交互闭环，用「语音输入→识别理解→行为执行→语音反馈」一句话给出主线；再引出核心创新双链路架构（控制链路 vs 问答链路、模式互斥共享麦克风），分别按「采集→VAD 切段→ASR→（自回采过滤＋声纹/唤醒）→意图处理→执行/播报」讲清两条链路；最后落一句本地 CPU 运行＋结构化日志，呼应工程可复现。先架构、再链路、后工程，层次不能乱。", "kw": ["闭环系统", "双链路架构", "模式互斥", "共享麦克风", "控制链路（低时延/强约束/可打断）", "问答链路（唤醒/声纹/自然交互）", "VAD＋能量阈值", "SenseVoice", "CAM++ 声纹", "CommandParser", "Qwen2.5", "edge-tts", "本地 CPU 推理", "JSONL 结构化日志"], "ans": [{"lead": "", "text": "本项目面向家庭儿童陪伴与教育场景，目标不是做一个单纯的语音识别程序，而是实现一个真正可运行的机器人听觉交互闭环系统，使机器人能够完成“语音输入、识别理解、行为执行、语音反馈”的完整闭环。"}, {"lead": "", "text": "系统采用双链路架构，两条链路都从同一只麦克风采集声音开始，但因为优化目标不同而分开设计，并通过模式互斥保证同一时刻只有一条链路占用麦克风。"}, {"lead": "", "text": "第一条是语音控制链路，运行在图形界面主程序内的一个线程中。它的处理过程是：麦克风持续采集音频后，先用 WebRTC 语音活动检测配合能量阈值把连续音频切成有效语句；切好的语音段送入 SenseVoice 语音识别模型转成文字；识别出的文字不会立刻执行，而是先做自回采过滤、再经过 CAM++ 声纹校验确认说话人身份；只有通过校验的授权用户，文字才会交给指令解析器解析成动作序列，最后驱动仿真小车执行并在三维界面实时刷新。这条链路追求低时延和强约束。"}, {"lead": "", "text": "第二条是语音问答链路，由一个独立子进程承载，与主程序隔离运行。它的处理过程是：麦克风采集、语音活动检测切段、语音识别之后，先判断是否命中唤醒词“小千”，命中后再做声纹门禁，授权用户通过后系统优先用规则快速回复处理简单问题，只有复杂问题才调用 Qwen2.5 大模型生成回答，最后由 edge-tts 合成语音并播报；播报结束后进入一个短暂的抑制窗口，避免把自己的声音再次采进来。这条链路追求自然交互与权限管理。"}, {"lead": "", "text": "整套系统在普通消费级笔记本电脑上以 CPU 推理完成，并配有结构化日志记录每个环节的时延，便于复现和定位问题。"}]}, {"title": "二、本项目的基本模块和常用方法有哪些", "silu": "核心先亮明「听觉系统≠一个 ASR 模块，而是多环节协同」，再按数据流顺序逐个模块作答；每个模块用「职责＋常用方法（行业通法）＋本项目选型」三段式，体现既懂通法又能落地。务必覆盖采集、前端、ASR、声纹、唤醒与意图、状态机、TTS、冲突与日志八块，别漏掉冲突控制与日志（工程加分项）。", "kw": ["声音采集（PyAudio/16kHz）", "前端处理（VAD＋端点检测＋能量阈值＋三门限）", "ASR（HMM＋MFCC→端到端/SenseVoiceSmall）", "声纹/说话人验证（深度说话人嵌入/CAM++）", "唤醒与意图（关键词＋规则解析/LLM）", "有限状态机", "TTS（edge-tts＋pygame）", "自触发抑制", "JSONL 日志"], "ans": [{"lead": "", "text": "机器人听觉系统不等于一个语音识别模块，它是由多个环节协同组成的完整系统。本项目的基本模块和各自采用的常用方法如下。"}, {"lead": "声音采集模块", "text": "，负责把空气中的声音转成数字音频，采用 PyAudio 以 16kHz 采样率、1024 点为一块进行采集。"}, {"lead": "前端处理模块", "text": "，负责把连续音频流切成有效语句、滤除噪声，常用方法是语音活动检测加端点检测，本项目采用 WebRTC VAD 判断有没有人在说话，再用能量阈值过滤低幅度噪声，并设置最短语句时长、句尾静音时长和最大语句时长三个门限来控制切段。"}, {"lead": "语音识别模块（ASR）", "text": "，负责把语音转成文字，常用方法已从传统的隐马尔可夫模型加梅尔倒谱系数发展到端到端深度模型，本项目采用阿里达摩院开源的 SenseVoiceSmall。"}, {"lead": "声纹识别模块（说话人验证）", "text": "，负责判断“是谁在说话”，常用方法是基于深度神经网络的说话人嵌入，本项目采用 ModelScope 上的 CAM++ 模型，用于权限门禁。"}, {"lead": "唤醒与意图理解模块", "text": "，负责决定何时开始服务、把文字转成可执行意图，常用方法对固定指令用关键词匹配加规则解析，对开放问答用大语言模型；本项目控制指令用自研的结构化解析器，开放问答用 Qwen2.5-1.5B-Instruct。"}, {"lead": "状态机与执行模块", "text": "，负责把识别结果接到机器人动作、并管理监听与播报状态，常用方法是有限状态机；本项目用状态机管理待机、监听、识别、执行、播报等状态并做模式互斥。"}, {"lead": "语音合成模块（TTS）", "text": "，负责把文字念出来形成反馈，本项目采用微软的 edge-tts 配合 pygame 播放。"}, {"lead": "冲突控制与日志模块", "text": "，负责抑制自触发、记录运行数据，本项目采用播放期互斥加文本相似度过滤来防自触发，用自研的 JSONL 结构化日志记录关键事件和时延。"}]}, {"title": "三、选型是怎么做的，为什么不选别的方案", "silu": "先给统一原则——「够用、能在本地 CPU 跑、能稳定展示」约束下做横向对比、选最平衡方案；再逐模块给「选了什么＋为什么不选另一个」。ASR 要讲清四阶段对比（HMM＋SVM→Whisper→云端 API→SenseVoice）这条最能体现工程取舍的主线，并用数字（字错率<8%、比 Whisper 快约 5 倍、显存 1.2GB）支撑。每个否定项都点出被否的具体硬伤（显存/延迟/网络/音色/死机），不要只说「不好」。", "kw": ["选型原则（够用/本地 CPU/稳定展示）", "横向对比", "SenseVoice vs Whisper（非自回归/低延迟/字错率<8%/快约 5 倍/1.2GB）", "否 Whisper（3.5s 延迟＋4GB 显存）", "否云端（网络超时）", "CAM++（7.2M/精度-规模-成本平衡）", "Qwen2.5-1.5B（效果-时延平衡点/量化 3GB/约 0.8s）", "否 7B（14GB 显存）", "否 0.5B（指令遗忘/幻觉）", "edge-tts（零显存/自然）", "JSONL（可量化/可复现）"], "ans": [{"lead": "", "text": "本项目的选型原则是：在课程项目“够用、能在本地 CPU 上跑、能稳定展示”的约束下，对每个模块都做了横向对比，再选最平衡的方案。"}, {"lead": "语音切段选 WebRTC VAD 加能量阈值。", "text": "之所以不只用能量门限，是因为单纯靠能量在有背景噪声时鲁棒性不够；之所以不上更重的神经网络 VAD，是因为那样会明显增加部署复杂度。WebRTC VAD 专为实时通信设计、延迟低于 30 毫秒且抗噪较好，最适合低时延的流式前处理。"}, {"lead": "语音识别选 SenseVoiceSmall，而不是 Whisper。", "text": "我们做过四个阶段的对比。最早尝试传统的隐马尔可夫模型加支持向量机方案，提取梅尔倒谱系数再降维分类，在安静环境下识别率只有约百分之七十五，一旦有风扇噪声或换人就跌到百分之四十以下，泛化能力太差。然后尝试 Whisper，准确率能超过百分之九十，但它是自回归解码，在本地的总延迟高达约 3.5 秒、显存占用超过 4GB，严重超出“建议响应不超过 2 秒”的要求。接着尝试百度、讯飞等云端接口，识别又快又准，但校园网有波动会偶发超时崩溃，不符合“完整系统、工程稳定”的要求。最终选定 SenseVoiceSmall，它是非自回归模型、天生适合低延迟，支持中英日多语种、能在本地 CPU 运行，在含底噪的室内测试中字错率稳定在百分之八以下、推理速度比 Whisper 快近五倍、显存占用仅约 1.2GB，同时满足了多语种和本地低时延两个核心要求。"}, {"lead": "声纹识别选 CAM++。", "text": "它的参数量只有约 7.2M，基于上下文感知掩蔽和时延神经网络主干，选它不是因为它绝对最强，而是因为它在精度、参数规模和部署成本之间最平衡，适合在 CPU 上做轻量的说话人验证。"}, {"lead": "大模型选 Qwen2.5-1.5B-Instruct。", "text": "我们也做过对比。70 亿参数的大模型推理效果好，但本地加载至少需要 14GB 显存、容易内存溢出，首字延迟超过 1.5 秒，会把整体响应拖过 2 秒红线。5 亿参数的极小模型推理很快，但存在严重的指令遗忘和幻觉，经常漏掉结构化指令里的关键字符、甚至生成系统没有定义的第六类指令导致控制程序崩溃。15 亿参数的指令微调版恰好处在效果与时延的平衡点，量化后显存控制在 3GB 以内，配合精心设计的少样本提示模板强制它只输出“前进、后退、左转、右转、停止”五类或兜底指令，实测能稳定百分之百输出标准指令、推理延迟约 0.8 秒。"}, {"lead": "语音合成选 edge-tts。", "text": "pyttsx3 无需显存但音色机械，达不到自然反馈的要求；CosyVoice 音色出色，但和识别、大模型一起常驻显存时容易因显存碎片化导致死机，违背稳定运行要求。edge-tts 接入快、音色自然、支持多语言、且零本地显存占用，最适合快速构建可展示的反馈闭环。"}, {"lead": "日志选自研 JSONL 结构化日志，而不是简单打印。", "text": "因为任务书要求性能指标必须有测试数据支撑，结构化日志能记录每个事件的时间戳和耗时，使我们能够定量分析时延瓶颈、复现实验、定位异常，而不是靠主观感觉判断系统快慢。"}]}, {"title": "四、要实现机器人听觉，需要购买哪些器件，如何选型", "silu": "先立一句「器件选型不能脱离机器人本体和任务场景」，再用「最低可行/竞赛展示/高阶产品」三档梯度作答，体现能按目标-预算-抗噪-是否远场分层决策。重点落在麦克风：数量（单麦/双麦/阵列）、安装位置（靠交互面、远离电机与扬声器）、采样规格（16kHz/16bit）。最后说明本项目当前用电脑/USB 麦克风、迁移真机会升级到阵列＋独立回采通道，首尾呼应。", "kw": ["三档梯度（最低可行/竞赛展示/高阶产品）", "计算单元（PC/树莓派/Jetson/工控机）", "拾音器件", "扬声器", "麦克风数量（单麦/双麦/4 麦/6-8 麦阵列）", "声源方向估计", "远场拾音", "独立回采通道", "安装位置（远离电机/远离扬声器/靠交互面）", "采样规格（16kHz/16bit/低底噪）", "本地离线唤醒"], "ans": [{"lead": "", "text": "器件选型不能脱离机器人本体和任务场景，要根据目标、预算、抗噪要求和是否需要远场与方向判断来确定。我们把方案分成三档来回答。"}, {"lead": "最低可行方案", "text": "用于先把系统闭环跑通：一台普通电脑或工控机作为计算单元，一只普通 USB 麦克风或电脑内置麦克风作为拾音器件，一个扬声器用于语音反馈，再配一个仿真执行端或简单的机器人控制接口。这一档用单麦克风即可起步，能支持最基础的近场语音控制和语音播报。"}, {"lead": "竞赛展示方案", "text": "在复杂度和效果之间取平衡：采用双麦克风或四麦克风阵列以提升抗噪和前端设计能力，配独立扬声器，计算单元可用笔记本、树莓派、Jetson 或工控机，下接机器人底盘或仿真控制端，必要时再接入机器人的运动状态信息，让系统能根据自身状态调整监听策略。"}, {"lead": "高阶产品方案", "text": "接近真实服务机器人：采用六麦或八麦阵列做远场拾音和声源方向估计，配独立的回采通道供回声消除使用，再加上声纹识别和本地离线唤醒模块，进一步降低回声、自触发和网络依赖。"}, {"lead": "", "text": "选型的关键在麦克风。麦克风数量上，只做基础近场控制用单麦即可，要提升抗噪用双麦更好，要做远场拾音、方向判断和多人场景则用阵列麦克风。安装位置上，麦克风应装在机器人上半部靠近交互面的位置，既贴近人对机器人说话的方向，又要尽量远离底盘电机以避免机械振动和结构噪声、远离扬声器以减少回声和自触发。采样规格上，语音任务用 16kHz、16bit 即可，应选驱动稳定、底噪低的器件。本项目目前在仿真和电脑环境下验证，采用的是电脑内置或 USB 麦克风加扬声器，若迁移到真实机器人，会按上述竞赛或高阶方案升级到麦克风阵列加独立回采通道。"}]}, {"title": "五、为什么采用双链路架构", "silu": "一句话抓根因——「控制任务和问答任务的优化目标不同」：控制要强约束、低时延、可打断（「停止」要能立刻打断），问答要自然语言生成与播报管理。再讲不分链路的坏处（大模型推理拖慢控制、强约束限制问答灵活性）、分链路后的好处（互不拖累、各自灵活），最后补工程实现（线程 vs 独立子进程、进程隔离、模式互斥防抢麦）。这题考「为什么」，务必落在目标差异和工程隔离上。", "kw": ["优化目标不同", "控制链路（强约束/低时延/可打断/「停止」立即打断）", "问答链路（自然生成/播报管理）", "解耦", "模式互斥防抢麦", "共享前端但逻辑隔离", "线程 vs 独立子进程", "进程隔离提稳定性"], "ans": [{"lead": "", "text": "我们采用控制链路与问答链路并行但互斥的双链路设计，根本原因是控制任务和问答任务的优化目标不同。控制任务需要强约束和快速响应，比如“停止”必须能立刻打断当前动作，因此控制链路追求低时延、动作稳定和可打断；问答任务需要自然语言生成和播报管理，因此问答链路追求唤醒、声纹门禁、回复质量和防自触发。如果把两类任务塞进同一条链路，复杂问答的大模型推理就会拖慢控制响应，控制的强约束又会限制问答的灵活性。"}, {"lead": "", "text": "分成两条链路后，控制链路不会被复杂问答拖慢，问答链路也能更灵活地管理唤醒、声纹和播报；两条链路共享前端麦克风和切段，但在逻辑上相互隔离，并通过模式互斥保证同一时刻只有一条主循环占用麦克风，避免抢麦和资源冲突。控制链路运行在图形界面内的线程里，问答链路由独立子进程承载，进程隔离也提高了稳定性。"}]}, {"title": "六、声纹识别为什么要做，又是怎么做的", "silu": "分「为什么做」和「怎么做」两层。为什么：家庭场景使用者有家长/儿童/访客，权限应分级，声纹是把「按身份控制权限」这一任务书扩展要求真正嵌入系统逻辑，而非炫技。怎么做：先讲门禁位置（控制链路在 ASR 后、解析前；问答链路在唤醒词命中后），再讲两点真实改进（多段累计 3 秒注册、阈值分场景 0.42/0.38/0.50＋10 秒短时缓存），最后点「停止」紧急旁路体现安全优先。门禁位置一定要讲准，是踩分点。", "kw": ["身份权限分级（家长/儿童/访客）", "权限嵌入系统逻辑", "门禁位置（控制：ASR 后-解析前；问答：唤醒词后）", "CAM++ 说话人验证", "多段累计 3 秒注册", "阈值分场景（控制 0.42/短口令 0.38/问答 0.50）", "10 秒短时通过缓存", "「停止」紧急旁路", "安全优先"], "ans": [{"lead": "", "text": "在家庭儿童陪伴场景中，使用者不只有儿童，还有家长和访客。儿童需要自然交流和陪伴互动，但家长需要管理员权限去控制机器人的使用时长、可进入区域以及高权限命令是否放行，访客则不应默认拥有完整控制权。因此我们做声纹识别，不是为了多加一个炫技模块，而是为了把“家长、儿童、访客”的权限差异真正嵌入系统逻辑，对应任务书中“根据身份控制权限”的扩展要求。"}, {"lead": "", "text": "具体做法上，我们把声纹校验放在合适的门禁位置：控制链路在语音识别之后、指令解析之前做声纹校验，先确认语音内容是有效控制指令，再判断说话人是否有权执行；问答链路则在唤醒词命中之后做声纹校验，只有授权用户才能进入问答，否则播报“声纹识别失败，不能为你服务”。"}, {"lead": "", "text": "我们还针对真实使用做了两点改进。一是注册策略，早期要求用户单段连续说够三秒才能注册，但真实说话常有停顿导致注册失败，于是改为把多段有效语音累计到三秒后再完成注册，显著提高了注册成功率。二是阈值分场景，控制常规指令用 0.42、控制短口令用更宽松的 0.38、问答用更严格的 0.50，并在控制链路加入十秒的短时通过缓存，减少连续控制时对同一个人反复误拒。此外，“停止”指令保留紧急旁路，不验声纹即可执行，确保异常情况下任何人都能让机器人及时刹停，体现安全优先原则。"}]}, {"title": "七、什么是 AEC，如何避免自触发，又如何区分自己和客户", "silu": "听觉最重的综合题，四问都要答。①自触发本质：麦克风与扬声器同处一个物理声场，播报被采回→识别→再触发。②AEC 定义与降噪区别：参考信号是否已知——AEC 用扬声器播放的已知参考信号对消回声，降噪针对未知噪声。③避免自触发四层（禁听→AEC→声源/说话人区分→交互逻辑兜底）由浅入深。④本项目真实做法是亮点：尝试 WebRTC 硬件 AEC 失败（残响/延迟/缓冲致对消不彻底、陷入死循环）→改用基于生命周期的状态机互斥锁（播放期清空麦克风队列＋忙碌状态监控＋0.5s 冗余＋看门狗 10 秒）＋文本相似度过滤。⑤区分自己/客户分两层：自己 vs 外部人（AEC/方向/状态机）、目标用户 vs 其他人（唤醒词/声纹/距离方向）。把「失败→工程方案根治」这条故事讲出来最加分。", "kw": ["自触发（同一物理声场/播报被采回）", "AEC 声学回声消除", "与降噪区别（已知参考信号 vs 未知噪声）", "四层防护（禁听/AEC/声源-说话人区分/交互逻辑兜底）", "硬件 AEC 失败（残响-延迟-缓冲/死循环）", "状态机互斥锁", "播放期清空队列", "播放忙碌监控＋0.5s 冗余", "看门狗 10 秒", "文本相似度过滤", "两层区分（自己 vs 外人 / 目标用户 vs 其他人）", "高优先级命令（停止/打断）"], "ans": [{"lead": "", "text": "自触发问题的本质是：麦克风和扬声器处于同一个物理声场，机器人播报“正在前进”时，这句话可能被麦克风再次采到、被识别成“前进”、从而再次触发动作，形成自触发循环。任务书明确要求系统在播报时不得被自身声音触发新指令。"}, {"lead": "", "text": "AEC 即声学回声消除，它和普通降噪的区别在于参考信号是否已知。普通降噪针对的是随机、未知的背景噪声，目标是压低杂音；而机器人自己播报的声音不是未知噪声，系统本来就知道自己在播什么，所以应当作“已知参考信号的回声”来处理。AEC 正是利用扬声器正在播放的参考信号，在麦克风信号里找出对应的回声成分并尽量对消。"}, {"lead": "", "text": "避免自触发可以分四层来做，由浅入深。第一层是播报期直接禁听或降低监听灵敏度，最简单但会牺牲可打断能力。第二层是 AEC 回声消除，允许播报时保留一定监听能力，但对前端链路、时延和音频同步要求较高。第三层是区分声源和说话人，用麦克风阵列做声源方向估计判断声音来自扬声器方向还是用户方向，条件更好时再用声纹识别判断是谁在说。第四层是交互逻辑兜底，即便有了 AEC，也再加一层逻辑保护，比如播报时只接受“停止、取消、打断”这类高优先级命令、把识别文本与最近播报内容做相似度比较、对同一命令做短时去重。"}, {"lead": "", "text": "本项目的真实做法值得重点说明。我们早期尝试过用 WebRTC 算法做硬件级 AEC，把扬声器输出和麦克风输入做反向对消，但由于麦克风收音存在物理延迟、房间有残响、播放有缓冲，导致对消不彻底，识别模型仍会捕捉到微弱的残响并疯狂执行自己刚播报的指令，陷入死循环。于是我们放弃了耗费算力的算法对消，改从工程系统逻辑层面彻底解决，设计了一个基于生命周期的状态机互斥锁。当大模型输出文本交给 edge-tts 生成音频后，系统进入播放状态，此时强制挂起并清空麦克风输入队列；用播放器的忙碌状态严格监控播放生命周期，确认播报结束且余音消散、再增加约 0.5 秒冗余后才解锁、恢复监听；同时引入看门狗机制，一旦播放状态维持超过十秒就强制重置，防止死锁。在此之上再叠加文本相似度过滤，新识别文本若与最近播报高度相似就直接丢弃。这套方案不消耗额外算力，从系统时序上彻底避免了机器人同时“说话”和“听自己说话”。"}, {"lead": "", "text": "关于“如何区分自己和客户”，要分两层回答。第一层是区分机器人自己和外部人，主要靠 AEC、播放参考、方向判断和状态机互斥，让系统知道现在听到的是不是自己的播报。第二层是区分目标用户和其他人，靠唤醒词、按键接管、距离与方向约束以及声纹识别来缩小目标用户范围，使机器人不会谁说话都响应、只为授权用户服务。"}]}, {"title": "八、机器人上落地听觉任务，需要考虑机器人的哪些特性和客观因素", "silu": "开门见山点核心认识——「机器人不是静止设备，机器人本身会改变听觉任务的条件，不能只看识别率」。分两大块：机器人本体特性（结构位置/本体噪声/运动状态/机器人类型差异/算力供电）和外部客观因素（混响/背景噪声/距离/角度/多人/网络/算力/功耗）。每点要展开而非罗列，如本体噪声强调「是工作时一直存在的持续噪声，静止能识别、一动就听不清就不算可用」，多人场景要连到「先判断该听谁」。这题考系统性思维，越能展开越高分。", "kw": ["机器人会改变听觉条件", "本体特性（结构位置/本体噪声/运动状态/机器人类型/算力供电）", "持续性本体噪声（电机/风扇/减速器/轮地摩擦）", "运动时降低唤醒灵敏度", "机器人类型差异（服务陪伴/工业协作/仓储巡检）", "外部因素（混响/背景噪声/说话距离/角度/多人/网络/算力/功耗）", "多人场景先判断听谁", "可用性=条件变化时仍稳定"], "ans": [{"lead": "", "text": "这道题的关键认识是：机器人不是静止设备，机器人本身会改变听觉任务的条件，所以不能只看识别率，要同时考虑机器人本体特性和外部客观环境。"}, {"lead": "", "text": "先看机器人本体特性。第一是结构位置，麦克风装在头部、胸前还是底盘边缘效果不同，离扬声器太近回声会更重，离电机太近自身机械噪声会更明显，被壳体遮挡则拾音方向和灵敏度受影响。第二是本体噪声，移动机器人工作时底盘电机、风扇、减速器和轮地摩擦会持续发声，机械臂运动时也有关节驱动声，这些不是偶然干扰而是工作时一直存在的噪声，如果静止时能识别“停止”、底盘一启动就听不清，系统就还不算真正可用。第三是运动状态，机器人一旦前进、转向或播报，麦克风朝向、相对声源角度和噪声背景都会变化，更合理的做法是静止时保持较高监听灵敏度、运动时降低唤醒灵敏度或只保留少数高优先级指令以保证安全。第四是机器人类型差异，服务和陪伴机器人重自然交互、低时延和可打断，工业和协作机器人重安全和权限、更适合封闭指令集，仓储和巡检机器人重任务主线、听觉只是辅助不能影响导航安全。第五是算力与供电，本地算力弱会让前端处理和后端推理互相拖累，电池供电还要控制功耗。"}, {"lead": "", "text": "再看外部客观因素，包括空间混响、背景噪声、说话距离、说话角度、多人同时说话、网络延迟、本地算力和电源功耗。不能只笼统地写“环境复杂”，而要展开：教室、走廊、大厅的反射条件差异很大，同一系统在不同空间表现可能不同；多人场景下系统不仅要识别准，还要先判断该听谁，这就和区分目标用户连在一起；若系统依赖云端识别和合成，网络是否稳定会直接影响交互体验，本地算力太弱也会拖慢前端和通信。真正可用的系统，是在这些条件变化时仍能基本稳定工作的系统，而不是安静实验室里偶尔成功一次的系统。"}]}, {"title": "九、高噪声场景怎么去噪", "silu": "核心立意「去噪不是加一个降噪算法，而是从前端到系统逻辑的多级过滤＋选鲁棒识别＋状态逻辑兜底」。分三层答：①前端三层过滤（VAD→能量阈值→最短语句时长，再配句尾静音＋最大时长）；②识别层选非自回归鲁棒模型 SenseVoice（含底噪字错率<8%）＋解析层容错映射使可用率＋17%；③系统层处理本体噪声（远离电机扬声器、按运动状态调灵敏度）与自播报噪声（状态机互斥＋抑制窗口）。把「多级过滤＋鲁棒模型＋状态兜底」三件套讲全。", "kw": ["多级过滤（非单一降噪）", "前端三层（VAD/能量阈值/最短语句时长）", "句尾静音＋最大时长", "非自回归鲁棒模型 SenseVoice", "字错率<8%", "容错词映射＋模糊匹配（可用率＋17%）", "本体噪声缓解（远离电机扬声器/按运动状态调灵敏度）", "自播报噪声（状态机互斥＋抑制窗口）"], "ans": [{"lead": "", "text": "去噪不是简单地加一个降噪算法，而是从前端到系统逻辑的多级过滤，再配合选对鲁棒的识别方案和用状态逻辑兜底。"}, {"lead": "", "text": "在前端，我们建立三层过滤。第一层是 WebRTC 语音活动检测，判断当前音频里有没有人在说话，把大段非语音过滤掉；第二层是能量阈值，把低幅度的环境噪声滤除；第三层是最短语句时长门限，把键盘声、咳嗽声这类短促碎片挡在识别之前，再配合句尾静音判定和最大语句时长控制切段。这样能大幅减少无效音频进入后端，既省算力又降低误触发。"}, {"lead": "", "text": "在识别方案上，我们选用对噪声更鲁棒的非自回归模型 SenseVoice，它在含底噪的室内环境里字错率仍能稳定在百分之八以下；同时在指令解析阶段建立容错词映射和模糊匹配规则，把高频误识别词纳入对应动作集合，使控制可用率提升约百分之十七。"}, {"lead": "", "text": "在系统层面，对机器人自身的本体噪声，靠把麦克风远离电机和扬声器、按运动状态调整监听灵敏度来缓解；对机器人自己播报造成的“噪声”，靠状态机互斥和抑制窗口来处理。多级过滤、鲁棒模型和状态兜底结合起来，系统才能在高噪声场景下保持可用。"}]}, {"title": "十、开发中遇到的问题与解决思路（听觉）", "silu": "用「现象→根因→解决」三段式逐条讲，覆盖八类问题。最加分的是把第③类（自回采/自触发）与硬件 AEC 失败的故事勾连，体现「从算法对消转向工程状态机根治」的认知升级。讲时点出每类背后的工程教训（严格关键词匹配会误杀有效命令、双链路共享音频导致抢麦）。答不完八类可挑最有代表性的四到五类，但每条都要根因到位、解决落地。", "kw": ["现象-根因-解决三段式", "①环境噪声误触发→三层过滤", "②播报含「系统：」前缀→LLM 到 TTS 加正则文本清洗", "③自回采自触发→播放期抑制＋文本相似度过滤（硬件 AEC 失败后改工程方案）", "④复杂问答延迟→fast_reply 分支＋压上下文＋限 max_new_tokens", "⑤误识别拉低可用率→容错映射＋模糊匹配（＋17%）", "⑥复合/连续控制→序列解析＋连续模式＋「停止」打断", "⑦声纹注册门禁→多段累计 3 秒＋阈值分场景＋短时缓存", "⑧模式冲突日志混乱→模式互斥＋子进程直通＋统一 JSONL"], "ans": [{"lead": "", "text": "开发过程中我们遇到并解决了以下几类典型问题，每一类都先分析现象、再找根因、最后给出解决办法。"}, {"lead": "第一类是环境噪声与误触发。", "text": "现象是有背景说话或杂音时，系统频繁触发识别，产生大量无意义文本。根因是单一的语音活动检测对噪声区分能力有限，切句门槛过低时短碎片音频也进入了后续链路。解决办法是建立前面所说的三层过滤，即语音活动检测、能量阈值和最短语句时长，不满足条件的片段直接丢弃，不进入识别、大模型和控制执行。"}, {"lead": "第二类是播报内容异常。", "text": "现象是问答时语音合成有时会把“系统：”这样的角色前缀也念出来，影响自然性。根因不是合成模块出错，而是大模型输出保留了对话角色标签，合成模块又直接对原始文本播报。解决办法是在大模型到语音合成之间加一个文本清洗函数，用正则表达式剥离“系统：”“助手：”等角色前缀和不适合朗读的格式符号，再交给合成模块。"}, {"lead": "第三类是自回采与自触发。", "text": "现象是机器人播报时麦克风又采到自身声音，导致重复识别甚至循环响应。根因是听觉输入和语音输出处于同一物理声场，缺少隔离时系统会把自身播报当成新的用户输入。解决办法是采用两层抑制：播放期间及结束后的短窗口内不接收新语音，并且如果新识别文本与最近播报内容高度相似就直接丢弃。我们正是在尝试硬件回声消除失败后，改用这套基于状态机互斥的工程方案才彻底根治了死循环。"}, {"lead": "第四类是复杂问答延迟偏高。", "text": "现象是简单问题响应快，但复杂问题在 CPU 环境下延迟明显增大，用户会觉得反应慢。根因是问答的主要瓶颈不在识别或声纹，而在大模型推理，如果所有问题都直接进大模型整体时延就偏高。解决办法不是盲目换模型，而是增加快速应答分支，让时间、日期、简单事实和简单计算这类问题优先走规则回复，同时压缩上下文长度、限制生成的最大新词数，从系统层面降低大模型的推理开销。"}, {"lead": "第五类是误识别拉低控制可用率。", "text": "现象是用户说“前进”，识别有时输出“前径”“钱进”“前景”，导致控制指令无法执行。根因是识别输出并不总是标准控制词，若解析器只做严格关键词匹配，就会把本该执行的命令误判为无效。解决办法是在指令解析器中加入容错词映射和模糊匹配规则，把高频误识别词纳入前进、后退、转向等动作集合，实测使控制可用率提升约百分之十七。"}, {"lead": "第六类是复合指令与连续控制支持不足。", "text": "现象是“左转前进三步”要拆成几句说，只说“前进”又不能持续运动，交互不自然。根因是旧解析器只支持单动作单参数，缺少动作序列语义和持续动作状态。解决办法是设计序列解析函数，按文本顺序扫描动作词、解析中文和阿拉伯数字，把自然语言转成动作对象列表；前进、后退不带步数时进入连续模式，收到“停止”时立即打断并清空持续动作。系统由此从“识别单一口令”升级为“控制意图的结构化解析”。"}, {"lead": "第七类是声纹注册与门禁稳定性。", "text": "现象是早期注册容易因停顿失败，控制模式下又频繁把本人也拒绝。根因是单段式注册对真实说话不友好，且问答与控制场景共用同一阈值，没有区分口令长度和音频质量。解决办法是把注册改成多段累计到三秒后完成，并按场景分别设置阈值，控制链路再加短口令阈值和短时通过缓存，降低重复误拒。"}, {"lead": "第八类是模式冲突与日志混乱。", "text": "现象是控制和问答同时运行时会抢麦，界面日志重复、乱序，与终端显示不一致。根因是系统存在界面内的控制线程和界面外的问答子进程两条链路，多源日志没有统一格式，又共享同一音频输入资源。解决办法是加入模式互斥机制，切换时只允许一条语音主循环运行，问答日志用子进程直通显示、只去掉控制字符不改业务文本，控制链路则统一用结构化日志并统一时间戳和去重策略。"}]}, {"title": "十一、复现开源项目的探索与反思", "silu": "先交代复现什么（开源 ROS2 语音控制机器人，Gazebo 里语音驱动运动，感知-决策-执行三层＋ros_gz_bridge 桥接，环境 Ubuntu24.04/ROS2 Jazzy/Gazebo Sim Harmonic/VMware）。再点核心现象「功能孤岛：语音端能听、控制端能发、仿真端能看，但连不成闭环」。然后锁定三层根因（物理执行层：缺关节与驱动插件、新 Gazebo 不支持旧二进制插件；通讯协议层：桥接消息格式与话题命名空间不一致；网络传输层：DDS 多网卡绑定＋回环隔离，外加仿真/现实时间不同步）。最后落金句——「上层控制代码的通用性，无法掩盖底层驱动环境的异构性」，并说明这促使你转向更可控的双链路方案。结论句是采分核心。", "kw": ["功能孤岛（能听/能发/能看但不闭环）", "Jazzy＋Gazebo Sim Harmonic＋VMware", "三层根因（物理执行层/通讯协议层/网络传输层）", "缺关节与驱动插件", "新 Gazebo 不支持旧二进制插件", "ros_gz_bridge 消息格式＋命名空间前缀＋显式 remapping", "DDS 多网卡发现失败＋回环隔离", "仿真/现实时间不同步", "结论「上层通用性掩盖不了底层异构性」", "从代码调试转向链路调试"], "ans": [{"lead": "", "text": "项目早期我们尝试复现一个开源的 ROS2 语音控制机器人项目，希望在 Gazebo 仿真里用语音指令驱动机器人运动。这个项目采用典型的感知、决策、执行三层架构，前端把麦克风音频转成文本，中间控制节点把关键词映射成速度控制消息，后端通过仿真插件驱动机器人，中间再用 ros_gz_bridge 做 ROS2 与 Gazebo 之间的消息桥接。复现环境是 Ubuntu 24.04、ROS2 Jazzy、Gazebo Sim Harmonic 和 VMware 虚拟机。"}, {"lead": "", "text": "复现中我们遇到了典型的“功能孤岛”现象：语音端能听、控制端能发、仿真端能看，但三者之间连不起来、无法形成真正闭环。经过深度排查，我们把问题锁定在三个层面。"}, {"lead": "", "text": "第一是物理执行层的问题，这是“信号能发到仿真里但机器人不动”的根本原因。自定义模型的描述文件里只有外观和碰撞属性，缺少关节和驱动插件，在物理引擎眼里它只是个静态刚体，没有把速度指令转成运动的出口；即便换成官方的 TurtleBot3 模型，由于 ROS2 Jazzy 配套的是新一代 Gazebo Sim，不再支持旧版 Gazebo Classic 的二进制驱动插件，模型虽然能显示却退化成不可控的视觉资源。"}, {"lead": "", "text": "第二是通讯协议层的问题。新一代中间件对桥接要求更严格，如果不精确声明消息的转换格式，桥梁就会直接拒绝转发；而且仿真器默认会给实体话题自动加前缀，控制节点发布的却是全局话题，在没有显式重映射的情况下，发送端和接收端看起来都叫同一个名字，实际上根本不在同一条逻辑通道里。"}, {"lead": "", "text": "第三是网络传输层的问题。虚拟机里同时存在虚拟网卡和本地回环地址，ROS2 节点可能绑定到虚拟局域网网卡，而仿真进程监听在本地地址上，结果控制节点发出的数据在操作系统网络栈层面就被隔离了，表面上节点都启动了，实际上数据包根本触达不到仿真内核。此外还有一个次生问题，虚拟机算力不足时仿真时间和现实时间严重不同步，前端按现实时间发的指令在仿真端看来已经过时而被丢弃。"}, {"lead": "", "text": "这次复现给我们的结论是：上层控制代码的通用性，无法掩盖底层驱动环境的异构性。在这类系统里写好控制逻辑只完成了很小一部分，真正决定闭环能否成立的是底层插件能不能挂上、桥接协议能不能对齐、话题命名是不是一致、网络发现有没有失效。它让我们第一次真切看到，一个机器人系统完全可能“每一层都看着正常，但整体就是不工作”。从此我们不再把项目理解成若干孤立模块，而是开始理解闭环本身，并把调试重点从代码调试转向链路调试。也正因踩过这些坑，我们后来才更坚定地采用更适合课程本地演示、更可控的双链路方案。"}]}, {"title": "十二、AI 工具是如何使用的", "silu": "先答用了什么（ChatGPT/Gemini 做错误分析，Trae/Codex 做代码指导），但重点讲「AI 角色随阶段演进的四个阶段」——调试助手（定位显性 bug）→系统拆解工具（理解架构/依赖/数据流/链路断点）→决策辅助工具（开发前评估路线可行性-优劣-成本、提前取舍）→排查隐患与优化（从能跑到更稳更好）。结尾必须有边界声明：「AI 方案都需结合任务主线和硬件约束反复追问筛选验证，它没替我们做项目」，体现诚实与主体性。阶段演进＋边界声明是亮点。", "kw": ["错误分析（ChatGPT/Gemini）", "代码指导（Trae/Codex）", "四阶段演进（调试助手/系统拆解/决策辅助/排查优化）", "从改 bug 到理解架构", "功能点理解→链路理解", "开发前评估可行性-优劣-成本", "提前架构取舍", "从「能跑」到「更稳更好」", "边界声明（需人工追问筛选验证）"], "ans": [{"lead": "", "text": "在本项目中，我们用 ChatGPT 和 Gemini 做错误分析，用 Trae 和 Codex 做代码指导。但更值得说的是 AI 在项目中扮演的角色随阶段不断变化，大致经历了四个阶段。"}, {"lead": "", "text": "第一阶段是项目调试助手。项目初期系统对我们来说是个黑盒，常见情况是程序不报错但结果不对、每一层都看似正常但整体行为不符合预期。这时我们主要把报错信息、相关代码段、配置文件以及预期行为与实际行为的差异一起提供给 AI，让它帮我们把问题定位到具体模块。"}, {"lead": "", "text": "第二阶段是系统拆解工具。随着复杂度上升，我们意识到问题往往不是某一行代码写错，而是出现在系统链路的断点上。这时 AI 的作用从改错转向帮助理解架构，识别模块之间的依赖关系、数据流向和接口协议。因为机器人听觉项目不是单一识别模块，而是采集、切段、识别、声纹、解析、执行、问答、合成等多个环节的协同，AI 帮我们从理解功能点转向理解整条链路。"}, {"lead": "", "text": "第三阶段是决策辅助工具，这是变化最大的一步。我们开始在开发之前就把目标功能、候选框架和硬件约束描述给 AI，让它分析不同路线的可行性、优劣和成本，从而提前做出架构取舍，而不是走弯路后再返工。"}, {"lead": "", "text": "第四阶段是排查隐患与优化工具。系统基本跑通后，我们用 AI 检查链路里哪些地方可能误触发、哪些参数在不同设备上不稳定、哪些日志现象背后是性能瓶颈，帮助系统从“能跑”提升到“更稳更好”。需要说明的是，AI 给出的方案都需要我们结合任务主线和硬件约束反复追问、筛选和验证，它没有替我们做项目，但显著提高了我们从问题到方案的迭代效率。"}]}, {"title": "十三、测试方案与结果（听觉）", "silu": "先讲方法学——「先定义指标再测量」：准确率（正确执行组数/总组数，且无误触发/自触发）、响应延迟（由结构化日志时间戳算，控制取文本到动作完成、问答取识别到播报完成，重复取平均）；再讲测试规模（3 台电脑×各 10 组控制＋10 组问答、多设备复现佐证稳定性）和用例覆盖（控制 6 类＋问答 7 类）。然后给数据：控制 97%、可用率＋17%、平均 0.12s；问答 100%、中日英三语、简单 0.21s、复杂 2.14s、连续 10 分钟无崩溃无自触发。最后一句对照任务书指标全部达成（≥80%/≤2s/连续运行/无自触发）。数字必须报准，是硬采分点。", "kw": ["先定义指标再测量", "准确率定义（正确执行且无自触发）", "延迟由 JSONL 时间戳计算", "3 台电脑×各 10 组", "多设备复现", "用例覆盖（控制 6 类＋问答 7 类）", "控制 97%/＋17%/0.12s", "问答 100%/中日英/简单 0.21s/复杂 2.14s", "连续 10min 无崩溃无自触发", "对照任务书全达成"], "ans": [{"lead": "", "text": "为保证结果可复现，我们先定义指标再测量。准确率定义为正确执行的组数与总组数之比，其中“正确”要同时满足动作或回答与预期一致、且过程中没有误触发或自触发；响应延迟直接由结构化日志的时间戳计算，控制取从发出控制文本到动作完成的时间差，问答取从识别完成到大模型输出或播报完成的时间差，每组重复测量取平均。测试在三台不同配置的电脑上进行，每台分别做十组控制和十组问答，用多设备复现来佐证稳定性。测试用例的设计覆盖了任务书要求的全部指标：控制方面覆盖基础动作、复合指令、连续运动、停止中断、误识别容错和跨设备复现，问答方面覆盖唤醒词、声纹门禁、基础问答、多语种交互、简单计算、复杂开放问题和自回采抑制。"}, {"lead": "", "text": "测试结果表明，控制链路在三台电脑共三十组复合与连续指令测试中综合准确率达到百分之九十七，容错策略使可用率提升约百分之十七，平均响应延迟约 0.12 秒，远优于任务书建议的不超过两秒。问答链路识别准确率达到百分之百，能稳定处理中、日、英多语种交互，简单问题因命中快速回复平均响应约 0.21 秒，复杂问题因需要大模型推理平均约 2.14 秒，系统连续运行十分钟以上没有崩溃，播报过程中没有出现自触发循环。这些数据全面达到了任务书关于识别准确率不低于百分之八十、响应延迟尽量不超过两秒、连续稳定运行和不得明显自触发的要求。"}]}, {"title": "十四、老师课上演示的智能语音助手是怎么实现的", "silu": "先破题——「本质不是一个模型包打天下，而是一条完整的实时语音工程链路」（前端降噪＋VAD→可能有 AEC→流式 ASR＋意图解析→TTS＋状态切换→播报期打断与冲突控制）。再答它为什么显得智能且能被打断的三个条件：播报时未完全失去监听、有优先级抢占机制（说「停一下/打断」能优先处理）、状态切换足够快（播报态↔监听态）。最后金句收尾——「让人觉得智能往往不是因为知道得多，而是在合适的时候做出合适的反应」，并点明与本项目双链路＋状态机思路一致。", "kw": ["实时语音工程链路（非单一模型）", "前端降噪＋VAD＋AEC", "流式 ASR＋意图解析", "TTS＋状态切换控制", "三条件（播报时保留监听/优先级抢占/状态切换快）", "高优先级打断（停一下/打断）", "金句「合适时候合适反应」", "听得稳-切得快-能打断-不被自己带跑", "呼应双链路＋状态机"], "ans": [{"lead": "", "text": "老师课上演示的智能语音助手，本质不是一个模型包打天下，而是一条完整的实时语音工程链路：前面有降噪和语音活动检测等前端判断，可能还有回声消除，中间有流式语音识别和意图解析，后面有语音合成和状态切换控制，还有播报期的打断与冲突控制。"}, {"lead": "", "text": "它之所以显得智能、并且能被打断，关键在三个条件。第一，系统在播报时没有完全失去监听能力，否则用户根本无法插话。第二，系统会判断什么输入更重要，当用户在机器人说话时说出“停一下”“打断”这类高优先级指令，系统能优先处理而不是机械地把原话说完，这背后一定有优先级抢占机制。第三，系统的状态切换足够快，能及时从播报状态切回监听状态，否则用户不会觉得它真能打断。"}, {"lead": "", "text": "可以总结说，一个语音系统让人觉得智能，往往不是因为它知道得多，而是因为它在合适的时候做出了合适的反应，也就是听得稳、切得快、能打断、不被自己的声音带跑、反馈能说明当前状态。这与我们项目里双链路加状态机的设计思路是一致的。"}]}, {"title": "十五、如果要在听觉任务上做进一步拓展，可以怎么做、做什么", "silu": "用感知层/系统层/交互层＋落地层，每个方向都「既说做什么、也说怎么做」。感知层：面向儿童适配（误读词表/儿童语音增强/ASR 微调）＋硬件升级到麦克风阵列＋声源方向＋独立回采＋真正 AEC。系统层：重构成「共享前端＋意图路由＋专用任务模块」，配置中心化、依赖瘦身、自动化回归测试。交互层：家长管理员权限落地（时长/区域/分级命令）＋可打断＋情绪识别＋长期记忆＋故事陪伴学习辅导＋引导式追问（不直接判失败）。落地层：从 3D 仿真迁到真实移动平台＋参考 ROS 模块化节点接口＋多传感器融合。拓展题要「方向清晰＋怎么做具体」，避免空喊。", "kw": ["感知层（儿童误读词表/儿童语音增强/ASR 微调/麦克风阵列/声源方向/独立回采/真正 AEC）", "系统层（共享前端＋意图路由＋专用任务模块/配置中心化/依赖瘦身/自动化回归测试）", "交互层（家长权限落地:时长-区域-分级命令/可打断/情绪识别/长期记忆/故事陪伴学习辅导/引导式追问）", "落地层（真机迁移/ROS 模块化节点/多传感器融合）"], "ans": [{"lead": "", "text": "如果在现有系统基础上继续拓展，我们会从感知层、系统层和交互层三个方向推进，每个方向都既说清做什么、也说清怎么做。"}, {"lead": "", "text": "在感知层，重点是提升复杂场景下的鲁棒性，尤其是面向儿童的适配。现有系统主要依赖通用语音识别和容错解析，对儿童发音不清、语速不稳、表达不完整的情况处理不足。做法是建立儿童常见误读词表、引入儿童语音增强模型、并针对儿童发音特点对识别模型做微调；同时在硬件上从单麦克风升级到麦克风阵列，加入声源方向估计和独立回采通道，把目前用工程状态机实现的防自触发，进一步配合真正的声学回声消除，从而在更嘈杂、更远场的真实家庭环境里稳定工作。"}, {"lead": "", "text": "在系统层，重点是统一架构、减少工程债。当前控制链路和问答链路虽然共享麦克风和前端切段，但后续处理偏分散，又存在模型路径硬编码、依赖臃肿、双实现并存的问题。做法是把系统重构成“共享前端加意图路由加专用任务模块”的形式，先统一完成唤醒、语音活动检测和识别，再根据识别文本、说话人身份和意图类型路由到控制模块或问答模块，从而减少重复计算、提高复用率；同时把路径、阈值和模式开关做配置中心化，给依赖瘦身，并引入自动化回归测试，使系统更容易跨设备迁移和长期维护。"}, {"lead": "", "text": "在交互层，重点是把陪伴机器人的产品能力做完整。做法是把家长管理员权限真正落地，实现使用时长控制、区域访问约束和分级命令权限；在交互体验上加入可打断交互、情绪识别和长期交互记忆，并围绕儿童场景扩展故事陪伴、学习问答和数学语文辅导等功能；当系统无法准确理解儿童表达时，不直接判失败，而是通过追问、选项提示或语音确认来引导儿童把意图说清楚，提升真实使用中的交互成功率。"}, {"lead": "", "text": "最后，在落地层面，可以把目前主要在三维仿真中验证的运动控制迁移到真实移动机器人平台，参考 ROS 的模块化通信思想设计统一的节点接口，并结合激光雷达、视觉或超声波等传感器实现更完整的多传感器融合，使小千从课程项目原型逐步走向产品化雏形。"}]}]}, {"name": "第二部分　视觉任务：校园服务机器人语义导航系统", "questions": [{"title": "一、本项目的技术路线是什么", "silu": "先点平台（ROS2 Humble＋Gazebo）和「语义导航」的含义（不按坐标盲走，理解「快递站/0826 包裹/苹果」等语义对象再决策），再给任务剧情（约 10m×8m 校园，教室出发→快递站取件→水果店取物→宿舍送达）。然后按五层层次化架构作答（仿真物理层/传感器与桥接层/定位导航层/语义感知层/任务调度层），最后讲两条核心数据流（定位与导航流、语义任务流）。架构分层讲清、数据流讲清两条线如何在任务服务器汇合。", "kw": ["ROS2 Humble＋Gazebo", "语义导航（理解语义对象再决策）", "10m×8m 校园四点剧情", "五层架构（仿真物理/传感器桥接/定位导航/语义感知/任务调度）", "话题＋动作接口通信", "两条数据流（定位导航流/语义任务流）", "ros_gz_bridge", "SLAM Toolbox", "AMCL", "Nav2", "语义视觉节点", "MissionServer", "RViz"], "ans": [{"lead": "", "text": "本项目基于 ROS2 Humble 与 Gazebo 仿真平台，实现一个校园服务机器人语义导航系统，完成“环境感知、地图构建、定位、路径规划、自主导航、反馈”的完整闭环。这里的语义导航指机器人不只是按一个坐标盲走，而是能理解“快递站”“0826 号包裹”“苹果”这些语义对象并据此决定行为。机器人在约十米乘八米的仿真校园里完成从教室出发、到快递站识别取件、到水果店识别取物、最后返回宿舍送达的完整服务过程。"}, {"lead": "", "text": "系统按层次化原则分成五层，各层之间用 ROS2 的话题和动作接口通信。最底层是仿真物理层，由 Gazebo 提供校园场景、差速驱动机器人模型以及激光雷达和相机传感器。第二层是传感器与桥接层，由 ros_gz_bridge 把 Gazebo 的消息转换成 ROS2 标准话题，主要包括时钟、里程计、激光、相机图像和速度指令。第三层是定位导航层，由地图服务、自适应蒙特卡洛定位以及 Nav2 的规划器、控制器、行为树导航器和速度平滑器组成。第四层是语义感知层，由语义视觉节点实现，订阅相机图像、在 HSV 颜色空间做轻量识别、输出结构化检测结果。第五层是任务调度层，由自研的任务服务器实现，维护任务状态机、通过导航动作接口驱动机器人完成各语义子任务，并把任务状态可视化到 RViz。"}, {"lead": "", "text": "系统有两条核心数据流。一条是定位与导航流：预先保存的静态地图由地图服务发布，定位模块用实时激光和地图做配准算出全局位姿，全局规划器据此算出路径，局部控制器沿路径生成速度，经速度平滑后驱动底盘，里程计再把真实位姿反馈回来形成闭环。另一条是语义任务流：相机图像进入语义视觉节点做颜色识别，识别结果交给任务服务器判断当前取物或配送步骤是否完成，任务服务器再向导航下发新的目标，整个过程的状态对外广播并在 RViz 中可视化。"}]}, {"title": "二、本项目的基本模块和常用方法有哪些", "silu": "和听觉 Q2 同构，按「职责＋常用方法＋本项目选型」逐模块作答，覆盖仿真与传感器、建图、定位、规划与控制、语义感知、任务编排、可视化七块。每块点出行业通法（建图=激光 SLAM、定位=粒子滤波 AMCL、规划=全局＋局部、语义=颜色/基准标记/深度学习），再给本项目落地（SLAM Toolbox/AMCL/Navfn＋RPP/HSV/任务服务器/RViz）。", "kw": ["仿真与传感器（Gazebo＋URDF＋ros_gz_bridge）", "建图（激光 SLAM/SLAM Toolbox 在线异步＋前沿探索）", "定位（粒子滤波 AMCL）", "规划与控制（全局 Navfn＋局部 RPP＋代价地图＋速度平滑）", "语义感知（颜色识别/ArUco 基准标记/深度学习→HSV 阈值）", "任务编排（有限状态机/MissionServer）", "可视化（RViz 标记数组）"], "ans": [{"lead": "", "text": "本项目的基本模块和各自常用方法如下。"}, {"lead": "仿真与传感器模块", "text": "，提供虚拟环境和传感数据，方法是用 Gazebo 加机器人统一描述文件构建场景与机器人，用 ros_gz_bridge 桥接消息。"}, {"lead": "建图模块", "text": "，在未知环境里同步定位并构建地图，常用方法是激光 SLAM，本项目用 SLAM Toolbox 的在线异步模式做二维占据栅格建图，并用前沿探索自动驱动机器人遍历。"}, {"lead": "定位模块", "text": "，在已知地图上实时估计机器人位姿，常用方法是基于粒子滤波的自适应蒙特卡洛定位。"}, {"lead": "路径规划与运动控制模块", "text": "，负责算路径和跟踪路径，常用方法是全局规划加局部控制，本项目全局用基于栅格搜索的 Navfn 规划器，局部用调节型纯追踪控制器，并配代价地图做避障、配速度平滑器让运动平稳。"}, {"lead": "语义感知模块", "text": "，把图像转成“看到了什么”的语义信息，常用方法有基于颜色的识别、基准标记识别和深度学习检测，本项目用 OpenCV 的 HSV 颜色阈值做轻量识别。"}, {"lead": "任务编排模块", "text": "，把高层服务任务拆成子步骤顺序执行，常用方法是有限状态机，本项目用自研的任务服务器驱动语义服务流程。"}, {"lead": "可视化模块", "text": "，实时展示任务进度，方法是用 RViz 的标记数组显示地点、目标和状态。"}]}, {"title": "三、选型是怎么做的，为什么不选别的方案", "silu": "先给统一原则——「4 核 8G 虚拟机资源受限下，优先轻量、确定、可解释、能稳定跑通，把更先进更重的方案作为扩展对比」。再逐项「选了什么＋为什么不选另一个＋被否硬伤」：局部控制 RPP 不选 MPPI（随机采样吃 CPU、虚拟机下「成功但速度全 0」）、全局 Navfn 不选 Smac Hybrid（混合 A* 更重、配置慢、小场景路径不稳）、语义 HSV 不选 YOLO（CPU 慢/依赖重/黑箱）、定位静态地图＋AMCL 不选现场建图（建图与运行分离、保答辩录屏可复现）。每个否定项点工程取舍而非技术做不到（「不是调不出 MPPI，而是不划算」），这句最体现工程判断力。", "kw": ["选型原则（轻量/确定/可解释/稳定跑通）", "RPP vs MPPI（随机采样吃 CPU/「成功但速度全 0」/「不是调不出而是不划算」）", "Navfn vs Smac Hybrid（混合 A* 重/配置慢/小场景路径不稳）", "HSV vs YOLO（CPU 慢/依赖重/黑箱不可解释）", "静态地图＋AMCL vs 现场建图（建图与运行分离/工业界标准/录屏可复现/建图单独演示隔离输出）"], "ans": [{"lead": "", "text": "本项目的选型贯穿一个原则：在四核八G的虚拟机这种资源受限环境下，优先选择轻量、确定、可解释、能稳定跑通的方案，把更先进但更重的方案作为报告里的扩展和对比。"}, {"lead": "局部控制器选调节型纯追踪，而不是 MPPI。", "text": "MPPI 是模型预测路径积分控制，它在每个控制周期随机采样多组未来速度序列，用运动模型预测每条轨迹并计算代价，再选代价最低的速度指令，效果好但非常吃 CPU。调节型纯追踪只需在路径上取一个前视点，用几何方法算出追上它所需的曲率和角速度，并在大曲率转弯和靠近障碍时自动降速，计算量小、行为确定。在我们的虚拟机里，MPPI 出现过“动作声明成功但速度输出全为零”的不稳定现象，而纯追踪稳定得多，所以果断改用纯追踪。这不是调不出 MPPI，而是不划算，课程更看重系统稳定跑通，这恰恰体现了工程判断力。"}, {"lead": "全局规划器选 Navfn，而不是 Smac Hybrid。", "text": "Smac Hybrid 是带运动学约束的混合 A 星，在搜索时同时考虑机器人位置和朝向、生成更符合转弯约束的平滑路径，适合阿克曼底盘或大场景，但更重，在虚拟机里配置极慢、产生的路径在小场景里也不稳。Navfn 基于栅格代价地图做 Dijkstra 或 A 星搜索，算出从当前位置到目标点总代价最低的全局路径，对小场景的差速机器人足够用且更稳定。"}, {"lead": "语义视觉选 HSV 颜色阈值，而不是 YOLO。", "text": "YOLO 这类深度模型在 CPU 上推理慢、依赖重，对八G的虚拟机不友好，而且是黑箱不可解释。HSV 颜色识别计算量小、可解释、CPU 能跑，能说清楚为什么把某物体判成苹果，代价是对光照和材质较敏感，这一点我们如实列为已知局限，并把 YOLO 作为未来升级方向。"}, {"lead": "定位选静态地图加自适应蒙特卡洛定位，而不是现场建图。", "text": "这是工业界标准做法，把建图和运行分离。现场 SLAM 在虚拟机上有渲染和时间同步的不确定性，用预先验证过的静态地图加粒子滤波定位能保证答辩录屏的可复现性，建图能力则单独演示并且输出与主线地图隔离。"}]}, {"title": "四、本项目需要哪些传感器配置，迁移到真实机器人需要哪些器件", "silu": "分「仿真配置」和「迁移真机」两块。仿真：二维激光雷达（建图/定位/避障/前沿探索）、RGB 相机 640×480（语义识别/可视化）、里程计（差速插件按轮速发布、必要时加 IMU）；并区分外部传感器（激光/相机感知环境）vs 内部传感器（里程计/IMU 感知自身）。迁移真机：差速底盘（含编码器轮组提供里程计）、二维激光雷达（看量程/扫描频率/精度）、RGB 或深度相机（要三维定位/视觉伺服选深度）、IMU、本地计算单元（工控机/Jetson）、电源管理。最后给选型原则——轻量化＋算力匹配（激光测距、相机理解，别在受限平台硬上高带宽高算力）。", "kw": ["仿真三传感器（2D 激光雷达/RGB 相机 640×480/里程计＋IMU）", "外部 vs 内部传感器（环境感知/自身状态）", "激光用途（建图-定位-避障-前沿探索）", "迁移器件（差速底盘＋编码器轮组/2D 激光雷达看量程频率精度/RGB 或深度相机/IMU/本地计算单元工控机 Jetson/电源管理）", "选型原则（轻量化＋算力匹配/激光测距＋相机理解）"], "ans": [{"lead": "", "text": "在仿真中，机器人配置了三类传感器。一是二维激光雷达，挂在底盘前上方，发布激光扫描数据，用于建图、定位、代价地图避障和前沿探索；二是 RGB 相机，分辨率六百四十乘四百八十，发布图像，用于语义识别和可视化；三是里程计，由差速驱动插件根据轮速发布，提供自身位姿，必要时还可加惯性测量单元辅助姿态。其中激光雷达和相机是外部传感器，负责感知环境；里程计和惯性测量单元是内部传感器，负责感知自身状态。"}, {"lead": "", "text": "如果把系统迁移到真实机器人，需要购买的器件包括：一台差速驱动底盘，含两个驱动电机和带编码器的轮组以提供里程计；一台二维激光雷达，负责几何测距和建图，选型时关注量程、扫描频率和精度；一台 RGB 相机或深度相机，负责语义识别，若要做三维定位和视觉伺服则选深度相机；一个惯性测量单元辅助姿态估计；一个本地计算单元，如工控机或 Jetson，负责运行导航与识别；以及相应的电源和供电管理。选型时遵循轻量化和算力匹配原则，几何感知用低消耗的激光雷达负责测距、语义识别用普通相机负责理解，避免在算力受限的平台上强行使用高带宽高算力的方案。"}]}, {"title": "五、SLAM 建图是怎么做的，原理是什么", "silu": "先给 SLAM 定义（未知环境里边建图边定位），再点本项目用 SLAM Toolbox 在线异步（ROS2 最成熟二维激光 SLAM、图优化方法）。原理三段：前端激光扫描匹配估相邻位移并建位姿图（节点=位姿、边=约束）→后端 Ceres 求解器做非线性最小二乘优化→回环检测加约束消累积漂移；「在线异步」=实时处理激光不阻塞主线程。再讲产物（0.05m 分辨率二维占据栅格、栅格存占据概率、占据/空闲/未知三态、map_saver 存 YAML＋PGM），最后讲遍历方式（前沿探索找已知/未知交界、确定性巡航兜底）。「位姿图＋图优化＋回环」三件套是采分核心。", "kw": ["SLAM 定义（边建图边定位）", "SLAM Toolbox 在线异步", "图优化方法", "前端扫描匹配＋位姿图（节点位姿/边约束）", "后端 Ceres 非线性最小二乘", "回环检测消漂移", "在线异步=不阻塞主线程", "0.05m 占据栅格（占据概率/占据-空闲-未知）", "map_saver 存 YAML＋PGM", "前沿探索＋确定性巡航兜底"], "ans": [{"lead": "", "text": "SLAM 即同步定位与建图，指机器人在未知环境里一边构建地图、一边确定自己的位置。本项目用 SLAM Toolbox 的在线异步模式，它是 ROS2 生态里最成熟的二维激光 SLAM，属于图优化方法。它的工作过程是：前端用激光扫描匹配估计机器人相邻时刻的位移，并构建一张位姿图，图里的节点是机器人位姿、边是位姿之间的约束；后端用 Ceres 求解器对这张位姿图做非线性最小二乘优化；当机器人回到曾经走过的地方时，回环检测会加入新的约束来消除累积漂移。在线异步的含义是实时处理激光扫描而不阻塞主线程。"}, {"lead": "", "text": "机器人一边走，激光一边和已有地图配准，实时生成一张分辨率为零点零五米的二维占据栅格地图，每个栅格存的是被占据的概率，常见有占据、空闲和未知三种状态，最后用地图保存工具存成 YAML 和 PGM 两个文件。驱动机器人遍历建图我们用前沿探索方法，让机器人自动寻找已知区域和未知区域的交界、不断前往这些交界点扩大已知区域，必要时还有确定性巡航作为兜底。"}]}, {"title": "六、AMCL 定位是怎么做的，为什么需要它", "silu": "分「怎么做」和「为什么」。怎么做：AMCL=基于粒子滤波的概率定位，一群带权粒子近似位姿分布；三步（预测：里程计运动模型推进粒子→更新：激光与地图匹配度做似然加权打分→重采样：高分复制低分淘汰、粒子云收敛）；「自适应」=按收敛程度动态调粒子数省算力；关键输出=地图坐标系→里程计坐标系的变换。为什么需要：纯里程计轮速积分会累积漂移越走越偏，AMCL 用激光匹配地图周期性修正；机器人准确位姿=AMCL 给的 map→odom 修正量叠加里程计的 odom→base_link。本项目差速运动模型＋原点自动初始化。把「粒子滤波三步＋输出 map→odom＋修正里程计漂移」讲全。", "kw": ["粒子滤波概率定位", "带权粒子近似位姿分布", "三步（预测-里程计运动模型/更新-激光观测似然加权/重采样-收敛）", "自适应=动态调粒子数", "关键输出 map→odom 变换", "纯里程计累积漂移", "激光匹配地图修正漂移", "位姿=map→odom 叠加 odom→base_link", "差速运动模型＋原点自动初始化"], "ans": [{"lead": "", "text": "AMCL 即自适应蒙特卡洛定位，是一种基于粒子滤波的概率定位方法。它用一群带权重的粒子来近似机器人位姿的概率分布，每个粒子代表机器人可能在的一个位姿。工作过程分三步：预测时用里程计运动模型推进所有粒子；更新时用激光观测与已知地图的匹配程度给每个粒子打分、做似然加权；重采样时让高分粒子被复制、低分粒子被淘汰，粒子云逐渐收敛到真实位姿。所谓自适应，是指用一种采样方法按收敛程度动态调整粒子数量以节省算力。它的关键输出是地图坐标系到里程计坐标系的变换。"}, {"lead": "", "text": "之所以需要它，是因为纯里程计靠轮速积分会累积漂移、越走越偏，而 AMCL 用激光匹配已知地图能周期性地修正这个漂移。机器人在地图中的准确位姿，正是由 AMCL 给出的地图到里程计的修正量，叠加里程计给出的里程计到机器人本体的变换，两者拼起来得到的。本项目采用差速运动模型，并在启动时用原点自动初始化定位，省去了手动指定初始位姿。"}]}, {"title": "七、Nav2 导航框架是怎么工作的", "silu": "先点 Nav2 是 ROS2 官方导航框架、由生命周期节点组成、核心用一棵行为树组织导航逻辑（调全局规划器算路径、调局部控制器跟踪、失败时触发旋转/后退/等待恢复行为）。再讲全局 Navfn（全局代价地图 Dijkstra/A*、允许穿越未知）、局部 RPP（取前视点几何算曲率角速度、大曲率与近障自动降速）、代价地图三层（静态层/障碍层实时激光/膨胀层按半径加粗留安全距离，局部滚动窗口避障＋全局覆盖规划）、速度平滑器限加减速突变。最后强调关键工程处理——故意放宽 yaw 朝向容差让「到点即成功」、不原地反复纠正、精确朝向由任务层到点二次对准（避免小地图超时失败）。「放宽朝向容差＋二次对准」是视觉高频追问点。", "kw": ["ROS2 官方框架/生命周期节点", "行为树组织（全局规划＋局部跟踪＋恢复行为旋转-后退-等待）", "Navfn 全局（代价地图 Dijkstra/A*/允许穿越未知）", "RPP 局部（前视点几何/大曲率近障降速）", "代价地图三层（静态/障碍-实时激光/膨胀-按半径加粗）", "局部滚动窗口＋全局覆盖", "velocity_smoother 限加减速", "放宽 yaw 容差「到点即成功」", "任务层二次对准（避免小地图超时）"], "ans": [{"lead": "", "text": "Nav2 是 ROS2 官方推荐的导航框架，由一组生命周期节点组成，核心是用一棵行为树来组织导航逻辑。行为树负责调用全局规划器算出路径、调用局部控制器跟踪路径、并在导航失败时触发旋转、后退、等待这类恢复行为。"}, {"lead": "", "text": "全局规划用 Navfn 规划器，它在全局代价地图上做 Dijkstra 或 A 星搜索，算出从当前位置到目标点总代价最低的无碰撞路径，并允许穿越尚未探明的区域。局部控制用调节型纯追踪控制器，它在路径上取一个前视点、用几何方法算出追上它所需的曲率和角速度，并在大曲率和靠近障碍时自动降速。代价地图分三层，静态层来自地图，障碍层来自实时激光用于处理动态障碍，膨胀层按机器人半径把障碍加粗、留出安全距离；局部代价地图是机器人周围一个滚动窗口做实时避障，全局代价地图覆盖整张图做规划。控制器输出的速度还要经过速度平滑器限制加减速突变，再变成最终速度指令驱动底盘。"}, {"lead": "", "text": "这里有一个关键的工程处理：我们故意把导航的最终朝向容差放得很宽，让机器人到点就算成功，不在终点反复原地纠正朝向，避免在小地图里因反复微调而超时失败；真正需要的精确朝向，由任务层在到点后再二次对准来保证。"}]}, {"title": "八、语义视觉识别是怎么做的", "silu": "先答用 OpenCV 在 HSV 空间做轻量识别（非深度学习），讲清为什么用 HSV——色相/饱和度/明度分离，颜色信息集中在 H 通道，光照引起的亮度变化隔离在 V 通道，按色相判颜色比 RGB 更抗光照。再讲识别流程（转 OpenCV 格式缩放→裁中心 ROI→转 HSV→对红蓝黄绿橙白用阈值生成掩膜统计占比→超阈值判物体；多色物体如三色快递包裹做组合判定避免拆成三误报）。然后讲两个诚实性保障（图像质量判断：ROI 灰度标准差＋饱和像素比例低则判空抑制；任务状态过滤：只有到达当前任务地点且检测到当前目标才算数）。结尾金句「识别真正基于相机图像算出来、识别不到就报失败、绝不用到达坐标冒充识别成功」。诚实性两条是视觉加分点。", "kw": ["OpenCV＋HSV（非深度学习）", "HSV 为何抗光照（H 色相/S 饱和度/V 明度分离/亮度隔离在 V）", "流程（缩放→中心 ROI→HSV→inRange 掩膜统计占比→超阈值判定）", "多色组合判定（三色包裹不拆成三误报）", "图像质量判断（灰度标准差＋饱和像素比例→判空抑制）", "任务状态过滤（到达当前地点＋当前目标才算数）", "金句「识别不到即失败/不用坐标冒充」"], "ans": [{"lead": "", "text": "语义视觉识别用 OpenCV 在 HSV 颜色空间做轻量识别，而不是深度学习。之所以用 HSV，是因为它把颜色的色相、饱和度和明度分开，颜色信息主要集中在色相通道，而光照引起的亮度变化被单独隔离在明度通道，所以按色相判断颜色比直接用 RGB 更能抵抗光照变化。"}, {"lead": "", "text": "识别流程是：先把相机图像转成 OpenCV 格式并缩放，裁出图像中心的感兴趣区域，转到 HSV 空间，对红、蓝、黄、绿、橙、白等颜色分别用阈值生成掩膜、统计各颜色像素的占比，占比超过阈值就判定对应物体。对由多种颜色组成的物体，比如蓝黄红三色条的快递包裹，做组合判定，避免把一个包裹拆成三个误报。为了保证识别诚实可靠，我们加了防误报机制：先计算感兴趣区域的灰度标准差和饱和像素比例，如果画面空白或低纹理就直接输出空结果、抑制识别；同时用任务状态来过滤，只有机器人到达当前任务地点、且检测到的正是当前任务目标时识别才算数，这样机器人路上瞥见一抹颜色不会被误判成到了目的地。我们强调识别是真正基于相机图像算出来的，识别不到就明确报失败，绝不用“到达坐标”来冒充识别成功。"}]}, {"title": "九、任务编排是怎么做的，MissionServer 状态机如何运行", "silu": "先点任务服务器是语义服务核心、本质有限状态机。再走一遍状态机流程（以取 0826 包裹为例：空闲→导航到观察点→原地转正对货架→等待视觉确认目标→导航到取物点→停约 2 秒模拟取件→送达宿舍→完成；取快递＋取水果＋送宿舍串成 campus_demo）。然后讲三个设计要点：①高层语义与底层导航解耦（业务不写进行为树、Nav2 管导航、任务服务器管编排、只通过标准接口通信、可独立排查；并解释为何不把业务塞进行为树——行为树适合通用导航＋恢复，「先识别再取再送」是业务逻辑，塞进去会强耦合难复用）；②支持暂停/取消/继续（手动干预要求）；③到点二次对准（Nav2 放宽朝向容差不保证车头，任务服务器读 TF 用 /cmd_vel 精确转向，比收紧 Nav2 容差更稳）。补一句取物点是配置文件人工标定、视觉只确认存在不做三维位姿估计。「解耦＋为何不塞行为树＋二次对准」三点是采分核心。", "kw": ["任务服务器=有限状态机", "状态流程（空闲→观察点→转正→等待视觉确认→取物点→模拟取件 2s→送达→完成）", "campus_demo 串接", "高层语义与底层导航解耦", "为何不塞行为树（行为树管通用导航＋恢复/业务逻辑会强耦合难复用/关注点分离）", "暂停-取消-继续（手动干预）", "到点二次对准（读 TF＋/cmd_vel/比收紧 Nav2 容差更稳）", "取物点人工标定＋视觉只确认存在不做三维位姿估计"], "ans": [{"lead": "", "text": "任务编排由我们自研的任务服务器实现，它是整个语义服务能跑起来的核心，本质是一个有限状态机。以“去快递站取 0826 号包裹”为例，它的运行过程是：从空闲状态出发，先导航到快递站的观察点；到点后原地转正、让相机正对货架；然后等待视觉确认目标包裹；确认到了，再导航到包裹正前方的取物点；停留约两秒模拟取件；最后送达宿舍，状态变成完成。把取快递、取水果、送宿舍这几段串起来就是完整的校园配送演示。"}, {"lead": "", "text": "它有三个设计要点。第一是高层语义与底层导航解耦，业务逻辑没有写进 Nav2 的行为树，导航交给 Nav2、任务编排交给任务服务器、两者只通过标准接口通信，任何一层出问题都能独立排查。这里要解释为什么不把任务逻辑塞进行为树：行为树适合编排导航加恢复这类通用机器人行为，而“先识别再取再送”是业务逻辑，写进行为树会让导航和业务强耦合、难以复用，所以用状态机承载业务、行为树只管导航与恢复，是更清晰的关注点分离。第二是支持任务的暂停、取消和继续，满足任务书的手动干预要求。第三是到点后的二次对准，因为 Nav2 为了保证成功率放宽了朝向容差、不保证车头方向，任务服务器在到点后会自己读取坐标变换、用速度指令把车头精确转到目标朝向，保证相机正对识别区域，这比收紧 Nav2 的朝向容差更稳、也不影响长距离导航。需要说明的是，物体正前方的取物点是在配置文件里人工标定的，视觉只负责确认目标存在、不做三维位姿估计，这降低了复杂度和不确定性。"}]}, {"title": "十、智能小车为什么要做多传感器融合（激光雷达加视觉）", "silu": "一句话定调——激光提供「在哪里」（空间位置/几何/安全底线），视觉提供「是什么」（语义/特征/智能上限）。再从四角度展开：①优劣互补与全天候（相机识类型颜色文字但暗光强光致盲、无原生测距；激光高精度测距三维建图不受光线但不认颜色纹理语义；暗处靠激光、光足时视觉介入）；②消除物理盲区（单一高位传感器车头正下方和四周有三角盲区，蹲着小孩/宠物/矮家具测不到，要组合不同位置类型）；③带宽与算力（深度相机彩色＋深度流数据量大吃算力，激光点云稀疏简单可直接给距离，受限平台用激光测距＋普通相机语义）；④分工协作（导航避障靠激光厘米级停靠＋相机辨障类型，语义交互靠相机锁目标＋激光精确定位才能执行「走到沙发旁/避开婴儿区」）。最后点本项目正是这种融合。", "kw": ["激光「在哪里」（位置/几何/安全底线）vs 视觉「是什么」（语义/特征/智能上限）", "优劣互补全天候（相机暗光强光致盲无测距/激光不受光线不认语义）", "消除物理盲区（三角盲区/蹲着小孩-宠物-矮家具/组合不同位置类型）", "带宽算力（深度相机数据量大/激光点云稀疏可直接给距离）", "分工协作（激光厘米级停靠＋相机辨障/相机锁目标＋激光定位执行复合指令）", "本项目融合（激光几何主干＋相机语义/任务服务器汇合）"], "ans": [{"lead": "", "text": "小车不能只依赖单一的激光雷达或摄像头，因为单一传感器在物理特性上有天然短板；同时用两者是为了实现“精准感知加语义理解”的深度互补。一句话概括，激光雷达提供的是“在哪里”，负责空间位置和几何结构，是确保车辆碰不到的安全底线；视觉相机提供的是“是什么”，负责物体语义和特征，是让车辆看得懂的智能上限。"}, {"lead": "", "text": "具体可以从四个角度说明。第一是优劣互补与全天候适应。视觉相机擅长识别物体类型、颜色和文字标签，但在暗光或强光下容易致盲，且缺乏原生的精准测距能力；激光雷达擅长高精度测距、三维建图和可靠避障，完全不受光线影响，但无法识别颜色、纹理和语义。黑暗中靠激光独立保证基础导航与避障，光线充足时视觉介入提供场景理解。第二是消除物理盲区。受安装高度和垂直视场角限制，单一高位传感器在车头正下方和车身四周会形成三角盲区，蹲着的小孩、宠物或矮家具这类贴身障碍可能完全测不到，必须组合不同位置和类型的传感器才能实现无死角感知。第三是带宽与算力。深度相机要同时输出高分辨率的彩色流和深度流，数据量大、占带宽、吃算力；激光雷达输出的是稀疏而结构简单的点云，数据量小、可直接给出物理距离。在电池供电、算力受限的小车上，更合理的是用低消耗的激光雷达负责测距、用普通相机负责语义识别。第四是分工协作，导航避障靠激光做厘米级精准停靠、相机辅助辨别障碍类型来决定绕行策略，语义交互靠相机锁定目标、再结合激光的精确定位才能执行“走到沙发旁”“避开婴儿区”这类复合指令。本项目的视觉任务正是这种融合的实践，主线用激光负责建图、定位和避障的几何主干，用相机负责物体语义识别，两条线在任务服务器汇合做决策。"}]}, {"title": "十一、开发中遇到的问题与解决思路（视觉）", "silu": "先亮方法论——「分层排查：先看节点生命周期是否激活→再看话题有无发布者和数据→再看 TF 通不通、时间戳对不对，层层定位不盲目调参」。再用「现象→根因→解决」讲最有代表性的几个，最核心是仿真时间轴混用（Nav2 报「变换数据太旧」＋秒判到达却不动；根因 Gazebo/TF 用仿真时间十几秒、部分节点用墙上时间 17 亿秒差约 56 年；解决三步：全节点＋RViz 设 use_sim_time、发目标时间戳设 0 用最新可用变换、清残留进程重启）。其余可挑讲：导航秒成功不动（到达检查器残留＋MPPI「成功但速度 0」→stateful=false＋换 RPP）、静态地图报「map 坐标系不存在」三轮排查（补地图参数→加自动初始位姿→重写行为树路径）、任务服务器崩溃（变量名撞基类私有字段→改名）、机器人 spawn 卡住（DDS 发现失败→ROS_LOCALHOST_ONLY=1＋把 spawn 改成展开 URDF 字符串直传、成功率 100%）、空白画面误报牛奶盒（图像质量判空）、速度桥接失效（重复广告＋消息类型不对→统一一个话题＋正确类型＋轮关节名对齐）。时间轴和三轮排查最能体现集成能力与排查深度。", "kw": ["分层排查方法论（节点生命周期→话题发布者与数据→TF 与时间戳）", "仿真时间轴混用（「变换数据太旧」＋秒判到达/仿真时间 vs 墙上时间差 56 年/use_sim_time＋stamp=0 最新变换＋清进程重启）", "导航秒成功不动（stateful 残留＋MPPI「速度全 0」→stateful=false＋换 RPP）", "map 坐标系不存在三轮（补地图参数→自动初始位姿→重写行为树路径）", "任务服务器崩溃（变量名撞基类私有字段→改名）", "spawn 卡住（DDS 发现失败→ROS_LOCALHOST_ONLY=1/IGN_IP=GZ_IP=127.0.0.1＋URDF 字符串直传/成功率 100%）", "空白误报牛奶盒（图像质量判空）", "速度桥接失效（重复广告＋消息类型/统一话题＋轮关节名对齐）"], "ans": [{"lead": "", "text": "视觉任务在虚拟机环境下集成 ROS2、Gazebo 和 Nav2，遇到了不少典型工程问题，下面按现象、根因、解决三段式说明最有代表性的几个。我们也由此总结出一套分层排查的方法论：先看节点生命周期是不是激活，再看话题有没有发布者和数据，再看坐标变换通不通、时间戳对不对，层层定位而不是盲目调参。"}, {"lead": "最核心的问题是仿真时间轴混用。", "text": "现象是 Nav2 反复报“变换数据太旧”，并且机器人秒判到达却完全不动。根因是 Gazebo、坐标变换和里程计用的是仿真时间、只有十几秒，而部分节点和 Python 程序发导航目标时用的是系统墙上时间、十七亿多秒，两者相差约五十六年，Nav2 一看目标时间戳比缓存新了几十年，就认为变换太旧无法对齐、于是错误地判定已到达。解决分三步：给所有 Nav2 节点和 RViz 显式设置使用仿真时间；所有 Python 节点发导航目标时把时间戳统一设成零，这是坐标变换库约定的“使用最新可用变换”的写法，能从根上绕开时间轴不一致；最后彻底清理残留的旧进程再重启，避免多套仿真时间互相打架。这个问题排查了很多轮，最能体现系统集成能力。"}, {"lead": "第二个问题是导航秒成功但机器人不动。", "text": "现象是导航动作很快返回成功，但剩余距离还有两米多、速度指令全为零。根因有两个，一是到达检查器保留了上一轮“已到达”的状态，二是 MPPI 控制器在小地图和虚拟机下偶发“成功但速度为零”。解决办法是把到达检查器设成每个新目标都重新评估，并把局部控制器从 MPPI 换成更轻量确定的调节型纯追踪。"}, {"lead": "第三个问题是静态地图导航报“地图坐标系不存在”，分三轮才彻底解决。", "text": "第一轮发现地图服务报参数未初始化，根因是参数文件里地图服务段被注释、导致无法重写地图路径，解决办法是补回这段参数让启动文件能写入真实地图路径、地图才得以发布。第二轮发现地图发布了但仍说坐标系不存在、定位模块报没有初始位姿，解决办法是给定位模块加上自动初始位姿。第三轮发现定位激活了但导航器仍未激活，根因是行为树的路径还是占位符没被替换，解决办法是在启动文件里把行为树路径重写成真实文件。三层都修好之后导航才完全激活。这道题最能体现分层排查的深度。"}, {"lead": "第四个问题是任务服务器崩溃。", "text": "现象是收到任务后报属性错误。根因是我们用来保存导航客户端字典的变量名，恰好和框架基类的内部保留字段重名、被覆盖了。解决办法是把这个变量改名。教训是继承框架类时不要触碰它的私有字段。"}, {"lead": "第五个问题是机器人生成卡住。", "text": "现象是生成机器人的节点一直挂着、基础话题都看不到。根因是虚拟机网络导致 ROS2 的分布式发现失败，而生成节点又依赖话题发现。解决办法是强制让通信走本机回环地址，并把生成方式从订阅话题改成先把机器人描述展开成文件再直接传入，绕开话题发现，成功率提升到百分之百。"}, {"lead": "第六个问题是视觉把空白画面误报成牛奶盒。", "text": "现象是无图形界面时相机抓到一整张灰白空图，被误报成白色的牛奶盒。根因是纯白画面落入了白色颜色模板。解决办法是在识别前先判断图像质量，灰度变化很小且饱和像素比例很低时就认定是空白或低纹理画面、直接输出空结果，宁可识别失败也不造假。"}, {"lead": "第七个问题是速度桥接失效。", "text": "现象是导航有速度输出但底盘几乎不动。根因是早期把两个速度话题都桥接到了仿真的同一个话题、造成重复广告，而且消息类型声明不对。解决办法是统一成只把一个速度话题桥接过去、并用正确的消息类型，再手动发布速度指令验证底盘确实运动后才固化配置。此外还有一个机器人模型相关的小坑，驱动插件里写的轮子关节名和模型文件里的真实关节名不一致，启动时报找不到关节，把名字统一并对齐轮距轮半径才解决。"}]}, {"title": "十二、测试方案与结果（视觉）", "silu": "先讲五维度（测试环境/自主建图/定位导航/语义识别/端到端任务）和分层测试思想（先用合成标准图像剥离仿真渲染不确定性单独验证算法、再上真实相机；位置误差用定位位姿与配置坐标作差并参考里程计排除假成功不动）。再报数据：建图约 220×180 栅格/0.05m、连通性全过；定位导航四点单点成功率 100%、误差 0.33–0.4m 都在 0.55m 容差内、Nav2 六节点生命周期全激活；语义识别三色包裹＋红苹果正确、空白防误报有效；端到端跑通教室→快递站→水果店→宿舍、DONE 4/4。最后诚实说明已知局限——headless 无渲染相机是空白图、识别被防误报拒绝、完整演示要开渲染，这是虚拟机无独显离屏渲染受限造成的、不是算法造假。诚实声明＋准数字是采分点。", "kw": ["五维度（环境/建图/定位导航/识别/端到端）", "分层测试（合成标准图剥离渲染不确定性→真实相机/位置误差作差＋里程计排除假成功）", "建图 220×180/0.05m/连通性全过", "四点单点成功率 100%/误差 0.33-0.4m 在 0.55m 容差内/Nav2 六节点全激活", "识别三色包裹＋红苹果正确＋空白防误报", "端到端 DONE 4/4", "已知局限（headless 无渲染→空白图被拒/无独显离屏渲染受限/非算法造假）"], "ans": [{"lead": "", "text": "我们从测试环境、自主建图、定位导航、语义识别和端到端任务五个维度做了验证，并采用分层测试的思想：先用合成的标准图像剥离仿真渲染的不确定性、单独验证识别算法本身，再上真实相机；位置误差用定位估计的位姿和配置坐标作差，并参考里程计确认机器人确实在动，排除假成功不动的情况。"}, {"lead": "", "text": "测试结果是：自主建图能生成覆盖完整可通行区域的二维栅格地图，尺寸约二百二十乘一百八十栅格、分辨率零点零五米，核心地点连通性全部通过。定位导航方面，对教室、快递站、水果店、宿舍四个核心任务点单点导航成功率为百分之百，到达误差在零点三三到零点四米之间、都落在零点五五米的目标容差以内，Nav2 的六个核心节点生命周期全部正常激活。语义识别方面，合成的三色包裹和红色苹果识别都正确，空白画面防误报机制有效。端到端任务方面，完整跑通了从教室出发、快递站取件、水果店取物、宿舍送达的服务闭环，任务最终状态为全部四步完成。需要诚实说明的是，无图形界面模式下相机不渲染、是空白图，识别会被防误报机制拒绝，完整演示要在开启渲染的模式下进行，这是虚拟机没有独立显卡、离屏渲染受限造成的已知局限，不是算法造假。"}]}, {"title": "十三、如果要在视觉任务上做进一步拓展，可以怎么做、做什么", "silu": "用感知层/系统层/扩展层＋真机部署，每个都「做什么＋怎么做」。感知层：HSV 对光照材质敏感、只答「在不在画面」→引入深度相机＋YOLO 语义分割提鲁棒性支持更多类别、引入点云三维语义建图构建可查询语义地图。系统层：取物点人工标定→深度相机三维定位＋视觉伺服自动对接自己算停靠点减少硬编码；解决 headless 相机不渲染（换支持离屏渲染后端）；动态环境分层处理（临时障碍交局部代价地图、长期变化才在线/增量更新写地图）。扩展层：已预留多机器人协同/自然语言语音导航/行为树可视化编辑器，因 4 核 8G 没进主线→更强平台落地匈牙利分配多机调度＋语音识别加本地大模型自然语言指令。真机部署：仿真配置适配真实差速平台（如 TurtleBot3）＋重标相机内参/里程计/定位噪声参数（架构可迁移参数需重整定）。", "kw": ["感知层（深度相机＋YOLO 语义分割/点云三维语义建图/可查询语义地图）", "系统层（深度相机三维定位＋视觉伺服自动对接/减少人工标定/解决 headless 离屏渲染/动态环境分层:局部避障 vs 在线增量更新）", "扩展层（已预留多机协同-自然语言语音导航-行为树可视化编辑器/匈牙利分配多机调度/语音＋本地大模型自然语言指令）", "真机部署（适配 TurtleBot3 差速平台/重标相机内参-里程计-定位噪声参数/架构可迁移参数需重整定）"], "ans": [{"lead": "", "text": "如果在现有系统基础上继续拓展，我们会从感知层、系统层和扩展层三个方向推进。"}, {"lead": "", "text": "在感知层，重点是提升识别的鲁棒性和环境理解的深度。当前用的是 HSV 颜色识别，对光照和材质较敏感、只能回答“目标在不在画面里”。做法是引入深度相机和 YOLO 这类深度学习语义分割模型，提升复杂光照和遮挡下的识别鲁棒性、支持更多类别的物体；并引入基于点云的三维语义建图，把语义标签和三维地图结合起来，构建可供上层任务查询的语义地图，让机器人具备更深层的环境理解能力。"}, {"lead": "", "text": "在系统层，重点是减少人工干预、提高精度和适应性。当前物体的接近点是人工标定的，视觉只确认目标是否存在、不做三维位姿估计。做法是用深度相机做三维定位，实现视觉伺服自动对接，让机器人能自己算出靠近物体的停靠点，减少手工标定和参数硬编码；同时解决无图形界面模式下相机不渲染、视觉无输入的问题，比如更换支持离屏渲染的仿真后端，让真实相机识别在完整闭环里稳定生效；对于动态环境，则分层处理，临时障碍交给激光和局部代价地图实时避障、不修改全局地图，长期稳定的环境变化才用在线建图或增量式更新写入地图。"}, {"lead": "", "text": "在扩展层，重点是把已经预留接口的高级能力在算力允许时真正落地。我们的代码仓库里已经保留了多机器人协同、自然语言语音导航和行为树可视化编辑器等实验模块，但因为四核八G的虚拟机算力有限而没有进入主线。做法是在算力更强的平台上，落地基于匈牙利分配的多机器人任务调度、基于语音识别加本地大模型的自然语言指令解析，让用户用口语下达配送任务。"}, {"lead": "", "text": "最后，在真机部署层面，可以把仿真里验证过的机器人描述、传感器模型和导航定位配置适配到真实差速驱动平台，比如 TurtleBot3，并重新标定相机内参、轮速里程计和定位的噪声参数，因为真实世界还有传感器噪声、光照变化和动态行人，架构可以迁移但参数需要重新整定。"}]}]}, {"name": "第三部分　两个任务都适用的通用设计题", "questions": [{"title": "一、机器人感知系统由哪些部分组成，结合你的项目谈理解", "silu": "先给定义（机器人通过合理组合多种传感器、检测环境信息与自身状态对应的物理量、构建环境与状态模型、对环境变化做实时准确反应的系统），再给四层结构（传感器层=外部＋内部传感器/前端信号处理层=滤波降噪切段降采样特征提取/感知理解层=识别建图语义身份意图理解/决策与反馈层=状态机决策控制执行反馈）。然后两个项目各走一遍（听觉：麦克风→VAD 能量切段→ASR＋声纹理解→解析＋大模型决策→小车＋TTS 反馈；视觉：激光＋相机＋里程计→桥接→建图定位＋颜色识别理解→任务状态机决策→底盘＋RViz 反馈）。最后核心理解金句——「感知系统不是单传感器/单模型，而是采集-处理-理解-决策-执行-反馈完整闭环，且每个传感器结果都不能直接用、要结合状态和权限再解释」（听觉识别文本要过声纹门禁、视觉看到红色要先确认到达当前任务地点）。定义＋四层＋闭环金句是采分核心。", "kw": ["定义（多传感器组合/检测环境＋自身物理量/构建模型/实时准确反应）", "四层结构（传感器层-外部＋内部/前端信号处理-滤波降噪切段特征/感知理解-识别建图语义意图/决策反馈-状态机决策执行反馈）", "两项目映射（听觉链路/视觉链路）", "完整闭环（采集-处理-理解-决策-执行-反馈）", "感知结果不能直接用要结合状态权限再解释（声纹门禁/到达地点才算识别）"], "ans": [{"lead": "", "text": "机器人感知系统是指机器人通过把多种传感器合理组合，检测环境信息和自身内部状态对应的物理量，从而构建环境和状态模型、对环境变化做出实时准确反应的系统。它通常分为四个层次。第一是传感器层，包括感知环境的外部传感器和感知自身状态的内部传感器。第二是前端信号处理层，负责滤波、降噪、切段、降采样和特征提取。第三是感知理解层，负责识别、建图、语义识别、身份或意图理解。第四是决策与反馈层，负责状态机决策、控制执行以及反馈输出。"}, {"lead": "", "text": "结合我们的两个项目来看，听觉系统以麦克风这个外部声学传感器为起点，经过语音活动检测和能量阈值的前端切段，由语音识别和声纹识别完成理解，再由指令解析和大模型做决策，最后驱动小车并用语音合成反馈。视觉系统以激光雷达和相机这两个外部传感器、以及里程计这个内部传感器为感知层，经过桥接进入系统，由建图和定位、颜色识别完成理解，由任务状态机做决策，最后驱动底盘并在界面可视化反馈。"}, {"lead": "", "text": "核心理解在于，机器人感知系统不是单个传感器、也不是单个模型，而是从采集、处理、理解、决策、执行到反馈的完整闭环；而且每个传感器的结果都不能直接使用，要结合状态和权限再解释。比如听觉里识别出文本不等于立刻执行，要先过声纹门禁；视觉里看到一抹红色不等于到了水果店，要先确认到达了当前任务地点。这正是机器人感知系统比单一传感实验更有价值的地方。"}]}, {"title": "二、机器人传感器和普通传感器有什么区别", "silu": "先给共同点（作为传感器本体定义相同：能感受被测量并按规律转成可用输出信号、由敏感元件＋转换元件＋测量电路组成），再点根本区别——机器人传感器要服务于感知-决策-执行闭环、且工作在会移动会振动会自己发声的本体上。然后五方面展开：目的不同（普通只测量输出量、机器人输出要驱动决策动作）、平台不同（静止固定 vs 会动有电机风扇噪声、扬声器麦克风可能同声场）、环境不同（动态不确定强干扰/混响光照动态障碍）、数量关系不同（多传感器融合＋内外协同＋时间坐标同步）、结果使用不同（机器人要结合状态机和权限再解释而非直接读数）。最后用项目佐证（听觉扬声器麦克风同声场的自触发、视觉里程计累积漂移要靠激光匹配地图修正——都是普通静止传感器不会遇到的）。", "kw": ["共同点（本体定义相同/敏感元件＋转换元件＋测量电路）", "根本区别（服务感知-决策-执行闭环/工作在会动会振会发声的本体）", "五方面（目的-驱动决策动作/平台-会动有噪声同声场/环境-动态强干扰/数量-多传感器融合内外协同时间坐标同步/结果-结合状态权限再解释）", "项目佐证（自触发/里程计漂移靠激光修正）"], "ans": [{"lead": "", "text": "两者作为传感器的本体定义是相同的，都是能感受被测量并按一定规律转换成可用输出信号的器件，由敏感元件、转换元件和测量电路组成。区别在于机器人传感器要服务于机器人的感知、决策、执行闭环，并且工作在一个会移动、会振动、会自己发声的本体上。"}, {"lead": "", "text": "可以从五个方面展开。第一是目的不同，普通传感器往往只是测量并输出一个量，机器人传感器的输出要驱动机器人的决策和动作。第二是工作平台不同，普通传感器多为静止固定安装，机器人传感器装在会动、会有电机和风扇噪声、扬声器和麦克风还可能处于同一声场的本体上。第三是工作环境不同，机器人面对的是动态、不确定、强干扰的环境，比如混响、光照变化和动态障碍。第四是数量和关系不同，机器人往往需要多传感器融合、内部和外部传感器协同，还要做时间和坐标的同步。第五是结果使用方式不同，机器人传感器的结果要结合状态机和权限再解释，而不是直接读数。用我们的项目佐证，听觉里扬声器和麦克风同处一个声场带来的自触发问题，视觉里里程计会累积漂移、必须靠激光匹配地图来修正，都是普通静止传感器不会遇到、而机器人传感器特有的问题。"}]}, {"title": "三、给你一个听觉或视觉任务，你会怎么设计技术路线，需要完成哪些任务", "silu": "方法论总纲题，给一套通用七步法（听觉视觉都适用）：①需求分析与指标化（场景用户＋把任务书转成可测指标:准确率/延迟/误差/连续运行/不得自触发）→②系统分层与数据流设计（画感知-前端-理解-决策-执行-反馈框图＋标准接口解耦可独立测试）→③传感器与算法选型（够用/稳定/可解释/算力可承受＋说清为什么选放弃什么）→④逐模块实现→⑤工程鲁棒性设计（噪声/干扰/冲突/失败恢复:自触发抑制/动态避障/失败重试）→⑥测试与验证（先定义指标再多场景多设备多轮次对照实验量化）→⑦回扣与反思（映射回传感系统能力点＋创新点与不足）。再分别给听觉子任务清单和视觉子任务清单。最后点明这正对应课程要求「按任务和场景确定传感器类型、关键指标、使用数量、设计传感系统解决方案」。七步法是采分骨架，背全就稳。", "kw": ["通用七步法（需求分析指标化→系统分层数据流→传感器算法选型→逐模块实现→工程鲁棒性→测试验证→回扣反思）", "指标化（准确率/延迟/误差/连续运行/不得自触发）", "标准接口解耦可独立测试", "选型原则（够用/稳定/可解释/算力可承受）", "鲁棒性（自触发抑制/动态避障/失败重试）", "先定义指标再多场景多设备多轮对照", "听觉子任务清单", "视觉子任务清单", "回扣课程要求（按任务场景定传感器类型-指标-数量）"], "ans": [{"lead": "", "text": "无论是听觉还是视觉任务，我都会按同一套工程方法来设计，分七步。第一步是需求分析与指标化，明确场景和用户，把任务书的要求转化成可测量的指标，比如识别准确率、响应延迟、定位误差、连续运行时间和不得自触发。第二步是系统分层与数据流设计，画出从感知、前端、理解、决策、执行到反馈的框图，明确各模块的输入输出和接口，让模块之间用标准接口解耦、可以独立测试。第三步是传感器与算法选型，按照够用、稳定、可解释、算力可承受的原则选，并说清楚为什么这么选、放弃了什么。第四步是逐模块实现，按数据流把每个模块做出来。第五步是工程鲁棒性设计，处理噪声、干扰、冲突和失败恢复，比如自触发抑制、动态避障和失败重试。第六步是测试与验证，先定义指标，再用多场景、多设备、多轮次和对照实验得到量化结果。第七步是回扣与反思，把项目映射回传感系统设计的能力点，并列出创新点和不足。"}, {"lead": "", "text": "落到具体子任务上，听觉任务要完成声音采集、前端切段、唤醒或接管、语音识别、意图理解、状态机决策、动作执行、语音反馈以及自触发冲突控制，再加上声纹门禁、日志和多语种等扩展。视觉任务要完成仿真环境与传感器配置、消息桥接、二维或三维建图、地图保存与加载、定位与重定位、全局规划与局部控制、动态避障、语义识别、高层任务编排和可视化。这套方法正好对应课程要求的，根据具体任务和工作场景确定传感器类型、关键指标和使用数量，设计合适的传感系统解决方案。"}]}]}], "appendix": {"heading": "附录　关键数据与参数速记", "note": "考前重点背这一页的数字与「不选 X」结论。任何大题答到数据或选型环节，直接引用此处口径，保证口径统一、数字前后一致；被追问到没做的部分，按文末口诀坦诚承认并给未来方案，绝不编造。", "blocks": ["听觉任务核心数据。 控制指令准确率百分之九十七，平均响应延迟零点一二秒，容错使可用率提升约百分之十七；问答识别准确率百分之百，简单问题平均零点二一秒、复杂问题平均二点一四秒；连续运行十分钟以上无崩溃、无自触发；测试规模为三台电脑各十组控制加十组问答。五类控制指令为前进、后退、左转、右转、停止，另支持复合与连续指令。", "听觉任务关键参数。 采样率一万六千赫兹；语音活动检测灵敏度取最高档；能量门限通用一百八十、控制一百二十；最短语句时长通用零点七秒、控制零点四五秒，最长八秒；声纹阈值控制常规零点四二、控制短口令零点三八、问答零点五零；声纹注册多段累计三秒；播放后抑制窗口约零点五秒，看门狗超时十秒。", "听觉任务选型一句话。 切段用 WebRTC 语音活动检测加能量阈值；识别用 SenseVoiceSmall，不用 Whisper 是因延迟和显存超标；声纹用 CAM++，参数量约七百二十万；大模型用 Qwen2.5 的十五亿参数指令版，量化后显存三G以内；合成用 edge-tts；日志用 JSONL 结构化。", "视觉任务核心数据。 四个核心地点单点导航成功率百分之百，到达误差零点三三到零点四米、均在零点五五米容差内；地图约二百二十乘一百八十栅格、分辨率零点零五米；合成图像识别正确率百分之百、空白防误报有效；端到端任务全部四步完成。", "视觉任务关键参数与选型。 局部控制器期望线速度零点二五米每秒、前视距离零点四五米；底盘轮距零点四五米、轮半径零点零七五米；坐标变换树从地图到里程计、再到机器人本体、再到各传感器，全系统统一使用仿真时间、发目标用最新可用变换。全局规划用 Navfn 不用 Smac Hybrid，局部控制用调节型纯追踪不用 MPPI，语义识别用 HSV 颜色阈值不用 YOLO，理由都是轻量、确定、可解释、在虚拟机上稳定。", "答题口诀。 任何大题都按这个顺序写：是什么，为什么这么选、为什么不选别的，怎么实现，遇到什么问题怎么解决，效果如何用数据说话，最后一句回扣到机器人传感系统的完整闭环。被问到没做的地方就坦诚承认、说清原因多半是算力或稳定取舍、再给未来方案，绝不编造。"]}};

/* ---- flatten ---- */
const DOMS=[
 {key:'aud',label:'听觉',color:'var(--c-aud)',hex:'#2BB6C4'},
 {key:'vis',label:'视觉',color:'var(--c-vis)',hex:'#A78BFA'},
 {key:'gen',label:'通用',color:'var(--c-gen)',hex:'#EC6F9C'},
];
const Q=[]; const GROUPS=[];
DATA.parts.forEach((pt,pi)=>{
  const dom=DOMS[Math.min(pi,2)];
  const items=[];
  pt.questions.forEach(q=>{ const o={...q,gi:Q.length,pi,dom}; Q.push(o); items.push(o); });
  GROUPS.push({pi,dom,name:pt.name,items,label:['听觉任务','视觉任务','通用设计题'][Math.min(pi,2)]});
});
const N=Q.length;

/* ---- state + persistence (window.storage if present, else memory) ---- */
const KEY='ros_exam_progress_v1';
const Store={mem:null,
  async load(){ try{const r=await window.storage.get(KEY); if(r&&r.value) return JSON.parse(r.value);}catch(e){} return this.mem; },
  async save(v){ this.mem=v; try{await window.storage.set(KEY,JSON.stringify(v));}catch(e){} }
};
let status=new Array(N).fill(0);
const S={mode:'study',filter:'all',search:'',openCards:new Set(),
  rPos:0,rIds:[],rOpen:{silu:false,kw:false,ans:false},onlyUn:false,shuffle:false,kwShow:{}};

/* ---- helpers ---- */
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cnt=()=>{let d=0,r=0;status.forEach(v=>{if(v===2)d++;else if(v===1)r++;});return{d,r,u:N-d-r};};
function persist(){ Store.save(status); }
function cycle(gi){ status[gi]=(status[gi]+1)%3; persist(); refreshDots(); meter(); }

const chev=`<svg class="ic" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const searchIcon=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

function blkSilu(q){return `<div class="silu"><div class="silu-h">答题思路</div><div class="silu-b">${esc(q.silu)}</div></div>`;}
function blkKw(q){return `<div class="mini-h kw-h">关键词<span class="tag">采分点 · ${q.kw.length}</span></div><div class="kwrow">${q.kw.map(k=>`<span class="chip">${esc(k)}</span>`).join('')}</div>`;}
function blkAns(q){return `<div class="ans">${q.ans.map(a=>`<p>${a.lead?`<b>${esc(a.lead)}</b>`:''}${esc(a.text)}</p>`).join('')}</div>`;}

/* ---- meter + dots ---- */
function meter(){const c=cnt();$('#mDone').textContent=c.d;$('#mTot').textContent=N;
  $('#fDone').style.width=(c.d/N*100)+'%';
  const rev=$('#fRev');rev.style.left=(c.d/N*100)+'%';rev.style.width=(c.r/N*100)+'%';}
function refreshDots(){document.querySelectorAll('[data-dot]').forEach(el=>{
  const v=status[+el.dataset.dot];el.classList.remove('s1','s2');if(v===1)el.classList.add('s1');if(v===2)el.classList.add('s2');});}

/* ---- spine ---- */
function spine(){
  $('#spine').innerHTML=GROUPS.map(g=>`
    <div class="grp">
      <div class="grp-h"><span class="bar" style="background:${g.dom.color}"></span>${g.label}<span class="gc">${g.items.length}</span></div>
      ${g.items.map(q=>`<div class="qitem" data-jump="${q.gi}">
        <span class="dot" data-dot="${q.gi}"></span>
        <span class="qt" style="--qc:${q.dom.color}">${esc(q.title)}</span>
      </div>`).join('')}
    </div>`).join('');
  refreshDots();
}

/* ---- STUDY ---- */
function viewStudy(){
  const q=S.search.trim().toLowerCase();
  const match=x=> !q || (x.title+ x.silu+ x.kw.join('')+ x.ans.map(a=>a.lead+a.text).join('')).toLowerCase().includes(q);
  let html=`<div class="toolbar">
    <div class="search">${searchIcon}<input id="srch" placeholder="搜索题目 / 关键词 / 答案…" value="${esc(S.search)}"></div>
    <button class="btn" id="expAll">展开全部</button>
    <button class="btn" id="colAll">收起全部</button>
  </div>`;
  let any=false;
  GROUPS.forEach(g=>{
    const items=g.items.filter(match);
    if(!items.length) return; any=true;
    html+=`<section class="part-sec">
      <div class="part-h"><span class="bar" style="background:${g.dom.color}"></span><span class="pn">${esc(g.name)}</span><span class="pc">${items.length} 题</span></div>
      ${items.map(qq=>card(qq)).join('')}
    </section>`;
  });
  if(!any) html+=`<div class="empty"><div class="big">&#128269;</div><p>没有匹配「${esc(S.search)}」的题目</p></div>`;
  $('#view').innerHTML=html; refreshDots();
}
function card(q){
  const open=S.openCards.has(q.gi);
  return `<div class="card ${open?'open':''}" data-card="${q.gi}" style="--dom:${q.dom.color}">
    <div class="card-h" data-toggle="${q.gi}">
      <button class="statusdot" data-dot="${q.gi}" data-cyc="${q.gi}" title="标记掌握状态"></button>
      <span class="ct">${esc(q.title)}</span>
      <span class="kwcount">${q.kw.length} 词</span>
      <span class="chev">${chev}</span>
    </div>
    <div class="acc-body"><div class="acc-inner"><div class="acc-pad">
      ${blkSilu(q)}${blkKw(q)}${blkAns(q)}
    </div></div></div>
  </div>`;
}

/* ---- RECITE ---- */
function buildDeck(){
  let ids=Q.filter(q=> S.filter==='all'||q.dom.key===S.filter).map(q=>q.gi);
  if(S.onlyUn) ids=ids.filter(gi=>status[gi]<2);
  if(S.shuffle){for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}}
  S.rIds=ids; if(S.rPos>=ids.length)S.rPos=Math.max(0,ids.length-1);
}
function viewRecite(){
  const fbar=`<div class="rbar">
    ${['all','aud','vis','gen'].map(k=>`<button class="fchip ${S.filter===k?'on':''}" data-f="${k}">${k==='all'?'全部':DOMS.find(d=>d.key===k).label}</button>`).join('')}
    <button class="fchip ${S.shuffle?'on':''}" data-shuf style="margin-left:8px">&#128256; 打乱</button>
    <label class="toggle ${S.onlyUn?'on':''}" data-only><span class="sw"></span>只练未掌握</label>
  </div>`;
  if(!S.rIds.length){
    $('#view').innerHTML=fbar+`<div class="empty"><div class="big">&#127881;</div><p>这一组都掌握了！</p><p style="color:var(--faint);font-size:13px">关掉「只练未掌握」或切换分类，再练别的。</p></div>`;
    bindRbar(); return;
  }
  const q=Q[S.rIds[S.rPos]];
  const ly=(t,num,label,body)=>`<div class="lyr ${S.rOpen[t]?'open':''}" data-t="${t}">
      <button class="lyr-btn" data-lyr="${t}"><span class="lyr-num">${num}</span>${label}
        <span class="lyr-state">${S.rOpen[t]?'已翻开':'点击翻开'}<span class="lyr-chev">${chev}</span></span></button>
      <div class="lyr-wrap"><div class="lyr-inner"><div class="lyr-pad">${body}</div></div></div></div>`;
  $('#view').innerHTML=fbar+`
    <div class="rcard" style="--dom:${q.dom.color}">
      <div class="rhead">
        <span class="rbadge" style="background:${q.dom.color}">${q.dom.label}</span>
        <span class="rpos"><b>${S.rPos+1}</b> / ${S.rIds.length}${S.onlyUn?' · 未掌握':''}</span>
      </div>
      <div class="rtitle">${esc(q.title)}</div>
      <div class="layers">
        ${ly('silu','1','答题思路 — 怎么组织',`<div class="silu-b">${esc(q.silu)}</div>`)}
        ${ly('kw','2','关键词 — 要命中的采分点',`<div class="kwrow">${q.kw.map(k=>`<span class="chip">${esc(k)}</span>`).join('')}</div>`)}
        ${ly('ans','3','参考答案 — 完整背诵稿',blkAns(q))}
      </div>
      <div class="grade">
        <button class="gbtn g-no" data-grade="1">&#8635; 没记住</button>
        <button class="gbtn g-yes" data-grade="2">&#10003; 记住了</button>
      </div>
      <div class="nav">
        <button class="navbtn" data-nav="-1" ${S.rPos===0?'disabled':''}>&larr; 上一题</button>
        <button class="navbtn" data-nav="1" ${S.rPos>=S.rIds.length-1?'disabled':''}>下一题 &rarr;</button>
      </div>
      <div class="hint"><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 翻层 &nbsp;·&nbsp; <kbd>&larr;</kbd><kbd>&rarr;</kbd> 切题 &nbsp;·&nbsp; <kbd>Enter</kbd> 记住了 &nbsp;·&nbsp; <kbd>Bksp</kbd> 没记住</div>
    </div>`;
  bindRbar();
}
function bindRbar(){
  document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{S.filter=b.dataset.f;S.rPos=0;buildDeck();resetReveal();viewRecite();syncSpine();});
  const sh=$('[data-shuf]'); if(sh)sh.onclick=()=>{S.shuffle=!S.shuffle;S.rPos=0;buildDeck();resetReveal();viewRecite();};
  const ol=$('[data-only]'); if(ol)ol.onclick=()=>{S.onlyUn=!S.onlyUn;S.rPos=0;buildDeck();resetReveal();viewRecite();};
}
function resetReveal(){S.rOpen={silu:false,kw:false,ans:false};}
function gotoRecite(gi){const i=S.rIds.indexOf(gi);if(i>=0){S.rPos=i;resetReveal();viewRecite();syncSpine();}}

/* ---- KEYWORD ---- */
function cover(term){const n=Math.min(Math.max([...term].length,1),6);return '▢'.repeat(n);}
function viewKw(){
  let html=`<div class="rbar">
    ${['all','aud','vis','gen'].map(k=>`<button class="fchip ${S.filter===k?'on':''}" data-kf="${k}">${k==='all'?'全部':DOMS.find(d=>d.key===k).label}</button>`).join('')}
    <button class="btn" id="kwAll" style="margin-left:auto">全部翻开</button>
    <button class="btn" id="kwNone">全部盖回</button>
  </div>`;
  GROUPS.forEach(g=>{
    if(S.filter!=='all'&&g.dom.key!==S.filter)return;
    html+=`<section class="part-sec"><div class="part-h"><span class="bar" style="background:${g.dom.color}"></span><span class="pn">${esc(g.name)}</span></div>`;
    g.items.forEach(q=>{
      const shown=S.kwShow[q.gi]||new Set();
      html+=`<div class="kwq" data-kwq="${q.gi}" style="--dom:${q.dom.color}">
        <div class="kwq-h"><span class="qt">${esc(q.title)}</span>
          <span class="tally"><b data-tally="${q.gi}">${shown.size}</b>/${q.kw.length}</span>
          <button class="flip" data-flipone="${q.gi}">${shown.size===q.kw.length?'盖回':'全翻'}</button></div>
        <div class="kwchips">${q.kw.map((k,ix)=>`<span class="kc ${shown.has(ix)?'show':''}" data-kc="${q.gi}:${ix}">${shown.has(ix)?esc(k):cover(k)}</span>`).join('')}</div>
      </div>`;
    });
    html+=`</section>`;
  });
  $('#view').innerHTML=html;
}
function flipChip(gi,ix){const s=S.kwShow[gi]||(S.kwShow[gi]=new Set());s.has(ix)?s.delete(ix):s.add(ix);}

/* ---- APPENDIX ---- */
const numRe=/(\d+(?:\.\d+)?\s?(?:%|秒|毫秒|米每秒|厘米|米|赫兹|GB|G|档|栅格|步|个)?|百分之[零一二三四五六七八九十百]+|[零一二三四五六七八九十百千]+(?:点[零一二三四五六七八九]+)?(?:秒|毫秒|米每秒|厘米|米|赫兹|档|栅格|步|个|G|GB))/g;
function hl(t){return esc(t).replace(numRe,m=>`<span class="num">${m}</span>`);}
function viewAppendix(){
  const ap=DATA.appendix;
  let cards='';
  ap.blocks.forEach(b=>{
    const ci=b.indexOf('。');
    const label=(ci>0?b.slice(0,ci):b).replace(/[。\s]+$/,'');
    const body=ci>0?b.slice(ci+1).trim():'';
    const isVis=/视觉/.test(label);
    if(/口诀/.test(label)){
      cards+=`<div class="kou"><div class="ah"><span class="pill">UNIVERSAL</span>${esc(label)}</div><div class="ab">${hl(body)}</div></div>`;
    }else{
      cards+=`<div class="apx-card ${isVis?'vis':''}"><div class="ah">${esc(label)}</div><div class="ab">${hl(body)}</div></div>`;
    }
  });
  $('#view').innerHTML=`${ap.note?`<div class="apx-note"><b>速记说明 ·</b> ${esc(ap.note)}</div>`:''}
    <div class="apx-grid">${cards}</div>`;
}

/* ---- router + binding ---- */
function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===S.mode));
  if(S.mode==='study')viewStudy();
  else if(S.mode==='recite'){buildDeck();viewRecite();}
  else if(S.mode==='kw')viewKw();
  else viewAppendix();
  syncSpine();
}
function syncSpine(){
  let curGi=-1;
  if(S.mode==='recite'&&S.rIds.length)curGi=S.rIds[S.rPos];
  document.querySelectorAll('[data-jump]').forEach(el=>el.classList.toggle('cur',+el.dataset.jump===curGi));
}

/* delegated clicks */
document.addEventListener('click',e=>{
  const t=e.target;
  // spine jump
  const jp=t.closest('[data-jump]');
  if(jp){const gi=+jp.dataset.jump;document.body.classList.remove('menu');
    if(S.mode==='recite'){gotoRecite(gi);} 
    else if(S.mode==='kw'){S.mode='kw';render();const el=document.querySelector(`[data-kwq="${gi}"]`);el&&el.scrollIntoView({behavior:'smooth',block:'center'});}
    else{S.mode='study';S.openCards.add(gi);render();const el=document.querySelector(`[data-card="${gi}"]`);el&&el.scrollIntoView({behavior:'smooth',block:'center'});}
    return;}
  // status cycle (study)
  const cy=t.closest('[data-cyc]'); if(cy){e.stopPropagation();cycle(+cy.dataset.cyc);return;}
  // card toggle
  const tg=t.closest('[data-toggle]'); if(tg){const gi=+tg.dataset.toggle;S.openCards.has(gi)?S.openCards.delete(gi):S.openCards.add(gi);
    document.querySelector(`[data-card="${gi}"]`).classList.toggle('open');return;}
  // recite layer toggle
  const ly=t.closest('[data-lyr]'); if(ly){const k=ly.dataset.lyr;S.rOpen[k]=!S.rOpen[k];
    const box=ly.closest('.lyr');box.classList.toggle('open');
    box.querySelector('.lyr-state').childNodes[0].textContent=S.rOpen[k]?'已翻开':'点击翻开';return;}
  // grade
  const gr=t.closest('[data-grade]'); if(gr){grade(+gr.dataset.grade);return;}
  // nav
  const nv=t.closest('[data-nav]'); if(nv){move(+nv.dataset.nav);return;}
  // kw chip flip
  const kc=t.closest('[data-kc]'); if(kc){const[gi,ix]=kc.dataset.kc.split(':').map(Number);flipChip(gi,ix);updateKwq(gi);return;}
  const fo=t.closest('[data-flipone]'); if(fo){const gi=+fo.dataset.flipone;const q=Q[gi];const s=S.kwShow[gi]||(S.kwShow[gi]=new Set());
    if(s.size===q.kw.length)s.clear();else q.kw.forEach((_,i)=>s.add(i));updateKwq(gi);return;}
});
function updateKwq(gi){const q=Q[gi];const s=S.kwShow[gi]||new Set();
  const box=document.querySelector(`[data-kwq="${gi}"]`);if(!box)return;
  box.querySelectorAll('[data-kc]').forEach(el=>{const ix=+el.dataset.kc.split(':')[1];const on=s.has(ix);
    el.classList.toggle('show',on);el.textContent=on?q.kw[ix]:cover(q.kw[ix]);});
  box.querySelector(`[data-tally="${gi}"]`).textContent=s.size;
  box.querySelector(`[data-flipone="${gi}"]`).textContent=s.size===q.kw.length?'盖回':'全翻';}

function grade(v){const gi=S.rIds[S.rPos];status[gi]=v;persist();refreshDots();meter();
  if(S.onlyUn){buildDeck();if(S.rPos>=S.rIds.length)S.rPos=Math.max(0,S.rIds.length-1);}
  else{if(S.rPos<S.rIds.length-1)S.rPos++;}
  resetReveal();viewRecite();syncSpine();}
function move(d){const np=S.rPos+d;if(np<0||np>=S.rIds.length)return;S.rPos=np;resetReveal();viewRecite();syncSpine();}

/* tabs */
$('#tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;S.mode=b.dataset.m;render();window.scrollTo({top:0,behavior:'smooth'});});
/* study search + expand (delegated via input listener) */
document.addEventListener('input',e=>{if(e.target.id==='srch'){S.search=e.target.value;
  // keep caret: re-render then refocus
  const v=e.target.value;viewStudy();const i=$('#srch');if(i){i.focus();i.setSelectionRange(v.length,v.length);}}});
document.addEventListener('click',e=>{
  if(e.target.id==='expAll'){GROUPS.forEach(g=>g.items.forEach(q=>S.openCards.add(q.gi)));viewStudy();}
  if(e.target.id==='colAll'){S.openCards.clear();viewStudy();}
  if(e.target.id==='kwAll'){GROUPS.forEach(g=>{if(S.filter!=='all'&&g.dom.key!==S.filter)return;g.items.forEach(q=>{const s=S.kwShow[q.gi]||(S.kwShow[q.gi]=new Set());q.kw.forEach((_,i)=>s.add(i));});});viewKw();}
  if(e.target.id==='kwNone'){S.kwShow={};viewKw();}
  if(e.target.matches('[data-kf]')){S.filter=e.target.dataset.kf;viewKw();}
});

/* keyboard (recite only) */
document.addEventListener('keydown',e=>{
  if($('#overlay').classList.contains('show')){if(e.key==='Escape')closeModal();return;}
  if(S.mode!=='recite')return;
  const tag=(e.target.tagName||'').toLowerCase();if(tag==='input'||tag==='textarea')return;
  if(!S.rIds.length)return;
  const k=e.key.toLowerCase();
  if(k==='1'||k==='2'||k==='3'){const map={'1':'silu','2':'kw','3':'ans'};const t=map[k];S.rOpen[t]=!S.rOpen[t];
    const box=document.querySelector(`.lyr[data-t="${t}"]`);if(box){box.classList.toggle('open');box.querySelector('.lyr-state').childNodes[0].textContent=S.rOpen[t]?'已翻开':'点击翻开';}e.preventDefault();return;}
  if(k==='arrowright'||k==='j'){move(1);e.preventDefault();return;}
  if(k==='arrowleft'||k==='k'){move(-1);e.preventDefault();return;}
  if(k==='enter'){grade(2);e.preventDefault();return;}
  if(k==='backspace'){grade(1);e.preventDefault();return;}
  if(k==='s'){S.shuffle=!S.shuffle;S.rPos=0;buildDeck();resetReveal();viewRecite();e.preventDefault();return;}
});

/* drawer + modal */
$('#menuBtn').onclick=()=>document.body.classList.toggle('menu');
$('#backdrop').onclick=()=>document.body.classList.remove('menu');
function openModal(){$('#overlay').classList.add('show');}
function closeModal(){$('#overlay').classList.remove('show');}
$('#helpBtn').onclick=openModal;
$('#modalClose').onclick=closeModal;
$('#overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
$('#resetBtn').onclick=()=>{if(confirm('确定清空全部「掌握/复习」标记？此操作不可撤销。')){status=new Array(N).fill(0);persist();refreshDots();meter();render();closeModal();}};

/* init */
$('#tcStudy').textContent=N;
$('#introText').textContent=DATA.intro||'';
(async()=>{
  const saved=await Store.load();
  if(Array.isArray(saved)&&saved.length===N)status=saved.map(x=>+x||0);
  spine();meter();render();
})();
</script>
</body>
</html>
